
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Dooball Iframe Stable</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#1c1c1c;
}

.container {
    max-width:1000px;
    margin:auto;
    background:#fff;
}

.league {
    background:#5c6b7a;
    color:#fff;
    padding:10px;
    font-weight:bold;
}

.row {
    display:flex;
    align-items:center;
    border-bottom:1px solid #eee;
    padding:10px;
}

.time {
    width:80px;
    color:#666;
}

.teams {
    flex:1;
    display:flex;
    gap:10px;
}

.team {
    flex:1;
}

.vs {
    width:40px;
    text-align:center;
}

.servers {
    width:120px;
    text-align:right;
}

.btn {
    background:#22c55e;
    color:#fff;
    padding:4px 8px;
    border-radius:4px;
    font-size:12px;
    cursor:pointer;
}

/* overlay */
#overlay {
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:#000;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

#playerBox {
    width:90%;
    max-width:1000px;
}

#playerFrame {
    width:100%;
    height:600px;
    border:none;
    background:#000;
}

.team {
    display:flex;
    align-items:center;
    gap:6px;
    min-width:0;
}

.team.home {
    justify-content:flex-end;
    text-align:right;
}

.team.away {
    justify-content:flex-start;
}

.team img {
    width:20px;
    height:20px;
    object-fit:contain;
}

.team span {
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    max-width:140px;
}

.vs {
    font-weight:bold;
    color:#999;
}

</style>
</head>

<body>

<div style="background:#111;padding:10px;">
    <button onclick="goHome()" style="
        background:#ef4444;
        color:#fff;
        border:none;
        padding:6px 12px;
        border-radius:6px;
        cursor:pointer;
    ">
        ⬅ กลับหน้าหลัก
    </button>
</div>

<div class="container" id="app"></div>

<!-- PLAYER -->
<div id="overlay">
    <div id="playerBox">

        <div style="color:#fff;display:flex;justify-content:space-between;margin-bottom:5px;">
            <div id="serverBar"></div>
            <button onclick="closePlayer()">❌ Close</button>
        </div>

        <iframe id="playerFrame" allowfullscreen></iframe>

    </div>
</div>

<script>

const PLAYLIST_URL =
"https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/Dooball66%20Pro%20V4.3.json";

const HTML_URL =
"https://broken-surf-7347.hssmnoy.workers.dev/?url=https://embed-xs.bananacake.org/dooball66v2/schedule.html";

let originalData = null;
let htmlListGlobal = [];
let logoMap = {};

let currentServers = [];
let currentIndex = 0;

/* ================= LOAD ================= */
async function load(){
    try {
        const [jsonRes, htmlRes] = await Promise.all([
            fetch(PLAYLIST_URL),
            fetch(HTML_URL)
        ]);

        const data = await jsonRes.json();
        const html = await htmlRes.text();

        originalData = normalizePlaylist(data);
        htmlListGlobal = parseHTMLLogos(html);

        renderApp(originalData);

    } catch (e) {
        console.error(e);
        document.getElementById("app").innerHTML =
        "<div style='color:red;padding:20px'>โหลดไม่สำเร็จ</div>";
    }
}

/* ================= PARSE JSON ================= */
function normalizePlaylist(data){

    const result = { groups: [] };

    if(!data?.groups) return result;

    data.groups.forEach(group => {

        if(!Array.isArray(group.stations)) return;

        const map = new Map();

        group.stations.forEach(st => {

            if(!st?.name) return;

            const name = st.name.trim();

            if(!map.has(name)){
                map.set(name,{ name, stations:[] });
            }

            map.get(name).stations.push({
                url: st.url,
                referer: st.referer
            });
        });

        result.groups.push({
            name: group.name,
            groups: Array.from(map.values())
        });
    });

    return result;
}

/* ================= PARSE HTML LOGO (สำคัญ) ================= */
function parseHTMLLogos(html){

    const doc = new DOMParser().parseFromString(html, "text/html");
    const list = [];

    doc.querySelectorAll(".match").forEach(row => {

        const teams = row.querySelectorAll("span");
        const imgs = row.querySelectorAll("img");

        if(teams.length >= 2 && imgs.length >= 2){

            const home = normalize(teams[0].innerText);
            const away = normalize(teams[1].innerText);

            list.push({
                home,
                away,
                homeLogo: imgs[0].src,
                awayLogo: imgs[1].src
            });
        }
    });

    return list;
}

/* ================= MATCH LOGO FINDER ================= */
function findLogos(home, away){

    const h = normalize(home);
    const a = normalize(away);

    // 1) exact match
    let best = null;
    let score = 0;

    htmlListGlobal.forEach(m => {

        const s =
            similarity(h, m.home) +
            similarity(a, m.away);

        if(s > score){
            score = s;
            best = m;
        }
    });

    if(best && score > 1.2){
        return {
            homeLogo: best.homeLogo,
            awayLogo: best.awayLogo
        };
    }

    return {};
}

/* ================= NORMALIZE ================= */
function normalize(str){
    return (str || "")
        .toLowerCase()
        .replace(/[^a-z0-9ก-๙]/g,"")
        .trim();
}

function similarity(a,b){
    if(!a || !b) return 0;
    if(a.includes(b) || b.includes(a)) return 1;

    let m = 0;
    for(let i=0;i<a.length;i++){
        if(b.includes(a[i])) m++;
    }
    return m / Math.max(a.length,b.length);
}

/* ================= RENDER ================= */
function renderApp(data){

    const app = document.getElementById("app");

    let dateMenu = new Set();

    let html = `
    <div id="dateMenu" style="
        display:flex;
        gap:8px;
        overflow-x:auto;
        padding:10px;
        background:#222;
        position:sticky;
        top:0;
        z-index:999;
    "></div>
    `;

    data.groups.forEach(league => {

        dateMenu.add(league.name);

        html += `
<div class="league-block" data-date="${league.name}">
    <div class="league">${league.name}</div>
    <div class="rows">
`;

        league.groups.forEach(match => {

            const {home, away, time} = parseMatch(match.name);
	    const isSingle = !away || away === "TBD";
            const logos = findLogos(home, away);
            const servers = match.stations || [];

            html += `
<div class="row">

    <div class="time">${time}</div>

    <div class="teams">

    ${
        isSingle
        ? `
            <div style="
                width:100%;
                text-align:center;
                white-space:nowrap;
                overflow:hidden;
                text-overflow:ellipsis;
            ">
                ${home}
            </div>
        `
        : `
            <div class="team home">
                <span>${home}</span>
                ${logos.homeLogo ? `<img src="${logos.homeLogo}">` : ""}
            </div>

            <div class="vs">VS</div>

            <div class="team away">
                ${logos.awayLogo ? `<img src="${logos.awayLogo}">` : ""}
                <span>${away}</span>
            </div>
        `
    }

</div>

    <div class="servers">
        <span class="btn"
            onclick='openPlayer(${JSON.stringify(servers)},0)'>
            ▶ ดูสด
        </span>
    </div>

</div>
            `;
        });

        html += `
    </div>
</div>
        `;
    });

    app.innerHTML = html;

    // ===== DATE MENU =====
    const menu = document.getElementById("dateMenu");

    menu.innerHTML = Array.from(dateMenu).map(d => `
        <div onclick="filterDate('${d}')" style="
            color:#fff;
            padding:6px 10px;
            background:#444;
            border-radius:6px;
            cursor:pointer;
            white-space:nowrap;
        ">
            ${d}
        </div>
    `).join("");
}
/* ================= PARSE MATCH ================= */
function parseMatch(name){

    const time = (name.match(/\d{2}:\d{2}/) || [""])[0];

    let clean = name.replace(/\d{2}:\d{2}/g,"").trim();

    // 🔥 ลบ prefix ลีก
    clean = clean.replace(/^(NBA|NFL|MLB|NHL):\s*/i, "");

    let home = clean;
    let away = "TBD";

    if(clean.includes(" vs ")){
        [home, away] = clean.split(" vs ");
    }
    else if(clean.includes(" @ ")){
        const parts = clean.split(" @ ");
        away = parts[0];
        home = parts[1];
    }

    // 🔥 กันเคสมี prefix ฝั่งเดียว
    home = home.replace(/^(NBA|NFL|MLB|NHL):\s*/i, "").trim();
    away = away.replace(/^(NBA|NFL|MLB|NHL):\s*/i, "").trim();

    return {home, away, time};
}

/* ================= PLAYER ================= */
function openPlayer(list){
    currentServers = list || [];
    if(!currentServers.length) return;

    document.getElementById("overlay").style.display = "flex";
    loadIframe(currentServers[0].url);
    renderServers();
}

function loadIframe(url){
    document.getElementById("playerFrame").src = url;
}

function renderServers(){
    const bar = document.getElementById("serverBar");
    bar.innerHTML = "";

    currentServers.forEach((s,i)=>{
        bar.innerHTML += `
            <button onclick="switchServer(${i})">S${i+1}</button>
        `;
    });
}

function switchServer(i){
    loadIframe(currentServers[i].url);
}

/* ================= CLOSE ================= */
function closePlayer(){
    document.getElementById("overlay").style.display = "none";
    document.getElementById("playerFrame").src = "";
}

load();


function filterDate(dateName){

    document.querySelectorAll(".league-block").forEach(block => {

        if(block.dataset.date.includes(dateName)){
            block.style.display = "block";
        } else {
            block.style.display = "none";
        }
    });

}

function goHome(){
    window.location.href = "https://nongakka.github.io/doofree/index.html";
}
</script>
</body>
</html>
