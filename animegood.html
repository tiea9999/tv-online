function parseM3U(data, playlistName){

let channels=[];
const lines=data.split(/\r?\n/);
let current=null;
let pendingDRM=null;

lines.forEach(line=>{
line=line.trim();

if(line.startsWith("#EXTINF")){
    const title=line.substring(line.lastIndexOf(",")+1).trim() || "ไม่ทราบชื่อ";
    const logo=(line.match(/tvg-logo="(.*?)"/)||[])[1]||"";
    const group=(line.match(/group-title="(.*?)"/)||[])[1]||playlistName;

current={
    title,
    group,
    logo
};
    pendingDRM=null;
}
else if(line.includes("license_type=")){
    pendingDRM=pendingDRM||{};
    if(line.toLowerCase().includes("widevine")) pendingDRM.type="widevine";
    if(line.toLowerCase().includes("clearkey")) pendingDRM.type="clearkey";
}


else if(line.includes("license_key=")){
    pendingDRM = pendingDRM || {};

    const value = line.substring(line.indexOf("=")+1).trim();

    // ถ้าเป็นรูปแบบ keyid:key
    if(value.includes(":")){
        const parts = value.split(":");
        pendingDRM.keyId = parts[0];
        pendingDRM.key = parts[1];
        pendingDRM.type = "clearkey";
    } else {
        // Widevine license server
        pendingDRM.licenseServer = value;
        pendingDRM.type = "widevine";
    }
}


else if(line && !line.startsWith("#") && current){

    if(line.startsWith("http")){
        current.url=line;
        if(pendingDRM) current.drm=pendingDRM;
        channels.push(current);
    }

    current=null;
}

});

return channels;
}

function parseJSONPlaylist(data, playlistName){

    let channels = [];

// =========================
// 🔥 แบบที่ 0 : channels (dookeela)
// =========================
if(data.channels && Array.isArray(data.channels)){

    data.channels.forEach(ch => {

        if(!ch.streams || ch.streams.length === 0) return;

        channels.push({
            title: ch.name || "ไม่ทราบชื่อ",
            group: ch.group || playlistName,
            logo: ch.logo || "",
            urls: ch.streams
        });

    });

    return channels;
}


    // =========================
    // 🔥 แบบที่ 1 : มี groups
    // =========================
    if(data.groups && Array.isArray(data.groups)){

        data.groups.forEach(group => {

            if(!group.stations) return;

            group.stations.forEach(station => {

                channels.push({
                    title: (station.name || station.info || "ไม่ทราบชื่อ"),
                    group: group.name || playlistName,
                    logo: station.image || group.image || "",
                    url: station.url,
                    referer: station.referer || ""
                });

            });

        });

        return channels;
    }

    // =========================
    // 🔥 แบบที่ 2 : มี stations ตรง ๆ (แบบที่คุณส่งมา)
    // =========================
    if(data.stations && Array.isArray(data.stations)){

        data.stations.forEach(station => {

            channels.push({
                title: station.name + 
                       (station.info ? " - " + station.info : ""),
                group: data.name || playlistName,
                logo: station.image || data.image || "",
                url: station.url,
                referer: station.referer || ""
            });

        });

        return channels;
    }
// =========================
// 🔥 แบบที่ 3 : array ธรรมดา (playlist หนัง)
// =========================
if(Array.isArray(data)){

    data.forEach(item => {

        channels.push({
            title: item.title || item.name || "ไม่ทราบชื่อ",
            group: item.group || playlistName,
            logo: item.logo || item.image || "",
            url: item.url || item.stream || ""
        });

    });

    return channels;
}
    return channels;
}

/* GRID */
function renderGrid(){

    grid.innerHTML="";
    const keyword=document.getElementById("searchInput").value.toLowerCase();

    const filtered = allChannels.filter(c=>{
        return (!currentCategory || c.group===currentCategory)
        && c.title.toLowerCase().includes(keyword);
    });

    if(filtered.length === 0){
        grid.innerHTML = `
        <div style="grid-column:1/-1;text-align:center;padding:40px;opacity:.6">
            ไม่พบรายการ
        </div>`;
        return;
    }

    const totalPages = Math.ceil(filtered.length / itemsPerPage);

    if(currentPage > totalPages) currentPage = 1;

    const start = (currentPage - 1) * itemsPerPage;
    const end = start + itemsPerPage;

    const pageItems = filtered.slice(start, end);

    pageItems.forEach(ch=>{
        const card=document.createElement("div");
        card.className="movie-card";
        card.innerHTML=`
            <img loading="lazy"
                 src="${ch.logo||'https://via.placeholder.com/300x450?text=No+Image'}">
            <div class="movie-title">${ch.title}</div>
        `;
        card.onclick=()=>playStream(ch);
        grid.appendChild(card);
    });

    renderPagination(totalPages);
}

function renderAnimeGrid(){

    grid.innerHTML = "";

    const keyword = document.getElementById("searchInput")
        .value.toLowerCase();

    const filtered = animeData.filter(movie =>
        movie.title.toLowerCase().includes(keyword)
    );

const totalPages = Math.ceil(filtered.length / itemsPerPage);
if(currentPage > totalPages) currentPage = 1;
const start = (currentPage - 1) * itemsPerPage;
const end = start + itemsPerPage;

const pageItems = filtered.slice(start, end);


    pageItems.forEach(movie => {

        const card = document.createElement("div");
        card.className = "movie-card";

        card.innerHTML = `
    <img loading="lazy" src="${movie.image}">
    <div class="movie-title">
        ${movie.title}
        <div style="
            margin-top:6px;
            font-size:12px;
            opacity:.7;
        ">
            ทั้งหมด ${movie.episodes ? movie.episodes.length : 0} ตอน
        </div>
    </div>
`;

        card.onclick = () => {
            currentAnime = movie;
            renderEpisodes(movie);
        };

        grid.appendChild(card);
    });

    if(filtered.length === 0){
        grid.innerHTML = `
            <div style="grid-column:1/-1;text-align:center;padding:40px;opacity:.6">
                ไม่พบรายการ
            </div>`;
    }
renderPagination(totalPages);

}
function renderPagination(totalPages){

const perPage = 20;

let start = Math.floor((currentPage-1)/perPage)*perPage + 1;
let end = Math.min(start + perPage - 1, totalPages);

const div = document.createElement("div");
div.id="pagination";

if(start>1){

const prev=document.createElement("button");
prev.textContent="◀";

prev.onclick=()=>{
currentPage=start-1;

document.querySelector(".main-content")
.scrollTo({top:0,behavior:"smooth"});

if(isAnimeMode){
    renderAnimeGrid();
}else{
    renderGrid();
}
};

div.appendChild(prev);

}

for(let i=start;i<=end;i++){

const btn=document.createElement("button");
btn.textContent=i;

if(i===currentPage){
btn.classList.add("active");
}

btn.onclick=()=>{
currentPage=i;
document.querySelector(".main-content")
.scrollTo({top:0,behavior:"smooth"});
if(isAnimeMode){
    renderAnimeGrid();
}else{
    renderGrid();
}
};

div.appendChild(btn);

}

if(end<totalPages){

const next=document.createElement("button");
next.textContent="▶";

next.onclick=()=>{
currentPage=end+1;

document.querySelector(".main-content")
.scrollTo({top:0,behavior:"smooth"});

if(isAnimeMode){
    renderAnimeGrid();
}else{
    renderGrid();
}
};

div.appendChild(next);

}

const top=document.getElementById("paginationTop");
top.innerHTML="";
top.appendChild(div);

}

function renderEpisodes(movie){

    grid.innerHTML = "";

    movie.episodes
.sort((a,b)=>{

    const numA = parseInt(a.name.replace(/\D/g,'')) || 0;
    const numB = parseInt(b.name.replace(/\D/g,'')) || 0;

    return numB - numA;   // มาก → น้อย
})
.forEach(ep => {

        const card = document.createElement("div");
        card.className = "movie-card";

        card.innerHTML = `
            <div class="movie-title">${ep.name}</div>
        `;
       
            card.onclick = () => {

    if(ep.servers && ep.servers.length > 0){
        openServerPopup(ep);
    }

};

        grid.appendChild(card);
    });

    const backBtn = document.createElement("button");
    backBtn.textContent = "← กลับ";
    backBtn.className = "back-btn";
    backBtn.onclick = ()=>{
    currentPage = 1;   // 🔥 รีเซตหน้า
    renderAnimeGrid();
};

    grid.prepend(backBtn);
}


/* PLAYER RESET */
function resetPlayers(){

    console.log("Reset Players");

    if(hls){
        try{ hls.destroy(); }catch(e){}
        hls = null;
    }

    if(dashPlayer){
        try{ dashPlayer.reset(); }catch(e){}
        dashPlayer = null;
    }
        
    if(jwInstance){
    try{ jwInstance.remove(); }catch(e){}
    jwInstance = null;
}
    document.getElementById("jw-player").innerHTML="";
    const oldVideo = document.getElementById("videoPlayer");

if(oldVideo){

    oldVideo.pause();
    oldVideo.removeAttribute("src");
    oldVideo.load();

    const newVideo = oldVideo.cloneNode(true);
    oldVideo.parentNode.replaceChild(newVideo, oldVideo);
    video = newVideo;

    video.style.display = "block";
    document.getElementById("jw-player").style.display = "none";
}

    setPlayerLabel(forcedPlayer ? forcedPlayer.toUpperCase() : "Auto");

const iframe = document.getElementById("iframePlayer");
if(iframe){
    iframe.src = "about:blank";
    iframe.style.display = "none";
}

}

    video.style.display="none";
    document.getElementById("jw-player").style.display="block";

    jwInstance = jwplayer("jw-player").setup({
        file: channel.url,
        width: "100%",
        height: "100%",
        autostart: true
    });

    jwInstance.on('ready', function(){
        setDefaultVolumeJW();
    });

}

function startJWfallback(channel){

    video.style.display="none";
    document.getElementById("jw-player").style.display="block";

    jwInstance = jwplayer("jw-player").setup({
        file: channel.url,
        width: "100%",
        height: "100%",
        autostart: true,
        primary: "html5"
    });

    jwInstance.on('ready', function(){
        setDefaultVolumeJW();
    });

}


/* PLAY */
function playStream(channel){
    currentChannel = channel; 
    overlay.classList.add("active");
    playerContainer.classList.add("active");
    resetPlayers();

    if(!channel.url && channel.urls){
    channel.url = channel.urls[0];
}

if(!channel.url) return;

    const url = channel.url.toLowerCase();

// =========================
// MP4 PLAYER
// =========================
if(url.includes(".mp4")){

    setPlayerLabel("HTML5 MP4");

    video.style.display="block";
    document.getElementById("jw-player").style.display="none";

    video.src = channel.url;
    setDefaultVolumeHTML5();
    video.play().catch(()=>{});

    return;
}

// =========================
// 🔥 ถ้าเป็น embed page → ใช้ iframe
// =========================
if(
    !url.includes(".m3u8") &&
    !url.includes(".mp4") &&
    !url.includes(".mpd") &&
    !url.includes(".txt") &&
    (
        url.includes("embed") ||
        url.includes("videoembed") ||
        url.includes("iframe") ||
        url.includes("ok.ru") ||
        url.includes("short.")
    )
)
{

    setPlayerLabel("Iframe");

    video.style.display="none";
    document.getElementById("jw-player").style.display="none";

    const iframe = document.getElementById("iframePlayer");
    iframe.style.display="block";
    iframe.src = channel.url;

    return;
}

// =========================
// 🔥 โหมดบังคับ
// =========================
if(forcedPlayer === "jw"){
    setPlayerLabel("JW (บังคับ)");
    startJWfallback(channel);
    return;
}

if(forcedPlayer === "html5"){

    setPlayerLabel("HTML5 (บังคับ)");

    video.style.display="block";
    document.getElementById("jw-player").style.display="none";

    // =================
    // HLS (.m3u8)
    // =================
    if(url.includes(".m3u8")){

        if(typeof Hls !== "undefined" && Hls.isSupported()){

            if(hls){
                try{ hls.destroy(); }catch(e){}
                hls = null;
            }

            hls = new Hls({
    enableWorker:true,
    lowLatencyMode:true,

    // 🔥 บังคับ parse playlist
    manifestLoadingTimeOut: 20000,
    manifestLoadingMaxRetry: 4,

    xhrSetup: function(xhr){
        if(channel.referer){
            xhr.setRequestHeader("Referer", channel.referer);
        }
    }
});

            hls.loadSource(channel.url);
            hls.attachMedia(video);

            hls.on(Hls.Events.MANIFEST_PARSED,function(){
                setDefaultVolumeHTML5();
                video.play().catch(()=>{});
            });

        }else{

            video.src = channel.url;
            setDefaultVolumeHTML5();
            video.play().catch(()=>{});

        }

        return;
    }

    // =================
    // DASH (.mpd)
    // =================
    if(url.includes(".mpd")){

        dashPlayer = dashjs.MediaPlayer().create();
        dashPlayer.initialize(video, channel.url, true);

        setDefaultVolumeHTML5();

        return;
    }

    // =================
    // ไม่รองรับ
    // =================
    alert("HTML5 รองรับเฉพาะ m3u8 / mpd");

    overlay.classList.remove("active");
    playerContainer.classList.remove("active");
    resetPlayers();

    return;
}

    // =========================
    // 1️⃣ ถ้าเป็น MPD + DRM → ใช้ JW ทันที
    // =========================
    if(url.includes(".mpd") && channel.drm){
        setPlayerLabel("JW (DRM)");
        video.style.display="none";
        document.getElementById("jw-player").style.display="block";

        let config = {
            file: channel.url,
            width: "100%",
            height: "100%",
            autostart: true,
            type: "dash",
            primary: "html5"
        };

        if(channel.drm.type === "widevine"){
            config.drm = {
                widevine: {
                    url: channel.drm.licenseServer
                }
            };
        }

        if(channel.drm.type === "clearkey"){
            config.drm = {
                clearkey: {
                    keyId: channel.drm.keyId,
                    key: channel.drm.key
                }
            };
        }

        jwInstance = jwplayer("jw-player").setup(config);
		jwInstance.on('ready', function(){
    setDefaultVolumeJW();   // 🔊 25%
});
        return;
    }

    // =========================
    // 2️⃣ MPD ไม่มี DRM → dash.js
    // =========================
    if(url.includes(".mpd")){
    setPlayerLabel("dash.js");
    video.style.display="block";
    document.getElementById("jw-player").style.display="none";

    dashPlayer = dashjs.MediaPlayer().create();
     // 🔥 เพิ่มตรงนี้
    if(channel.referer){
        dashPlayer.extend("RequestModifier", function(){
            return {
                modifyRequestHeader: function(xhr){
                    xhr.setRequestHeader("Referer", channel.referer);
                    return xhr;
                }
            };
        }, true);
    }

    dashPlayer.initialize(video, channel.url, true);
    setDefaultVolumeHTML5();
    dashPlayer.on(dashjs.MediaPlayer.events.ERROR, function(){
        try{ dashPlayer.reset(); }catch(e){}
        dashPlayer = null;

        console.log("dash error → fallback JW");
        startJWfallback(channel);
    });

    return;
}
       

    // =========================
    // 3️⃣ M3U8 → HLS.js
    // =========================
    if(
url.includes(".m3u8") ||
url.includes(".txt") ||
url.includes("/qualitys/") ||
url.includes("/frame/") ||
url.includes("master")
){


    video.style.display="block";
    document.getElementById("jw-player").style.display="none";

    // 1️⃣ Safari native
    if(video.canPlayType("application/vnd.apple.mpegurl") && !channel.referer){

        setPlayerLabel("Native HLS");
        video.src = channel.url;
        video.load();
		setDefaultVolumeHTML5();
        video.play().catch(()=>{});

        setTimeout(()=>{
            if(video.readyState < 2){
                startJWfallback(channel);
            }
        },3000);

        return;   // ✅ สำคัญมาก
    }

    // 2️⃣ HLS.js
    if(typeof Hls !== "undefined" && Hls.isSupported()){

        setPlayerLabel("HLS.js");

        if(hls){
            try{ hls.destroy(); }catch(e){}
            hls = null;
        }

     hls = new Hls({

enableWorker:true,
lowLatencyMode:true,

manifestLoadingTimeOut:20000,
manifestLoadingMaxRetry:5,
levelLoadingMaxRetry:5,
fragLoadingMaxRetry:5,

xhrSetup: function(xhr,url){

    xhr.withCredentials = false;

    // 🔥 เพิ่ม 3 บรรทัดนี้
    xhr.setRequestHeader("Referer", location.href);
    xhr.setRequestHeader("Origin", location.origin);
    xhr.setRequestHeader("User-Agent", navigator.userAgent);

}
});  
        console.log("PLAY HLS:",channel.url);
        hls.loadSource(channel.url);
        hls.attachMedia(video);

        let playTimeout;

        hls.on(Hls.Events.MANIFEST_PARSED, function(){
            setDefaultVolumeHTML5();   // 🔊 25%
			video.play().catch(()=>{});

            playTimeout = setTimeout(()=>{
                if(video.readyState < 2){
                    try{ hls.destroy(); }catch(e){}
                    startJWfallback(channel);
                }
            },3000);
        });

        hls.on(Hls.Events.ERROR, function(event,data){

    if(data.fatal){

        console.log("HLS ERROR → switch server");

        // ถ้ามีหลาย server
        if(channel.urls && channel.urls.length > 1){

            const index = channel.urls.indexOf(channel.url);

            if(index < channel.urls.length - 1){

                channel.url = channel.urls[index + 1];

                console.log("Switch to:", channel.url);

                setTimeout(()=>{
                    playStream(channel);
                },500);

                return;
            }
        }

        clearTimeout(playTimeout);

        try{ hls.destroy(); }catch(e){}

        startJWfallback(channel);

    }

});

        video.addEventListener("playing",()=>{
            clearTimeout(playTimeout);
        });

        return;  // ✅ สำคัญ
    }

    // 3️⃣ ถ้าเข้าไม่ได้เลย → JW
    startJWfallback(channel);
    return;
}
            
    // =========================
    // 4️⃣ อื่น ๆ → JW
    // =========================
    startJWfallback(channel);
}
function startJWfallback(channel){

    setPlayerLabel("JW (Fallback)");
    video.style.display="none";
    document.getElementById("jw-player").style.display="block";

    let type = null;

    if(channel.url.toLowerCase().includes(".mpd")) type = "dash";
    else if(
    channel.url.toLowerCase().includes(".m3u8") ||
    channel.url.toLowerCase().includes(".txt")
) type = "hls";

    jwInstance = jwplayer("jw-player").setup({
    file: channel.url,
    width: "100%",
    height: "100%",
    autostart: true,
    primary: "html5",
    type: type,
    
});
	jwInstance.on('ready', function(){
    setDefaultVolumeJW();   // ✅ 25%
});
}
