<script>

const container = document.getElementById("channels");

function renderCategory(title,list){

const h = document.createElement("h2");
h.innerText = title;
h.style.margin="20px";
container.appendChild(h);

list.forEach(ch=>{

const card=document.createElement("div");

card.className="channel-card";

card.innerHTML=`

<div onclick="openPlayer('${ch.url}')">

<img src="${ch.logo}" style="max-height:60px"><br>

${ch.name}

</div>

`;

container.appendChild(card);

});

}

renderCategory("📺 ดิจิตอล",channels.tv.digital);
renderCategory("🎬 หนัง",channels.tv.movie);
renderCategory("⚽ กีฬา",channels.tv.sport);
renderCategory("🌍 สารคดี",channels.tv.documentary);
renderCategory("🧸 การ์ตูน",channels.tv.cartoon);

</script>
