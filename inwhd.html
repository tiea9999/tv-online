<!DOCTYPE html>

<html lang="th">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TIEA IPTV - TV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:sans-serif;
margin:0;
}

header{
text-align:center;
padding:15px;
font-size:24px;
background:#020617;
}

.player-box{
max-width:900px;
margin:auto;
padding:15px;
}

video{
width:100%;
background:black;
border-radius:10px;
}

.search-box{
text-align:center;
margin:10px;
}

input{
padding:8px;
width:200px;
border-radius:6px;
border:none;
}

.category{
margin:20px;
font-size:22px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
gap:15px;
padding:20px;
}

.channel-card{
background:#1e293b;
border-radius:10px;
padding:10px;
text-align:center;
cursor:pointer;
}

.channel-card img{
max-height:50px;
}

.favorite{
color:gold;
font-size:18px;
cursor:pointer;
}

</style>

</head>

<body>

<header>TIEA IPTV</header>

<div class="player-box" id="playerTop">

<video id="player" controls autoplay playsinline></video>

</div>

<div class="search-box">
<input type="text" id="search" placeholder="🔍 ค้นหาช่อง">
</div>

<div id="channels"></div>

<script src="channels.js"></script>

<script>

const video=document.getElementById("player");

let allChannels=[];

function playStream(url){

localStorage.setItem("lastChannel",url);

if(Hls.isSupported()){

const hls=new Hls();
hls.loadSource(url);
hls.attachMedia(video);

}else{

video.src=url;

}

video.play();

document.getElementById("playerTop").scrollIntoView({
behavior:"smooth"
});

}

function toggleFav(name){

let fav=JSON.parse(localStorage.getItem("fav"))||[];

if(fav.includes(name)){
fav=fav.filter(x=>x!==name);
}else{
fav.push(name);
}

localStorage.setItem("fav",JSON.stringify(fav));

renderAll();

}

function renderCategory(title,list){

const container=document.getElementById("channels");

const h=document.createElement("div");
h.className="category";
h.innerText=title;

container.appendChild(h);

const grid=document.createElement("div");
grid.className="grid";

list.forEach(ch=>{

allChannels.push(ch);

const card=document.createElement("div");

card.className="channel-card";

const fav=JSON.parse(localStorage.getItem("fav"))||[];

const star=fav.includes(ch.name)?"⭐":"☆";

card.innerHTML=`

<img src="${ch.logo}">
<div>${ch.name}</div>
<div class="favorite">${star}</div>

`;

card.onclick=()=>playStream(ch.url);

card.querySelector(".favorite").onclick=(e)=>{

e.stopPropagation();

toggleFav(ch.name);

};

grid.appendChild(card);

});

container.appendChild(grid);

}

function renderAll(){

document.getElementById("channels").innerHTML="";

allChannels=[];

renderCategory("📺 ดิจิตอล",channels.tv.digital);
renderCategory("🎬 หนัง",channels.tv.movie);
renderCategory("⚽ กีฬา",channels.tv.sport);
renderCategory("🌍 สารคดี",channels.tv.documentary);
renderCategory("🧸 การ์ตูน",channels.tv.cartoon);

}

renderAll();

document.getElementById("search").addEventListener("input",function(){

const keyword=this.value.toLowerCase();

document.getElementById("channels").innerHTML="";

const result=allChannels.filter(c=>c.name.toLowerCase().includes(keyword));

renderCategory("🔎 ผลลัพธ์ค้นหา",result);

});

const last=localStorage.getItem("lastChannel");

if(last){
playStream(last);
}

</script>

</body>
</html>
