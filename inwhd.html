<script>

let channelList=[];
let currentIndex=0;

function buildChannelList(){

channelList=[];

Object.values(channels.tv).forEach(group=>{
group.forEach(ch=>{
channelList.push(ch);
});
});

}

function playByIndex(i){

if(i<0) i=channelList.length-1;
if(i>=channelList.length) i=0;

currentIndex=i;

playStream(channelList[i].url);

}

document.addEventListener("keydown",function(e){

if(e.key==="ArrowRight"){
playByIndex(currentIndex+1);
}

if(e.key==="ArrowLeft"){
playByIndex(currentIndex-1);
}

});

buildChannelList();

</script>
