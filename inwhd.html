<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIEA IPTV</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
background: radial-gradient(circle at top,#1e293b,#0f172a,#020617);
font-family:'Segoe UI',sans-serif;
}

.glow{
text-shadow:0 0 10px #3b82f6,
            0 0 20px #3b82f6,
            0 0 40px #2563eb;
}

.channel-card{
background:rgba(30,41,59,0.6);
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,0.1);
transition:.3s;
}

.channel-card:hover{
transform:translateY(-8px) scale(1.05);
box-shadow:0 0 20px rgba(37,99,235,.6);
}

.menu-btn{
padding:8px 20px;
border-radius:999px;
background:#1e293b;
transition:.3s;
}

.menu-btn:hover{
background:linear-gradient(90deg,#2563eb,#3b82f6);
}

.active-btn{
background:linear-gradient(90deg,#2563eb,#3b82f6);
box-shadow:0 0 15px #3b82f6;
}

.modal-box{
background:rgba(15,23,42,.95);
backdrop-filter:blur(20px);
box-shadow:0 0 30px rgba(37,99,235,.5);
}

.back-home{
position:fixed;
top:15px;
left:15px;
padding:10px 18px;
border-radius:50px;
font-weight:600;
cursor:pointer;
z-index:9999;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.3);
color:#fff;
}

.back-home:hover{
background:linear-gradient(90deg,#ff512f,#dd2476);
}

</style>
</head>

<body class="text-white min-h-screen">

<header class="text-center py-8">
<h1 class="text-4xl font-bold tracking-widest mb-6 glow">
TIEA IPTV
</h1>

<div class="back-home" onclick="goHome()">
⬅ กลับหน้าหลัก
</div>

</header>

<div id="channelContainer" class="px-6 pb-16"></div>

<!-- PLAYER -->
<div id="playerModal"
onclick="closeModal(event)"
class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50 backdrop-blur-md">

<div class="modal-box w-11/12 md:w-3/4 lg:w-1/2 rounded-2xl p-4 relative">

<button onclick="forceClose()" class="absolute top-3 right-4 text-red-400 text-2xl">✖</button>

<video id="player"
class="w-full h-72 md:h-96 rounded-xl bg-black"
controls
autoplay
playsinline
webkit-playsinline>
</video>

</div>
</div>

<script>

const channels=[

{ name:"MONO MAX1", logo:"https://www.fileinwtv.site/postor/20250830165328Mono1.jpg", url:"https://love.r95lvvlb9o.workers.dev/lx-origin/th-monomax01_480/chunks.m3u8" },

{ name:"MONO MAX2", logo:"https://www.fileinwtv.site/postor/20250830165343Mono2.jpg", url:"https://love.pifipa2974.workers.dev/lx-origin/th-monomax02_480/chunks.m3u8" },

{ name:"Bein Sport1", logo:"https://www.fileinwtv.site/postor/20240418192615Bein1.jpg", url:"https://love.r95lvvlb9o.workers.dev/vx-origin/epl-bein1_480/chunks.m3u8" },

{ name:"True Sport1", logo:"https://www.fileinwtv.site/postor/20240418192933TrueSport1.jpg", url:"https://love.r95lvvlb9o.workers.dev/lx-origin/th-tsporthd1_480/chunks.m3u8" },

{ name:"SPOTV", logo:"https://www.fileinwtv.site/postor/20240418193126SPOTV.jpg", url:"https://love.r95lvvlb9o.workers.dev/vx-origin/hd-spotv_480/chunks.m3u8" }

];

function renderChannels(){

const container=document.getElementById("channelContainer");

const grid=document.createElement("div");
grid.className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-6";

channels.forEach(ch=>{

const card=document.createElement("div");

card.className="channel-card rounded-2xl p-5 text-center cursor-pointer";

card.innerHTML=`

<div onclick="openPlayer('${ch.url}')">

<div class="h-20 flex items-center justify-center">

<img src="${ch.logo}" class="max-h-16 object-contain">

</div>

<div class="mt-4 text-sm font-semibold">${ch.name}</div>

</div>

`;

grid.appendChild(card);

});

container.appendChild(grid);

}

let hls;

function openPlayer(url){

const video=document.getElementById("player");

if(hls){
hls.destroy();
}

if(Hls.isSupported()){

hls=new Hls({
enableWorker:true,
lowLatencyMode:true
});

hls.loadSource(url);
hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED,function(){
video.play();
});

}
else if(video.canPlayType('application/vnd.apple.mpegurl')){

video.src=url;
video.play();

}

document.getElementById("playerModal").classList.remove("hidden");
document.getElementById("playerModal").classList.add("flex");

}

function closeModal(e){
if(e.target.id==="playerModal"){forceClose();}
}

function forceClose(){

const modal=document.getElementById("playerModal");

if(hls){
hls.destroy();
}

const v=document.getElementById("player");

v.pause();
v.removeAttribute("src");
v.load();

modal.classList.add("hidden");
modal.classList.remove("flex");

}

function goHome(){

if(document.referrer!==""){
history.back();
}
else{
window.location.href="https://tiea9999.github.io/tv-online/index.html";
}

}

renderChannels();

</script>

</body>
</html>
