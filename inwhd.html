<!DOCTYPE html>

<html lang="th">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TIEA IPTV - TV</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:sans-serif;
}

header{
text-align:center;
padding:15px;
font-size:24px;
}

.player-box{
width:100%;
max-width:900px;
margin:auto;
}

video{
width:100%;
border-radius:10px;
}

.category{
margin:20px;
font-size:22px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
gap:15px;
padding:20px;
}

.channel-card{
background:#1e293b;
border-radius:10px;
padding:10px;
text-align:center;
cursor:pointer;
transition:0.25s;
}

.channel-card:hover{
transform:scale(1.05);
box-shadow:0 0 10px #3b82f6;
}

.channel-card img{
max-height:50px;
margin-bottom:8px;
}

.home-btn{
position:fixed;
top:10px;
left:10px;
background:#2563eb;
padding:8px 14px;
border-radius:6px;
color:white;
text-decoration:none;
}

</style>

</head>

<body>

<a href="index.html" class="home-btn">🏠 HOME</a>

<header>TIEA IPTV</header>

<!-- PLAYER -->

<div class="player-box" id="playerTop">

<video id="player" controls autoplay playsinline></video>

</div>

<!-- CHANNEL LIST -->

<div id="channels"></div>

<script src="channels.js"></script>

<script>

const video=document.getElementById("player");

function playStream(url){

if(Hls.isSupported()){

const hls=new Hls();

hls.loadSource(url);
hls.attachMedia(video);

}else{

video.src=url;

}

video.play();

document.getElementById("playerTop").scrollIntoView({
behavior:"smooth"
});

}

const container=document.getElementById("channels");

function render(title,list){

const h=document.createElement("div");
h.className="category";
h.innerText=title;

container.appendChild(h);

const grid=document.createElement("div");
grid.className="grid";

list.forEach(ch=>{

const card=document.createElement("div");

card.className="channel-card";

card.innerHTML=`

<img src="${ch.logo}">
<div>${ch.name}</div>

`;

card.onclick=function(){
playStream(ch.url);
};

grid.appendChild(card);

});

container.appendChild(grid);

}

render("📺 ดิจิตอล",channels.tv.digital);
render("🎬 หนัง",channels.tv.movie);
render("⚽ กีฬา",channels.tv.sport);
render("🌍 สารคดี",channels.tv.documentary);
render("🧸 การ์ตูน",channels.tv.cartoon);

</script>

</body>
</html>
