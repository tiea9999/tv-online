<!DOCTYPE html>

<html lang="th">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIEA IPTV</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
background:#0f172a;
font-family:sans-serif;
}

.channel-card{
background:#1e293b;
border-radius:12px;
padding:15px;
cursor:pointer;
transition:0.25s;
text-align:center;
}

.channel-card:hover{
transform:scale(1.05);
box-shadow:0 0 15px rgba(59,130,246,0.7);
}
</style>

</head>

<body class="text-white min-h-screen">

<header class="text-center py-6 text-3xl font-bold">
TIEA IPTV
</header>

<div id="channels" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 px-6 pb-10"></div>

<div id="playerModal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50">

<div class="bg-black p-4 rounded-xl w-11/12 md:w-3/4 lg:w-1/2 relative">

<button onclick="closePlayer()" class="absolute top-2 right-3 text-red-400 text-xl">✖</button>

<video id="playerFrame"
class="w-full h-72 md:h-96 bg-black rounded-lg"
controls
autoplay
playsinline
webkit-playsinline> </video>

</div>
</div>

<script>

/* CHANNEL LIST */

const channels=[

{
      { name:"3HD", logo:"https://www.fileinwtv.site/postor/20240418191821ch3hd.jpg", url:"https://love.r95lvvlb9o.workers.dev/lx-origin/hd-ch3_720/chunks.m3u8"},
      { name:"5HD", logo:"https://www.fileinwtv.site/postor/20240418185850ch5hd.jpg", url:"https://love.r95lvvlb9o.workers.dev/lx-origin/hd-ch5_720/chunks.m3u8"},
      { name:"7HD", logo:"https://www.fileinwtv.site/postor/20240418185909ch7hd.jpg", url:"https://love.r95lvvlb9o.workers.dev/lx-origin/hd-ch7_720/chunks.m3u8"},
      { name:"TNN16", logo:"https://www.fileinwtv.site/postor/20240418190014TNN16.jpg", url:"https://love.r95lvvlb9o.workers.dev/lx-origin/sd-tnn24_720/chunks.m3u8"},
      { name:"Nation TV", logo:"https://www.fileinwtv.site/postor/20240418192308Nation1.jpg", url:"https://love.r95lvvlb9o.workers.dev/lx-origin/sd-nation_720/chunks.m3u8" },
      { name:"True4U", logo:"https://www.fileinwtv.site/postor/20240418190115True4u.jpg", url:"https://love.r95lvvlb9o.workers.dev/lx-origin/sd-24u_480/chunks.m3u8" },
      { name:"GMM25", logo:"https://www.fileinwtv.site/postor/20240418190128gmmchannel.jpg", url:"https://love.r95lvvlb9o.workers.dev/lx-origin/sd-gmmchannel_720/chunks.m3u8" },
      { name:"Workpoint TV", logo:"https://www.fileinwtv.site/postor/20240418190941Workpoint.jpg", url:"https://love.r95lvvlb9o.workers.dev/lx-origin/hd-workpoint_720/chunks.m3u8" },
      { name:"MONO29", logo:"https://www.fileinwtv.site/postor/20240418191023mono29.jpg", url:"https://love.r95lvvlb9o.workers.dev/lx-origin/hd-mono_720/chunks.m3u8" },
      { name:"MCOT HD", logo:"https://www.fileinwtv.site/postor/20240418191042mcothd.jpg", url:"https://love.r95lvvlb9o.workers.dev/lx-origin/hd-mcot_720/chunks.m3u8" },
      { name:"Thairath TV", logo:"https://www.fileinwtv.site/postor/20241201222710thairahttvhd2.jpg", url:"https://love.r95lvvlb9o.workers.dev/lx-origin/hd-thairath_720/chunks.m3u8" },
      { name:"AmarinTV", logo:"https://www.fileinwtv.site/postor/20240418191809amarintvhd.jpg", url:"https://love.r95lvvlb9o.workers.dev/lx-origin/hd-amarin_720/chunks.m3u8" },
      { name:"Thai PBS", logo:"https://www.fileinwtv.site/postor/20240418191223tpbshd.jpg", url:"https://love.r95lvvlb9o.workers.dev/lx-origin/hd-tpbs_720/chunks.m3u8" },
      { name:"PPTV", logo:"https://www.fileinwtv.site/postor/20240418191253pptvhd.jpg", url:"https://love.r95lvvlb9o.workers.dev/lx-origin/hd-pptv_720/chunks.m3u8" },
      { name:"ONE31", logo:"https://www.fileinwtv.site/postor/20240418191350onehd.jpg", url:"https://love.r95lvvlb9o.workers.dev/lx-origin/hd-gmmone_720/chunks.m3u8"},
      { name:"CH8", logo:"https://www.fileinwtv.site/postor/20240418191335ch8.jpg", url:"https://love.r95lvvlb9o.workers.dev/lx-origin/hd-ch8_480/chunks.m3u8"},
      { name:"NBT 2 HD", logo:"https://www.fileinwtv.site/postor/20240418191323nbthd.jpg", url:"https://love.r95lvvlb9o.workers.dev/lx-origin/sd-nbt_720/chunks.m3u8"
}

];


/* RENDER CHANNEL */

const container=document.getElementById("channels");

channels.forEach(ch=>{

const card=document.createElement("div");
card.className="channel-card";

card.innerHTML=`
<div onclick="openPlayer('${ch.url}')">

<div class="h-20 flex items-center justify-center">
<img src="${ch.logo}" class="max-h-16">
</div>

<div class="mt-3 text-sm">${ch.name}</div>

</div>
`;

container.appendChild(card);

});


/* ULTRA PLAYER ENGINE */

let hls;

function openPlayer(url){

const video=document.getElementById("playerFrame");

if(hls){
hls.destroy();
}

if(Hls.isSupported()){

hls=new Hls({

enableWorker:true,
lowLatencyMode:true,

backBufferLength:120,
maxBufferLength:150,
maxMaxBufferLength:300,

liveSyncDurationCount:3,
liveMaxLatencyDurationCount:5,

manifestLoadingMaxRetry:8,
levelLoadingMaxRetry:8,
fragLoadingMaxRetry:10,

startFragPrefetch:true,
capLevelToPlayerSize:true

});

hls.loadSource(url);
hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED,function(){
video.play();
});


/* AUTO STREAM RECOVERY */

hls.on(Hls.Events.ERROR,function(event,data){

if(data.fatal){

switch(data.type){

case Hls.ErrorTypes.NETWORK_ERROR:
console.log("Network error → retry");
hls.startLoad();
break;

case Hls.ErrorTypes.MEDIA_ERROR:
console.log("Media error → recover");
hls.recoverMediaError();
break;

default:
console.log("Fatal error → destroy");
hls.destroy();
break;

}

}

});

}

else if(video.canPlayType('application/vnd.apple.mpegurl')){

video.src=url;
video.play();

}

document.getElementById("playerModal").classList.remove("hidden");
document.getElementById("playerModal").classList.add("flex");

}


/* CLOSE PLAYER */

function closePlayer(){

const modal=document.getElementById("playerModal");
const v=document.getElementById("playerFrame");

v.pause();
v.removeAttribute("src");
v.load();

if(hls){
hls.destroy();
}

modal.classList.add("hidden");
modal.classList.remove("flex");

}

</script>

</body>
</html>
