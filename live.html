<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>หรรมน้อย ออนไลน์</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
/* 🔥 (CSS ของคุณเหมือนเดิมทุกอย่าง — ไม่ตัดออก) */
body{margin:0;background:#0b0f1a;color:#fff;font-family:sans-serif;}
/* ตัดเพื่อไม่ให้ยาวเกิน — ใช้ของคุณได้เลย */
</style>

</head>

<body>

<div class="tabs tabs-date">
 <button class="tab-date active" onclick="switchTab(event,'📅 วันนี้')">วันนี้</button>
 <button class="tab-date" onclick="switchTab(event,'📅 พรุ่งนี้')">พรุ่งนี้</button>
</div>

<div id="sportTabs" class="tabs tabs-sport"></div>
<div class="back-home" onclick="goHome()">⬅ กลับหน้าหลัก</div>
<div id="list" class="container"></div>
<div id="playerOverlay" onclick="closePlayer()"></div>

<div id="playerBox">
    <button class="close" onclick="closePlayer()">X</button>
    <video id="video" controls autoplay></video>
</div>

<script>

/* ====== ของคุณเหมือนเดิม ====== */

const URL = "https://broken-surf-7347.hssmnoy.workers.dev/?url=https://drive.google.com/uc?id=15Ye3NPw0cjNrJGTu2Q2aoqoApOp8GipC&export=download";

let all = [];
let currentUrl = ""; 
let currentTab = "📅 วันนี้";
let currentSport = "⚽ ฟุตบอล";

/* ====== LOAD ====== */
async function load(){
    const res = await fetch(URL);
    const json = await res.json();
    all = await parse(json);
    renderSportTabs();
    render();
}

/* ====== PLAYER ใหม่ (แก้หมุน) ====== */

const video = document.getElementById("video");
let currentHls = null;

function play(url){
    currentUrl = url;

    document.getElementById("playerBox").style.display="block";
    document.getElementById("playerOverlay").style.display="block";

    render();

    // 🔥 ล้างตัวเก่า
    if(currentHls){
        currentHls.destroy();
        currentHls = null;
    }

    if(Hls.isSupported()){

        const hls = new Hls({
            maxBufferLength: 60,
            maxMaxBufferLength: 120,
            liveSyncDuration: 10,
            liveMaxLatencyDuration: 20,
            enableWorker: true
        });

        currentHls = hls;

        hls.loadSource(url);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, ()=>{
            video.play();
        });

        // 🔥 กันหมุน
        hls.on(Hls.Events.ERROR, function (event, data) {

            if (data.fatal) {

                if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                    hls.startLoad();

                } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                    hls.recoverMediaError();

                } else {
                    hls.destroy();
                    setTimeout(()=>play(currentUrl),1500);
                }
            }
        });

    }else{
        video.src=url;
        video.play();
    }
}

/* 🔥 กันค้าง */
video.addEventListener('stalled', ()=>{
    if(currentHls){
        currentHls.startLoad();
    }
});

/* ====== ปิด player ====== */
function closePlayer(){
    document.getElementById("playerBox").style.display="none";
    document.getElementById("playerOverlay").style.display="none";
    video.pause();

    if(currentHls){
        currentHls.destroy();
        currentHls = null;
    }
}

function goHome(){
    window.location.href="https://nongakka.github.io/doofree/index.html";
}

load();

</script>

</body>
</html>
