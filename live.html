<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TIEA ตารางบอลเทพ</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: sans-serif;
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: #111;
      border-bottom: 1px solid #222;
      padding: 10px;
    }
    .title {
      font-size: 22px;
      font-weight: bold;
      color: #00e5ff;
      margin-bottom: 8px;
    }
    .tools {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .btn {
      border: 0;
      border-radius: 10px;
      background: #222;
      color: #fff;
      padding: 10px 12px;
      cursor: pointer;
      font-size: 14px;
    }
    .btn.active, .btn:focus {
      background: #00c853;
      outline: none;
    }
    .btn.home { background: #2196f3; }
    .btn.reload { background: #ff9800; }
    .wrap {
      padding: 12px;
    }
    .status {
      display: none;
      margin-bottom: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(255,255,255,.08);
      white-space: pre-wrap;
      color: #ddd;
    }
    .daybar {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 8px;
      margin-bottom: 12px;
    }
    .league-block {
      margin-bottom: 16px;
      background: #111;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #1f1f1f;
    }
    .league-head {
      background: #161616;
      padding: 10px 12px;
      font-weight: bold;
      color: #00e5ff;
      border-bottom: 1px solid #222;
    }
    .match {
      display: grid;
      grid-template-columns: 88px 1fr 90px;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      border-bottom: 1px solid #1d1d1d;
    }
    .match:last-child {
      border-bottom: 0;
    }
    .time {
      font-weight: bold;
      color: #ffd54f;
      font-size: 14px;
    }
    .countdown {
      font-size: 12px;
      color: #aaa;
      margin-top: 4px;
    }
    .teams {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }
    .team {
      font-size: 14px;
      line-height: 1.3;
      word-break: break-word;
    }
    .live-tag {
      display: inline-block;
      font-size: 11px;
      background: #e53935;
      color: #fff;
      border-radius: 999px;
      padding: 2px 8px;
      margin-left: 6px;
      vertical-align: middle;
    }
    .action {
      text-align: right;
    }
    .watch-btn {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 10px;
      background: #00c853;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }
    .watch-btn.alt {
      background: #444;
    }
    .empty {
      padding: 18px;
      color: #aaa;
      background: #111;
      border-radius: 12px;
    }
    @media (max-width: 700px) {
      .match {
        grid-template-columns: 1fr;
      }
      .action {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="title">⚽ TIEA ตารางบอลเทพ</div>
    <div class="tools">
      <button class="btn home" id="homeBtn">🏠 HOME</button>
      <button class="btn reload" id="reloadBtn">รีโหลด</button>
    </div>
  </div>

  <div class="wrap">
    <div id="statusBox" class="status"></div>
    <div id="dayBar" class="daybar"></div>
    <div id="content"></div>
  </div>

  <script>
    const HOME_URL = "https://tiea9999.github.io/tv";
    const statusBox = document.getElementById("statusBox");
    const dayBar = document.getElementById("dayBar");
    const content = document.getElementById("content");

    const DAY_COUNT = 5;
    let selectedDate = "";
    let allMatches = [];
    let countdownTimer = null;

    document.getElementById("homeBtn").onclick = () => {
      location.href = HOME_URL;
    };

    document.getElementById("reloadBtn").onclick = () => {
      loadSchedule();
    };

    function setStatus(msg) {
      statusBox.textContent = msg || "";
      statusBox.style.display = msg ? "block" : "none";
    }

    function formatDateKey(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function formatThaiDate(dateStr) {
      const d = new Date(dateStr + "T00:00:00");
      return d.toLocaleDateString("th-TH", {
        weekday: "short",
        day: "numeric",
        month: "short"
      });
    }

    function buildDayButtons() {
      dayBar.innerHTML = "";
      const now = new Date();

      for (let i = 0; i < DAY_COUNT; i++) {
        const d = new Date(now);
        d.setDate(now.getDate() + i);
        const key = formatDateKey(d);

        const btn = document.createElement("button");
        btn.className = "btn" + (key === selectedDate ? " active" : "");
        btn.textContent = formatThaiDate(key);
        btn.onclick = () => {
          selectedDate = key;
          buildDayButtons();
          renderMatches();
        };
        dayBar.appendChild(btn);
      }
    }

    function normalizeMatch(raw) {
      const league =
        raw.league_name || raw.league || raw.tournament || raw.competition || "ลีกอื่นๆ";

      const home =
        raw.home_name || raw.homeTeam || raw.home || raw.team1 || raw.host || "ทีมเหย้า";

      const away =
        raw.away_name || raw.awayTeam || raw.away || raw.team2 || raw.guest || "ทีมเยือน";

      const kickoff =
        raw.kickoff || raw.start_time || raw.startTime || raw.time || raw.match_time || "";

      const liveUrl =
        raw.url || raw.link || raw.stream || raw.source || raw.watch_url || "";

      const isLive =
        raw.is_live === true ||
        raw.live === true ||
        raw.status === "LIVE" ||
        raw.status === "live";

      return {
        league,
        home,
        away,
        kickoff,
        liveUrl,
        isLive
      };
    }

    function parsePossibleArray(data) {
      if (Array.isArray(data)) return data;
      if (Array.isArray(data.items)) return data.items;
      if (Array.isArray(data.data)) return data.data;
      if (Array.isArray(data.matches)) return data.matches;
      if (Array.isArray(data.fixtures)) return data.fixtures;

      const arr = Object.values(data).find(v => Array.isArray(v));
      return arr || [];
    }

    async function tryFetchJson(url) {
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error(`โหลดไม่สำเร็จ: ${res.status}`);
      return await res.json();
    }

    async function loadSchedule() {
      setStatus("กำลังโหลดตารางแข่งขัน...");
      content.innerHTML = "";

      // ปรับลำดับ fallback ได้ตามที่คุณใช้งานจริง
      const urls = [
        "https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/Dooball66%20Pro%20V4.3.json",
        "https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/M3U/config_dooball66.json",
        "https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/M3U/dooball66-2.json"
      ];

      let loaded = null;
      let lastErr = null;

      for (const url of urls) {
        try {
          const data = await tryFetchJson(url);
          const arr = parsePossibleArray(data);
          if (arr.length) {
            loaded = arr;
            break;
          }
        } catch (e) {
          lastErr = e;
        }
      }

      if (!loaded) {
        setStatus("โหลดตารางไม่สำเร็จ\nไฟล์ต้นทางหรือ API ด้านในอาจล่ม");
        content.innerHTML = `<div class="empty">ไม่พบตารางแข่งขันในตอนนี้</div>`;
        return;
      }

      allMatches = loaded.map(normalizeMatch).filter(x => x.kickoff);
      setStatus("");

      if (!selectedDate) {
        const today = new Date();
        selectedDate = formatDateKey(today);
      }

      buildDayButtons();
      renderMatches();
      startCountdownTick();
    }

    function getDateKeyFromKickoff(kickoff) {
      const d = new Date(kickoff);
      if (isNaN(d)) return "";
      return formatDateKey(d);
    }

    function groupByLeague(matches) {
      const map = new Map();
      for (const m of matches) {
        if (!map.has(m.league)) map.set(m.league, []);
        map.get(m.league).push(m);
      }
      return map;
    }

    function formatKickoffTime(kickoff) {
      const d = new Date(kickoff);
      if (isNaN(d)) return "--:--";
      return d.toLocaleTimeString("th-TH", {
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function countdownText(kickoff, isLive) {
      if (isLive) return "กำลังถ่ายทอดสด";
      const now = new Date();
      const target = new Date(kickoff);
      if (isNaN(target)) return "";

      const diff = target - now;
      if (diff <= 0) return "เริ่มแข่งแล้ว";

      const totalMin = Math.floor(diff / 60000);
      const hrs = Math.floor(totalMin / 60);
      const mins = totalMin % 60;

      if (hrs > 0) return `อีก ${hrs} ชม. ${mins} นาที`;
      return `อีก ${mins} นาที`;
    }

    function renderMatches() {
      const filtered = allMatches
        .filter(m => getDateKeyFromKickoff(m.kickoff) === selectedDate)
        .sort((a, b) => new Date(a.kickoff) - new Date(b.kickoff));

      if (!filtered.length) {
        content.innerHTML = `<div class="empty">ไม่มีคู่แข่งในวันนี้</div>`;
        return;
      }

      const grouped = groupByLeague(filtered);
      content.innerHTML = "";

      for (const [league, matches] of grouped.entries()) {
        const block = document.createElement("div");
        block.className = "league-block";

        const head = document.createElement("div");
        head.className = "league-head";
        head.textContent = `${league} • ${matches.length} คู่`;
        block.appendChild(head);

        matches.forEach(match => {
          const row = document.createElement("div");
          row.className = "match";

          const timeBox = document.createElement("div");
          timeBox.className = "time";
          timeBox.innerHTML = `
            ${formatKickoffTime(match.kickoff)}
            <div class="countdown">${countdownText(match.kickoff, match.isLive)}</div>
          `;

          const teams = document.createElement("div");
          teams.className = "teams";
          teams.innerHTML = `
            <div class="team">${match.home}${match.isLive ? '<span class="live-tag">LIVE</span>' : ''}</div>
            <div class="team">${match.away}</div>
          `;

          const action = document.createElement("div");
          action.className = "action";

          const watchBtn = document.createElement("button");
          watchBtn.className = "watch-btn" + (match.liveUrl ? "" : " alt");
          watchBtn.textContent = match.liveUrl ? "ดูสด" : "ยังไม่มีลิงก์";
          watchBtn.disabled = !match.liveUrl;

          watchBtn.onclick = () => {
            location.href = match.liveUrl;
          };

          action.appendChild(watchBtn);

          row.appendChild(timeBox);
          row.appendChild(teams);
          row.appendChild(action);

          block.appendChild(row);
        });

        content.appendChild(block);
      }
    }

    function startCountdownTick() {
      if (countdownTimer) clearInterval(countdownTimer);
      countdownTimer = setInterval(() => {
        renderMatches();
      }, 30000);
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" || e.key === "Backspace" || e.keyCode === 10009) {
        e.preventDefault();
        location.href = HOME_URL;
      }
    });

    loadSchedule();
  </script>
</body>
</html>
