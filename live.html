<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Sports</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif}
.schedule{
padding:10px;
background:#111;
display:flex;
gap:10px;
overflow-x:auto;
}
.match{
background:#222;
padding:10px;
border-radius:10px;
min-width:220px;
cursor:pointer;
}
video{
width:100%;
height:250px;
background:black;
}
</style>

</head>

<body>

<div class="schedule" id="schedule">กำลังโหลด...</div>
<video id="player" controls autoplay></video>

<script>
const player = document.getElementById("player");
const schedule = document.getElementById("schedule");

let currentUrls = [];
let current = 0;

/* 🔥 fallback ตาราง (กัน API พัง) */
const fallbackMatches = [
  {
    title: "พรีเมียร์ลีก",
    time: "20:00"
  },
  {
    title: "ลาลีกา",
    time: "22:00"
  }
];

/* =========================
   🔥 map ลีก → ช่อง
========================= */
function getChannelUrls(title){

  title = title.toLowerCase();

  if(title.includes("premier") || title.includes("man") || title.includes("liverpool")){
    return [
      "https://love.sikoyo3159.workers.dev/lx-origin/epl-bein1_720/chunks.m3u8",
      "https://love.tivov68423.workers.dev/lx-origin/epl-bein1_720/chunks.m3u8"
    ];
  }

  if(title.includes("real") || title.includes("barcelona")){
    return [
      "https://love.sikoyo3159.workers.dev/lx-origin/epl-bein2_720/chunks.m3u8",
      "https://love.tivov68423.workers.dev/lx-origin/epl-bein2_720/chunks.m3u8"
    ];
  }

  return [
    "https://love.sikoyo3159.workers.dev/lx-origin/epl-bein1_720/chunks.m3u8",
    "https://love.tivov68423.workers.dev/lx-origin/epl-bein1_720/chunks.m3u8"
  ];
}

/* =========================
   🔥 render function
========================= */
function render(matches){

  schedule.innerHTML = "";

  matches.forEach((m)=>{

    const urls = getChannelUrls(m.title);

    const div=document.createElement("div");
    div.className="match";
    div.innerHTML=`<b>${m.title}</b><br>${m.time}`;

    div.onclick=()=>{
      currentUrls = urls;
      current = 0;
      play(currentUrls[current]);
    };

    schedule.appendChild(div);
  });

  // เล่นตัวแรก
  if(matches.length){
    currentUrls = getChannelUrls(matches[0].title);
    play(currentUrls[0]);
  }
}

/* =========================
   🔥 ดึง API + fallback
========================= */
fetch("https://www.thesportsdb.com/api/v1/json/3/eventsday.php?s=Soccer")
  .then(res => res.json())
  .then(data => {

    if(!data.events){
      throw "no data";
    }

    const matches = data.events.slice(0,10).map(m=>({
      title: m.strEvent,
      time: m.strTime?.substring(0,5) || "--:--"
    }));

    render(matches);

  })
  .catch(()=>{
    console.log("⚠️ ใช้ fallback");
    render(fallbackMatches);
  });

/* =========================
   🔥 PLAYER
========================= */
function play(url){

  if(window.hls){
    window.hls.destroy();
  }

  if(Hls.isSupported()){

    const hls = new Hls({
      maxBufferLength: 30,
      maxMaxBufferLength: 60
    });

    window.hls = hls;

    hls.loadSource(url);
    hls.attachMedia(player);

    hls.on(Hls.Events.ERROR, function (event, data) {
      if(data.fatal) switchStream();
    });

    hls.on(Hls.Events.MANIFEST_PARSED, function () {
      player.play();
    });

  } else {
    player.src = url;
    player.play();
  }
}

/* 🔁 auto switch */
function switchStream(){
  current++;
  if(current >= currentUrls.length) current = 0;
  play(currentUrls[current]);
}

/* กันค้าง */
player.addEventListener('stalled', switchStream);
player.addEventListener('error', switchStream);

</script>

</body>
</html>
