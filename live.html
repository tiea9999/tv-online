<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Sports</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif}

/* ตาราง */
.schedule{
padding:10px;
background:#111;
display:flex;
gap:10px;
overflow-x:auto;
}

.match{
background:#222;
padding:10px;
border-radius:10px;
min-width:200px;
cursor:pointer;
}

/* player */
video{
width:100%;
height:250px;
background:black;
}
</style>

</head>

<body>

<!-- 🏟 ตารางแข่งขัน -->

<div class="schedule" id="schedule"></div>

<!-- 🎬 player -->

<video id="player" controls autoplay></video>

<script>
const player = document.getElementById("player");
const schedule = document.getElementById("schedule");

let currentUrls = [];
let current = 0;

/* =========================
   🔥 โหลด matches.json
========================= */
fetch("matches.json")
  .then(res => res.json())
  .then(matches => {

    schedule.innerHTML = "";

    matches.forEach((m)=>{
      const div=document.createElement("div");
      div.className="match";
      div.innerHTML=`<b>${m.title}</b><br>${m.time}`;

      div.onclick=()=>{
        currentUrls = m.urls;
        current = 0;
        play(currentUrls[current]);
      };

      schedule.appendChild(div);
    });

    // ▶️ เล่นอันแรกอัตโนมัติ
    if(matches.length > 0){
      currentUrls = matches[0].urls;
      play(currentUrls[0]);
    }

  })
  .catch(err=>{
    console.log("❌ โหลดตารางไม่ได้", err);
  });

/* =========================
   🔥 PLAYER + AUTO SWITCH
========================= */
function play(url){

  if(window.hls){
    window.hls.destroy();
  }

  if(Hls.isSupported()){

    const hls = new Hls({
      maxBufferLength: 30,
      maxMaxBufferLength: 60,
      liveSyncDuration: 5,
      liveMaxLatencyDuration: 10
    });

    window.hls = hls;

    hls.loadSource(url);
    hls.attachMedia(player);

    hls.on(Hls.Events.MANIFEST_PARSED, function () {
      player.play();
    });

    hls.on(Hls.Events.ERROR, function (event, data) {

      if (data.fatal) {
        switchStream();
      }
    });

  } else {
    player.src = url;
    player.play();
  }
}

/* 🔁 สลับลิงก์ */
function switchStream(){

  current++;

  if(current >= currentUrls.length){
    current = 0;
  }

  console.log("➡️ switching:", currentUrls[current]);

  setTimeout(()=>{
    play(currentUrls[current]);
  }, 500);
}

/* 🔥 กันค้าง */
player.addEventListener('stalled', switchStream);
player.addEventListener('error', switchStream);

</script>

</body>
</html>
