<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live TV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif}
video{width:100%;height:250px;background:#000}
</style>

</head>

<body>

<video id="player" controls autoplay></video>

<script>
const player = document.getElementById("player");

/* 🔥 ใส่ลิงก์เดิมของคุณได้เลย */
let url = "https://love.tecobo5568.workers.dev/lx-origin/hd-ch3_720/chunks.m3u8";

/* =========================
   🔥 PLAYER (แก้หมุน)
========================= */
function play(url){

  if(window.hls){
    window.hls.destroy();
  }

  if(Hls.isSupported()){

    const hls = new Hls({
      maxBufferLength: 60,
      maxMaxBufferLength: 120,
      liveSyncDuration: 10,
      liveMaxLatencyDuration: 20,
      enableWorker: true
    });

    window.hls = hls;

    hls.loadSource(url);
    hls.attachMedia(player);

    hls.on(Hls.Events.MANIFEST_PARSED, function () {
      player.play();
    });

    // 🔥 กันหมุน
    hls.on(Hls.Events.ERROR, function (event, data) {

      if (data.fatal) {

        if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
          console.log("🔄 network → reload");
          hls.startLoad();

        } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
          console.log("🔄 media → recover");
          hls.recoverMediaError();

        } else {
          console.log("❌ restart stream");
          hls.destroy();
          setTimeout(()=>play(url),1500);
        }
      }
    });

  } else {
    player.src = url;
    player.play();
  }
}

/* 🔁 กันค้าง */
player.addEventListener('stalled', ()=>{
  console.log("⚠️ stalled → reload");
  if(window.hls){
    window.hls.startLoad();
  }
});

player.addEventListener('waiting', ()=>{
  console.log("⏳ buffering...");
});

/* ▶️ เริ่มเล่น */
play(url);

</script>

</body>
</html>
