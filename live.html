<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ ตารางแข่งขัน</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:sans-serif;
}

.header{
  padding:12px;
  background:#111;
  color:#00e5ff;
  font-size:20px;
  font-weight:bold;
}

#backBtn{
  position:fixed;
  top:10px;
  left:10px;
  z-index:999;
  padding:10px 12px;
  border:none;
  border-radius:10px;
  background:#e53935;
  color:#fff;
  cursor:pointer;
}

.grid{
  padding:12px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:10px;
}

.card{
  background:#111;
  padding:10px;
  border-radius:10px;
}

.match{
  font-size:14px;
  font-weight:bold;
}

.time{
  margin-top:6px;
  font-size:12px;
  color:#aaa;
}
</style>
</head>
<body>

<button id="backBtn">⬅ กลับ</button>

<div class="header">⚽ ตารางแข่งขัน</div>
<div id="grid" class="grid"></div>

<script>
const grid = document.getElementById("grid");

// 🔥 ใส่ JSON ของคุณตรงนี้
const JSON_URL = "https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/M3U/config_dooball66.json";

async function loadMatch(){
  try{
    const res = await fetch(JSON_URL);
    const data = await res.json();

    let list = [];

    if(Array.isArray(data)){
      list = data;
    }else if(data.matches){
      list = data.matches;
    }else if(data.data){
      list = data.data;
    }

    grid.innerHTML = "";

    if(!list.length){
      grid.innerHTML = "ไม่มีข้อมูล";
      return;
    }

    list.forEach(item=>{
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <div class="match">${item.home || item.team1 || ""} vs ${item.away || item.team2 || ""}</div>
        <div class="time">${item.time || item.kickoff || ""}</div>
      `;

      grid.appendChild(div);
    });

  }catch(e){
    grid.innerHTML = "โหลดไม่สำเร็จ";
  }
}

document.getElementById("backBtn").onclick = ()=>{
  history.back();
};

loadMatch();
</script>

</body>
</html>
