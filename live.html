<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live TV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif}
video{width:100%;height:100vh;background:black}
</style>

</head>

<body>

<video id="player" controls autoplay></video>

<script>
const player = document.getElementById("player");

// 🔥 ใส่ลิงก์ที่ต้องการเล่น
const url = "https://love.sikoyo3159.workers.dev/lx-origin/hd-ch3_720/chunks.m3u8";

play(url);

/* =========================
   🔥 PLAY (กันหมุนตัวจบ)
========================= */
function play(url){

  if(window.hls){
    window.hls.destroy();
  }

  if(Hls.isSupported()){

    const hls = new Hls({
      maxBufferLength: 30,
      maxMaxBufferLength: 60,
      liveSyncDuration: 5,
      liveMaxLatencyDuration: 10,
      enableWorker: true,
      lowLatencyMode: true
    });

    window.hls = hls;

    hls.loadSource(url);
    hls.attachMedia(player);

    hls.on(Hls.Events.MANIFEST_PARSED, function () {
      player.play();
    });

    /* 🔥 AUTO FIX หมุน */
    hls.on(Hls.Events.ERROR, function (event, data) {

      if (data.fatal) {

        switch (data.type) {

          case Hls.ErrorTypes.NETWORK_ERROR:
            console.log("🔄 network error → reload");
            hls.startLoad();
            break;

          case Hls.ErrorTypes.MEDIA_ERROR:
            console.log("🔄 media error → recover");
            hls.recoverMediaError();
            break;

          default:
            console.log("❌ fatal error → restart");
            hls.destroy();
            setTimeout(()=>play(url),1000);
            break;
        }
      }
    });

  } else {
    player.src = url;
    player.play();
  }
}

/* 🔥 กันค้าง */
player.addEventListener('waiting', ()=>{
  console.log("⏳ buffering...");
});

player.addEventListener('stalled', ()=>{
  console.log("⚠️ stalled → reload");
  if(window.hls){
    window.hls.startLoad();
  }
});
</script>

</body>
</html>
