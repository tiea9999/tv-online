<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TIEA LIVE</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #000;
      color: #fff;
      font-family: sans-serif;
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: #111;
      border-bottom: 1px solid #222;
      padding: 10px;
    }
    .title {
      font-size: 22px;
      font-weight: bold;
      color: #00e5ff;
      margin-bottom: 8px;
    }
    .tools {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .btn {
      border: 0;
      border-radius: 10px;
      background: #222;
      color: #fff;
      padding: 10px 12px;
      cursor: pointer;
      font-size: 14px;
    }
    .btn.active, .btn:focus {
      background: #00c853;
      outline: none;
    }
    .btn.home { background: #2196f3; }
    .btn.reload { background: #ff9800; }
    .wrap {
      padding: 12px;
    }
    .status {
      display: none;
      margin-bottom: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(255,255,255,.08);
      white-space: pre-wrap;
      color: #ddd;
    }
    .daybar {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 8px;
      margin-bottom: 12px;
    }
    .league-block {
      margin-bottom: 16px;
      background: #111;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #1f1f1f;
    }
    .league-head {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #161616;
      padding: 10px 12px;
      font-weight: bold;
      color: #00e5ff;
      border-bottom: 1px solid #222;
    }
    .league-head img {
      width: 28px;
      height: 28px;
      object-fit: contain;
      background: #000;
      border-radius: 6px;
      flex-shrink: 0;
    }
    .match {
      display: grid;
      grid-template-columns: 88px 1fr 110px;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      border-bottom: 1px solid #1d1d1d;
    }
    .match:last-child {
      border-bottom: 0;
    }
    .time {
      font-weight: bold;
      color: #ffd54f;
      font-size: 14px;
    }
    .countdown {
      font-size: 12px;
      color: #aaa;
      margin-top: 4px;
    }
    .teams {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .teams img {
      width: 72px;
      height: 40px;
      object-fit: cover;
      border-radius: 8px;
      background: #000;
      flex-shrink: 0;
    }
    .match-name {
      font-size: 14px;
      line-height: 1.35;
      word-break: break-word;
    }
    .action {
      text-align: right;
    }
    .watch-btn {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 10px;
      background: #00c853;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }
    .watch-btn.alt {
      background: #444;
    }
    .station-count {
      margin-top: 4px;
      font-size: 11px;
      color: #aaa;
    }
    .empty {
      padding: 18px;
      color: #aaa;
      background: #111;
      border-radius: 12px;
    }

    #playerWrap {
      position: fixed;
      inset: 0;
      background: #000;
      display: none;
      z-index: 9999;
    }
    #videoPlayer {
      width: 100%;
      height: 100%;
      background: #000;
    }
    #playerBar {
      position: absolute;
      top: 12px;
      left: 12px;
      display: flex;
      gap: 8px;
      z-index: 10000;
      flex-wrap: wrap;
      opacity: 1;
      transition: opacity .25s ease;
    }
    #playerBar.hide-ui {
      opacity: 0;
      pointer-events: none;
    }
    .player-btn {
      border: 0;
      border-radius: 10px;
      padding: 10px 12px;
      color: #fff;
      cursor: pointer;
      font-weight: bold;
    }
    .btn-player-home { background: #2196f3; }
    .btn-player-close { background: #e53935; }
    .btn-player-open { background: #009688; }
    .btn-player-mx { background: #ff9800; }

    @media (max-width: 700px) {
      .match {
        grid-template-columns: 1fr;
      }
      .action {
        text-align: left;
      }
      .teams {
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="title">⚽ TIEA ตารางบอลเทพ</div>
    <div class="tools">
      <button class="btn home" id="homeBtn">🏠 HOME</button>
      <button class="btn reload" id="reloadBtn">รีโหลด</button>
    </div>
  </div>

  <div class="wrap">
    <div id="statusBox" class="status"></div>
    <div id="dayBar" class="daybar"></div>
    <div id="content"></div>
  </div>

  <div id="playerWrap">
    <video id="videoPlayer" controls playsinline webkit-playsinline autoplay></video>
    <div id="playerBar">
      <button id="playerHomeBtn" class="player-btn btn-player-home">🏠 หน้าโฮม</button>
      <button id="playerExternalBtn" class="player-btn btn-player-open">▶ PLAYER</button>
      <button id="playerMxBtn" class="player-btn btn-player-mx">▶ MX</button>
      <button id="playerCloseBtn" class="player-btn btn-player-close">✕ ปิด</button>
    </div>
  </div>

  <script>
    const HOME_URL = "https://tiea9999.github.io/tv-online";
    const SOURCE_URL = "https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/Dooball66%20Pro%20V4.3.json";

    const statusBox = document.getElementById("statusBox");
    const dayBar = document.getElementById("dayBar");
    const content = document.getElementById("content");
    const playerWrap = document.getElementById("playerWrap");
    const playerBar = document.getElementById("playerBar");
    const video = document.getElementById("videoPlayer");

    let allMatches = [];
    let selectedDate = "";
    let tickTimer = null;
    let playerUiTimer = null;
    let hls = null;
    let currentUrl = "";

    document.getElementById("homeBtn").onclick = () => location.href = HOME_URL;
    document.getElementById("reloadBtn").onclick = () => loadSchedule();
    document.getElementById("playerHomeBtn").onclick = () => location.href = HOME_URL;
    document.getElementById("playerCloseBtn").onclick = closePlayer;
    document.getElementById("playerExternalBtn").onclick = () => openExternalPlayer(currentUrl);
    document.getElementById("playerMxBtn").onclick = () => openMx(currentUrl);

    function setStatus(msg) {
      statusBox.textContent = msg || "";
      statusBox.style.display = msg ? "block" : "none";
    }

    function pad2(n) {
      return String(n).padStart(2, "0");
    }

    function formatDateKey(date) {
      return `${date.getFullYear()}-${pad2(date.getMonth() + 1)}-${pad2(date.getDate())}`;
    }

    function formatThaiDate(dateStr) {
      const d = new Date(dateStr + "T00:00:00");
      return d.toLocaleDateString("th-TH", {
        weekday: "short",
        day: "numeric",
        month: "short"
      });
    }

    function parseDateTimeFromText(text) {
      const now = new Date();
      const str = String(text || "").trim();

      let m = str.match(/(\d{1,2})\/(\d{1,2})\s+(\d{1,2}):(\d{2})/);
      if (m) {
        const day = Number(m[1]);
        const month = Number(m[2]);
        const hour = Number(m[3]);
        const minute = Number(m[4]);
        const year = now.getFullYear();
        return new Date(year, month - 1, day, hour, minute, 0);
      }

      m = str.match(/(\d{1,2}):(\d{2})/);
      if (m) {
        const hour = Number(m[1]);
        const minute = Number(m[2]);
        return new Date(now.getFullYear(), now.getMonth(), now.getDate(), hour, minute, 0);
      }

      return null;
    }

    function extractTimeText(matchName, info) {
      const combined = `${matchName} ${info || ""}`;

      let m = combined.match(/(\d{1,2}\/\d{1,2}\s+\d{1,2}:\d{2})/);
      if (m) return m[1];

      m = combined.match(/(\d{1,2}:\d{2})/);
      if (m) return m[1];

      return "";
    }

    function normalizeDooballJson(data) {
      const out = [];
      const leagues = Array.isArray(data?.groups) ? data.groups : [];

      leagues.forEach(league => {
        const leagueName = league?.name || "ลีกอื่นๆ";
        const leagueImage = league?.image || "";
        const matches = Array.isArray(league?.groups) ? league.groups : [];

        matches.forEach(match => {
          const stations = Array.isArray(match?.stations) ? match.stations : [];
          const matchName = match?.name || "ไม่มีชื่อคู่แข่ง";
          const matchImage = match?.image || "";
          const firstInfo = stations[0]?.info || "";
          const timeText = extractTimeText(matchName, firstInfo);
          const kickoffDate = parseDateTimeFromText(timeText);

          out.push({
            league: leagueName,
            leagueImage,
            matchName,
            matchImage,
            info: firstInfo,
            timeText,
            kickoff: kickoffDate,
            dateKey: kickoffDate ? formatDateKey(kickoffDate) : "",
            stations: stations.map((s, idx) => ({
              name: s?.name || `Link ${idx + 1}`,
              info: s?.info || "",
              image: s?.image || "",
              url: s?.url || "",
              referer: s?.referer || "",
              userAgent: s?.["user-agent"] || s?.userAgent || ""
            })).filter(s => s.url)
          });
        });
      });

      return out;
    }

    function getAvailableDateKeys(matches) {
      return [...new Set(matches.map(m => m.dateKey).filter(Boolean))].sort();
    }

    function buildDayButtons(dateKeys) {
      dayBar.innerHTML = "";

      dateKeys.forEach(key => {
        const btn = document.createElement("button");
        btn.className = "btn" + (key === selectedDate ? " active" : "");
        btn.textContent = formatThaiDate(key);
        btn.onclick = () => {
          selectedDate = key;
          buildDayButtons(dateKeys);
          renderMatches();
        };
        dayBar.appendChild(btn);
      });
    }

    function countdownText(kickoff) {
      if (!kickoff) return "";
      const now = new Date();
      const diff = kickoff - now;

      if (diff <= 0) return "เริ่มแล้ว/ถ่ายทอดสด";

      const totalMin = Math.floor(diff / 60000);
      const hrs = Math.floor(totalMin / 60);
      const mins = totalMin % 60;

      if (hrs > 0) return `อีก ${hrs} ชม. ${mins} นาที`;
      return `อีก ${mins} นาที`;
    }

    function formatKickoffTime(kickoff, timeText) {
      if (kickoff instanceof Date && !isNaN(kickoff)) {
        return kickoff.toLocaleTimeString("th-TH", { hour: "2-digit", minute: "2-digit" });
      }
      return timeText || "--:--";
    }

    function groupByLeague(matches) {
      const map = new Map();
      matches.forEach(m => {
        if (!map.has(m.league)) map.set(m.league, []);
        map.get(m.league).push(m);
      });
      return map;
    }

    function pickPrimaryStation(stations) {
      if (!Array.isArray(stations) || !stations.length) return null;

      const primary =
        stations.find(s =>
          String(s.name || "").includes("หลัก") ||
          String(s.info || "").includes("หลัก")
        ) || stations[0];

      return primary;
    }

    function showPlayerUi() {
      playerBar.classList.remove("hide-ui");
      if (playerUiTimer) clearTimeout(playerUiTimer);
      playerUiTimer = setTimeout(() => {
        if (playerWrap.style.display === "block") {
          playerBar.classList.add("hide-ui");
        }
      }, 2500);
    }

    function clearPlayer() {
      if (hls) {
        try { hls.destroy(); } catch (e) {}
        hls = null;
      }
      try { video.pause(); } catch (e) {}
      video.removeAttribute("src");
      video.src = "";
      video.load();
    }

    function closePlayer() {
      clearPlayer();
      playerWrap.style.display = "none";
      playerBar.classList.remove("hide-ui");
      currentUrl = "";
    }

    function openExternalPlayer(url) {
      if (!url) return;
      try {
        const u = new URL(url);
        location.href =
          "intent://" + u.host + u.pathname + u.search +
          "#Intent;scheme=" + u.protocol.replace(":", "") +
          ";action=android.intent.action.VIEW;type=video/*;end";
      } catch (e) {
        location.href = url;
      }
    }

    function openMx(url) {
      if (!url) return;
      location.href = "intent:" + url + "#Intent;package=com.mxtech.videoplayer.ad;end";
    }

    function tryPlay(url) {
      currentUrl = url;
      playerWrap.style.display = "block";
      showPlayerUi();
      clearPlayer();

      const lower = String(url).toLowerCase();

      if (lower.includes(".m3u8")) {
        if (Hls.isSupported()) {
          hls = new Hls({
            enableWorker: true,
            autoStartLoad: true,
            maxBufferLength: 30,
            maxMaxBufferLength: 60,
            fragLoadingMaxRetry: 6
          });

          hls.loadSource(url);
          hls.attachMedia(video);

          hls.on(Hls.Events.MANIFEST_PARSED, () => {
            const p = video.play();
            if (p && typeof p.then === "function") {
              p.catch(() => openExternalPlayer(url));
            }
          });

          hls.on(Hls.Events.ERROR, (e, data) => {
            if (data?.fatal) {
              openExternalPlayer(url);
            }
          });
          return;
        }

        if (video.canPlayType("application/vnd.apple.mpegurl")) {
          video.src = url;
          video.play().catch(() => openExternalPlayer(url));
          return;
        }

        openExternalPlayer(url);
        return;
      }

      if (lower.match(/\.(mp4|mkv|avi|mov)$/)) {
        video.src = url;
        video.play().catch(() => openExternalPlayer(url));
        return;
      }

      openExternalPlayer(url);
    }

    function openStation(match) {
      if (!match.stations.length) return;
      const primary = pickPrimaryStation(match.stations);
      if (!primary) return;
      tryPlay(primary.url);
    }

    function renderMatches() {
      const filtered = allMatches
        .filter(m => m.dateKey === selectedDate)
        .sort((a, b) => {
          const ta = a.kickoff ? a.kickoff.getTime() : 0;
          const tb = b.kickoff ? b.kickoff.getTime() : 0;
          return ta - tb;
        });

      if (!filtered.length) {
        content.innerHTML = `<div class="empty">ไม่มีคู่แข่งในวันนี้</div>`;
        return;
      }

      const grouped = groupByLeague(filtered);
      content.innerHTML = "";

      for (const [league, matches] of grouped.entries()) {
        const block = document.createElement("div");
        block.className = "league-block";

        const head = document.createElement("div");
        head.className = "league-head";
        head.innerHTML = `
          ${matches[0].leagueImage ? `<img src="${matches[0].leagueImage}" alt="" onerror="this.style.display='none'">` : ""}
          <span>${league} • ${matches.length} คู่</span>
        `;
        block.appendChild(head);

        matches.forEach(match => {
          const row = document.createElement("div");
          row.className = "match";

          const timeBox = document.createElement("div");
          timeBox.className = "time";
          timeBox.innerHTML = `
            ${formatKickoffTime(match.kickoff, match.timeText)}
            <div class="countdown">${countdownText(match.kickoff)}</div>
          `;

          const teams = document.createElement("div");
          teams.className = "teams";
          teams.innerHTML = `
            ${match.matchImage ? `<img src="${match.matchImage}" alt="" onerror="this.style.display='none'">` : ""}
            <div class="match-name">${match.matchName}</div>
          `;

          const action = document.createElement("div");
          action.className = "action";

          const watchBtn = document.createElement("button");
          watchBtn.className = "watch-btn" + (match.stations.length ? "" : " alt");
          watchBtn.textContent = match.stations.length ? "ดูสด" : "ยังไม่มีลิงก์";
          watchBtn.disabled = !match.stations.length;
          watchBtn.onclick = () => openStation(match);

          const stationCount = document.createElement("div");
          stationCount.className = "station-count";
          stationCount.textContent = match.stations.length ? `${match.stations.length} ลิงก์` : "";

          action.appendChild(watchBtn);
          action.appendChild(stationCount);

          row.appendChild(timeBox);
          row.appendChild(teams);
          row.appendChild(action);
          block.appendChild(row);
        });

        content.appendChild(block);
      }
    }

    function startTick() {
      if (tickTimer) clearInterval(tickTimer);
      tickTimer = setInterval(() => {
        renderMatches();
      }, 30000);
    }

    async function loadSchedule() {
      try {
        setStatus("กำลังโหลดตารางแข่งขัน...");
        content.innerHTML = "";
        dayBar.innerHTML = "";

        const res = await fetch("https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/Dooball66%20Pro%20V4.3.json", { cache: "no-store" });
        if (!res.ok) throw new Error("โหลดไฟล์ไม่สำเร็จ: " + res.status);

        const data = await res.json();
        allMatches = normalizeDooballJson(data);

        if (!allMatches.length) {
          setStatus("ไม่พบข้อมูลตารางแข่งขัน");
          content.innerHTML = `<div class="empty">ไม่มีข้อมูลในไฟล์นี้</div>`;
          return;
        }

        const dates = getAvailableDateKeys(allMatches);
        if (!dates.length) {
          setStatus("อ่านเวลาการแข่งไม่สำเร็จ");
          content.innerHTML = `<div class="empty">ไฟล์มีคู่แข่ง แต่ยังจับเวลาไม่สำเร็จ</div>`;
          return;
        }

        selectedDate = dates[0];
        setStatus(`โหลดสำเร็จ: ${allMatches.length} คู่`);
        buildDayButtons(dates);
        renderMatches();
        startTick();
      } catch (e) {
        console.error(e);
        setStatus("โหลดตารางไม่สำเร็จ\n" + (e?.message || ""));
        content.innerHTML = `<div class="empty">ตารางแข่งขันไม่มาในตอนนี้</div>`;
      }
    }

    ["mousemove", "mousedown", "touchstart"].forEach(evt => {
      playerWrap.addEventListener(evt, () => {
        if (playerWrap.style.display === "block") showPlayerUi();
      });
    });

    document.addEventListener("keydown", (e) => {
      if (playerWrap.style.display === "block") {
        showPlayerUi();
        if (e.key === "Escape" || e.key === "Backspace" || e.keyCode === 10009) {
          e.preventDefault();
          closePlayer();
          return;
        }
      } else {
        if (e.key === "Escape" || e.key === "Backspace" || e.keyCode === 10009) {
          e.preventDefault();
          location.href = HOME_URL;
        }
      }
    });

    loadSchedule();
  </script>
</body>
</html>
