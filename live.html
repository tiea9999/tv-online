<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Dooball Iframe Stable</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#1c1c1c;
    color:#fff;
}

.container {
    max-width:1000px;
    margin:auto;
    background:#fff;
    color:#111;
    min-height:100vh;
}

.league {
    background:#5c6b7a;
    color:#fff;
    padding:10px;
    font-weight:bold;
    position:sticky;
    top:52px;
    z-index:10;
}

.row {
    display:flex;
    align-items:center;
    border-bottom:1px solid #eee;
    padding:10px;
    gap:10px;
}

.time {
    width:80px;
    color:#666;
    font-weight:bold;
}

.teams {
    flex:1;
    display:flex;
    gap:10px;
    align-items:center;
}

.team {
    flex:1;
    display:flex;
    align-items:center;
    gap:6px;
    min-width:0;
}

.team.home {
    justify-content:flex-end;
    text-align:right;
}

.team.away {
    justify-content:flex-start;
}

.team img {
    width:20px;
    height:20px;
    object-fit:contain;
}

.team span {
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    max-width:140px;
}

.vs {
    width:40px;
    text-align:center;
    font-weight:bold;
    color:#999;
}

.servers {
    width:120px;
    text-align:right;
}

.btn {
    background:#22c55e;
    color:#fff;
    padding:6px 10px;
    border-radius:6px;
    font-size:12px;
    cursor:pointer;
    border:none;
}

.topbar{
    background:#111;
    padding:10px;
    position:sticky;
    top:0;
    z-index:20;
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    align-items:center;
}

.top-btn{
    background:#2563eb;
    color:#fff;
    border:none;
    padding:8px 12px;
    border-radius:6px;
    cursor:pointer;
}

.home-btn{
    background:#22c55e;
}

#dateMenu{
    display:flex;
    gap:8px;
    overflow-x:auto;
    padding:10px;
    background:#222;
    position:sticky;
    top:52px;
    z-index:15;
}

.date-chip{
    color:#fff;
    padding:6px 10px;
    background:#444;
    border-radius:6px;
    cursor:pointer;
    white-space:nowrap;
    border:none;
}

.date-chip.active{
    background:#22c55e;
    color:#000;
    font-weight:bold;
}

#overlay {
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:#000;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

#playerBox {
    width:92%;
    max-width:1000px;
}

#playerFrame {
    width:100%;
    height:600px;
    border:none;
    background:#000;
}

.player-head{
    color:#fff;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    margin-bottom:5px;
    flex-wrap:wrap;
}

#serverBar{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
}

.server-btn{
    background:#374151;
    color:#fff;
    border:none;
    padding:6px 10px;
    border-radius:999px;
    cursor:pointer;
}

.server-btn.active{
    background:#f59e0b;
}

.empty{
    padding:20px;
    text-align:center;
    color:#555;
}

@media (max-width: 900px){
    .row{
        flex-direction:column;
        align-items:stretch;
    }
    .time,.servers{
        width:100%;
        text-align:left;
    }
    .teams{
        width:100%;
    }
    #playerFrame{
        height:56vw;
        min-height:260px;
    }
    .league{
        top:52px;
    }
}
</style>
</head>

<body>

<div class="topbar">
    <button class="top-btn home-btn" onclick="goHome()">⬅ กลับหน้าหลัก</button>
    <button class="top-btn" onclick="load()">รีโหลด</button>
</div>

<div class="container" id="app"></div>

<div id="overlay">
    <div id="playerBox">
        <div class="player-head">
            <div id="serverBar"></div>
            <button class="top-btn" style="background:#dc2626" onclick="closePlayer()">❌ Close</button>
        </div>
        <iframe id="playerFrame" allowfullscreen referrerpolicy="no-referrer"></iframe>
    </div>
</div>

<script>
const PLAYLIST_URL = "https://raw.githubusercontent.com/nongakka/TV/main/playlist/sportsonline.json";
const HTML_URL = "https://iptv.tawatchai250958.workers.dev/?url=https://embed-xs.bananacake.org/dooball66v2/schedule.html";
const HOME_URL = "https://tiea9999.github.io/tv-online/index.html";

let originalData = null;
let htmlListGlobal = [];
let currentServers = [];
let currentIndex = 0;
let currentDateFilter = "";

async function load(){
    try {
        const app = document.getElementById("app");
        app.innerHTML = "<div class='empty'>กำลังโหลด...</div>";

        const [jsonRes, htmlRes] = await Promise.all([
            fetch(PLAYLIST_URL),
            fetch(HTML_URL)
        ]);

        if (!jsonRes.ok) throw new Error("โหลด playlist ไม่สำเร็จ");
        if (!htmlRes.ok) throw new Error("โหลด schedule ไม่สำเร็จ");

        const data = await jsonRes.json();
        const html = await htmlRes.text();

        originalData = normalizePlaylist(data);
        htmlListGlobal = parseHTMLLogos(html);

        renderApp(originalData);
    } catch (e) {
        console.error(e);
        document.getElementById("app").innerHTML =
            "<div class='empty' style='color:red'>โหลดไม่สำเร็จ</div>";
    }
}

function normalizePlaylist(data){
    const result = { groups: [] };
    if(!data?.groups) return result;

    data.groups.forEach(group => {
        if(!Array.isArray(group.stations)) return;

        const map = new Map();

        group.stations.forEach(st => {
            if(!st?.name || !st?.url) return;

            const name = st.name.trim();
            if(!map.has(name)){
                map.set(name,{ name, stations:[] });
            }

            map.get(name).stations.push({
                url: st.url,
                referer: st.referer || ""
            });
        });

        result.groups.push({
            name: group.name || "ไม่ทราบลีก",
            groups: Array.from(map.values())
        });
    });

    return result;
}

function parseHTMLLogos(html){
    const doc = new DOMParser().parseFromString(html, "text/html");
    const list = [];

    doc.querySelectorAll(".match").forEach(row => {
        const teams = row.querySelectorAll("span");
        const imgs = row.querySelectorAll("img");

        if(teams.length >= 2 && imgs.length >= 2){
            list.push({
                home: normalize(teams[0].innerText),
                away: normalize(teams[1].innerText),
                homeLogo: imgs[0].src,
                awayLogo: imgs[1].src
            });
        }
    });

    return list;
}

function findLogos(home, away){
    const h = normalize(home);
    const a = normalize(away);

    let best = null;
    let score = 0;

    htmlListGlobal.forEach(m => {
        const s = similarity(h, m.home) + similarity(a, m.away);
        if(s > score){
            score = s;
            best = m;
        }
    });

    if(best && score > 1.2){
        return {
            homeLogo: best.homeLogo,
            awayLogo: best.awayLogo
        };
    }

    return {};
}

function normalize(str){
    return (str || "")
        .toLowerCase()
        .replace(/[^a-z0-9ก-๙]/g,"")
        .trim();
}

function similarity(a,b){
    if(!a || !b) return 0;
    if(a.includes(b) || b.includes(a)) return 1;

    let m = 0;
    for(let i=0;i<a.length;i++){
        if(b.includes(a[i])) m++;
    }
    return m / Math.max(a.length,b.length);
}

function parseMatch(name){
    const time = (name.match(/\d{2}:\d{2}/) || [""])[0];

    let clean = name.replace(/\d{2}:\d{2}/g,"").trim();
    clean = clean.replace(/^(NBA|NFL|MLB|NHL):\s*/i, "");

    let home = clean;
    let away = "TBD";

    if(clean.includes(" vs ")){
        [home, away] = clean.split(" vs ");
    } else if(clean.includes(" @ ")){
        const parts = clean.split(" @ ");
        away = parts[0];
        home = parts[1];
    }

    home = home.replace(/^(NBA|NFL|MLB|NHL):\s*/i, "").trim();
    away = away.replace(/^(NBA|NFL|MLB|NHL):\s*/i, "").trim();

    return {home, away, time};
}

function renderApp(data){
    const app = document.getElementById("app");
    const dateMenu = new Set();

    let html = `<div id="dateMenu"></div>`;

    data.groups.forEach(league => {
        dateMenu.add(league.name);

        html += `
<div class="league-block" data-date="${escapeHtml(league.name)}">
    <div class="league">${escapeHtml(league.name)}</div>
    <div class="rows">
`;

        league.groups.forEach(match => {
            const {home, away, time} = parseMatch(match.name);
            const isSingle = !away || away === "TBD";
            const logos = findLogos(home, away);
            const servers = match.stations || [];

            html += `
<div class="row">
    <div class="time">${escapeHtml(time || "--:--")}</div>

    <div class="teams">
        ${
            isSingle
            ? `
            <div style="width:100%;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
                ${escapeHtml(home)}
            </div>
            `
            : `
            <div class="team home">
                <span>${escapeHtml(home)}</span>
                ${logos.homeLogo ? `<img src="${logos.homeLogo}" alt="">` : ""}
            </div>

            <div class="vs">VS</div>

            <div class="team away">
                ${logos.awayLogo ? `<img src="${logos.awayLogo}" alt="">` : ""}
                <span>${escapeHtml(away)}</span>
            </div>
            `
        }
    </div>

    <div class="servers">
        <button class="btn" onclick='openPlayer(${JSON.stringify(servers)})'>▶ ดูสด</button>
    </div>
</div>
`;
        });

        html += `
    </div>
</div>
`;
    });

    app.innerHTML = html;

    const menu = document.getElementById("dateMenu");
    const dates = Array.from(dateMenu);

    if (!currentDateFilter && dates.length) {
        currentDateFilter = dates[0];
    }

    menu.innerHTML = dates.map(d => `
        <button class="date-chip ${d === currentDateFilter ? 'active' : ''}" onclick="filterDate('${escapeJs(d)}')">
            ${escapeHtml(d)}
        </button>
    `).join("");

    if (currentDateFilter) {
        filterDate(currentDateFilter, false);
    }
}

function openPlayer(list){
    currentServers = (list || []).filter(s => s && s.url);
    currentIndex = 0;

    if(!currentServers.length) return;

    document.getElementById("overlay").style.display = "flex";
    loadIframe(currentServers[0].url);
    renderServers();
}

function loadIframe(url){
    document.getElementById("playerFrame").src = url || "";
}

function renderServers(){
    const bar = document.getElementById("serverBar");
    bar.innerHTML = "";

    currentServers.forEach((s,i)=>{
        const btn = document.createElement("button");
        btn.className = "server-btn" + (i === currentIndex ? " active" : "");
        btn.textContent = s.name || ("S" + (i + 1));
        btn.onclick = () => switchServer(i);
        bar.appendChild(btn);
    });
}

function switchServer(i){
    if(!currentServers[i] || !currentServers[i].url) return;
    currentIndex = i;
    loadIframe(currentServers[i].url);
    renderServers();
}

function closePlayer(){
    document.getElementById("overlay").style.display = "none";
    document.getElementById("playerFrame").src = "";
}

function filterDate(dateName, rerenderMenu = true){
    currentDateFilter = dateName;

    document.querySelectorAll(".league-block").forEach(block => {
        block.style.display = block.dataset.date.includes(dateName) ? "block" : "none";
    });

    if (rerenderMenu) {
        document.querySelectorAll(".date-chip").forEach(btn => {
            btn.classList.toggle("active", btn.textContent.trim() === dateName);
        });
    } else {
        document.querySelectorAll(".date-chip").forEach(btn => {
            btn.classList.toggle("active", btn.textContent.trim() === dateName);
        });
    }
}

function goHome(){
    window.location.href = HOME_URL;
}

function escapeHtml(str){
    return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
}

function escapeJs(str){
    return String(str || "").replace(/\\/g, "\\\\").replace(/'/g, "\\'");
}

document.getElementById("overlay").addEventListener("click", (e) => {
    if (e.target.id === "overlay") closePlayer();
});

load();
</script>
</body>
</html>
