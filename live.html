<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Football</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{margin:0;background:#111;color:#fff;font-family:sans-serif}
.topbar{padding:10px;background:#000;display:flex;justify-content:space-between}
.container{padding:10px}

.row{
display:flex;justify-content:space-between;
padding:10px;border-bottom:1px solid #333
}

.btn{
background:#22c55e;padding:5px 10px;border-radius:6px;cursor:pointer
}

#overlay{
position:fixed;inset:0;background:#000;
display:none;align-items:center;justify-content:center
}
video{width:100%}
</style>
</head>

<body>

<div class="topbar">
<div>⚽ ตารางแข่งขัน</div>
<a href="index.html" style="color:#22c55e">🏠 กลับ</a>
</div>

<div id="app" class="container">กำลังโหลด...</div>

<div id="overlay">
<video id="player" controls autoplay></video>
</div>

<script>

// 🔥 MAIN + BACKUP
const URLS = [
"https://broken-surf-7347.hssmnoy.workers.dev/?url=https://drive.google.com/uc?id=15Ye3NPw0cjNrJGTu2Q2aoqoApOp8GipC&export=download",
"https://raw.githubusercontent.com/tiea9999/tv-online/main/dooball66.json"
];

async function load(){
let data = null;

for(let url of URLS){
try{
const res = await fetch(url);
data = await res.json();
console.log("โหลดจาก:", url);
break;
}catch(e){
console.log("ล่ม:", url);
}
}

if(!data){
document.getElementById("app").innerHTML = "❌ โหลดไม่ได้ทุก server";
return;
}

render(data);
}

// render
function render(data){
const app = document.getElementById("app");
app.innerHTML = "";

data.groups.forEach(l=>{
app.innerHTML += `<h3>${l.name}</h3>`;

l.groups.forEach(m=>{
app.innerHTML += `
<div class="row">
<div>${m.name}</div>
<div class="btn" onclick='play("${m.stations?.[0]?.url || ""}")'>▶ ดู</div>
</div>
`;
});
});
}

// play
function play(url){
if(!url) return alert("ไม่มีลิงก์");

const v = document.getElementById("player");
document.getElementById("overlay").style.display="flex";

if(Hls.isSupported()){
const hls = new Hls();
hls.loadSource(url);
hls.attachMedia(v);
}else{
v.src = url;
}
}

document.getElementById("overlay").onclick = ()=>{
document.getElementById("overlay").style.display="none";
};

load();

</script>

</body>
</html>
