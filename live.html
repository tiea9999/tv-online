<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚽ ตารางแข่งขัน</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:sans-serif;
}
.header{
  padding:14px;
  font-size:22px;
  font-weight:bold;
  color:#00e5ff;
}
.match{
  border-bottom:1px solid #333;
  padding:12px;
  cursor:pointer;
}
.match:hover{background:#111}
.team{font-size:16px}
.time{color:#aaa;font-size:13px}

#playerWrap{
  position:fixed;
  inset:0;
  background:#000;
  display:none;
  z-index:9999;
}
#video{width:100%;height:100%}

.btn{
  position:absolute;
  top:10px;
  left:10px;
  padding:10px;
  background:#e53935;
  border:none;
  color:#fff;
}
</style>
</head>

<body>

<div class="header">⚽ ตารางแข่งขัน</div>
<div id="list"></div>

<div id="playerWrap">
  <video id="video" controls autoplay></video>
  <button class="btn" onclick="closePlayer()">✕ ปิด</button>
</div>

<script>
const API_LIST = [
  "https://iptv.tawatchai250958.workers.dev/",
  "https://iptv.tawatchai250958.workers.dev/json",
  "https://iptv.tawatchai250958.workers.dev/api"
];

const list = document.getElementById("list");
const video = document.getElementById("video");
const playerWrap = document.getElementById("playerWrap");

let hls;

async function loadMatch(){
  list.innerHTML = "กำลังโหลด...";

  let data = null;

  for(const url of API_LIST){
    try{
      const res = await fetch(url);
      const text = await res.text();

      // 🔥 กันเคสที่ไม่ใช่ JSON
      if(text.startsWith("<!DOCTYPE")) continue;

      data = JSON.parse(text);
      console.log("โหลดจาก:", url);
      break;

    }catch(e){
      console.log("ลองแล้วพัง:", url);
    }
  }

  if(!data){
    list.innerHTML = "❌ โหลดไม่สำเร็จ (API พัง หรือไม่ใช่ JSON)";
    return;
  }

  list.innerHTML = "";

  data.forEach(match=>{
    const div = document.createElement("div");
    div.className = "match";

    div.innerHTML = `
      <div class="team">${match.home || match.title || "ไม่พบชื่อ"} vs ${match.away || ""}</div>
      <div class="time">${match.time || ""}</div>
    `;

    div.onclick = ()=> play(match.link || match.url);

    list.appendChild(div);
  });
}

function play(url){
  if(!url) return;

  playerWrap.style.display = "block";

  if(hls){
    hls.destroy();
    hls = null;
  }

  if(Hls.isSupported() && url.includes(".m3u8")){
    hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  }else{
    video.src = url;
  }
}

function closePlayer(){
  if(hls){
    hls.destroy();
    hls = null;
  }
  video.pause();
  playerWrap.style.display = "none";
}

loadMatch();
</script>

</body>
</html>
