<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif}
#playerBox{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
width:80%;max-width:900px;aspect-ratio:16/9;background:#000;display:none;z-index:9999}
#playerOverlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;z-index:9998}
video{width:100%;height:100%}
.close{position:absolute;top:5px;right:5px;background:red;color:#fff;border:none}
</style>

</head>

<body>

<div id="list"></div>

<div id="playerOverlay" onclick="closePlayer()"></div>

<div id="playerBox">
<button class="close" onclick="closePlayer()">X</button>
<video id="video" controls autoplay></video>
</div>

<script>

/* =========================
   🔥 โหลดข้อมูลเดิมของคุณ
========================= */
const URL = "https://broken-surf-7347.hssmnoy.workers.dev/?url=https://drive.google.com/uc?id=15Ye3NPw0cjNrJGTu2Q2aoqoApOp8GipC&export=download";

let all = [];
let currentUrl = "";

/* =========================
   🔥 โหลดรายการ
========================= */
async function load(){
    try{
        const res = await fetch(URL);
        const json = await res.json();

        // ใช้โครงเดิม
        all = json.groups || [];

        render();
    }catch(e){
        document.getElementById("list").innerHTML = "❌ โหลดตารางไม่ได้";
    }
}

/* =========================
   🔥 แสดงรายการ (เรียบๆ)
========================= */
function render(){
    const list = document.getElementById("list");
    list.innerHTML="";

    all.forEach(g=>{
        if(!g.stations) return;

        g.stations.forEach(s=>{
            const div = document.createElement("div");
            div.style.padding="10px";
            div.style.borderBottom="1px solid #333";
            div.innerText = g.name;

            div.onclick = ()=>play(s.url);

            list.appendChild(div);
        });
    });
}

/* =========================
   🔥 PLAYER (แก้หมุน)
========================= */
const video = document.getElementById("video");
let hls;

async function play(url){
    currentUrl = url;

    document.getElementById("playerBox").style.display="block";
    document.getElementById("playerOverlay").style.display="block";

    // 🔥 ล้างตัวเก่า
    if(hls){
        hls.destroy();
        hls = null;
    }

    // 🔥 ใช้ fetch ใส่ header
    const response = await fetch(url, {
        headers:{
            "Referer": "https://dooball66s.com/",
            "User-Agent": navigator.userAgent
        }
    });

    const blob = await response.blob();
    const blobUrl = URL.createObjectURL(blob);

    if(Hls.isSupported()){
        hls = new Hls({
            maxBufferLength: 10,
            liveSyncDuration: 3
        });

        hls.loadSource(blobUrl);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, ()=>{
            video.play().catch(()=>{});
        });

    }else{
        video.src = blobUrl;
        video.play();
    }
}
/* 🔥 กันค้าง */
video.addEventListener("stalled", ()=>{
    if(currentUrl){
        play(currentUrl);
    }
});

/* =========================
   🔥 ปิด
========================= */
function closePlayer(){
    document.getElementById("playerBox").style.display="none";
    document.getElementById("playerOverlay").style.display="none";
    video.pause();

    if(hls){
        hls.destroy();
        hls = null;
    }
}

load();

</script>

</body>
</html>
