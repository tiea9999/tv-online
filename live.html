<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TIEA LIVE WORKERS STABLE</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
*{box-sizing:border-box}body{margin:0;background:#000;color:#fff;font-family:sans-serif}.topbar{position:sticky;top:0;z-index:50;background:#111;border-bottom:1px solid #222;padding:10px}.title{font-size:22px;font-weight:bold;color:#00e5ff;margin-bottom:8px}.tools{display:flex;gap:8px;flex-wrap:wrap}.btn{border:0;border-radius:10px;background:#222;color:#fff;padding:10px 12px;cursor:pointer;font-size:14px}.btn.active,.btn:focus{background:#00c853;outline:none}.btn.home{background:#2196f3}.btn.reload{background:#ff9800}.wrap{padding:12px}.status{display:none;margin-bottom:12px;padding:10px 12px;border-radius:10px;background:rgba(255,255,255,.08);white-space:pre-wrap;color:#ddd}.daybar{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:12px}.league-block{margin-bottom:16px;background:#111;border-radius:12px;overflow:hidden;border:1px solid #1f1f1f}.league-head{display:flex;align-items:center;gap:10px;background:#161616;padding:10px 12px;font-weight:bold;color:#00e5ff;border-bottom:1px solid #222}.league-head img{width:28px;height:28px;object-fit:contain;background:#000;border-radius:6px;flex-shrink:0}.match{display:grid;grid-template-columns:88px 1fr 110px;gap:10px;align-items:center;padding:10px 12px;border-bottom:1px solid #1d1d1d}.match:last-child{border-bottom:0}.time{font-weight:bold;color:#ffd54f;font-size:14px}.countdown{font-size:12px;color:#aaa;margin-top:4px}.teams{display:flex;align-items:center;gap:10px;min-width:0}.teams img{width:72px;height:40px;object-fit:cover;border-radius:8px;background:#000;flex-shrink:0}.match-name{font-size:14px;line-height:1.35;word-break:break-word}.action{text-align:right}.watch-btn{width:100%;border:0;border-radius:10px;padding:10px;background:#00c853;color:#fff;font-weight:bold;cursor:pointer}.watch-btn.alt{background:#444}.station-count{margin-top:4px;font-size:11px;color:#aaa}.empty{padding:18px;color:#aaa;background:#111;border-radius:12px}
#playerWrap{position:fixed;inset:0;background:#000;display:none;z-index:9999}#videoPlayer{width:100%;height:100%;background:#000}#playerBar{position:absolute;top:12px;left:12px;right:12px;display:flex;justify-content:space-between;gap:8px;z-index:10000;flex-wrap:wrap;opacity:1;visibility:visible;transform:translateY(0);transition:opacity .25s ease,visibility .25s ease,transform .25s ease}.player-left,.player-right{display:flex;gap:8px;flex-wrap:wrap}#playerWrap.force-hide-controls #playerBar{opacity:0!important;visibility:hidden!important;pointer-events:none!important;transform:translateY(-22px)!important}.player-btn{border:0;border-radius:10px;padding:10px 12px;color:#fff;cursor:pointer;font-weight:bold}.btn-player-home{background:#2196f3}.btn-player-close{background:#e53935}.btn-player-open{background:#009688}.btn-player-mx{background:#ff9800}.player-status{position:absolute;left:12px;right:12px;bottom:14px;z-index:10001;display:none;text-align:center;background:rgba(0,0,0,.72);color:#fff;padding:8px 12px;border-radius:10px;border:1px solid rgba(0,229,255,.35);font-size:14px}#playerWrap.force-hide-controls .player-status{opacity:0!important;visibility:hidden!important}@media(max-width:700px){.match{grid-template-columns:1fr}.action{text-align:left}.teams{align-items:flex-start}}
</style>
</head>
<body>
<div class="topbar"><div class="title">⚽ TIEA ตารางบอลเทพ WORKERS STABLE</div><div class="tools"><button class="btn home" id="homeBtn">🏠 HOME</button><button class="btn reload" id="reloadBtn">รีโหลด</button><button class="btn" id="testBtn">ทดสอบ Discovery</button></div></div>
<div class="wrap"><div id="statusBox" class="status"></div><div id="dayBar" class="daybar"></div><div id="content"></div></div>
<div id="playerWrap"><video id="videoPlayer" controls playsinline webkit-playsinline autoplay></video><div id="playerBar"><div class="player-left"><button id="playerCloseBtn" class="player-btn btn-player-close">✕ ปิด</button><button id="playerReloadBtn" class="player-btn btn-player-open">↻ รีโหลด</button></div><div class="player-right"><button id="playerHomeBtn" class="player-btn btn-player-home">🏠 หน้าโฮม</button><button id="playerExternalBtn" class="player-btn btn-player-open">▶ PLAYER</button><button id="playerMxBtn" class="player-btn btn-player-mx">▶ MX</button></div></div><div id="playerStatus" class="player-status"></div></div>
<script>
const HOME_URL="https://tiea9999.github.io/tv-online";
const SOURCE_URL="https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/Dooball66%20Pro%20V4.3.json";
const WORKER_PROXY="https://iptv.tawatchai250958.workers.dev/?url=";
const TEST_DISCOVERY="https://love.sikoyo3159.workers.dev/lx-origin/sd-discovery_720/chunks.m3u8";
const statusBox=document.getElementById('statusBox'),dayBar=document.getElementById('dayBar'),content=document.getElementById('content'),playerWrap=document.getElementById('playerWrap'),playerStatus=document.getElementById('playerStatus'),video=document.getElementById('videoPlayer');
let allMatches=[],selectedDate='',tickTimer=null,playerUiTimer=null,hls=null,hlsWatchdog=null,currentUrl='';
document.getElementById('homeBtn').onclick=()=>location.href=HOME_URL;document.getElementById('reloadBtn').onclick=()=>loadSchedule();document.getElementById('testBtn').onclick=()=>tryPlay(TEST_DISCOVERY);document.getElementById('playerHomeBtn').onclick=()=>location.href=HOME_URL;document.getElementById('playerCloseBtn').onclick=closePlayer;document.getElementById('playerReloadBtn').onclick=()=>{if(currentUrl)tryPlay(currentUrl)};document.getElementById('playerExternalBtn').onclick=()=>openExternalPlayer(currentUrl);document.getElementById('playerMxBtn').onclick=()=>openMx(currentUrl);
function setStatus(m){statusBox.textContent=m||'';statusBox.style.display=m?'block':'none'}
function setPlayerStatus(m,a=true){playerStatus.textContent=m||'';playerStatus.style.display=m?'block':'none';if(a&&m){clearTimeout(setPlayerStatus._t);setPlayerStatus._t=setTimeout(()=>playerStatus.style.display='none',4500)}}
function proxify(u){u=String(u||'').trim();if(!u)return'';if(u.includes('workers.dev'))return u;return WORKER_PROXY+encodeURIComponent(u)}
function forceAudio100(){try{video.muted=false;video.defaultMuted=false;video.volume=1.0}catch(e){}}
function pad2(n){return String(n).padStart(2,'0')}function formatDateKey(d){return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`}
function formatThaiDate(s){return new Date(s+'T00:00:00').toLocaleDateString('th-TH',{weekday:'short',day:'numeric',month:'short'})}
function parseDateTimeFromText(t){const n=new Date(),s=String(t||'').trim();let m=s.match(/(\d{1,2})\/(\d{1,2})\s+(\d{1,2}):(\d{2})/);if(m)return new Date(n.getFullYear(),+m[2]-1,+m[1],+m[3],+m[4],0);m=s.match(/(\d{1,2}):(\d{2})/);if(m)return new Date(n.getFullYear(),n.getMonth(),n.getDate(),+m[1],+m[2],0);return null}
function extractTimeText(a,b){const c=`${a} ${b||''}`;let m=c.match(/(\d{1,2}\/\d{1,2}\s+\d{1,2}:\d{2})/);if(m)return m[1];m=c.match(/(\d{1,2}:\d{2})/);return m?m[1]:''}
function normalizeDooballJson(data){const out=[],leagues=Array.isArray(data?.groups)?data.groups:[];leagues.forEach(l=>{const league=l?.name||'ลีกอื่นๆ',leagueImage=l?.image||'',matches=Array.isArray(l?.groups)?l.groups:[];matches.forEach(match=>{const stations=Array.isArray(match?.stations)?match.stations:[],matchName=match?.name||'ไม่มีชื่อคู่แข่ง',matchImage=match?.image||'',firstInfo=stations[0]?.info||'',timeText=extractTimeText(matchName,firstInfo),kickoff=parseDateTimeFromText(timeText);out.push({league,leagueImage,matchName,matchImage,info:firstInfo,timeText,kickoff,dateKey:kickoff?formatDateKey(kickoff):'',stations:stations.map((s,i)=>({name:s?.name||`Link ${i+1}`,info:s?.info||'',image:s?.image||'',url:s?.url||'',referer:s?.referer||'',userAgent:s?.['user-agent']||s?.userAgent||''})).filter(s=>s.url)})})});return out}
function getAvailableDateKeys(ms){return[...new Set(ms.map(m=>m.dateKey).filter(Boolean))].sort()}function buildDayButtons(keys){dayBar.innerHTML='';keys.forEach(k=>{const b=document.createElement('button');b.className='btn'+(k===selectedDate?' active':'');b.textContent=formatThaiDate(k);b.onclick=()=>{selectedDate=k;buildDayButtons(keys);renderMatches()};dayBar.appendChild(b)})}
function countdownText(k){if(!k)return'';const diff=k-new Date();if(diff<=0)return'เริ่มแล้ว/ถ่ายทอดสด';const total=Math.floor(diff/60000),h=Math.floor(total/60),m=total%60;return h>0?`อีก ${h} ชม. ${m} นาที`:`อีก ${m} นาที`}
function formatKickoffTime(k,t){return k instanceof Date&&!isNaN(k)?k.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'}):(t||'--:--')}
function groupByLeague(ms){const map=new Map();ms.forEach(m=>{if(!map.has(m.league))map.set(m.league,[]);map.get(m.league).push(m)});return map}
function pickPrimaryStation(stations){return !Array.isArray(stations)||!stations.length?null:(stations.find(s=>String(s.name||'').includes('หลัก')||String(s.info||'').includes('หลัก'))||stations[0])}
function showPlayerUi(){playerWrap.classList.remove('force-hide-controls');if(playerUiTimer)clearTimeout(playerUiTimer);playerUiTimer=setTimeout(()=>{if(playerWrap.style.display==='block'){try{document.activeElement?.blur?.()}catch(e){}playerWrap.classList.add('force-hide-controls')}},3000)}
function clearPlayer(){if(hlsWatchdog){clearInterval(hlsWatchdog);hlsWatchdog=null}if(hls){try{hls.destroy()}catch(e){}hls=null}try{video.pause()}catch(e){}video.removeAttribute('src');video.src='';video.load();setPlayerStatus('')}
function closePlayer(){clearPlayer();playerWrap.style.display='none';playerWrap.classList.remove('force-hide-controls');currentUrl=''}
function openExternalPlayer(url){if(!url)return;try{const u=new URL(url);location.href='intent://'+u.host+u.pathname+u.search+'#Intent;scheme='+u.protocol.replace(':','')+';action=android.intent.action.VIEW;type=video/*;S.browser_fallback_url='+encodeURIComponent(url)+';end'}catch(e){location.href=url}}
function openMx(url){if(!url)return;try{const u=new URL(url);location.href='intent://'+u.host+u.pathname+u.search+'#Intent;scheme='+u.protocol.replace(':','')+';action=android.intent.action.VIEW;type=video/*;package=com.mxtech.videoplayer.ad;S.browser_fallback_url='+encodeURIComponent(url)+';end'}catch(e){location.href='intent:'+url+'#Intent;package=com.mxtech.videoplayer.ad;end'}}
function startWatchdog(){let last=0,stuck=0;hlsWatchdog=setInterval(()=>{if(playerWrap.style.display!=='block'||!hls)return;forceAudio100();if(video.paused||video.readyState<2){try{hls.startLoad()}catch(e){}video.play().catch(()=>{});return}if(Math.abs(video.currentTime-last)<.05)stuck++;else stuck=0;last=video.currentTime;if(stuck>=4){setPlayerStatus('ภาพค้าง กำลังกู้คืน...');try{hls.startLoad()}catch(e){}video.play().catch(()=>{});stuck=0}},3000)}
function tryPlay(rawUrl){const url=proxify(rawUrl);currentUrl=url;playerWrap.style.display='block';showPlayerUi();clearPlayer();forceAudio100();const lower=String(url).toLowerCase();if(lower.includes('.m3u8')){if(Hls.isSupported()){setPlayerStatus('กำลังโหลด HLS ผ่าน workers.dev...');hls=new Hls({enableWorker:true,lowLatencyMode:false,autoStartLoad:true,maxBufferLength:35,maxMaxBufferLength:70,backBufferLength:20,maxBufferHole:.4,highBufferWatchdogPeriod:3,manifestLoadingMaxRetry:6,manifestLoadingRetryDelay:1200,levelLoadingMaxRetry:6,levelLoadingRetryDelay:1200,fragLoadingMaxRetry:8,fragLoadingRetryDelay:1200,startFragPrefetch:true,capLevelToPlayerSize:true,testBandwidth:false,abrEwmaDefaultEstimate:1200000});hls.loadSource(url);hls.attachMedia(video);hls.on(Hls.Events.MANIFEST_PARSED,()=>{forceAudio100();video.play().catch(()=>openExternalPlayer(url));setTimeout(()=>{forceAudio100();video.play().catch(()=>{})},300);setPlayerStatus('กำลังเล่น HLS')});hls.on(Hls.Events.BUFFER_STALLED,()=>{setPlayerStatus('กำลังเติมบัฟเฟอร์...');try{hls.startLoad()}catch(e){}});hls.on(Hls.Events.ERROR,(e,d)=>{if(d?.fatal){if(d.type===Hls.ErrorTypes.NETWORK_ERROR){setPlayerStatus('เน็ตเวิร์กสะดุด กำลังต่อใหม่...');try{hls.startLoad()}catch(e){}}else if(d.type===Hls.ErrorTypes.MEDIA_ERROR){setPlayerStatus('วิดีโอสะดุด กำลังกู้คืน...');try{hls.recoverMediaError()}catch(e){}}else openExternalPlayer(url)}});startWatchdog();return}if(video.canPlayType('application/vnd.apple.mpegurl')){video.src=url;forceAudio100();video.play().catch(()=>openExternalPlayer(url));return}openExternalPlayer(url);return}if(lower.match(/\.(mp4|mkv|avi|mov)$/)){video.src=url;forceAudio100();video.play().catch(()=>openExternalPlayer(url));return}openExternalPlayer(url)}
function openStation(match){const p=pickPrimaryStation(match.stations);if(p)tryPlay(p.url)}
function renderMatches(){const filtered=allMatches.filter(m=>m.dateKey===selectedDate).sort((a,b)=>(a.kickoff?a.kickoff.getTime():0)-(b.kickoff?b.kickoff.getTime():0));if(!filtered.length){content.innerHTML='<div class="empty">ไม่มีคู่แข่งในวันนี้</div>';return}const grouped=groupByLeague(filtered);content.innerHTML='';for(const[league,matches]of grouped.entries()){const block=document.createElement('div');block.className='league-block';const head=document.createElement('div');head.className='league-head';head.innerHTML=`${matches[0].leagueImage?`<img src="${matches[0].leagueImage}" alt="" onerror="this.style.display='none'">`:''}<span>${league} • ${matches.length} คู่</span>`;block.appendChild(head);matches.forEach(match=>{const row=document.createElement('div');row.className='match';const timeBox=document.createElement('div');timeBox.className='time';timeBox.innerHTML=`${formatKickoffTime(match.kickoff,match.timeText)}<div class="countdown">${countdownText(match.kickoff)}</div>`;const teams=document.createElement('div');teams.className='teams';teams.innerHTML=`${match.matchImage?`<img src="${match.matchImage}" alt="" onerror="this.style.display='none'">`:''}<div class="match-name">${match.matchName}</div>`;const action=document.createElement('div');action.className='action';const watchBtn=document.createElement('button');watchBtn.className='watch-btn'+(match.stations.length?'':' alt');watchBtn.textContent=match.stations.length?'ดูสด':'ยังไม่มีลิงก์';watchBtn.disabled=!match.stations.length;watchBtn.onclick=()=>openStation(match);const stationCount=document.createElement('div');stationCount.className='station-count';stationCount.textContent=match.stations.length?`${match.stations.length} ลิงก์`:'';action.appendChild(watchBtn);action.appendChild(stationCount);row.appendChild(timeBox);row.appendChild(teams);row.appendChild(action);block.appendChild(row)});content.appendChild(block)}}
function startTick(){if(tickTimer)clearInterval(tickTimer);tickTimer=setInterval(renderMatches,30000)}
async function loadSchedule(){try{setStatus('กำลังโหลดตารางแข่งขัน...');content.innerHTML='';dayBar.innerHTML='';const res=await fetch(SOURCE_URL+'?t='+Date.now(),{cache:'no-store'});if(!res.ok)throw new Error('โหลดไฟล์ไม่สำเร็จ: '+res.status);const data=await res.json();allMatches=normalizeDooballJson(data);if(!allMatches.length){setStatus('ไม่พบข้อมูลตารางแข่งขัน');content.innerHTML='<div class="empty">ไม่มีข้อมูลในไฟล์นี้</div>';return}const dates=getAvailableDateKeys(allMatches);if(!dates.length){setStatus('อ่านเวลาการแข่งไม่สำเร็จ');content.innerHTML='<div class="empty">ไฟล์มีคู่แข่ง แต่ยังจับเวลาไม่สำเร็จ</div>';return}selectedDate=dates[0];setStatus(`โหลดสำเร็จ: ${allMatches.length} คู่`);buildDayButtons(dates);renderMatches();startTick()}catch(e){console.error(e);setStatus('โหลดตารางไม่สำเร็จ\n'+(e?.message||''));content.innerHTML='<div class="empty">ตารางแข่งขันไม่มาในตอนนี้</div>'}}
['mousemove','mousedown','touchstart','touchmove','click','pointermove','pointerdown'].forEach(evt=>playerWrap.addEventListener(evt,()=>{if(playerWrap.style.display==='block')showPlayerUi()},{passive:true}));
document.addEventListener('keydown',e=>{if(playerWrap.style.display==='block'){showPlayerUi();if(e.key==='Escape'||e.key==='Backspace'||e.keyCode===10009){e.preventDefault();closePlayer();return}}else if(e.key==='Escape'||e.key==='Backspace'||e.keyCode===10009){e.preventDefault();location.href=HOME_URL}});
loadSchedule();
</script>
</body>
</html>
