async function loadPlaylist() {
  try {
    const res = await fetch("https://raw.githubusercontent.com/nongakka/anime-auto/main/playlist.json");
    const data = await res.json();

    // 🔥 รองรับ format ใหม่ (channels)
    if (data.channels) {
      PLAYLIST = data.channels.map(c => ({
        title: (c.id + " " + c.name),
        logo: c.logo,
        servers: (c.streams || []).map((url, i) => ({
          name: "Server " + (i + 1),
          url: url
        }))
      }));
    } else {
      // 🔥 format เก่า
      PLAYLIST = data;
    }

    console.log("✅ โหลด playlist แล้ว", PLAYLIST.length);

  } catch (e) {
    console.error("❌ โหลด playlist ไม่ได้", e);
  }
}

function normalize(str) {
  return (str || "")
    .toLowerCase()

    // ✅ ตัด prefix หน้าเดียว (มี - เท่านั้น)
    .replace(/^[a-z]+-/, "")

    // ✅ ลบ quality
    .replace(/hd|fhd|uhd/g, "")

    // ✅ ลบ space dash underscore ที่เหลือ
    .replace(/[\s_-]/g, "")

    // ✅ ลบตัวแปลก
    .replace(/[^a-z0-9]/g, "");
}
function findStream(channelName) {
  if (!channelName || PLAYLIST.length === 0) return null;

  const cleanChannel = normalize(channelName);

  let best = null;
  let bestLen = 0;

  for (const p of PLAYLIST) {
    const cleanTitle = normalize(p.title);

    if (cleanTitle.includes(cleanChannel) || cleanChannel.includes(cleanTitle)) {

      const len = Math.min(cleanTitle.length, cleanChannel.length);

      if (len > bestLen) {
        best = p;
        bestLen = len;
      }
    }
  }

  return best;
}

function formatThaiTime(dateStr) {
  if (!dateStr) return "-";

  const iso = dateStr
    .replace(" ", "T")
    .replace("+07", "+07:00"); // ✅ แก้ตรงนี้

  const d = new Date(iso);

  if (isNaN(d)) return "-"; // กันพัง

  return d.toLocaleTimeString("th-TH", {
    hour: "2-digit",
    minute: "2-digit",
    timeZone: "Asia/Bangkok"
  });
}
  
function formatThaiDate(dateStr) {
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;

  return d.toLocaleDateString("th-TH-u-ca-buddhist", {
    weekday: "long",
    day: "numeric",
    month: "long",
    year: "numeric"
  });
}
  
function getCountdown(timeStr) {
  if (!timeStr) return "-";

  const iso = timeStr.replace(" ", "T").replace("+07", "+07:00");
  const target = new Date(iso);
  const now = new Date();

  const diff = target - now;

  if (diff <= 0) return "เริ่มแล้ว";

  const h = Math.floor(diff / 1000 / 60 / 60);
  const m = Math.floor((diff / 1000 / 60) % 60);
  const s = Math.floor((diff / 1000) % 60);

  if (h > 0) return `อีก ${h} ชม. ${m} นาที`;
  if (m > 0) return `อีก ${m} นาที`;
  return `อีก ${s} วิ`;
}

  const video = document.getElementById("videoPlayer");

  if (hls) {
    hls.destroy();
  }

  if (Hls.isSupported()) {
    hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, function () {
      video.play();
    });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url;
    video.play();
  }
}

// ปิด
function closePlayer() {
  const modal = document.getElementById("playerModal");
  const video = document.getElementById("videoPlayer");

  if (hls) hls.destroy();
  video.pause();
  video.src = "";

  modal.classList.add("hidden");
  modal.classList.remove("flex");
}

// ESC ปิด
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closePlayer();
});


function switchServer(url, el) {
  playStream(url);

  // ลบ active จากทุกปุ่ม
  document.querySelectorAll(".server-btn").forEach(btn => {
    btn.classList.remove("bg-blue-600", "active-server");
    btn.classList.add("bg-white/10");
  });

  // ใส่ active ให้ปุ่มที่กด
  el.classList.remove("bg-white/10");
  el.classList.add("bg-blue-600", "active-server");
}
  
function goBack() {
  window.location.href = "https://nongakka.github.io/doofree/index.html";
}
</script>

<!-- 🔥 PLAYER MODAL PRO -->
<div id="playerModal"
  onclick="closePlayer()"
  class="fixed inset-0 bg-black/90 hidden items-center justify-center z-50">

  <div class="relative w-full max-w-5xl mx-4"
       onclick="event.stopPropagation()">

    <!-- ปิด -->
    <button onclick="closePlayer()"
      class="absolute -top-10 right-0 text-white text-xl bg-red-500 px-3 py-1 rounded">
      ✕
    </button>

    <!-- video -->
    <div class="bg-black rounded-xl overflow-hidden">
      <video id="videoPlayer"
        class="w-full aspect-video"
        controls
        autoplay
        muted>
      </video>
    </div>

    <!-- server -->
    <div id="serverList"
      class="mt-3 flex flex-wrap gap-2 justify-center">
    </div>

  </div>
</div>
