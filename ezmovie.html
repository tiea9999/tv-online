<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TIEA IPTV PRO FINAL</title>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: sans-serif;
        }

        #homeBtn {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 9999;
            padding: 10px 14px;
            background: #00c853;
            border: none;
            border-radius: 10px;
            color: #fff;
            cursor: pointer;
        }

        .row-title {
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #00e5ff;
            font-weight: bold;
            font-size: 18px;
        }

        .seeall {
            background: #ff9800;
            border: none;
            padding: 6px 10px;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
        }

        .row-items {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 10px;
            scrollbar-width: thin;
        }

        .card {
            min-width: 160px;
            max-width: 160px;
            background: #111;
            border-radius: 10px;
            padding: 8px;
            text-align: center;
            cursor: pointer;
            flex-shrink: 0;
        }

        .card img {
            width: 100%;
            height: 210px;
            object-fit: cover;
            border-radius: 8px;
            background: #1a1a1a;
            display: block;
        }

        .card-title {
            margin-top: 8px;
            font-size: 14px;
            line-height: 1.35;
            word-break: break-word;
        }

        #overlay,
        #player {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
        }

        #overlay {
            background: #000;
            z-index: 999;
            overflow: auto;
            padding-top: 50px;
        }

        #player {
            background: #000;
            z-index: 1000;
        }

        video,
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
            object-fit: contain;
        }

        .btn,
        .btn3,
        .btn4 {
            position: absolute;
            top: 10px;
            z-index: 1002;
            padding: 10px;
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
        }

        .btn {
            right: 10px;
            background: #ff0000;
        }

        .btn3 {
            right: 60px;
            background: #2196f3;
        }

        .btn4 {
            right: 130px;
            background: #9c27b0;
        }

        #mxHint {
            position: absolute;
            left: 10px;
            bottom: 10px;
            z-index: 1002;
            background: rgba(0, 0, 0, .65);
            padding: 8px 10px;
            border-radius: 8px;
            font-size: 13px;
        }

        .status {
            padding: 14px;
            color: #fff;
        }

        .ep-wrap {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 10px;
        }

        .ep-card {
            min-width: 110px;
            background: #111;
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            border: 1px solid #222;
        }

        .card:focus,
        .ep-card:focus,
        button:focus {
            outline: 3px solid #00e5ff;
            outline-offset: 2px;
        }

        .all-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            padding: 10px;
        }

        .all-grid .card {
            min-width: 0;
            max-width: none;
            width: 100%;
        }

        @media (min-width: 700px) {
            .all-grid {
                grid-template-columns: repeat(4, minmax(0, 1fr));
            }
        }

        @media (min-width: 1100px) {
            .all-grid {
                grid-template-columns: repeat(6, minmax(0, 1fr));
            }
        }
    </style>
</head>

<body>

    <button id="homeBtn">🏠 HOME</button>

    <div id="grid"></div>
    <div id="overlay"></div>

    <div id="player">
        <button class="btn" onclick="goHome()">✕</button>
        <button class="btn3" onclick="openExternal()">▶ MX</button>
        <button class="btn4" onclick="copyCurrentLink()">คัดลอก</button>
        <div id="mxHint">ถ้าไม่มีภาพให้กด MX</div>
        <video id="video" playsinline webkit-playsinline x5-playsinline controls autoplay muted preload="auto"></video>
        <iframe id="frame" allowfullscreen referrerpolicy="no-referrer"></iframe>
    </div>

    <script>
        const PROXY = "https://iptv.tawatchai250958.workers.dev/?url=";

        const SOURCES = [
            {
                name: "หนังมาใหม่",
                type: "anime-json",
                url: "https://raw.githubusercontent.com/nongakka/ezmovie/main/playlist_หนังมาใหม่.json"
            },
            {
                name: "หนังไทย",
                type: "anime-json",
                url: "https://raw.githubusercontent.com/nongakka/ezmovie/main/playlist_หนังไทย.json"
            },
            {
                name: "หนังเอเชีย",
                type: "anime-json",
                url: "https://raw.githubusercontent.com/nongakka/ezmovie/main/playlist_หนังเอเชีย.json"
            },
            {
                name: "หนังฝรั่ง",
                type: "anime-json",
                url: "https://raw.githubusercontent.com/nongakka/ezmovie/main/playlist_หนังฝรั่ง.json"
            },
            {
                name: "หนังเกาหลี",
                type: "anime-json",
                url: "https://raw.githubusercontent.com/nongakka/ezmovie/main/playlist_หนังเกาหลี.json"
            },
            {
                name: "หนังญี่ปุ่น",
                type: "anime-json",
                url: "https://raw.githubusercontent.com/nongakka/ezmovie/main/playlist_หนังญี่ปุ่น.json"
            },
            {
                name: "หนังแอคชั่นบู๊_action",
                type: "anime-json",
                url: "https://raw.githubusercontent.com/nongakka/ezmovie/main/playlist_หนังแอคชั่นบู๊_action.json"
            },
            {
                name: "หนังดราม่า_drama",
                type: "anime-json",
                url: "https://raw.githubusercontent.com/nongakka/ezmovie/main/playlist_หนังดราม่า_drama.json"
            },
            {
                name: "หนังผจญภัย_adventure",
                type: "anime-json",
                url: "https://raw.githubusercontent.com/nongakka/ezmovie/main/playlist_หนังผจญภัย_adventure.json"
            },
        ];

        const FALLBACK_IMG =
            "data:image/svg+xml;utf8," +
            encodeURIComponent(`
                <svg xmlns="http://www.w3.org/2000/svg" width="300" height="450">
                    <rect width="100%" height="100%" fill="#1a1a1a"/>
                    <text x="50%" y="50%" fill="#ffffff" font-size="22" text-anchor="middle" dy=".3em">NO IMAGE</text>
                </svg>
            `);

        let grid = document.getElementById("grid");
        let overlay = document.getElementById("overlay");
        let video = document.getElementById("video");
        let frame = document.getElementById("frame");
        let player = document.getElementById("player");

        let hls = null;
        let store = {};

        let allView = {
            active: false,
            name: "",
            page: 1
        };

        let currentList = [];
        let currentIndex = 0;

        function safeId(text) {
            return String(text).replace(/[^\wก-๙-]/g, "_");
        }

        function getTitle(item) {
            return item.title || item.name || item.ep_name || "ไม่มีชื่อ";
        }

        function getImage(item) {
            return (
                item.image ||
                item.poster ||
                item.poster_url ||
                item.thumb ||
                item.thumbnail ||
                item.logo ||
                FALLBACK_IMG
            );
        }

        function getDirectUrl(item) {
            if (!item || typeof item !== "object") return "";
            return (
                item.url ||
                item.file ||
                item.src ||
                item.link ||
                item.stream ||
                item.play ||
                item.video ||
                item.video_url ||
                item.m3u8 ||
                item.player ||
                item.embed ||
                item.stream_url ||
                ""
            );
        }

        function normalizeServers(servers) {
            if (!Array.isArray(servers)) return [];

            return servers
                .map(s => {
                    if (typeof s === "string") return { url: s };

                    if (s && typeof s === "object") {
                        return {
                            url:
                                s.url ||
                                s.file ||
                                s.src ||
                                s.link ||
                                s.stream ||
                                s.play ||
                                s.video ||
                                s.video_url ||
                                s.m3u8 ||
                                s.player ||
                                s.embed ||
                                s.stream_url ||
                                ""
                        };
                    }

                    return { url: "" };
                })
                .filter(s => s.url);
        }

        async function loadAll() {
            grid.innerHTML = `<div class="status">⚡ LOADING...</div>`;
            const rows = [];

            for (const s of SOURCES) {
                try {
                    const res = await fetch(s.url + "?t=" + Date.now(), { cache: "no-store" });
                    if (!res.ok) throw new Error("โหลดไม่สำเร็จ " + res.status);

                    const data = await res.json();

                    let list = [];
                    if (Array.isArray(data)) {
                        list = data;
                    } else if (Array.isArray(data.items)) {
                        list = data.items;
                    } else if (Array.isArray(data.data)) {
                        list = data.data;
                    }

                    store[s.name] = {
                        data: list,
                        page: 1,
                        error: ""
                    };
                } catch (err) {
                    console.error("โหลด source ไม่ได้:", s.name, err);
                    store[s.name] = {
                        data: [],
                        page: 1,
                        error: "โหลดรายการไม่ได้"
                    };
                }

                rows.push(s.name);
            }

            grid.innerHTML = "";
            rows.forEach(renderRow);

            setTimeout(() => {
                const homeBtn = document.getElementById("homeBtn");
                if (homeBtn) homeBtn.focus();
            }, 300);
        }

        function renderRow(name) {
            const rowId = safeId(name);
            const row = document.createElement("div");

            row.innerHTML = `
                <div class="row-title">
                    <span>${name}</span>
                    <button class="seeall" onclick="seeAll('${name.replace(/'/g, "\\'")}')">ดูทั้งหมด</button>
                </div>
                <div class="row-items" id="row-${rowId}"></div>
            `;

            grid.appendChild(row);
            renderPage(name);
        }

        function createCard(item, onClick) {
            const div = document.createElement("div");
            div.className = "card";
            div.tabIndex = 0;

            const img = getImage(item);
            const title = getTitle(item);

            div.innerHTML = `
                <img
                    src="${img}"
                    alt="${title}"
                    loading="lazy"
                    referrerpolicy="no-referrer"
                    onerror="this.onerror=null;this.src='${FALLBACK_IMG}'"
                >
                <div class="card-title">${title}</div>
            `;

            div.onclick = onClick;
            div.onkeydown = (e) => {
                if (e.key === "Enter" || e.key === "OK") {
                    e.preventDefault();
                    onClick();
                }
            };
            return div;
        }

        function renderPage(name) {
            const obj = store[name];
            if (!obj) return;

            const row = document.getElementById("row-" + safeId(name));
            if (!row) return;

            const items = obj.data.slice(0, 15);
            row.innerHTML = "";

            if (obj.error) {
                row.innerHTML = `<div class="status">❌ ${obj.error}</div>`;
                return;
            }

            if (!items.length) {
                row.innerHTML = `<div class="status">ไม่มีข้อมูล</div>`;
                return;
            }

            items.forEach(item => row.appendChild(createCard(item, () => openItem(item))));
        }

        function seeAll(name) {
            allView.active = true;
            allView.name = name;
            allView.page = 1;
            renderAllPage();
        }

        function renderAllPage() {
            const obj = store[allView.name];
            if (!obj) return;

            const perPage = 10;
            const totalItems = obj.data.length;
            const totalPages = Math.max(1, Math.ceil(totalItems / perPage));
            const currentPage = Math.min(allView.page, totalPages);
            const start = (currentPage - 1) * perPage;
            const end = start + perPage;
            const items = obj.data.slice(start, end);

            overlay.style.display = "block";
            grid.style.display = "none";

            overlay.innerHTML = `
                <div style="padding:10px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;">
                    <h2 style="margin:0;">${allView.name}</h2>
                    <div style="display:flex;gap:8px;flex-wrap:wrap;">
                        <button class="seeall" onclick="prevAllPage()">◀ ก่อนหน้า</button>
                        <button class="seeall" onclick="nextAllPage()">ถัดไป ▶</button>
                        <button class="seeall" onclick="backToGrid()">← กลับ</button>
                    </div>
                </div>

                <div style="padding:0 10px 10px 10px;color:#00e5ff;">
                    หน้า ${currentPage} / ${totalPages} &nbsp; | &nbsp; ทั้งหมด ${totalItems} เรื่อง
                </div>

                <div id="allBox" class="all-grid"></div>
            `;

            const box = document.getElementById("allBox");

            if (obj.error) {
                box.innerHTML = `<div class="status">❌ ${obj.error}</div>`;
                return;
            }

            if (!items.length) {
                box.innerHTML = `<div class="status">ไม่มีข้อมูล</div>`;
                return;
            }

            items.forEach(item => box.appendChild(createCard(item, () => openItem(item))));
        }

        function nextAllPage() {
            const obj = store[allView.name];
            if (!obj) return;

            const totalPages = Math.max(1, Math.ceil(obj.data.length / 20));
            if (allView.page < totalPages) {
                allView.page++;
                renderAllPage();
            }
        }

        function prevAllPage() {
            if (allView.page > 1) {
                allView.page--;
                renderAllPage();
            }
        }

        function openItem(item) {
            if (Array.isArray(item.episodes) && item.episodes.length) {
                showEP(item);
                return;
            }

            const servers = normalizeServers(item.servers || item.sources || item.links || []);
            const url = getDirectUrl(item);

            if (servers.length) {
                startPlay(servers);
                return;
            }

            if (url) {
                startPlay([{ url }]);
                return;
            }

            alert("❌ ไม่พบลิงก์เล่น");
        }

        function showEP(item) {
            overlay.style.display = "block";
            grid.style.display = "none";

            overlay.innerHTML = `
                <div style="padding:10px;display:flex;align-items:center;justify-content:space-between;">
                    <h2 style="margin:0;">${getTitle(item)}</h2>
                    <button class="seeall" onclick="backToListOrGrid()">← กลับ</button>
                </div>
                <div class="ep-wrap" id="epBox"></div>
            `;

            const box = document.getElementById("epBox");

            item.episodes.forEach((ep, index) => {
                const d = document.createElement("div");
                d.className = "ep-card";
                d.tabIndex = 0;
                d.textContent = ep.name || ep.title || `EP ${index + 1}`;
                d.onclick = () => {
                    const servers = normalizeServers(
                        ep.servers || ep.sources || ep.links || ep.files || ep.playlist || []
                    );

                    const single = getDirectUrl(ep);

                    if (servers.length) {
                        startPlay(servers);
                    } else if (single) {
                        startPlay([{ url: single }]);
                    } else {
                        alert("❌ ตอนนี้ไม่มีลิงก์เล่น");
                    }
                };
                d.onkeydown = (e) => {
                    if (e.key === "Enter" || e.key === "OK") {
                        e.preventDefault();
                        d.click();
                    }
                };
                box.appendChild(d);
            });
        }

        function startPlay(list) {
            currentList = [...list];
            currentIndex = 0;
            overlay.style.display = "none";
            player.style.display = "block";
            playServers(currentList);
        }

        async function playServers(list) {
            currentList = [...list];

            for (let i = 0; i < list.length; i++) {
                currentIndex = i;
                const item = list[i];
                const url = typeof item === "string" ? item : item.url;

                if (!url) continue;

                try {
                    await play(url);
                    return;
                } catch (e) {
                    console.warn("server เล่นไม่ได้:", url, e);
                }
            }

            alert("❌ เล่นไม่ได้ทุก server");
            goHome();
        }

        function cleanupPlayers() {
            if (hls) {
                try { hls.destroy(); } catch (e) { }
                hls = null;
            }

            video.pause();
            video.muted = true;
            video.removeAttribute("src");
            video.load();
            video.style.display = "none";

            frame.src = "";
            frame.style.display = "none";
        }

        function isHls(url) {
            return /\.m3u8($|\?)/i.test(url);
        }

        function isVideoFile(url) {
            return /\.(mp4|m4v|webm|ogg|ogv|mov)($|\?)/i.test(url);
        }

        function isEmbeddable(url) {
            return /youtube\.com|youtu\.be|vk\.com|ok\.ru|dailymotion\.com|player|embed/i.test(url);
        }

        async function play(url) {
            cleanupPlayers();

            if (isHls(url)) {
                try {
                    await playHlsWithFallback(url);
                    return;
                } catch (e) {
                    try {
                        await playNativeVideo(PROXY + encodeURIComponent(url));
                        return;
                    } catch (_) {
                        throw e;
                    }
                }
            }

            if (isVideoFile(url)) {
                return playNativeVideo(url);
            }

            if (isEmbeddable(url)) {
                return openFrame(url);
            }

            try {
                await playNativeVideo(url);
                return;
            } catch (_) {
                return openFrame(url);
            }
        }

        function playNativeVideo(url) {
            video.style.display = "block";
            frame.style.display = "none";

            return new Promise((resolve, reject) => {
                let done = false;

                const ok = () => {
                    if (done) return;
                    done = true;
                    clear();
                    video.muted = false;
                    const p = video.play();
                    if (p && typeof p.then === "function") {
                        p.then(() => resolve()).catch(() => resolve());
                    } else {
                        resolve();
                    }
                };

                const fail = () => {
                    if (done) return;
                    done = true;
                    clear();
                    reject("video error");
                };

                const clear = () => {
                    video.removeEventListener("loadedmetadata", ok);
                    video.removeEventListener("canplay", ok);
                    video.removeEventListener("playing", ok);
                    video.removeEventListener("error", fail);
                };

                video.addEventListener("loadedmetadata", ok, { once: true });
                video.addEventListener("canplay", ok, { once: true });
                video.addEventListener("playing", ok, { once: true });
                video.addEventListener("error", fail, { once: true });

                video.pause();
                video.removeAttribute("src");
                video.load();

                video.src = url;
                video.load();

                setTimeout(() => {
                    if (!done) fail();
                }, 10000);
            });
        }

        function playHlsWithFallback(url) {
            const tryUrls = [url, PROXY + encodeURIComponent(url)];

            return new Promise(async (resolve, reject) => {
                for (const testUrl of tryUrls) {
                    try {
                        await playOneHls(testUrl);
                        resolve();
                        return;
                    } catch (e) {
                        console.warn("HLS ล้มเหลว:", testUrl, e);
                    }
                }
                reject("hls fail");
            });
        }

        function playOneHls(sourceUrl) {
            video.style.display = "block";
            frame.style.display = "none";

            return new Promise((resolve, reject) => {
                let settled = false;

                const ok = () => {
                    if (settled) return;
                    settled = true;
                    clear();

                    setTimeout(() => {
                        video.muted = false;
                        const p = video.play();
                        if (p && typeof p.then === "function") {
                            p.then(() => resolve()).catch(() => resolve());
                        } else {
                            resolve();
                        }
                    }, 200);
                };

                const fail = () => {
                    if (settled) return;
                    settled = true;
                    clear();
                    reject("hls error");
                };

                const clear = () => {
                    video.removeEventListener("loadedmetadata", ok);
                    video.removeEventListener("canplay", ok);
                    video.removeEventListener("playing", ok);
                    video.removeEventListener("error", fail);

                    if (hls) {
                        hls.off(Hls.Events.MANIFEST_PARSED, ok);
                        hls.off(Hls.Events.LEVEL_LOADED, ok);
                        hls.off(Hls.Events.ERROR, onHlsError);
                    }
                };

                const onHlsError = (event, data) => {
                    if (!data) return;

                    if (data.fatal) {
                        if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                            try { hls.startLoad(); } catch (e) { }
                        } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                            try { hls.recoverMediaError(); } catch (e) { }
                        } else {
                            fail();
                        }
                    }
                };

                video.pause();
                video.removeAttribute("src");
                video.load();

                if (video.canPlayType("application/vnd.apple.mpegurl")) {
                    video.addEventListener("loadedmetadata", ok, { once: true });
                    video.addEventListener("canplay", ok, { once: true });
                    video.addEventListener("playing", ok, { once: true });
                    video.addEventListener("error", fail, { once: true });

                    video.src = sourceUrl;
                    video.load();
                } else if (Hls.isSupported()) {
                    hls = new Hls({
                        enableWorker: true,
                        lowLatencyMode: false,
                        backBufferLength: 30,
                        maxBufferLength: 20,
                        maxMaxBufferLength: 30,
                        startLevel: -1,
                        fragLoadingTimeOut: 20000,
                        manifestLoadingTimeOut: 20000
                    });

                    video.addEventListener("loadedmetadata", ok, { once: true });
                    video.addEventListener("canplay", ok, { once: true });
                    video.addEventListener("playing", ok, { once: true });
                    video.addEventListener("error", fail, { once: true });

                    hls.on(Hls.Events.MANIFEST_PARSED, ok);
                    hls.on(Hls.Events.LEVEL_LOADED, ok);
                    hls.on(Hls.Events.ERROR, onHlsError);

                    hls.loadSource(sourceUrl);
                    hls.attachMedia(video);
                } else {
                    reject("browser not support hls");
                    return;
                }

                setTimeout(() => {
                    if (!settled) fail();
                }, 12000);
            });
        }

        function openFrame(url) {
            frame.style.display = "block";

            return new Promise((resolve, reject) => {
                let done = false;

                const ok = () => {
                    if (done) return;
                    done = true;
                    clearTimeout(timer);
                    resolve();
                };

                const fail = () => {
                    if (done) return;
                    done = true;
                    clearTimeout(timer);
                    reject("iframe error");
                };

                frame.onload = ok;
                frame.onerror = fail;
                frame.src = url;

                const timer = setTimeout(() => {
                    if (!done) ok();
                }, 2500);
            });
        }

        function openExternal() {
            if (!currentList.length) return;

            const item = currentList[currentIndex];
            const url = typeof item === "string" ? item : item.url;
            if (!url) return;

            try {
                window.open(url, "_blank");
            } catch (e) {
                prompt("คัดลิงก์นี้ไปเปิดใน MX", url);
            }
        }

        async function copyCurrentLink() {
            if (!currentList.length) return;
            const item = currentList[currentIndex];
            const url = typeof item === "string" ? item : item.url;
            if (!url) return;

            try {
                await navigator.clipboard.writeText(url);
                alert("คัดลอกลิงก์แล้ว");
            } catch (e) {
                prompt("คัดลอกลิงก์นี้", url);
            }
        }

        function backToListOrGrid() {
            if (allView.active) {
                renderAllPage();
            } else {
                backToGrid();
            }
        }

        function backToGrid() {
            overlay.style.display = "none";
            overlay.innerHTML = "";
            grid.style.display = "block";
            allView.active = false;
            allView.name = "";
            allView.page = 1;
        }

        function goHome() {
            cleanupPlayers();

            player.style.display = "none";
            overlay.style.display = "none";
            overlay.innerHTML = "";
            grid.style.display = "block";

            allView.active = false;
            allView.name = "";
            allView.page = 1;

            currentList = [];
            currentIndex = 0;

            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        document.getElementById("homeBtn").onclick = () => {
            cleanupPlayers();
            window.location.href = "https://tiea9999.github.io/tv-online/index.html";
        };

        document.addEventListener("keydown", function (e) {
            const key = e.key;

            if (key === "Escape" || key === "Backspace" || key === "GoBack") {
                e.preventDefault();

                if (player.style.display === "block") {
                    goHome();
                    return;
                }

                if (overlay.style.display === "block") {
                    backToListOrGrid();
                    return;
                }

                return;
            }

            if (key === "Enter" || key === "OK") {
                const el = document.activeElement;
                if (el && typeof el.click === "function") {
                    e.preventDefault();
                    el.click();
                }
            }
        });

        loadAll();
    </script>

</body>

</html>
