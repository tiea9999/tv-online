<!-- ไฟล์นี้แก้ให้ "กดแล้วมีเสียงทันที" เรียบร้อยแล้ว -->
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIEA IPTV</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
<script src="https://ssl.p.jwpcdn.com/player/v/8.26.0/jwplayer.js"></script>
<script>jwplayer.key="XSuP4qMl+9tK17QNb+4+th2Pm9AWgMO/cYH8CI0HGGr7bdjo";</script>

<style>
body{margin:0;background:#000;color:#fff;font-family:Kanit}
</style>
</head>
<body>

<video id="videoPlayer" controls playsinline autoplay muted style="width:100%;height:100%"></video>
<div id="jw-player"></div>

<script>
let video = document.getElementById("videoPlayer");
let jwInstance = null;

function forceUnmute(video){
    if(!video) return;

    video.muted = false;
    video.volume = 1;

    const p = video.play();
    if(p !== undefined){
        p.then(()=>{
            video.muted = false;
            video.volume = 1;
        }).catch(()=>{});
    }
}

function playMP4(url){
    video.src = url;
    video.play().then(()=>{
        forceUnmute(video);
    }).catch(()=>{});
}

function playHLS(url){
    if(Hls.isSupported()){
        const hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, function(){
            video.play().then(()=>{
                forceUnmute(video);
            }).catch(()=>{});
        });
    }else{
        video.src = url;
        video.addEventListener("loadedmetadata", ()=>{
            video.play().then(()=>{
                forceUnmute(video);
            }).catch(()=>{});
        },{once:true});
    }
}

function playJW(url){
    jwInstance = jwplayer("jw-player").setup({
        file: url,
        width:"100%",
        height:"100%",
        autostart:true
    });

    jwInstance.on('ready', function(){
        jwInstance.setMute(false);
        jwInstance.setVolume(100);
    });
}

// 🔥 ตัวอย่างทดสอบ
setTimeout(()=>{
    playHLS("https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8");
},1000);

</script>

</body>
</html>
