<script>

let playlists = [];

/* ===== SAVE LAST 5 URL ===== */

function saveLastUrl(url){

    list = list.filter(u => u !== url);

    if(list.length > 5){

    }

    localStorage.setItem("last_playlist_urls", JSON.stringify(list));

const grid=document.getElementById("movieGrid");

/* SAVE */
        function savePlaylists(){

    console.log("Skip saving playlist (disabled to prevent quota error)");

window.location.href = "https://tiea9999.github.io/tv-online/index.html";

/* RENDER PLAYLIST UI */
function renderPlaylists(){

playlists.forEach((pl,index)=>{

// ป้องกัน playlist เสีย

const div=document.createElement("div");

/* DELETE */
function deletePlaylist(index){
if(!confirm("ลบ Playlist นี้?")) return;

playlists.splice(index,1);

if(activePlaylistIndex===index){
activePlaylistIndex=null;
allChannels=[];
grid.innerHTML="";
categoryList.innerHTML="";
}

savePlaylists();
renderPlaylists();
}

/* REFRESH ONE */
function refreshOne(index){
const pl=playlists[index];
if(!pl.source) return alert("Playlist นี้ไม่ใช่ URL");

let refreshURL = pl.source;

if(refreshURL.includes("?")){
    refreshURL += "&t=" + Date.now();
}else{
    refreshURL += "?t=" + Date.now();
}

fetch(refreshURL)

.then(r=>r.text())
.then(text=>{

parseM3U(text,pl.source,index);
alert("รีเฟรชสำเร็จ ✅");
})
.catch(()=>alert("รีเฟรชไม่สำเร็จ ❌"));
}

/* FILE LOAD */
document.getElementById("fileInput").addEventListener("change",e=>{
if(!e.target.files.length) return;

const reader=new FileReader();
reader.onload=()=>{
parseM3U(reader.result,null,null,e.target.files[0].name);
};
reader.readAsText(e.target.files[0]);
});


/* URL LOAD */
function fixDropboxURL(url){

    // ถ้าเป็น dropbox.com → แปลงเป็น dl=1
    if(url.includes("dropbox.com")){
        url = url.replace("www.dropbox.com","dl.dropboxusercontent.com");
        url = url.replace("dropbox.com","dl.dropboxusercontent.com");

        if(!url.includes("dl=1")){
            if(url.includes("?")){
                url += "&dl=1";
            }else{
                url += "?dl=1";
            }
        }
    }

    return url;
}

function loadURL(){

    let url = document.getElementById("urlInput").value.trim();
    if(!url) return;

    url = fixDropboxURL(url);

    saveLastUrl(url);
    
    fetch(url)
    .then(r=>{
        if(!r.ok) throw new Error("โหลดไม่สำเร็จ");
        return r.text();
    })
    .then(text=>{
        parseM3U(text,url);
    })
    .catch(err=>{
        alert("โหลด URL ไม่สำเร็จ ❌\n" + err.message);
    });
}

/* =========================
   🔥 UNIVERSAL JSON NORMALIZER
========================= */
function normalizePlaylist(input){

// ===== Series format (title + episodes) =====
if(Array.isArray(input) && input.length > 0 && input[0]?.episodes){

    const groups = input.map(series => {

        const stations = [];

        (series.episodes || []).forEach(ep => {
            
        // ===== Series รองรับ Multi Server จริง =====
if((ep.servers || []).length > 0){
    stations.push({
        name: ep.name,
        image: series.image || "",
        servers: ep.servers
    });
}
        });

        return {
            name: series.title || "ไม่มีชื่อ",
            image: series.image || "",
            stations: stations
        };
    });

    return {
        name: "Series Playlist",
        groups: groups
    };
}
    // ถ้าเป็น array ตรง ๆ
    if(Array.isArray(input)){
        return {
            name: "Imported Playlist",
            image: "",
            groups: [{
                name: "ทั้งหมด",
                image: "",
                
stations: input
.map(i => ({
    name: i.name || i.title,
    url: i.url || i.link,
    image: i.image || ""
}))
.filter(i => i.name && i.url)
            }]
        };
    }

    // ถ้ามี groups อยู่แล้ว
    if(input.groups && Array.isArray(input.groups)){
    input.groups.forEach(g=>{
        if(g.stations){
            g.stations = g.stations.filter(s => 
    s.url || (s.servers && Array.isArray(s.servers))
);
        }
    });
    return input;
}

    // ถ้ามี stations แต่ไม่มี groups
    if(input.stations && Array.isArray(input.stations)){
        return {
            name: input.name || "Playlist",
            image: input.image || "",
            groups: [{
                name: input.name || "ทั้งหมด",
                image: input.image || "",
                stations: input.stations
            }]
        };
    }

    // ถ้าเป็น object เดี่ยวที่มี name + url
    if(input.name && input.url){
        return {
            name: "Imported Playlist",
            image: input.image || "",
            groups: [{
                name: "ทั้งหมด",
                image: input.image || "",
                stations: [input]
            }]
        };
    }

    return null;
}

/* PARSE */
function parseM3U(data, source, indexOverride = null, fileName = null){

let channels = [];
let groupsData = [];

let cleanData = data.trim();

// ลบ BOM
if(cleanData.charCodeAt(0) === 0xFEFF){
    cleanData = cleanData.slice(1);
}

/* =====================================
   🔥 AUTO DETECT JSON จากเนื้อไฟล์จริง
===================================== */

let isJSON = false;

try{
    JSON.parse(cleanData);
    isJSON = true;
}catch(e){
    isJSON = false;
}

if(isJSON){
    try{

        const raw = JSON.parse(cleanData);
        const normalized = normalizePlaylist(raw);

        if(normalized && normalized.groups){

            groupsData = normalized.groups;

            normalized.groups.forEach(group=>{

                if(!group.stations || !Array.isArray(group.stations)) return;

                group.stations.forEach(st=>{

                    // ===== Multi Server =====
                    if(st.servers && Array.isArray(st.servers)){
                        channels.push({
                            title: st.name || "ไม่ทราบชื่อ",
                            group: group.name || "อื่นๆ",
                            logo: st.image || group.image || "",
                            servers: st.servers
                        });
                        return;
                    }

                    // ===== URL ปกติ =====
                    if(st.url){
                        channels.push({
                            title: st.name || "ไม่ทราบชื่อ",
                            group: group.name || "อื่นๆ",
                            logo: st.image || group.image || "",
                            url: st.url,
                            referer: st.referer || null,
                            drm: st.drm || null
                        });
                    }

                });

            });

        }

    }catch(e){
        console.log("JSON parse error → fallback M3U");
    }
}

/* =====================================
   🔥 ถ้าไม่ใช่ JSON → ถือเป็น M3U
===================================== */

if(channels.length === 0){

    const lines = cleanData.split(/\r?\n/);
let current=null;
let tempDRM = null;

    lines.forEach(line=>{

    line=line.trim();

    // ===== EXTINF =====
    if(line.startsWith("#EXTINF")){

        const title=line.substring(line.lastIndexOf(",")+1).trim();
        const group=(line.match(/group-title="(.*?)"/)||[])[1]||"อื่นๆ";
        const logo=(line.match(/tvg-logo="(.*?)"/)||[])[1]||"";

        current={title,group,logo};
        tempDRM = null; // reset drm
    }

    // ===== DRM TYPE =====
    else if(line.includes("license_type=clearkey")){
        tempDRM = {
            type: "clearkey"
        };
    }

    // ===== DRM KEY =====
    else if(line.includes("license_key=")){

        const match = line.match(/license_key=(.*)/);
        if(match && tempDRM){

            const parts = match[1].split(":");

            if(parts.length === 2){
                tempDRM.keyId = parts[0].trim();
                tempDRM.key = parts[1].trim();
            }
        }
    }

    // ===== URL =====
    else if(line && !line.startsWith("#") && current){

        current.url=line;

        if(tempDRM){
            current.drm = tempDRM;
        }

        channels.push(current);

        current=null;
        tempDRM=null;
    }

});

/* =====================================
   🔥 ตั้งชื่อ Playlist ให้ปลอดภัย
===================================== */

let playlistName = "Local File";

if(fileName){
    playlistName = fileName;
}
else if(source){
    try{
        playlistName = new URL(source).hostname;
    }catch{
        playlistName = "Imported URL";
    }
}

/* ===================================== */

const playlistData={
    name: playlistName,
    source: source,
    channels: channels,
    groupsData: groupsData
};

if(indexOverride!==null){
    playlists[indexOverride]=playlistData;
    activePlaylistIndex=indexOverride;
}else{
    playlists.push(playlistData);
    activePlaylistIndex=playlists.length-1;
}

savePlaylists();
renderPlaylists();

allChannels=channels;

if(groupsData && groupsData.length > 0){
    viewMode="groups";
    renderGroups();
}else{
    viewMode="channels";
    buildCategories();
    renderGrid();
}
}
}
/* CATEGORY */
function buildCategories(){
const groups=["ทั้งหมด",...new Set(allChannels.map(c=>c.group))];
categoryList.innerHTML="";

groups.forEach((g,i)=>{
const li=document.createElement("li");
li.textContent=g;

if(i===0){
li.classList.add("active");
}

li.onclick=()=>{
categoryList.querySelectorAll("li")
.forEach(el=>el.classList.remove("active"));
li.classList.add("active");
currentCategory=g;
renderGrid();
};

categoryList.appendChild(li);
});
}

/* SEARCH */
document.getElementById("searchInput").addEventListener("input",renderGrid);

/* GRID */
function renderGrid(){
grid.innerHTML="";
const keyword=document.getElementById("searchInput").value.toLowerCase();
const filtered=allChannels.filter(c=>{
return (currentCategory==="ทั้งหมด"||c.group===currentCategory)
&& c.title.toLowerCase().includes(keyword);
});
filtered.forEach(ch=>{
const card=document.createElement("div");
card.className="movie-card";
card.innerHTML=`<img loading="lazy" src="${ch.logo||'https://via.placeholder.com/300x450?text=No+Image'}"><div class="movie-title">${ch.title}</div>`;
card.onclick=()=>playStream(ch);
grid.appendChild(card);
});
}


function renderGroups(){

grid.innerHTML="";

if(activePlaylistIndex === null || !playlists[activePlaylistIndex]){
    viewMode="channels";
    return;
}

const pl = playlists[activePlaylistIndex];

if(!pl.groupsData || pl.groupsData.length===0){
    viewMode="channels";
    renderGrid();
    return;
}

pl.groupsData.forEach(group=>{

    const card=document.createElement("div");
    card.className="movie-card";

    card.innerHTML=`
        <img src="${group.image || 'https://via.placeholder.com/300x450?text=No+Image'}">
        <div class="movie-title">${group.name}</div>
    `;

    card.onclick=()=>{
        currentGroupData = group;
        viewMode="channels";
        renderGroupChannels();
    };

    grid.appendChild(card);
});
}


function renderGroupChannels(){

grid.innerHTML="";

if(!currentGroupData 
   || !currentGroupData.stations 
   || !Array.isArray(currentGroupData.stations)){

    grid.innerHTML="<p style='padding:20px'>ไม่มีรายการในหมวดนี้</p>";
    return;
}

const keyword=document.getElementById("searchInput").value.toLowerCase();

currentGroupData.stations
.filter(st => (st.name || "").toLowerCase().includes(keyword))
.forEach(st=>{

    const card=document.createElement("div");
    card.className="movie-card";

    card.innerHTML=`
        <img loading="lazy" src="${st.image || currentGroupData.image || 'https://via.placeholder.com/300x450?text=No+Image'}">
        <div class="movie-title">${st.name || "ไม่ทราบชื่อ"}</div>
    `;

    card.onclick = ()=>{
    playStream({
        title: st.name,
        logo: st.image,
        url: st.url || null,
        referer: st.referer || "",
        servers: st.servers || null
    });
};

    grid.appendChild(card);

});
}


/* PLAYER RESET */
function resetPlayers(){

    console.log("Reset Players");

    if(hls){
        try{ hls.destroy(); }catch(e){}
        hls = null;
    }

    if(dashPlayer){
        try{ dashPlayer.reset(); }catch(e){}
        dashPlayer = null;
    }
        
    if(jwInstance){
    try{ jwInstance.remove(); }catch(e){}
    jwInstance = null;
}
    document.getElementById("jw-player").innerHTML="";
    const oldVideo = document.getElementById("videoPlayer");

if(oldVideo){

    oldVideo.pause();
    oldVideo.removeAttribute("src");
    oldVideo.load();

    const newVideo = oldVideo.cloneNode(true);
    oldVideo.parentNode.replaceChild(newVideo, oldVideo);
    video = newVideo;

    video.style.display = "block";
    document.getElementById("jw-player").style.display = "none";
}

    setPlayerLabel("ไม่มีการเล่น");

const embedFrame = document.getElementById("embed-frame");
embedFrame.style.display = "none";
embedFrame.src = "";

}
function startJW(channel){
    video.style.display="none";
    document.getElementById("jw-player").style.display="block";

    jwInstance = jwplayer("jw-player").setup({
        file: channel.url,
        width: "100%",
        height: "100%",
        autostart: true
    });
}

/* PLAY */
function playStream(channel){

// เช็คด้วย object reference ก่อน reset
const isNewChannel = currentChannel !== channel;

if(isNewChannel){
    currentServerIndex = 0;
}

currentChannel = channel;

resetPlayers();

    overlay.classList.add("active");
    playerContainer.classList.add("active");

    // =========================
    // MULTI SERVER
    // =========================
    if(channel.servers && Array.isArray(channel.servers)){

    currentServers = channel.servers;

    if(currentServerIndex >= channel.servers.length){
        currentServerIndex = 0;
    }

    const selectedServer = channel.servers[currentServerIndex];

    channel = {
        ...channel,
        url: selectedServer.url,
        referer: selectedServer.referer || channel.referer,
        drm: selectedServer.drm || channel.drm
    };

    renderServerButtons();

}else{
    currentServers = null;
    document.getElementById("server-buttons").innerHTML="";
}

    let url = (channel.url || "").toLowerCase();

// =========================
    // 🔥 โหมดบังคับ
    // =========================
    if(forcedPlayer === "jw"){
        setPlayerLabel("JW (บังคับ)");
        startJWfallback(channel,true);
        return;
    }

   if(forcedPlayer === "html5"){

    setPlayerLabel("HTML5 (บังคับ)");

    video.style.display="block";
    document.getElementById("jw-player").style.display="none";

    if(url.includes(".m3u8")){

        if(typeof Hls !== "undefined" && Hls.isSupported()){

            if(hls){
                try{ hls.destroy(); }catch(e){}
                hls = null;
            }

            hls = new Hls({
                xhrSetup: function(xhr){
                    if(channel.referer){
                        xhr.setRequestHeader("Referer", channel.referer);
                    }
                }
            });

            hls.loadSource(channel.url);
            hls.attachMedia(video);

            hls.on(Hls.Events.MANIFEST_PARSED,function(){
                video.play().catch(()=>{});
            });

        }else{
            video.src = channel.url;
            video.play().catch(()=>{});
        }

    }else{
        alert("HTML5 รองรับเฉพาะ m3u8");
overlay.classList.remove("active");
playerContainer.classList.remove("active");
resetPlayers();
return;
    }

    return;
}

// =========================
// EMBED LINK
// =========================

let rawUrl = (channel.url || "").trim();

if(rawUrl.startsWith("<iframe")){
    startEmbed(channel);
    return;
}

if(rawUrl.includes("/embed/")){
    startEmbed(channel);
    return;
}

    // =========================
    // 1️⃣ ถ้าเป็น MPD + DRM → ใช้ JW ทันที
    // =========================
    if(url.includes(".mpd") && channel.drm){
        setPlayerLabel("JW (DRM)");
        video.style.display="none";
        document.getElementById("jw-player").style.display="block";

        let config = {
            file: channel.url,
            width: "100%",
            height: "100%",
            autostart: true,
            type: "dash",
            primary: "html5"
        };

        if(channel.drm.type === "widevine"){
            config.drm = {
                widevine: {
                    url: channel.drm.licenseServer
                }
            };
        }

        if(channel.drm.type === "clearkey"){
            config.drm = {
                clearkey: {
                    keyId: channel.drm.keyId,
                    key: channel.drm.key
                }
            };
        }

        jwInstance = jwplayer("jw-player").setup(config);
        return;
    }

    // =========================
    // 2️⃣ MPD ไม่มี DRM → dash.js
    // =========================
    if(url.includes(".mpd")){
    setPlayerLabel("dash.js");
    video.style.display="block";
    document.getElementById("jw-player").style.display="none";

    dashPlayer = dashjs.MediaPlayer().create();
     // 🔥 เพิ่มตรงนี้
    if(channel.referer){
        dashPlayer.extend("RequestModifier", function(){
            return {
                modifyRequestHeader: function(xhr){
                    xhr.setRequestHeader("Referer", channel.referer);
                    return xhr;
                }
            };
        }, true);
    }

    dashPlayer.initialize(video, channel.url, true);

    dashPlayer.on(dashjs.MediaPlayer.events.ERROR, function(){
        try{ dashPlayer.reset(); }catch(e){}
        dashPlayer = null;

        console.log("dash error → fallback JW");
        startJWfallback(channel);
    });

    return;
}
       

    // =========================
    // 3️⃣ M3U8 → HLS.js
    // =========================
    if(url.includes(".m3u8")){

    video.style.display="block";
    document.getElementById("jw-player").style.display="none";

    // 1️⃣ Safari native
    if(video.canPlayType("application/vnd.apple.mpegurl") && !channel.referer){

        setPlayerLabel("Native HLS");
        video.src = channel.url;
        video.load();
        video.play().catch(()=>{});

        setTimeout(()=>{
            if(video.readyState < 2){
                startJWfallback(channel);
            }
        },3000);

        return;   // ✅ สำคัญมาก
    }

    // 2️⃣ HLS.js
    if(typeof Hls !== "undefined" && Hls.isSupported()){

        setPlayerLabel("HLS.js");

        if(hls){
            try{ hls.destroy(); }catch(e){}
            hls = null;
        }

        hls = new Hls({
            enableWorker:true,
            xhrSetup: function(xhr){
                if(channel.referer){
                    xhr.setRequestHeader("Referer", channel.referer);
                }
            }
        });

        hls.loadSource(channel.url);
        hls.attachMedia(video);

        let playTimeout;

        hls.on(Hls.Events.MANIFEST_PARSED, function(){
            video.play().catch(()=>{});

            playTimeout = setTimeout(()=>{
                if(video.readyState < 2){
                    try{ hls.destroy(); }catch(e){}
                    startJWfallback(channel);
                }
            },3000);
        });

        hls.on(Hls.Events.ERROR, function(event,data){
            if(data.fatal){
                clearTimeout(playTimeout);
                try{ hls.destroy(); }catch(e){}
                startJWfallback(channel);
            }
        });

        const onPlaying = () => {
    clearTimeout(playTimeout);
    video.removeEventListener("playing", onPlaying);
};

video.addEventListener("playing", onPlaying);

        return;  // ✅ สำคัญ
    }

    // 3️⃣ ถ้าเข้าไม่ได้เลย → JW
    startJWfallback(channel);
    return;
}
            
    // =========================
    // 4️⃣ อื่น ๆ → JW
    // =========================
    startJWfallback(channel);
}
function startJWfallback(channel, isForced = false){

    if(isForced){
        setPlayerLabel("JW (บังคับ)");
    } else {
        setPlayerLabel("JW (Fallback)");
    }

    video.style.display="none";
    document.getElementById("jw-player").style.display="block";

    let type = null;

    let safeUrl = (channel.url || "").toLowerCase();

if(safeUrl.includes(".mpd")) type = "dash";
else if(safeUrl.includes(".m3u8")) type = "hls";

    jwInstance = jwplayer("jw-player").setup({
        file: channel.url,
        width: "100%",
        height: "100%",
        autostart: true,
        primary: "html5",
        type: type
    });
}

/* CLOSE */
overlay.onclick=()=>{
overlay.classList.remove("active");
playerContainer.classList.remove("active");
resetPlayers();
};

/* INIT */

/* THEME TOGGLE + SAVE */
const themeBtn = document.getElementById("themeToggle");

// โหลดค่าที่เคยเลือก
if(localStorage.getItem("theme")==="light"){
    document.body.classList.add("light");
}

updateThemeText();

themeBtn.addEventListener("click", () => {
    document.body.classList.toggle("light");

    if(document.body.classList.contains("light")){
        localStorage.setItem("theme","light");
    } else {
        localStorage.setItem("theme","dark");
    }

    updateThemeText();
});

function updateThemeText(){
    if(document.body.classList.contains("light")){
        themeBtn.textContent = "🌙 โหมดมืด";
    } else {
        themeBtn.textContent = "☀️ โหมดสว่าง";
    }
}

document.getElementById("switchPlayerBtn").addEventListener("click", () => {

if(!currentChannel) return;

if(forcedPlayer === null){
    forcedPlayer = "jw";
}
else if(forcedPlayer === "jw"){
    forcedPlayer = "html5";
}
else{
    forcedPlayer = null;
}

let text = "🔁 Auto";
if(forcedPlayer === "jw") text = "🔁 JWPlayer";
if(forcedPlayer === "html5") text = "🔁 HTML5";

document.getElementById("switchPlayerBtn").textContent = text;

playStream(currentChannel);

});
renderPlaylists();

/* ===== AUTO LOAD LAST URL ===== */
window.addEventListener("load", async () => {

    renderRecentUrls();

    const urls = loadLastUrls();

    if(urls.length > 0){

        const lastUrl = urls[0];
        document.getElementById("urlInput").value = lastUrl;

        try{
            const response = await fetch(lastUrl);
            const text = await response.text();
            parseM3U(text,lastUrl);
            console.log("Auto loaded last playlist");
        }
catch(err){
    console.log("Auto load failed");

    let urls = loadLastUrls().filter(u => u !== lastUrl);
    localStorage.setItem("last_playlist_urls", JSON.stringify(urls));
    renderRecentUrls();
}
    }
});

function renderRecentUrls(){
    const container = document.getElementById("recentUrls");
    if(!container) return;

    const urls = loadLastUrls();

    if(urls.length === 0){
        container.innerHTML = "";
        return;
    }

    container.innerHTML = "<div style='font-size:12px;margin-bottom:4px;color:#aaa;'>ล่าสุด:</div>";

    urls.forEach(url => {

        const div = document.createElement("div");
        div.style.cssText = `
            font-size:12px;
            padding:4px 6px;
            background:#1c1c1c;
            margin-bottom:4px;
            border-radius:4px;
            cursor:pointer;
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
        `;

        div.textContent = url;

        div.onclick = async () => {
            document.getElementById("urlInput").value = url;

		saveLastUrl(url); // 🔥 เพิ่มบรรทัดนี้

            try{
                const response = await fetch(url);
                const text = await response.text();
                parseM3U(text,url);
            }catch{
                alert("โหลด URL ไม่สำเร็จ ❌");
            }
        };

        container.appendChild(div);
    });
}

function startEmbed(channel){

    setPlayerLabel("Embed");

    video.style.display = "none";
    document.getElementById("jw-player").style.display = "none";

    const embedFrame = document.getElementById("embed-frame");
    embedFrame.style.display = "block";

    let url = (channel.url || "").trim();

    // ถ้าเป็น iframe เต็มแท็ก → ดึง src ออกมา
    if(url.startsWith("<iframe")){
        const match = url.match(/src=["'](.*?)["']/i);
        if(match && match[1]){
            embedFrame.src = match[1];
        }else{
            console.log("Invalid iframe embed");
        }
    }else{
        embedFrame.src = url;
    }
}

function renderServerButtons(){

    const container = document.getElementById("server-buttons");
    container.innerHTML="";

    if(!currentServers) return;

    currentServers.forEach((server,index)=>{

        const btn = document.createElement("button");

        btn.textContent = server.name || ("Server " + (index+1));

        btn.style.cssText = `
            padding:6px 10px;
            border:none;
            border-radius:6px;
            cursor:pointer;
            background:${index===currentServerIndex ? "#f5c518" : "#333"};
            color:#fff;
        `;

        btn.onclick = ()=>{
    currentServerIndex = index;
    renderServerButtons();
    playStream(currentChannel);
};

        container.appendChild(btn);
    });
}
