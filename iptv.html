<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;}
#video{width:100%;height:100vh;background:#000;}

#info{
  position:fixed;
  bottom:20px;
  left:20px;
  background:rgba(0,0,0,0.6);
  padding:10px 15px;
  border-radius:10px;
}

#channelList{
  position:fixed;
  left:0;top:0;
  width:220px;height:100%;
  background:#111;
  overflow:auto;
}

.channel{
  padding:10px;
  border-bottom:1px solid #222;
  cursor:pointer;
}
.channel:hover{background:#e94560;}
</style>
</head>

<body>

<div id="channelList"></div>
<div id="info">Loading...</div>
<video id="video" autoplay controls></video>

<script>

let channels=[];
let currentIndex=0;

const video=document.getElementById("video");
const list=document.getElementById("channelList");
const info=document.getElementById("info");

let player;

/* โหลด JSON */
fetch("channels.json")
.then(res=>res.json())
.then(data=>{
  channels=data;
  renderList();
  playChannel(0); // 🔥 เล่นช่องแรกทันที
});

/* แสดงรายการ */
function renderList(){
  list.innerHTML="";
  channels.forEach((ch,i)=>{
    const div=document.createElement("div");
    div.className="channel";
    div.innerText=ch.name;
    div.onclick=()=>playChannel(i);
    list.appendChild(div);
  });
}

/* เล่นช่อง */
async function playChannel(i){
  currentIndex=i;
  const ch=channels[i];

  info.innerText=ch.name;

  if(player){ player.destroy(); }

  if(ch.drm){
    player=new shaka.Player(video);

    await player.configure({
      drm:{ clearKeys:{ [ch.keyId]: ch.key } }
    });

    await player.load(ch.file);

  }else{
    if(Hls.isSupported()){
      const hls=new Hls();
      hls.loadSource(ch.file);
      hls.attachMedia(video);
    }else{
      video.src=ch.file;
    }
  }

  video.volume=0.8;
}

/* 🎮 รีโมทคีย์บอร์ด */
document.addEventListener("keydown",(e)=>{

  if(e.key==="ArrowUp"){
    currentIndex--;
    if(currentIndex<0) currentIndex=channels.length-1;
    playChannel(currentIndex);
  }

  if(e.key==="ArrowDown"){
    currentIndex++;
    if(currentIndex>=channels.length) currentIndex=0;
    playChannel(currentIndex);
  }

});

/* 📱 ทัชมือถือ (ปัดขึ้นลง) */
let startY=0;

document.addEventListener("touchstart",(e)=>{
  startY=e.touches[0].clientY;
});

document.addEventListener("touchend",(e)=>{
  let endY=e.changedTouches[0].clientY;

  if(startY-endY>50){
    currentIndex++;
    if(currentIndex>=channels.length) currentIndex=0;
    playChannel(currentIndex);
  }

  if(endY-startY>50){
    currentIndex--;
    if(currentIndex<0) currentIndex=channels.length-1;
    playChannel(currentIndex);
  }
});

</script>

</body>
</html>
