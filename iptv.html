 <!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIEA IPTV</title>

<script src="https://ssl.p.jwpcdn.com/player/v/8.26.0/jwplayer.js"></script>
<script>
jwplayer.key = 'XSuP4qMl+9tK17QNb+4+th2Pm9AWgMO/cYH8CI0HGGr7bdjo';
</script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {margin:0; background:#000; color:#fff; font-family:Arial;}
#channel-list {display:grid; grid-template-columns:repeat(5,1fr); gap:10px; padding:10px;}
.channel {background:#222; padding:10px; text-align:center; cursor:pointer; border-radius:8px;}
.channel img {width:60px;}
#player-container {position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
width:70%; aspect-ratio:16/9; background:#000; display:none; z-index:9999;}
video {width:100%; height:100%;}
</style>
</head>

<body>

<div id="player-container">
    <div id="jw-player"></div>
    <video id="html5-player" controls autoplay playsinline webkit-playsinline style="display:none;"></video>
</div>

<div id="channel-list"></div>

<script>
const channels = [
{
name:"TEST",
logo:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSfTCJkOFkgdOh3Ov8BDxjk8DqG6R6nHH7_1A&s",
file:"https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8",
drm:false
}
];

let currentHls=null;

/* ===== บังคับเสียง 100% ===== */
function forceMaxVolume(){
    const v=document.getElementById("html5-player");
    if(v){
        v.muted=false;
        v.defaultMuted=false;
        v.volume=1.0;
    }
    try{
        const p=jwplayer("jw-player");
        p.setMute(false);
        p.setVolume(100);
    }catch(e){}
}

/* ===== โหลดช่อง ===== */
function loadChannel(channel){
    const jwDiv=document.getElementById("jw-player");
    const v=document.getElementById("html5-player");
    const box=document.getElementById("player-container");

    box.style.display="block";

    try{jwplayer("jw-player").remove();}catch(e){}
    if(currentHls){currentHls.destroy(); currentHls=null;}

    v.pause(); v.src=""; v.style.display="none";
    jwDiv.style.display="block";

    const player=jwplayer("jw-player").setup({
        file:channel.file,
        autostart:true,
        mute:false,
        volume:100
    });

    /* ===== ดันเสียงทุกจังหวะ ===== */
    player.on("ready", forceMaxVolume);
    player.on("play", forceMaxVolume);
    player.on("firstFrame", forceMaxVolume);

    setTimeout(forceMaxVolume,300);
    setTimeout(forceMaxVolume,1000);
    setTimeout(forceMaxVolume,2500);

    player.on("error",()=>useHTML5(channel.file));
}

/* ===== fallback HTML5 ===== */
function useHTML5(url){
    const jwDiv=document.getElementById("jw-player");
    const v=document.getElementById("html5-player");

    jwDiv.style.display="none";
    v.style.display="block";

    forceMaxVolume();

    if(v.canPlayType('application/vnd.apple.mpegurl')){
        v.src=url;
        v.play().then(forceMaxVolume).catch(()=>{});
    }
    else if(Hls.isSupported()){
        currentHls=new Hls();
        currentHls.loadSource(url);
        currentHls.attachMedia(v);
        currentHls.on(Hls.Events.MANIFEST_PARSED,()=>{
            forceMaxVolume();
            v.play().catch(()=>{});
        });
    }
}

/* ===== สร้าง list ===== */
document.addEventListener("DOMContentLoaded",()=>{
    const list=document.getElementById("channel-list");
    channels.forEach(ch=>{
        const d=document.createElement("div");
        d.className="channel";
        d.innerHTML=`<img src="${ch.logo}"><br>${ch.name}`;
        d.onclick=()=>loadChannel(ch);
        list.appendChild(d);
    });
});
</script>

</body>
</html>
