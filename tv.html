<!DOCTYPE html>

<html lang="th">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TIEA IPTV - TV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
background:#020617;
color:white;
font-family:sans-serif;
margin:0;
}

header{
padding:15px;
font-size:24px;
text-align:center;
background:#0f172a;
}

.player{
max-width:900px;
margin:auto;
padding:20px;
}

video{
width:100%;
background:black;
border-radius:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#1e293b;
border-radius:10px;
padding:10px;
cursor:pointer;
text-align:center;
}

.card img{
max-height:60px;
margin-bottom:5px;
}

h2{
padding-left:20px;
}

</style>

</head>

<body>

<header>TIEA IPTV - TV</header>

<div class="player">
<video id="player" controls autoplay playsinline></video>
</div>

<div id="channels"></div>

<script src="channels.js"></script>

<script>

const video=document.getElementById("player");
const list=document.getElementById("channels");

function play(url){

if(Hls.isSupported()){

const hls=new Hls();
hls.loadSource(url);
hls.attachMedia(video);

}else{

video.src=url;

}

video.play();

window.scrollTo({top:0,behavior:"smooth"});

}

Object.keys(channels.tv).forEach(group=>{

const title=document.createElement("h2");
title.innerText=group.toUpperCase();

list.appendChild(title);

const grid=document.createElement("div");
grid.className="grid";

channels.tv[group].forEach(ch=>{

const div=document.createElement("div");

div.className="card";

div.innerHTML=`
<img src="${ch.logo}">
<div>${ch.name}</div>
`;

div.onclick=function(){
play(ch.url);
};

grid.appendChild(div);

});

list.appendChild(grid);

});

</script>

</body>
</html>
