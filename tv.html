Object.keys(channels).forEach(group=>{

list.appendChild(title);

const grid=document.createElement("div");
grid.className="grid";

channels[group].forEach(ch=>{

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="${ch.logo}">
<p>${ch.name}</p>
`;

card.onclick=()=>play(ch.url);

grid.appendChild(card);

});

function play(url){

const video=document.getElementById("video");

if(Hls.isSupported()){

const hls=new Hls();
hls.loadSource(url);
hls.attachMedia(video);

}else{

video.src=url;

}

}
