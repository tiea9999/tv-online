<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TIEA IPTV - TV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
margin:0;
background:#0b0b0b;
color:white;
font-family:sans-serif;
}

header{
background:#111;
padding:15px;
font-size:22px;
font-weight:bold;
}

h2{
padding:10px;
margin:0;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
gap:10px;
padding:10px;
}

.card{
background:#1b1b1b;
border-radius:10px;
padding:10px;
cursor:pointer;
text-align:center;
transition:.2s;
}

.card:hover{
background:#333;
}

.card img{
width:100%;
height:60px;
object-fit:contain;
}

.player{
position:sticky;
top:0;
background:black;
z-index:10;
}

video{
width:100%;
height:220px;
background:black;
}

</style>

</head>

<body>

<div class="player">
<video id="video" controls autoplay></video>
</div>

<header>TIEA IPTV</header>

<div id="list"></div>

<script>

const channels={

digital:[
{ name:"3HD", logo:"https://www.fileinwtv.site/postor/20240418191821ch3hd.jpg", url:"https://love.r95lvvlb9o.workers.dev/lx-origin/hd-ch3_720/chunks.m3u8"},
{ name:"7HD", logo:"https://www.fileinwtv.site/postor/20240418185909ch7hd.jpg", url:"https://love.r95lvvlb9o.workers.dev/lx-origin/hd-ch7_720/chunks.m3u8"},
{ name:"Workpoint", logo:"https://www.fileinwtv.site/postor/20240418190941Workpoint.jpg", url:"https://love.r95lvvlb9o.workers.dev/lx-origin/hd-workpoint_720/chunks.m3u8"},
{ name:"MONO29", logo:"https://www.fileinwtv.site/postor/20240418191023mono29.jpg", url:"https://love.r95lvvlb9o.workers.dev/lx-origin/hd-mono_720/chunks.m3u8"},
{ name:"AmarinTV", logo:"https://www.fileinwtv.site/postor/20240418191809amarintvhd.jpg", url:"https://love.r95lvvlb9o.workers.dev/lx-origin/hd-amarin_720/chunks.m3u8"}
],

movie:[
{ name:"HBO", url:"https://love.pifipa2974.workers.dev/lx-origin/th-hbo_720/chunks.m3u8", logo:"https://www.fileinwtv.site/postor/20240418201334HBO.jpg"},
{ name:"HBO Hits", url:"https://love.pifipa2974.workers.dev/lx-origin/th-hbohits_720/chunks.m3u8", logo:"https://www.fileinwtv.site/postor/20240418201343HBO_Hits.jpg"},
{ name:"Cinemax", url:"https://love.pifipa2974.workers.dev/lx-origin/th-cinemax_720/chunks.m3u8", logo:"https://www.fileinwtv.site/postor/20240418201426cinemax.jpg"}
],

kids:[
{ name:"Cartoon Network", url:"https://love.pifipa2974.workers.dev/lx-origin/sd-cartoonnetwork_480/chunks.m3u8", logo:"https://www.fileinwtv.site/postor/20240418202927CN.jpg"},
{ name:"Boomerang", url:"https://love.pifipa2974.workers.dev/lx-origin/sd-boomerang_480/chunks.m3u8", logo:"https://www.fileinwtv.site/postor/20240418202911Boomerang.jpg"}
],

documentary:[
{ name:"Discovery", url:"https://love.pifipa2974.workers.dev/lx-origin/sd-discovery_480/chunks.m3u8", logo:"https://www.fileinwtv.site/postor/20240418210226Discovery.jpg"},
{ name:"History", url:"https://love.pifipa2974.workers.dev/vx-origin/hd-history_720/chunks.m3u8", logo:"https://www.fileinwtv.site/postor/20240423163921history.jpg"}
]

};


const list=document.getElementById("list");

Object.keys(channels).forEach(group=>{

const title=document.createElement("h2");
title.innerText=group.toUpperCase();
list.appendChild(title);

const grid=document.createElement("div");
grid.className="grid";

channels[group].forEach(ch=>{

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="${ch.logo}">
<p>${ch.name}</p>
`;

card.onclick=()=>play(ch.url);

grid.appendChild(card);

});

list.appendChild(grid);

});


function play(url){

const video=document.getElementById("video");

if(Hls.isSupported()){

const hls=new Hls();
hls.loadSource(url);
hls.attachMedia(video);

}else{

video.src=url;

}

}

</script>

</body>
</html>
