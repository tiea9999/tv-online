let currentHls=null;
let isMax=false;

function forceMaxVolume(){
const video=document.getElementById("html5-player");

if(video){
video.muted=false;
video.defaultMuted=false;
video.volume=1.0;
}

try{
const p=jwplayer("jw-player");
p.setMute(false);
p.setVolume(100);
}catch(e){}
}

document.addEventListener("DOMContentLoaded",()=>{
const list=document.getElementById("channel-list");

channels.forEach(ch=>{
let div=document.createElement("div");
div.className="channel";
div.tabIndex=0;

div.innerHTML=`
<img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/60?text=TV'">
<span>${ch.name}</span>
`;

div.onclick=()=>loadChannel(ch,div);
div.onkeydown=(e)=>{
if(e.key==="Enter"||e.key===" "){
e.preventDefault();
loadChannel(ch,div);
}
};

list.appendChild(div);
});
});

function loadChannel(ch,el){

document.querySelectorAll('.channel').forEach(c=>c.classList.remove('active'));
if(el)el.classList.add('active');

const container=document.getElementById("player-container");
container.style.display="block";

const jw=document.getElementById("jw-player");
const video=document.getElementById("html5-player");

if(currentHls){currentHls.destroy();currentHls=null;}
try{jwplayer("jw-player").remove();}catch(e){}

video.pause();
video.removeAttribute("src");
video.src="";
video.muted=false;
video.defaultMuted=false;
video.volume=1.0;
video.style.display="none";

jw.style.display="block";

let player=jwplayer("jw-player").setup({
file:ch.file,
width:"100%",
aspectratio:"16:9",
autostart:true,
mute:false,
volume:100
});

player.on("ready",forceMaxVolume);
player.on("play",forceMaxVolume);
player.on("firstFrame",forceMaxVolume);
player.on("buffer",forceMaxVolume);
player.on("complete",forceMaxVolume);

setTimeout(forceMaxVolume,200);
setTimeout(forceMaxVolume,700);
setTimeout(forceMaxVolume,1500);
setTimeout(forceMaxVolume,3000);
setTimeout(forceMaxVolume,5000);

player.on("error",()=>useHTML5(ch.file));
}

function useHTML5(url){
const jw=document.getElementById("jw-player");
const video=document.getElementById("html5-player");

jw.style.display="none";
video.style.display="block";

video.muted=false;
video.defaultMuted=false;
video.volume=1.0;

if(video.canPlayType('application/vnd.apple.mpegurl')){
video.src=url;
video.play().then(forceMaxVolume).catch(()=>{});
}else if(Hls.isSupported()){
currentHls=new Hls({
enableWorker:false,
lowLatencyMode:false,
maxBufferLength:18,
maxMaxBufferLength:30,
backBufferLength:10
});
currentHls.loadSource(url);
currentHls.attachMedia(video);
currentHls.on(Hls.Events.MANIFEST_PARSED,()=>{
forceMaxVolume();
video.play().then(forceMaxVolume).catch(()=>{});
});
currentHls.on(Hls.Events.ERROR,()=>{
forceMaxVolume();
});
}else{
video.src=url;
video.play().then(forceMaxVolume).catch(()=>{});
}

video.onplay=forceMaxVolume;
video.onplaying=forceMaxVolume;
video.onloadeddata=forceMaxVolume;
video.oncanplay=forceMaxVolume;
video.onvolumechange=()=>{
if(video.volume<1 || video.muted){
video.muted=false;
video.volume=1.0;
}
};

setTimeout(forceMaxVolume,200);
setTimeout(forceMaxVolume,700);
setTimeout(forceMaxVolume,1500);
setTimeout(forceMaxVolume,3000);
setTimeout(forceMaxVolume,5000);
}

function closePlayer(){
document.getElementById("player-container").style.display="none";

if(currentHls){currentHls.destroy();currentHls=null;}
try{jwplayer("jw-player").remove();}catch(e){}

let v=document.getElementById("html5-player");
v.pause();
v.removeAttribute("src");
v.src="";
v.load();
}

function toggleMaximize(){
let c=document.getElementById("player-container");

if(!isMax){
c.style.width="100%";
c.style.height="100%";
c.style.maxWidth="none";
c.style.top="0";
c.style.left="0";
c.style.transform="none";
c.style.borderRadius="0";
isMax=true;
}else{
c.style.width="90%";
c.style.height="auto";
c.style.maxWidth="1000px";
c.style.aspectRatio="16/9";
c.style.top="50%";
c.style.left="50%";
c.style.transform="translate(-50%,-50%)";
c.style.borderRadius="10px";
isMax=false;
}
}

function goHome(){
window.location.href="https://tiea9999.github.io/tv-online/index.html";
