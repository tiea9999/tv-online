let hlsWatchdog = null;

function setStatus(text, autoHide=true){
  const box = document.getElementById("status");
  if(!box) return;
  box.textContent = text || "";
  box.style.display = text ? "block" : "none";
  if(autoHide && text){
    clearTimeout(setStatus._timer);
    setStatus._timer = setTimeout(()=>{ box.style.display = "none"; }, 4500);
  }
}

function isWorkerUrl(url){
  return String(url || "").includes("workers.dev");
}

function proxyUrl(url){
  url = String(url || "").trim();

  // ผ่าน workers.dev ล้วนๆ:
  // ถ้าเป็น workers อยู่แล้วใช้ตรง
  if(isWorkerUrl(url)) return url;

  // ถ้าไม่ใช่ workers ให้บังคับผ่าน Worker กลาง
  return WORKER_PROXY + encodeURIComponent(url);
}

function directUrl(url){
  return String(url || "").trim();
}

function forceAudio100(){
  const video = document.getElementById("html5-player");
  try{
    video.muted = false;
    video.defaultMuted = false;
    video.volume = 1.0;
  }catch(e){}
}

function openExternal(url){
  url = url || (activeChannel ? activeChannel.file : "") || activeUrl;
  if(!url) return;
  try{
    const u = new URL(url);
    const scheme = u.protocol.replace(":","");
    const hostPath = u.host + u.pathname + (u.search || "");
    const intent = "intent://" + hostPath + "#Intent;scheme=" + scheme + ";action=android.intent.action.VIEW;type=video/*;S.browser_fallback_url=" + encodeURIComponent(url) + ";end";
    window.location.href = intent;
  }catch(e){
    window.location.href = url;
  }
}

async function stopAllPlayers(){
  const video = document.getElementById("html5-player");

  if(hlsWatchdog){
    clearInterval(hlsWatchdog);
    hlsWatchdog = null;
  }

  if(currentHls){
    try{ currentHls.destroy(); }catch(e){}
    currentHls = null;
  }

  if(shakaPlayer){
    try{ await shakaPlayer.destroy(); }catch(e){}
    shakaPlayer = null;
  }

  try{
    video.pause();
    video.removeAttribute("src");
    video.load();
  }catch(e){}

  video.style.display = "none";

  const jwBox = document.getElementById("jw-player");
  if(jwBox) jwBox.style.display = "none";
  setStatus("");
}

async function loadChannel(channel, element){
  activeChannel = channel;
  activeElement = element;

  document.querySelectorAll(".channel").forEach(ch=>ch.classList.remove("active"));
  if(element) element.classList.add("active");

  document.getElementById("player-container").style.display = "block";
  showPlayerControls();
  await stopAllPlayers();

  const original = directUrl(channel.file);
  const url = proxyUrl(channel.file);
  activeUrl = url;

  if(original.includes(".mpd")){
    playMPD(channel, url);
  }else{
    useHLS_STABLE(url);
  }

  setTimeout(()=>{
    const btn = document.getElementById("closeBtn");
    if(btn) btn.focus();
  },300);
}

/* ================= MPD ผ่าน workers.dev ================= */
async function playMPD(channel, url){
  const video = document.getElementById("html5-player");
  const jwBox = document.getElementById("jw-player");

  if(jwBox) jwBox.style.display = "none";
  video.style.display = "block";
  video.controls = true;
  forceAudio100();

  if(!window.shaka){
    setStatus("เครื่องนี้โหลด Shaka Player ไม่ได้", false);
    return;
  }

  shaka.polyfill.installAll();

  if(!shaka.Player.isBrowserSupported()){
    setStatus("เครื่องนี้ไม่รองรับ MPD/DRM ผ่านเว็บ", false);
    return;
  }

  shakaPlayer = new shaka.Player(video);

  shakaPlayer.configure({
    streaming:{
      bufferingGoal: 35,
      rebufferingGoal: 5,
      bufferBehind: 20,
      retryParameters:{
        maxAttempts: 6,
        baseDelay: 1000,
        backoffFactor: 1.5,
        fuzzFactor: 0.5,
        timeout: 30000
      }
    }
  });

  if(channel.drm){
    shakaPlayer.configure({
      drm:{
        clearKeys:{
          [channel.keyId]: channel.key
        }
      }
    });
  }

  shakaPlayer.addEventListener("error", function(e){
    console.log("MPD ERROR:", e.detail);
    setStatus("MPD เล่นในเว็บนี้ไม่ได้ ให้กด PLAYER สำรอง", false);
  });

  try{
    setStatus("กำลังโหลด MPD ผ่าน workers.dev...");
    await shakaPlayer.load(url);
    forceAudio100();
    video.play().catch(()=>{});
    setTimeout(()=>{ forceAudio100(); video.play().catch(()=>{}); },300);
    setStatus("กำลังเล่น MPD ผ่าน workers.dev");
  }catch(e){
    console.log("MPD LOAD ERROR:", e);
    setStatus("MPD เล่นไม่ได้บนเครื่องนี้ / ให้กด PLAYER", false);
  }
}

/* ================= HLS นิ่งๆ ผ่าน workers.dev ================= */
function useHLS_STABLE(url){
  const video = document.getElementById("html5-player");
  const jwBox = document.getElementById("jw-player");

  if(jwBox) jwBox.style.display = "none";
  video.style.display = "block";
  video.controls = true;
  forceAudio100();

  if(currentHls){
    try{ currentHls.destroy(); }catch(e){}
    currentHls = null;
  }

  if(hlsWatchdog){
    clearInterval(hlsWatchdog);
    hlsWatchdog = null;
  }

  if(Hls.isSupported() && url.includes(".m3u8")){
    setStatus("กำลังโหลด HLS ผ่าน workers.dev...");

    currentHls = new Hls({
      enableWorker: true,
      lowLatencyMode: false,

      maxBufferLength: 35,
      maxMaxBufferLength: 70,
      backBufferLength: 20,
      maxBufferHole: 0.4,
      highBufferWatchdogPeriod: 3,
      nudgeOffset: 0.1,
      nudgeMaxRetry: 5,

      manifestLoadingMaxRetry: 6,
      manifestLoadingRetryDelay: 1200,
      manifestLoadingMaxRetryTimeout: 10000,
      levelLoadingMaxRetry: 6,
      levelLoadingRetryDelay: 1200,
      levelLoadingMaxRetryTimeout: 10000,
      fragLoadingMaxRetry: 8,
      fragLoadingRetryDelay: 1200,
      fragLoadingMaxRetryTimeout: 12000,

      startFragPrefetch: true,
      capLevelToPlayerSize: true,
      testBandwidth: false,
      abrEwmaDefaultEstimate: 1200000
    });

    currentHls.loadSource(url);
    currentHls.attachMedia(video);

    currentHls.on(Hls.Events.MANIFEST_PARSED, function(){
      forceAudio100();
      video.play().catch(()=>{});
      setTimeout(()=>{ forceAudio100(); video.play().catch(()=>{}); },300);
      setStatus("กำลังเล่น HLS");
    });

    currentHls.on(Hls.Events.BUFFER_STALLED, function(){
      setStatus("กำลังเติมบัฟเฟอร์...", true);
      try{ currentHls.startLoad(); }catch(e){}
    });

    currentHls.on(Hls.Events.ERROR, function(event, data){
      console.log("HLS ERROR:", data);
      if(!currentHls) return;

      if(data.fatal){
        if(data.type === Hls.ErrorTypes.NETWORK_ERROR){
          setStatus("เน็ตเวิร์กสะดุด กำลังต่อใหม่...");
          try{ currentHls.startLoad(); }catch(e){}
        }else if(data.type === Hls.ErrorTypes.MEDIA_ERROR){
          setStatus("สัญญาณวิดีโอสะดุด กำลังกู้คืน...");
          try{ currentHls.recoverMediaError(); }catch(e){}
        }else{
          setStatus("โหลดใหม่เพื่อความนิ่ง...", false);
          try{
            currentHls.destroy();
            currentHls = null;
            setTimeout(()=>useHLS_STABLE(url), 1200);
          }catch(e){}
        }
      }
    });

    startWatchdog(url);

  }else{
    video.src = url;
    setTimeout(()=>{
      forceAudio100();
      video.play().catch(()=>{});
    },300);
  }
}

function startWatchdog(url){
  const video = document.getElementById("html5-player");
  let lastTime = 0;
  let stuckCount = 0;

  hlsWatchdog = setInterval(()=>{
    if(document.getElementById("player-container").style.display !== "block") return;
    if(!currentHls) return;

    forceAudio100();

    if(video.paused || video.readyState < 2){
      try{ currentHls.startLoad(); }catch(e){}
      video.play().catch(()=>{});
      return;
    }

    if(Math.abs(video.currentTime - lastTime) < 0.05){
      stuckCount++;
    }else{
      stuckCount = 0;
    }

    lastTime = video.currentTime;

    if(stuckCount >= 4){
      setStatus("ภาพค้าง กำลังกู้คืน...");
      try{ currentHls.startLoad(); }catch(e){}
      video.play().catch(()=>{});
      stuckCount = 0;
    }
  }, 3000);
}

/* ================= AUTO HIDE PLAYER CONTROLS ================= */
let controlsTimer = null;

function showPlayerControls(){
  const container = document.getElementById("player-container");
  if(!container) return;

  container.classList.remove("controls-hidden");

  if(controlsTimer){
    clearTimeout(controlsTimer);
    controlsTimer = null;
  }

  controlsTimer = setTimeout(()=>{
    if(container.style.display === "block"){
      try{
        const active = document.activeElement;
        if(active && active.classList && active.classList.contains("player-btn")){
          active.blur();
        }
      }catch(e){}
      container.classList.add("controls-hidden");
    }
  }, 3000);
}

function setupAutoHideControls(){
  const container = document.getElementById("player-container");
  if(!container || container.dataset.autohideReady === "1") return;
  container.dataset.autohideReady = "1";

  ["mousemove","mousedown","touchstart","touchmove","click"].forEach(ev=>{
    container.addEventListener(ev, showPlayerControls, {passive:true});
  });

  document.addEventListener("keydown", function(){
    if(container.style.display === "block"){
      showPlayerControls();
    }
  });
}

/* ================= CLOSE ================= */
async function closePlayer(){
  await stopAllPlayers();
  document.getElementById("player-container").classList.remove("controls-hidden");
  document.getElementById("player-container").style.display = "none";
}

function goHome(){
  window.location.href = "https://tiea9999.github.io/tv-online/index.html";
}

/* ================= REMOTE ================= */
document.addEventListener("keydown",function(e){
  const container = document.getElementById("player-container");

  if(container.style.display === "block"){
    if(e.key === "Escape" || e.key === "Backspace" || e.key === "BrowserBack"){
      e.preventDefault();
      closePlayer();
    }
  }
});

/* ================= INIT ================= */
document.addEventListener("DOMContentLoaded",function(){
  setupAutoHideControls();
  const listContainer = document.getElementById("channel-list");

  channels.forEach(ch=>{
    const div = document.createElement("div");
    div.className = "channel";
    div.tabIndex = 0;
    div.innerHTML = `<img src="${ch.logo}"><span>${ch.name}</span>`;

    div.onclick = ()=>loadChannel(ch,div);

    div.onkeydown = e=>{
      if(e.key === "Enter" || e.key === "OK"){
        e.preventDefault();
        loadChannel(ch,div);
      }
    };

    listContainer.appendChild(div);
  });
});
