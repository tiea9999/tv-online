async function loadChannel(channel, element){

await stopAllPlayers();

}else{
useHLS(url);
}

setTimeout(()=>{
const btn = document.getElementById("closeBtn");
if(btn) btn.focus();
},300);
}

/* ================= MPD ================= */
async function playMPD(channel, url){
const video = document.getElementById("html5-player");
const jwBox = document.getElementById("jw-player");

if(jwBox) jwBox.style.display = "none";
video.style.display = "block";

video.muted = false;
video.defaultMuted = false;
video.volume = 1.0;

shaka.polyfill.installAll();

shakaPlayer = new shaka.Player(video);

if(channel.drm){
shakaPlayer.configure({
drm:{
clearKeys:{
[channel.keyId]: channel.key
}
}
});
}

try{
await shakaPlayer.load(url);

setTimeout(()=>{
video.muted = false;
video.defaultMuted = false;
video.volume = 1.0;
video.play().catch(()=>{});
},300);

}catch(e){
console.log("MPD ERROR:", e);
}
}

/* ================= HLS ================= */
function useHLS(url){
const video = document.getElementById("html5-player");
const jwBox = document.getElementById("jw-player");

if(jwBox) jwBox.style.display = "none";
video.style.display = "block";

if(currentHls){
currentHls.destroy();
currentHls = null;
}

if(Hls.isSupported()){
currentHls = new Hls({
enableWorker:true,
maxBufferLength:8,
maxMaxBufferLength:16
});

currentHls.loadSource(url);
currentHls.attachMedia(video);

currentHls.on(Hls.Events.MANIFEST_PARSED, function(){

// 🔥 บังคับเสียง 100%
video.muted = false;
video.defaultMuted = false;
video.volume = 1.0;

video.play().catch(()=>{});
});

}else{
video.src = url;

setTimeout(()=>{
video.muted = false;
video.defaultMuted = false;
video.volume = 1.0;
video.play().catch(()=>{});
},300);
}
}

/* ================= REMOTE ================= */
document.addEventListener("keydown",function(e){
const container = document.getElementById("player-container");

if(container.style.display === "block"){
if(e.key === "Escape" || e.key === "Backspace"){
e.preventDefault();
closePlayer();
}
}
});

document.addEventListener("DOMContentLoaded",function(){

channels.forEach(ch=>{

div.className = "channel";
div.tabIndex = 0;
div.innerHTML = `<img src="${ch.logo}"><span>${ch.name}</span>`;

div.onclick = ()=>loadChannel(ch,div);

div.onkeydown = e=>{
if(e.key === "Enter"){
loadChannel(ch,div);
}
};

listContainer.appendChild(div);
});
});
