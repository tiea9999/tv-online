<!DOCTYPE html>

<html lang="th">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TIEA IPTV - MOVIE</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
background:#020617;
color:white;
font-family:sans-serif;
margin:0;
}

header{
padding:15px;
background:#0f172a;
text-align:center;
font-size:22px;
}

#playlistMenu{
display:flex;
flex-wrap:wrap;
gap:10px;
padding:10px;
justify-content:center;
}

#playlistMenu button{
padding:8px 14px;
background:#1e293b;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

#search{
width:90%;
max-width:400px;
padding:8px;
margin:10px auto;
display:block;
border-radius:6px;
border:none;
}

.player{
max-width:900px;
margin:auto;
padding:20px;
}

video{
width:100%;
background:black;
border-radius:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#1e293b;
border-radius:10px;
overflow:hidden;
cursor:pointer;
}

.card img{
width:100%;
height:230px;
object-fit:cover;
}

.title{
padding:8px;
font-size:14px;
text-align:center;
}

</style>

</head>

<body>

<header>TIEA IPTV - MOVIE</header>

<div class="player">
<video id="player" controls autoplay playsinline></video>
</div>

<div id="playlistMenu"></div>

<input id="search" placeholder="ค้นหาหนัง...">

<div id="movies" class="grid"></div>

<script>

const PLAYLISTS=[

{
name:"หนังใหม่ประจำเดือน",
url:"https://tiea9999.github.io/tv-online/24hd.html"
},

{
name:"หนังซูม",
url:"https://dl.dropboxusercontent.com/scl/fi/f6335p7rp7gkjc1mjog3g/.m3u?rlkey=frk7z8lixpyxzt8ozw68hfb7g&dl=1"
},

{
name:"หนังใหม่",
url:"https://dl.dropboxusercontent.com/scl/fi/wkrcgx4mk0q5we9h198ik/.m3u?rlkey=42zamptxag4k8fy8ncly6ksuw&dl=1"
},

{
name:"หนังNETFLIX",
url:"https://raw.githubusercontent.com/9Pichapob/Movies/refs/heads/main/NETFLIX"
}

];

const video=document.getElementById("player");
const grid=document.getElementById("movies");
const menu=document.getElementById("playlistMenu");
const search=document.getElementById("search");

let MOVIES=[];
let hls=null;

function play(url){

if(hls){
hls.destroy();
hls=null;
}

video.pause();
video.removeAttribute("src");
video.load();

if(url.includes(".m3u8")){

if(Hls.isSupported()){

hls=new Hls({
enableWorker:true,
lowLatencyMode:true
});

hls.loadSource(url);
hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED,function(){
video.play();
});

}
else{

video.src=url;
video.play();

}

}

else{

video.src=url;
video.play();

}

window.scrollTo({top:0,behavior:"smooth"});

}

function addMovie(m){

const div=document.createElement("div");

div.className="card";

div.innerHTML=`
<img loading="lazy" src="${m.logo}">
<div class="title">${m.name}</div>
`;

div.onclick=()=>play(m.url);

grid.appendChild(div);

}

async function loadPlaylist(url){

grid.innerHTML="Loading...";
MOVIES=[];

const res=await fetch(url);
const text=await res.text();

const lines=text.split("\n");

grid.innerHTML="";

let current={};

lines.forEach(line=>{

line=line.trim();

if(line.startsWith("#EXTINF")){

const name=line.split(",")[1];
const logo=line.match(/tvg-logo="(.*?)"/);

current={
name:name,
logo:logo?logo[1]:""
};

}

else if(line.startsWith("http")){

current.url=line;

MOVIES.push(current);

addMovie(current);

}

});

}

PLAYLISTS.forEach(p=>{

const btn=document.createElement("button");

btn.innerText=p.name;

btn.onclick=()=>loadPlaylist(p.url);

menu.appendChild(btn);

});

search.onkeyup=function(){

const key=this.value.toLowerCase();

grid.innerHTML="";

MOVIES
.filter(m=>m.name.toLowerCase().includes(key))
.forEach(addMovie);

};

</script>

</body>
</html>
