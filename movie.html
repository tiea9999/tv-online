<!DOCTYPE html>

<html lang="th">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TIEA IPTV - MOVIE</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

body{
background:#020617;
color:white;
font-family:sans-serif;
margin:0;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:#0f172a;
}

.logo{
font-size:22px;
font-weight:bold;
}

.search{
padding:8px;
border-radius:6px;
border:none;
}

.player{
max-width:900px;
margin:auto;
padding:20px;
}

video{
width:100%;
background:black;
border-radius:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#1e293b;
border-radius:10px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:260px;
object-fit:cover;
}

.title{
padding:10px;
text-align:center;
font-size:14px;
}

</style>

</head>

<body>

<header>

<div class="logo">TIEA IPTV</div>

<input type="text" id="search" class="search" placeholder="ค้นหาหนัง...">

</header>

<div class="player">
<video id="player" controls autoplay playsinline></video>
</div>

<div class="grid" id="channels"></div>

<script src="channels.js"></script>

<script>

const video=document.getElementById("player");
const list=document.getElementById("channels");
const search=document.getElementById("search");

function play(url){

if(Hls.isSupported()){

const hls=new Hls();
hls.loadSource(url);
hls.attachMedia(video);

}else{

video.src=url;

}

video.play();
window.scrollTo({top:0,behavior:"smooth"});

}

function load(data){

list.innerHTML="";

data.forEach(ch=>{

const div=document.createElement("div");

div.className="card";

div.innerHTML=`
<img src="${ch.logo}">
<div class="title">${ch.name}</div>
`;

div.onclick=function(){
play(ch.url);
};

list.appendChild(div);

});

}

load(channels.movie);

search.onkeyup=function(){

const keyword=this.value.toLowerCase();

const filtered=channels.movie.filter(c=>
c.name.toLowerCase().includes(keyword)
);

load(filtered);

};

</script>

</body>
</html>
