<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">

    <!-- 🔥 สำคัญมาก -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

    <title>TIEA IPTV</title>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
    <script src="https://ssl.p.jwpcdn.com/player/v/8.26.0/jwplayer.js"></script>
    <script>
        jwplayer.key = "XSuP4qMl+9tK17QNb+4+th2Pm9AWgMO/cYH8CI0HGGr7bdjo";
    </script>

    <style>
        body {
            margin: 0;
            background: #0b0b0b;
            color: #fff;
            font-family: sans-serif;
            overflow-x: hidden;
        }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 8px;
            padding: 10px;
        }

        @media(max-width:500px) {
            .movie-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media(min-width:501px) and (max-width:900px) {
            .movie-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media(min-width:901px) {
            .movie-grid {
                grid-template-columns: repeat(5, 1fr);
            }
        }

        .movie-card {
            background: #1b1b1b;
            border-radius: 10px;
            cursor: pointer;
            outline: none;
        }

        .movie-card:focus {
            box-shadow: 0 0 0 3px #00e5ff;
        }

        .movie-card img {
            width: 100%;
            height: 120px;
            object-fit: contain;
            background: #000;
        }

        .movie-title {
            text-align: center;
            padding: 5px;
            font-size: 13px;
        }

        #player-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            display: none;
            z-index: 9999;
            overflow: hidden;
        }

        .close-btn {
            position: fixed;
            top: env(safe-area-inset-top, 20px);
            right: 15px;
            background: red;
            color: #fff;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            z-index: 99999;
        }

        .home-btn {
            position: fixed;
            top: env(safe-area-inset-top, 20px);
            left: 15px;
            background: #2196f3;
            color: #fff;
            border: none;
            padding: 10px 16px;
            border-radius: 12px;
            cursor: pointer;
            z-index: 99999;
            font-size: 14px;
        }

        video,
        #jw-player {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        #statusBox {
            position: fixed;
            left: 10px;
            right: 10px;
            bottom: 10px;
            z-index: 100000;
            background: rgba(0, 0, 0, .82);
            color: #fff;
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 14px;
            text-align: center;
            display: none;
        }
    </style>
</head>

<body>

    <div id="movieGrid" class="movie-grid"></div>

    <div id="player-container">
        <button id="homeBtn" class="home-btn">🏠 หน้าโฮม</button>
        <button id="closePlayerBtn" class="close-btn">✕</button>

        <video id="videoPlayer" controls playsinline autoplay muted></video>
        <div id="jw-player" style="display:none;"></div>
    </div>

    <div id="statusBox"></div>

    <script>
        let video = document.getElementById("videoPlayer");
        let jwInstance = null;
        let hls = null;
        let dashPlayer = null;

        /* =========================
           ใส่ลิงก์ได้ทั้ง JSON / M3U / M3U8 stream
           ========================= */
        const SOURCE_URL = "https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/M3U/Dooball.json";

        function $(id) {
            return document.getElementById(id);
        }

        function setStatus(msg) {
            const box = $("statusBox");
            box.textContent = msg || "";
            box.style.display = msg ? "block" : "none";
        }

        function setDefaultVolumeHTML5() {
            video.muted = true;
            video.volume = 1.0;
            setTimeout(() => {
                video.muted = false;
            }, 300);
        }

        function setDefaultVolumeJW() {
            if (jwInstance) jwInstance.setVolume(100);
        }

        function resetPlayers() {
            if (hls) {
                try { hls.destroy(); } catch (e) {}
                hls = null;
            }

            if (dashPlayer) {
                try { dashPlayer.reset(); } catch (e) {}
                dashPlayer = null;
            }

            if (jwInstance) {
                try { jwInstance.stop(); } catch (e) {}
                try { jwInstance.remove(); } catch (e) {}
                jwInstance = null;
            }

            try { video.pause(); } catch (e) {}
            video.removeAttribute("src");
            video.load();
            video.style.display = "block";
            $("jw-player").style.display = "none";
            setStatus("");
        }

        function showPlayer() {
            $("player-container").style.display = "block";
        }

        function closePlayer() {
            resetPlayers();
            $("player-container").style.display = "none";
        }

        function showError(msg) {
            $("movieGrid").innerHTML = `
                <div style="padding:20px;color:#ff5252;font-size:16px;">
                    ${msg}
                </div>
            `;
        }

        function getPlayableUrl(ch, index = 0) {
            if (!ch) return "";

            if (Array.isArray(ch.servers) && ch.servers.length > 0) {
                return ch.servers[index]?.url || "";
            }

            return ch.url || ch.stream || "";
        }

        function getServerCount(ch) {
            if (Array.isArray(ch.servers) && ch.servers.length > 0) return ch.servers.length;
            return getPlayableUrl(ch) ? 1 : 0;
        }

        function tryNextServer(ch, currentIndex, reason) {
            const total = getServerCount(ch);

            if (currentIndex + 1 < total) {
                setStatus(`${reason} กำลังสลับไป Server ${currentIndex + 2}`);
                setTimeout(() => {
                    playStream(ch, currentIndex + 1);
                }, 500);
            } else {
                setStatus("ทุก Server เล่นไม่ได้");
            }
        }

        function startJW(url, ch, serverIndex) {
            video.style.display = "none";
            $("jw-player").style.display = "block";

            jwInstance = jwplayer("jw-player").setup({
                file: url,
                autostart: true,
                width: "100%",
                height: "100%"
            });

            jwInstance.on("ready", () => {
                setDefaultVolumeJW();
            });

            jwInstance.on("error", () => {
                tryNextServer(ch, serverIndex, "JW เล่นไม่ได้");
            });
        }

        function playStream(ch, serverIndex = 0) {
            resetPlayers();
            showPlayer();

            const url = getPlayableUrl(ch, serverIndex);
            if (!url) {
                setStatus("ไม่พบลิงก์สตรีม");
                return;
            }

            const total = getServerCount(ch);
            setStatus(`กำลังเล่น ${ch.title || "ช่อง"} ${total > 1 ? `(Server ${serverIndex + 1}/${total})` : ""}`);

            const lower = url.toLowerCase();

            if (lower.includes(".mp4")) {
                video.src = url;
                setDefaultVolumeHTML5();
                video.play().catch(() => {
                    tryNextServer(ch, serverIndex, "MP4 เล่นไม่ได้");
                });
                return;
            }

            if (lower.includes(".m3u8")) {
                if (Hls.isSupported()) {
                    hls = new Hls({
                        enableWorker: true,
                        lowLatencyMode: true,
                        manifestLoadingMaxRetry: 3,
                        levelLoadingMaxRetry: 3,
                        fragLoadingMaxRetry: 3
                    });

                    hls.loadSource(url);
                    hls.attachMedia(video);

                    hls.on(Hls.Events.MANIFEST_PARSED, () => {
                        setDefaultVolumeHTML5();
                        video.play().catch(() => {
                            tryNextServer(ch, serverIndex, "HLS autoplay ไม่สำเร็จ");
                        });
                    });

                    hls.on(Hls.Events.ERROR, (event, data) => {
                        console.log("HLS error:", data);

                        if (data.fatal) {
                            if (serverIndex + 1 < total) {
                                tryNextServer(ch, serverIndex, "Main ใช้ไม่ได้ กำลังสลับสำรอง...");
                            } else {
                                setStatus("สตรีมเล่นไม่ได้ หรือโดนบล็อกต้นทาง");
                            }
                        }
                    });
                } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
                    video.src = url;
                    setDefaultVolumeHTML5();
                    video.play().catch(() => {
                        tryNextServer(ch, serverIndex, "Native HLS เล่นไม่ได้");
                    });
                } else {
                    tryNextServer(ch, serverIndex, "อุปกรณ์ไม่รองรับ HLS");
                }
                return;
            }

            if (lower.includes(".mpd")) {
                try {
                    dashPlayer = dashjs.MediaPlayer().create();
                    dashPlayer.initialize(video, url, true);
                    setDefaultVolumeHTML5();
                } catch (e) {
                    tryNextServer(ch, serverIndex, "DASH เล่นไม่ได้");
                }
                return;
            }

            startJW(url, ch, serverIndex);
        }

        function parseM3U(text) {
            const lines = text.split(/\r?\n/);
            const list = [];
            let current = null;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;

                if (line.startsWith("#EXTINF:")) {
                    const tvgLogoMatch = line.match(/tvg-logo="([^"]*)"/i);
                    const groupTitleMatch = line.match(/group-title="([^"]*)"/i);
                    const namePart = line.split(",").pop()?.trim() || "ไม่ทราบชื่อ";

                    current = {
                        title: namePart,
                        logo: tvgLogoMatch ? tvgLogoMatch[1] : "",
                        group: groupTitleMatch ? groupTitleMatch[1] : "",
                        url: "",
                        servers: []
                    };
                } else if (!line.startsWith("#")) {
                    if (current) {
                        current.url = line;
                        current.servers = [{ name: "Main", url: line }];
                        list.push(current);
                        current = null;
                    } else if (line.startsWith("http")) {
                        list.push({
                            title: "Live Stream",
                            logo: "",
                            group: "",
                            url: line,
                            servers: [{ name: "Main", url: line }]
                        });
                    }
                }
            }

            return list;
        }

        function normalizeJson(data) {
            let list = [];

            if (Array.isArray(data)) {
                list = data.map(item => ({
                    title: item.title || item.name || "ไม่ทราบชื่อ",
                    logo: item.logo || item.image || "",
                    group: item.group || item.category || "",
                    url: item.url || item.stream || item.link || "",
                    servers: Array.isArray(item.servers) ? item.servers.filter(s => s && s.url) : []
                }));
            } else if (data.channels && Array.isArray(data.channels)) {
                list = data.channels.map(item => ({
                    title: item.title || item.name || "ไม่ทราบชื่อ",
                    logo: item.logo || item.image || "",
                    group: item.group || item.category || "",
                    url: item.url || item.stream || item.link || "",
                    servers: Array.isArray(item.servers) ? item.servers.filter(s => s && s.url) : []
                }));
            } else if (data.groups && Array.isArray(data.groups)) {
                data.groups.forEach(g => {
                    (g.stations || []).forEach(s => {
                        list.push({
                            title: s.title || s.name || "ไม่ทราบชื่อ",
                            logo: s.logo || s.image || g.logo || g.image || "",
                            group: g.title || g.name || "",
                            url: s.url || s.stream || s.link || "",
                            servers: Array.isArray(s.servers) ? s.servers.filter(x => x && x.url) : []
                        });
                    });
                });
            } else if (data.url || data.stream || data.link || data.servers) {
                list = [{
                    title: data.title || data.name || "Live Stream",
                    logo: data.logo || data.image || "",
                    group: data.group || "",
                    url: data.url || data.stream || data.link || "",
                    servers: Array.isArray(data.servers) ? data.servers.filter(s => s && s.url) : []
                }];
            }

            return list
                .map(item => {
                    if ((!item.url || item.url === "") && item.servers?.length) {
                        item.url = item.servers[0].url;
                    }
                    return item;
                })
                .filter(item => item.url || (item.servers && item.servers.length));
        }

        async function loadSource(sourceUrl) {
            const lower = sourceUrl.toLowerCase();

            if (lower.endsWith(".m3u8") && !lower.includes(".json") && !lower.includes(".m3u?")) {
                return [{
                    title: "Live Stream",
                    logo: "",
                    group: "",
                    url: sourceUrl,
                    servers: [{ name: "Main", url: sourceUrl }]
                }];
            }

            const res = await fetch(sourceUrl);
            const text = await res.text();
            const trimmed = text.trim();

            if (trimmed.startsWith("{") || trimmed.startsWith("[")) {
                return normalizeJson(JSON.parse(text));
            }

            if (text.includes("#EXTM3U") || text.includes("#EXTINF")) {
                return parseM3U(text);
            }

            return [];
        }

        function renderChannels(list) {
            const grid = $("movieGrid");
            grid.innerHTML = "";

            if (!list.length) {
                showError("ไม่พบรายการช่อง");
                return;
            }

            list.forEach(ch => {
                const card = document.createElement("div");
                card.className = "movie-card";
                card.tabIndex = 0;

                const imgHtml = ch.logo
                    ? `<img src="${ch.logo}" onerror="this.src='';this.style.display='none';">`
                    : `<img src="" style="display:none;">`;

                card.innerHTML = `
                    ${imgHtml}
                    <div class="movie-title">${ch.title || "ไม่มีชื่อ"}</div>
                `;

                card.onclick = () => playStream(ch, 0);

                card.onkeydown = (e) => {
                    if (e.key === "Enter" || e.key === "OK") {
                        e.preventDefault();
                        playStream(ch, 0);
                    }
                };

                grid.appendChild(card);
            });
        }

        $("closePlayerBtn").onclick = (e) => {
            e.stopPropagation();
            closePlayer();
        };

        $("homeBtn").onclick = (e) => {
            e.stopPropagation();
            closePlayer();
            window.location.href = "https://tiea9999.github.io/tv-online/index.html";
        };

        $("player-container").addEventListener("click", function (e) {
            if (e.target === this) {
                closePlayer();
            }
        });

        async function load() {
            try {
                setStatus("กำลังโหลดรายการ...");
                const list = await loadSource(SOURCE_URL);
                renderChannels(list);
                setStatus("");
                console.log("channels loaded:", list);
            } catch (err) {
                console.error(err);
                showError("โหลดรายการไม่สำเร็จ");
                setStatus("โหลดรายการไม่สำเร็จ");
            }
        }

        load();
    </script>

</body>

</html>
