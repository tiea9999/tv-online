<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIEA IPTV AUTO BEST SERVER FINAL</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.10.9/shaka-player.compiled.min.js"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:Arial,sans-serif}
h2{padding:12px;color:orange}
.group-title{padding:10px 14px;font-size:22px;font-weight:bold;color:cyan}
.channel-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;padding:10px}
.channel{background:#222;border:2px solid #444;border-radius:12px;padding:8px;text-align:center;cursor:pointer}
.channel img{width:70px;height:70px;object-fit:contain}
.channel:hover,.channel:focus{border-color:orange;outline:none;box-shadow:0 0 10px cyan}
#player-container{position:fixed;inset:0;background:#000;display:none;z-index:99999}
#player{width:100%;height:100%;background:#000}
.player-controls{position:absolute;top:12px;left:12px;right:12px;display:flex;justify-content:space-between;z-index:100000}
.player-btn{background:rgba(0,0,0,.75);color:#fff;border:2px solid #fff;border-radius:12px;padding:10px 16px;font-size:16px;font-weight:bold;margin:3px}
.status{position:absolute;bottom:15px;left:15px;right:15px;text-align:center;background:rgba(0,0,0,.7);padding:10px;border-radius:10px;z-index:100001}
</style>
</head>
<body>

<h2>TIEA IPTV AUTO BEST SERVER FINAL</h2>

<div id="app"></div>

<div id="player-container">

<div class="player-controls">
<div>
<button class="player-btn" onclick="closePlayer()">X</button>
<button class="player-btn" onclick="reloadPlayer()">↻ รีโหลด</button>
</div>

<div>
<button class="player-btn" onclick="openExternal()">▶ PLAYER</button>
<button class="player-btn" onclick="openMX()">▶ MX</button>
<button class="player-btn" onclick="goHome()">🏠 HOME</button>
</div>
</div>

<video id="player" controls autoplay playsinline webkit-playsinline></video>

<div id="status" class="status">กำลังโหลด...</div>

</div>

<script>

const JSON_URL="https://raw.githubusercontent.com/tiea9999/tv-online/main/M3U/Dooball.json";

const app=document.getElementById("app");
const player=document.getElementById("player");

let hls=null;
let shakaPlayer=null;
let currentChannel=null;
let currentServerIndex=0;

function setStatus(t){
 document.getElementById("status").textContent=t;
}

function pick(o,k){
 for(const x of k){
   if(o&&o[x]) return o[x];
 }
 return "";
}

function normalize(item){

 let servers=[];

 if(Array.isArray(item.servers) && item.servers.length){

   item.servers.forEach(s=>{
      const url=pick(s,["url","file","stream","link"]);
      if(url){
        servers.push({
          url:url,
          drm:!!s.drm,
          keyId:s.keyId||"",
          key:s.key||""
        });
      }
   });

 }else{

   const url=pick(item,["url","file","stream","link"]);

   if(url){
      servers.push({
        url:url,
        drm:false,
        keyId:"",
        key:""
      });
   }

 }

 if(!servers.length) return null;

 return{
   title:pick(item,["title","name"]) || "No Name",
   logo:pick(item,["logo","poster","image"]) || "",
   group:pick(item,["group","category"]) || "อื่นๆ",
   servers
 };

}

function collect(data,out=[]){

 if(Array.isArray(data)){
   data.forEach(x=>collect(x,out));
   return out;
 }

 if(typeof data!=="object" || !data) return out;

 const one=normalize(data);

 if(one) out.push(one);

 ["items","channels","data","list"].forEach(k=>{
   if(Array.isArray(data[k])) collect(data[k],out);
 });

 return out;
}

async function load(){

 const res=await fetch(JSON_URL+"?t="+Date.now());

 const json=await res.json();

 const channels=collect(json);

 const groups={};

 channels.forEach(ch=>{
   if(!groups[ch.group]) groups[ch.group]=[];
   groups[ch.group].push(ch);
 });

 Object.keys(groups).forEach(group=>{

   const title=document.createElement("div");
   title.className="group-title";
   title.textContent=group;
   app.appendChild(title);

   const row=document.createElement("div");
   row.className="channel-row";

   groups[group].forEach(ch=>{

      const div=document.createElement("div");

      div.className="channel";
      div.tabIndex=0;

      div.innerHTML=`
      <img src="${ch.logo}">
      <div>${ch.title}</div>
      `;

      div.onclick=()=>playChannel(ch);

      row.appendChild(div);

   });

   app.appendChild(row);

 });

}

async function stopPlayers(){

 try{
   if(hls){
      hls.destroy();
      hls=null;
   }
 }catch(e){}

 try{
   if(shakaPlayer){
      await shakaPlayer.destroy();
      shakaPlayer=null;
   }
 }catch(e){}

 try{
   player.pause();
   player.removeAttribute("src");
   player.load();
 }catch(e){}

}

async function playChannel(ch){

 currentChannel=ch;
 currentServerIndex=0;

 document.getElementById("player-container").style.display="block";

 await stopPlayers();

 tryServer();

}

async function tryServer(){

 if(!currentChannel) return;

 if(currentServerIndex >= currentChannel.servers.length){

    setStatus("ทุก Server เล่นไม่ได้");
    return;

 }

 const s=currentChannel.servers[currentServerIndex];

 setStatus("กำลังลอง Server "+(currentServerIndex+1));

 await stopPlayers();

 if(s.url.includes(".mpd")){
    playMPD(s);
 }else{
    playHLS(s);
 }

}

function nextServer(){

 currentServerIndex++;

 setStatus("เปลี่ยนไป Backup "+(currentServerIndex+1));

 setTimeout(()=>{
   tryServer();
 },1000);

}

function playMPD(s){

 if(window.shaka){

    shaka.polyfill.installAll();

    shakaPlayer=new shaka.Player(player);

    if(s.drm && s.keyId && s.key){

      shakaPlayer.configure({
        drm:{
          clearKeys:{
            [s.keyId]:s.key
          }
        }
      });

    }

    shakaPlayer.load(s.url)
    .then(()=>{
       player.play();
       setStatus("กำลังเล่น MPD");
    })
    .catch(()=>{
       nextServer();
    });

 }

}

function playHLS(s){

 if(Hls.isSupported() && s.url.includes(".m3u8")){

    hls=new Hls({
      enableWorker:true,
      lowLatencyMode:false,
      maxBufferLength:30,
      maxMaxBufferLength:60
    });

    hls.loadSource(s.url);

    hls.attachMedia(player);

    hls.on(Hls.Events.MANIFEST_PARSED,()=>{
       player.play();
       setStatus("กำลังเล่น Server "+(currentServerIndex+1));
    });

    hls.on(Hls.Events.ERROR,(e,data)=>{

      if(data.fatal){
         nextServer();
      }

    });

    setTimeout(()=>{
      if(player.readyState<2 || player.paused){
         nextServer();
      }
    },5000);

 }else{

    player.src=s.url;

    player.play().catch(()=>{
      nextServer();
    });

 }

}

function closePlayer(){

 stopPlayers();

 document.getElementById("player-container").style.display="none";

}

function reloadPlayer(){

 if(currentChannel){
   playChannel(currentChannel);
 }

}

function goHome(){

 window.location.href="https://tiea9999.github.io/tv-online/index.html";

}

function openExternal(){

 if(!currentChannel) return;

 window.location.href=currentChannel.servers[currentServerIndex].url;

}

function openMX(){

 if(!currentChannel) return;

 const url=currentChannel.servers[currentServerIndex].url;

 try{

    const u=new URL(url);

    const scheme=u.protocol.replace(":","");

    const hostPath=u.host+u.pathname+(u.search||"");

    window.location.href=
    "intent://"+hostPath+
    "#Intent;scheme="+scheme+
    ";action=android.intent.action.VIEW;type=video/*;package=com.mxtech.videoplayer.ad;end";

 }catch(e){

    window.location.href=url;

 }

}

load();

</script>
</body>
</html>
