<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIEA IPTV AUTO GROUP FINAL</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
body{margin:0;background:#000;color:#fff;font-family:Arial,sans-serif}
h2{padding:12px;color:orange}
.group-title{padding:10px 14px;font-size:20px;font-weight:bold;color:cyan}
.channel-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;padding:10px}
.channel{background:#222;border:2px solid #444;border-radius:10px;padding:8px;text-align:center;cursor:pointer}
.channel img{width:70px;height:70px;object-fit:contain}
.channel:focus,.channel:hover{border-color:orange;outline:none}
video{position:fixed;inset:0;width:100%;height:100%;background:#000;display:none;z-index:9999}
</style>
</head>
<body>
<h2>TIEA IPTV AUTO GROUP FINAL</h2>
<div id="app"></div>
<video id="player" controls autoplay playsinline></video>

<script>
const JSON_URL="https://raw.githubusercontent.com/tiea9999/tv-online/main/M3U/Dooball.json";
const app=document.getElementById("app");
const player=document.getElementById("player");
let hls=null;

function pick(o,k){for(const x of k){if(o&&o[x])return o[x]}return ""}

function normalize(item){
  let url="";
  if(Array.isArray(item.servers)&&item.servers.length){
    url=pick(item.servers[0],["url","file","link","stream"]);
  }else{
    url=pick(item,["url","file","stream","link"]);
  }
  if(!url)return null;

  return{
    title:pick(item,["title","name"])||"No Name",
    logo:pick(item,["logo","poster","image"])||"",
    group:pick(item,["group","category"])||"อื่นๆ",
    url
  };
}

function collect(data,out=[]){
  if(Array.isArray(data)){
    data.forEach(x=>collect(x,out));
    return out;
  }
  if(typeof data!=="object"||!data)return out;

  const one=normalize(data);
  if(one)out.push(one);

  ["items","channels","data","list"].forEach(k=>{
    if(Array.isArray(data[k]))collect(data[k],out);
  });

  return out;
}

async function load(){
  const res=await fetch(JSON_URL+"?t="+Date.now());
  const json=await res.json();

  const channels=collect(json);
  const groups={};

  channels.forEach(ch=>{
    if(!groups[ch.group])groups[ch.group]=[];
    groups[ch.group].push(ch);
  });

  Object.keys(groups).forEach(group=>{
    const title=document.createElement("div");
    title.className="group-title";
    title.textContent=group;
    app.appendChild(title);

    const row=document.createElement("div");
    row.className="channel-row";

    groups[group].forEach(ch=>{
      const div=document.createElement("div");
      div.className="channel";
      div.tabIndex=0;
      div.innerHTML=`<img src="${ch.logo}"><div>${ch.title}</div>`;
      div.onclick=()=>play(ch.url);
      row.appendChild(div);
    });

    app.appendChild(row);
  });
}

function play(url){
  player.style.display="block";

  if(hls){hls.destroy();hls=null;}

  if(Hls.isSupported() && url.includes(".m3u8")){
    hls=new Hls();
    hls.loadSource(url);
    hls.attachMedia(player);
    hls.on(Hls.Events.MANIFEST_PARSED,()=>player.play());
  }else{
    player.src=url;
    player.play();
  }
}

load();
</script>
</body>
</html>
