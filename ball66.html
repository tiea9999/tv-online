<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>TIEA IPTV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
<script src="https://ssl.p.jwpcdn.com/player/v/8.26.0/jwplayer.js"></script>
<script>jwplayer.key="XSuP4qMl+9tK17QNb+4+th2Pm9AWgMO/cYH8CI0HGGr7bdjo";</script>

<style>
body{
margin:0;
background:#0b0b0b;
color:#fff;
font-family:sans-serif;
overflow-x:hidden;
}

.movie-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
gap:8px;
padding:10px;
}

@media(max-width:500px){
.movie-grid{grid-template-columns:repeat(2,1fr);}
}
@media(min-width:501px) and (max-width:900px){
.movie-grid{grid-template-columns:repeat(3,1fr);}
}
@media(min-width:901px){
.movie-grid{grid-template-columns:repeat(5,1fr);}
}

.movie-card{
background:#1b1b1b;
border-radius:10px;
cursor:pointer;
}

.movie-card img{
width:100%;
height:120px;
object-fit:contain;
background:#000;
}

.movie-title{
text-align:center;
padding:5px;
font-size:13px;
}

/* PLAYER */
#player-container{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:#000;
display:none;
z-index:9999;
overflow:hidden;
}

/* ปุ่ม */
.close-btn{
position:fixed;
top:env(safe-area-inset-top,20px);
right:15px;
background:red;
color:#fff;
border:none;
width:45px;
height:45px;
border-radius:50%;
font-size:18px;
cursor:pointer;
z-index:99999;
}

.home-btn{
position:fixed;
top:env(safe-area-inset-top,20px);
left:15px;
background:#2196f3;
color:#fff;
border:none;
padding:10px 16px;
border-radius:12px;
cursor:pointer;
z-index:99999;
font-size:14px;
}

video,#jw-player{
width:100%;
height:100%;
object-fit:contain;
}
</style>
</head>

<body>

<div id="movieGrid" class="movie-grid"></div>

<div id="player-container">

<button id="homeBtn" class="home-btn">🏠 หน้าโฮม</button>
<button id="closePlayerBtn" class="close-btn">✕</button>

<video id="videoPlayer" controls playsinline autoplay muted></video>
<div id="jw-player" style="display:none;"></div>

</div>

<script>

let video=document.getElementById("videoPlayer");
let jwInstance=null;
let hls=null;

/* 🔊 เสียง */
function setDefaultVolumeHTML5(){
video.muted=true;
video.volume=1.0;
setTimeout(()=>{video.muted=false},300);
}
function setDefaultVolumeJW(){
if(jwInstance) jwInstance.setVolume(100);
}

/* RESET */
function resetPlayers(){
if(hls){try{hls.destroy()}catch(e){} hls=null;}
if(jwInstance){try{jwInstance.stop();jwInstance.remove()}catch(e){} jwInstance=null;}
video.pause();
video.src="";
video.load();
video.style.display="block";
document.getElementById("jw-player").style.display="none";
}

/* PLAY */
function playStream(ch){

resetPlayers();
document.getElementById("player-container").style.display="block";

let url=ch.url||ch.stream;
if(!url && ch.servers?.length) url=ch.servers[0].url;
if(!url) return;

const lower=url.toLowerCase();

/* MP4 */
if(lower.includes(".mp4")){
video.src=url;
setDefaultVolumeHTML5();
video.play().catch(()=>{});
return;
}

/* HLS */
if(lower.includes(".m3u8")){
if(Hls.isSupported()){
hls=new Hls({manifestLoadingMaxRetry:6});
hls.loadSource(url);
hls.attachMedia(video);
hls.on(Hls.Events.MANIFEST_PARSED,()=>{
setDefaultVolumeHTML5();
video.play().catch(()=>{});
});
}else{
video.src=url;
setDefaultVolumeHTML5();
video.play().catch(()=>{});
}
return;
}

/* DASH */
if(lower.includes(".mpd")){
const dash=dashjs.MediaPlayer().create();
dash.initialize(video,url,true);
setDefaultVolumeHTML5();
return;
}

/* fallback JW */
startJW(url);
}

/* JW */
function startJW(url){
video.style.display="none";
document.getElementById("jw-player").style.display="block";

jwInstance=jwplayer("jw-player").setup({
file:url,
autostart:true,
width:"100%",
height:"100%"
});

jwInstance.on('ready',()=>setDefaultVolumeJW());
}

/* ปิด */
function closePlayer(){
resetPlayers();
document.getElementById("player-container").style.display="none";
}

/* EVENTS */
document.getElementById("closePlayerBtn").onclick=(e)=>{
e.stopPropagation();
closePlayer();
};

/* 🔥 FIX ปุ่ม HOME */
document.getElementById("homeBtn").onclick=(e)=>{
e.stopPropagation();
window.location.replace("https://tiea9999.github.io/tv-online/index.html");
};

/* 🔥 FIX คลิกพื้นหลังเท่านั้น */
document.getElementById("player-container").onclick=(e)=>{
if(e.target.id==="player-container"){
closePlayer();
}
};

/* LOAD */
async function load(){

const res=await fetch("https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/M3U/Dooball.json");
const data=await res.json();

const grid=document.getElementById("movieGrid");
let list=[];

if(data.groups){
data.groups.forEach(g=>{
g.stations.forEach(s=>{
list.push({
title:s.name,
logo:s.image||g.image,
url:s.url
});
});
});
}else{
list=data;
}

list.forEach(ch=>{
const card=document.createElement("div");
card.className="movie-card";

card.innerHTML=`
<img src="${ch.logo||''}">
<div class="movie-title">${ch.title}</div>
`;

card.onclick=()=>playStream(ch);

grid.appendChild(card);
});

}

load();

</script>

</body>
</html>
