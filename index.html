<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIEA IPTV - Home</title>

<style>
body{
  margin:0;
  background:#0f172a;
  color:white;
  font-family:sans-serif;
}

header{
  font-size:24px;
  padding:15px;
  text-align:center;
  background:#111;
}

.section{
  padding:15px;
}

h2{
  margin-bottom:10px;
  border-bottom:1px solid #444;
  padding-bottom:5px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:15px;
}

.card{
  background:#1e293b;
  border-radius:10px;
  padding:10px;
  cursor:pointer;
  text-align:center;
}

.card img{
  max-height:50px;
  margin-bottom:5px;
}

button{
  background:#222;
  border:none;
  color:white;
  padding:6px 12px;
  border-radius:6px;
  cursor:pointer;
  margin-top:10px;
}

.video-container{
  max-width:900px;
  margin:auto;
  padding:10px;
}

video{
  width:100%;
  border-radius:10px;
}
</style>

</head>

<body>

<header>TIEA IPTV</header>

<!-- 1️⃣ ตารางแข่งขันกีฬา + LIVE IPTV -->

<div class="section">
<h2>ตารางแข่งขันกีฬา + LIVE IPTV</h2>
<iframe src="live.html"></iframe>
</div>

<!-- เครื่องเล่น Video -->

<div class="video-container">
<video id="player" controls autoplay playsinline></video>
<br>
<button id="fullscreen-btn">ขยายจอ / ย่อจอ</button>
</div>

<!-- 2️⃣ TV -->

<div class="section" id="tv-section">
<h2>TV</h2>
<div class="grid" id="tv-channels"></div>
</div>

<!-- 3️⃣ Movie -->

<div class="section" id="movie-section">
<h2>Movie</h2>
<div class="grid" id="movie-channels"></div>
</div>

<!-- 4️⃣ Series -->

<div class="section" id="series-section">
<h2>Series</h2>
<div class="grid" id="series-channels"></div>
</div>

<script src="channels.js"></script>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
const video = document.getElementById("player");
const fullscreenBtn = document.getElementById("fullscreen-btn");

function play(url){
  if(Hls.isSupported()){
    const hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  } else {
    video.src = url;
  }
  video.play();
  window.scrollTo({top:0,behavior:"smooth"});
}

// ปุ่มขยายจอ
fullscreenBtn.addEventListener("click", ()=>{
  if(!document.fullscreenElement){
    video.requestFullscreen().catch(err=>console.log(err));
  } else {
    document.exitFullscreen();
  }
});

// สร้างช่อง TV
channels.tv.digital.forEach(ch=>{
  const div = document.createElement("div");
  div.className = "card";
  div.innerHTML = `<img src="${ch.logo}"><div>${ch.name}</div>`;
  div.onclick = ()=>play(ch.url);
  document.getElementById("tv-channels").appendChild(div);
});

// สร้างช่อง Movie
channels.movie.forEach(ch=>{
  const div = document.createElement("div");
  div.className = "card";
  div.innerHTML = `<img src="${ch.logo}"><div>${ch.name}</div>`;
  div.onclick = ()=>play(ch.url);
  document.getElementById("movie-channels").appendChild(div);
});

// สร้างช่อง Series
channels.series.forEach(ch=>{
  const div = document.createElement("div");
  div.className = "card";
  div.innerHTML = `<img src="${ch.logo}"><div>${ch.name}</div>`;
  div.onclick = ()=>play(ch.url);
  document.getElementById("series-channels").appendChild(div);
});
</script>

</body>
</html>
