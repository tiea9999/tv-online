<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIEA IPTV</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

body{
  display:flex;
  height:100vh;
  background:#000;
  color:#fff;
  overflow:hidden;
}

/* MENU */
#menu{
  width:230px;
  background:#0f172a;
  padding:15px;
  overflow-y:auto;
  z-index:10;
}

.menu-title{
  margin-top:10px;
  padding:12px;
  font-weight:bold;
  background:#1e293b;
  border-radius:10px;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
}

.menu-title span{
  transition:0.3s;
}

.menu-title.active span{
  transform:rotate(90deg);
}

.menu-link{
  padding:10px;
  margin:5px 0 5px 15px;
  cursor:pointer;
  border-radius:8px;
  display:none;
  background:#020617;
}

.menu-link:hover{
  background:#e94560;
}

/* PLAYER */
#main-player{
  flex:1;
  position:relative;
}

/* 🔥 Splash Screen */
#splash{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:99999;
}

#splash img{
  max-width:220px;
  border-radius:20px;
  animation:fadeIn 1s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:scale(0.8);}
  to{opacity:1; transform:scale(1);}
}

/* PLAYER FRAME */
.player-frame{
  position:absolute;
  width:100%;
  height:100%;
  border:none;
  opacity:0;
  transition:0.3s;
}

.player-frame.active{
  opacity:1;
}
</style>
</head>

<body>

<!-- 🔥 Splash -->
<div id="splash">
  <img src="https://www.dropbox.com/scl/fi/nfxxskq5ydbebgvs1lcfi/output_857d150a-0947-4571-a612-402b9466aa4d_512x512_1773067860534.png?dl=1">
</div>

<div id="menu">
  <div class="menu-title">📺 ทีวี <span>⯈</span></div>
  <div class="menu-link" data-url="https://tiea9999.github.io/tv-online/ball66.html">DOOBALL</div>

  <div class="menu-title">🎬 หนัง <span>⯈</span></div>
  <div class="menu-link" data-url="https://tiea9999.github.io/tv-online/ezmovie.html">EZMOVIE</div>

  <div class="menu-title">📺 ซีรีส์ <span>⯈</span></div>
  <div class="menu-link" data-url="https://tiea9999.github.io/tv-online/goseries4k.html">GOSERIES</div>

  <div class="menu-title">🔐 VIP <span>⯈</span></div>
  <div class="menu-link" data-url="https://tiea9999.github.io/tv-online/VIP.html" data-pass="9999">เข้า VIP</div>
</div>

<div id="main-player">
  <iframe id="frame1" class="player-frame active"></iframe>
  <iframe id="frame2" class="player-frame"></iframe>
</div>

<script>
const links=document.querySelectorAll(".menu-link");
const titles=document.querySelectorAll(".menu-title");

const frame1=document.getElementById("frame1");
const frame2=document.getElementById("frame2");

let currentFrame=1;

/* 🔥 Splash หายอัตโนมัติ */
setTimeout(()=>{
  document.getElementById("splash").style.display="none";
},1500);

/* Accordion */
titles.forEach(title=>{
  title.addEventListener("click",()=>{
    titles.forEach(t=>{
      if(t!==title){
        t.classList.remove("active");
        t.querySelector("span").innerText="⯈";

        let next=t.nextElementSibling;
        while(next && next.classList.contains("menu-link")){
          next.style.display="none";
          next=next.nextElementSibling;
        }
      }
    });

    title.classList.toggle("active");
    title.querySelector("span").innerText =
      title.classList.contains("active") ? "⯆" : "⯈";

    let next=title.nextElementSibling;
    while(next && next.classList.contains("menu-link")){
      next.style.display =
        title.classList.contains("active") ? "block" : "none";
      next=next.nextElementSibling;
    }
  });
});

/* Frame Switch */
function getNextFrame(){
  return currentFrame===1 ? frame2 : frame1;
}

function switchFrame(){
  if(currentFrame===1){
    frame1.classList.remove("active");
    frame2.classList.add("active");
    currentFrame=2;
  }else{
    frame2.classList.remove("active");
    frame1.classList.add("active");
    currentFrame=1;
  }
}

/* Click Menu */
links.forEach(link=>{
  link.addEventListener("click",()=>{
    const url=link.dataset.url;
    const pass=link.dataset.pass;

    if(pass){
      const input=prompt("กรุณาใส่รหัส VIP");
      if(input!==pass){alert("รหัสไม่ถูกต้อง");return;}
    }

    const nextFrame=getNextFrame();
    nextFrame.src=url;

    nextFrame.onload=()=>{
      switchFrame();
    };
  });
});
</script>

</body>
</html>
