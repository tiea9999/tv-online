<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIEA IPTV SMART TV FINAL</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;overflow:hidden}
.app{display:flex;height:100vh}
.sidebar{width:200px;background:#111;padding:10px;overflow:auto}
.menu-btn{width:100%;padding:12px;margin-bottom:8px;background:#222;border:0;color:#fff;border-radius:8px}
.menu-btn:focus{outline:none;box-shadow:0 0 10px #00e5ff}
.main{flex:1;padding:10px;overflow:auto}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.card{background:#111;border-radius:10px;overflow:hidden}
.card img{width:100%;height:160px;object-fit:cover}
.card-title{padding:8px;font-size:14px}
#playerWrap{position:fixed;inset:0;background:#000;display:none}
video{width:100%;height:100%}
</style>
</head>

<body>

<div class="app">

<div class="sidebar">
<button class="menu-btn" data-link="live.html">⚽ ตารางแข่งขัน</button>
<button class="menu-btn" data-source="Dooball.json">📺 ทีวีออนไลน์</button>
<button class="menu-btn" data-link="3bb.html">📡 3BB</button>
<button class="menu-btn" data-source="MySeries.json">📺 MySeries</button>
<button class="menu-btn" data-source="series24hd.json">📺 24Series</button>
<button class="menu-btn" data-source="movie24hd.json">🎬 หนัง24</button>
<button class="menu-btn" onclick="location.href='VIP.html'">🔒 VIP</button>
</div>

<div class="main">
<div id="grid" class="grid"></div>
</div>

</div>

<div id="playerWrap">
<video id="video" controls autoplay></video>
</div>

<script>

const grid = document.getElementById("grid");
const video = document.getElementById("video");
const playerWrap = document.getElementById("playerWrap");

let hls;

document.querySelectorAll(".menu-btn").forEach(btn=>{
btn.onclick=()=>{
if(btn.dataset.link){
location.href=btn.dataset.link;
return;
}
load(btn.dataset.source);
};
});

async function load(url){
grid.innerHTML="โหลด...";
try{
const res=await fetch(url);
const json=await res.json();
render(json);
}catch{
grid.innerHTML="โหลดไม่สำเร็จ";
}
}

function render(list){
grid.innerHTML="";
list.forEach(item=>{
const card=document.createElement("div");
card.className="card";
card.tabIndex=0;
card.innerHTML=`
<img src="${item.poster||''}">
<div class="card-title">${item.title}</div>
`;

card.onclick=()=>openItem(item);
card.onkeydown=e=>{if(e.key==="Enter")openItem(item);}

grid.appendChild(card);
});
}

function openItem(item){
if(item.episodes){
showEP(item);
}else{
play(item.servers);
}
}

function showEP(series){
grid.innerHTML="";
series.episodes.forEach(ep=>{
const btn=document.createElement("button");
btn.className="menu-btn";
btn.textContent=ep.title;
btn.onclick=()=>play(ep.servers);
grid.appendChild(btn);
});
}

function play(servers){
if(!servers||!servers.length)return;

let index=0;

function tryPlay(){
let url=servers[index].url;

startPlayer(url,()=>{
index++;
if(index<servers.length){
tryPlay();
}else{
openExternal(url);
}
});
}

tryPlay();
}

function startPlayer(url,onFail){

playerWrap.style.display="block";

if(hls){hls.destroy();}

if(video.canPlayType('application/vnd.apple.mpegurl')){
video.src=url;
video.play().catch(onFail);
return;
}

if(Hls.isSupported()){
hls=new Hls({
enableWorker:false,
maxBufferLength:10,
fragLoadingMaxRetry:2
});
hls.loadSource(url);
hls.attachMedia(video);

hls.on(Hls.Events.ERROR,(e,data)=>{
if(data.fatal)onFail();
});

}else{
video.src=url;
video.play().catch(onFail);
}

setTimeout(()=>{
if(video.readyState<2)onFail();
},3000);
}

function openExternal(url){
location.href="intent:"+url+"#Intent;type=video/*;end";
}

document.addEventListener("keydown",e=>{
if(e.key==="Escape"||e.keyCode===10009){
playerWrap.style.display="none";
video.pause();
}
});

</script>

</body>
</html>
