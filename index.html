<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIEA IPTV</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            background: #000;
            color: #fff;
        }

        /* ===== MENU ===== */
        #menu {
            width: 230px;
            background: #111;
            padding: 10px;
            overflow-y: auto;
            transition: 0.3s;
        }

        .menu-title {
            padding: 10px;
            margin-top: 5px;
            background: #222;
            border-radius: 6px;
            cursor: pointer;
        }

        .menu-link {
            padding: 8px;
            margin-left: 10px;
            display: none;
            cursor: pointer;
        }

        .menu-link:hover {
            background: #e94560;
        }

        /* ===== MOBILE MENU ===== */
        #menuToggle {
            display: none;
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 1000;
            background: #e94560;
            padding: 8px 12px;
            border-radius: 6px;
        }

        @media(max-width:768px) {
            #menu {
                position: fixed;
                left: -250px;
                top: 0;
                height: 100%;
                z-index: 999;
            }

            #menu.active {
                left: 0;
            }

            #menuToggle {
                display: block;
            }
        }

        /* ===== PLAYER ===== */
        #main {
            flex: 1;
            position: relative;
        }

        /* โลโก้ไม่บัง */
        #welcome {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            opacity: 0.7;
        }

        #welcome img {
            max-width: 180px;
        }

        /* ===== FLOAT PLAYER ===== */
        #floatPlayer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: none;
            z-index: 9999;
        }

        #floatPlayer iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        #closeBtn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: red;
            border: none;
            color: #fff;
            padding: 8px 12px;
            font-size: 16px;
            border-radius: 6px;
            z-index: 10;
        }
    </style>
</head>

<body>

    <button id="menuToggle">☰</button>

    <div id="menu">
        <div class="menu-title">📺 ทีวี</div>
        <div class="menu-link" data-url="https://tiea9999.github.io/tv-online/ball66.html">DOOBALL</div>

        <div class="menu-title">🎬 หนัง</div>
        <div class="menu-link" data-url="https://tiea9999.github.io/tv-online/ezmovie.html">EZMOVIE</div>

        <div class="menu-title">📺 ซีรีส์</div>
        <div class="menu-link" data-url="https://tiea9999.github.io/tv-online/goseries4k.html">GOSERIES</div>

        <div class="menu-title">🔐 VIP</div>
        <div class="menu-link" data-url="https://tiea9999.github.io/tv-online/VIP.html" data-pass="9999">เข้า VIP</div>
    </div>

    <div id="main">
        <div id="welcome">
            <img src="https://www.dropbox.com/scl/fi/nfxxskq5ydbebgvs1lcfi/output_857d150a-0947-4571-a612-402b9466aa4d_512x512_1773067860534.png?rlkey=92c2e2ilfdsm12r7tajb63p5d&dl=1">
        </div>
    </div>

    <!-- FLOAT PLAYER -->
    <div id="floatPlayer">
        <button id="closeBtn">✖</button>
        <iframe id="playerFrame"></iframe>
    </div>

    <script>
        const titles=document.querySelectorAll(".menu-title");
const links=document.querySelectorAll(".menu-link");
const menu=document.getElementById("menu");
const toggle=document.getElementById("menuToggle");

const floatPlayer=document.getElementById("floatPlayer");
const playerFrame=document.getElementById("playerFrame");

/* ===== toggle menu mobile ===== */
toggle.onclick=()=>{
  menu.classList.toggle("active");
};

/* ===== accordion ===== */
titles.forEach(title=>{
  title.onclick=()=>{
    links.forEach(l=>l.style.display="none");
    let next=title.nextElementSibling;
    while(next && next.classList.contains("menu-link")){
      next.style.display="block";
      next=next.nextElementSibling;
    }
  };
});

/* ===== click link ===== */
links.forEach(link=>{
  link.onclick=()=>{
    const url=link.dataset.url;
    const pass=link.dataset.pass;

    if(pass){
      const input=prompt("ใส่รหัส VIP");
      if(input!==pass){alert("รหัสผิด");return;}
    }

    playerFrame.src=url;
    floatPlayer.style.display="block";

    // ปิดเมนูในมือถือ
    menu.classList.remove("active");
  };
});

/* ===== close player ===== */
document.getElementById("closeBtn").onclick=()=>{
  floatPlayer.style.display="none";
  playerFrame.src="";
};

    </script>

</body>

</html>
