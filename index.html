<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIEA IPTV</title>

<style>

body{
background:#020617;
color:white;
font-family:sans-serif;
text-align:center;
margin:0;
}

.logo{
font-size:30px;
padding:30px;
font-weight:bold;
}

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:20px;
padding:40px;
max-width:600px;
margin:auto;
}

.card{
background:#1e293b;
padding:40px;
border-radius:12px;
cursor:pointer;
font-size:20px;
transition:0.3s;
}

.card:hover{
background:#334155;
}

a{
text-decoration:none;
color:white;
}

</style>

</head>

<body>

<div class="logo">TIEA IPTV</div>

<div class="menu">

<a href="tv.html">
<div class="card">📺 TV</div>
</a>

<a href="movie.html">
<div class="card">🎬 MOVIE</div>
</a>

<a href="series.html">
<div class="card">🎞 SERIES</div>
</a>

</div>

</body>
</html>
