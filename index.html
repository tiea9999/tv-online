<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIEA IPTV PRO</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{display:flex;height:100vh;background:#000;color:#fff;}
#menu{width:230px;background:#111;padding:10px;overflow-y:auto;}
.menu-title{padding:10px;margin-top:10px;background:#e94560;border-radius:6px;cursor:pointer;text-align:center;}
#main{flex:1;position:relative;}
.grid{display:flex;flex-wrap:wrap;gap:12px;padding:15px;justify-content:center;overflow:auto;height:100%;}
.card{width:120px;cursor:pointer;text-align:center;}
.card img{width:100%;border-radius:10px;}
#playerBox{position:absolute;top:0;left:0;width:100%;height:100%;display:none;background:#000;}
video{width:100%;height:100%;}
button{padding:8px 12px;margin:10px;background:#e94560;color:#fff;border:none;border-radius:6px;cursor:pointer;}
</style>
</head>

<body>

<div id="menu">
<div class="menu-title" onclick="loadTV()">📡 ทีวี</div>
<div class="menu-title" onclick="loadMovies()">🎬 หนัง</div>
<div class="menu-title" onclick="loadSeries()">📺 ซีรีส์</div>
<div class="menu-title" onclick="register()">📝 สมัคร</div>
<div class="menu-title" onclick="login()">🔐 ล็อกอิน</div>
<div class="menu-title" onclick="logout()">🚪 ออก</div>
<div class="menu-title" onclick="loadVIP()">🔐 VIP</div>
</div>

<div id="main">
<div id="content" class="grid"><h2>เลือกเมนู</h2></div>
<div id="playerBox"><video id="video" controls autoplay></video></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>
// 🔥 Firebase
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// 📡 TV
function loadTV(){
document.getElementById("playerBox").style.display="none";
document.getElementById("content").innerHTML =
`<iframe src="https://tiea9999.github.io/tv/ball66.html"></iframe>`;
}

// 🎬 Movies
function loadMovies(){ listenData("movies"); }

// 🔐 VIP
function loadVIP(){
if(!auth.currentUser){ alert("❌ ต้องล็อกอินก่อน"); return; }
listenData("vip");
}

// 📺 Series
function loadSeries(){
document.getElementById("playerBox").style.display="none";
db.collection("series").onSnapshot(snapshot=>{
let html="";
snapshot.forEach(doc=>{
let item = doc.data();
html += `
<div class="card" onclick="openSeriesSafe('${item.name}','${item.image}', ${JSON.stringify(item.episodes)})">
<img src="${item.image}">
<div>${item.name}</div>
</div>
`;
});
document.getElementById("content").innerHTML = html;
});
}

// 🔥 ฟังก์ชัน realtime สำหรับ movies / vip
function listenData(collection){
document.getElementById("playerBox").style.display="none";
db.collection(collection).onSnapshot(snapshot=>{
let html="";
snapshot.forEach(doc=>{
let item = doc.data();
html += `
<div class="card" onclick="play('${item.url}')">
<img src="${item.image}">
<div>${item.name}</div>
</div>
`;
});
document.getElementById("content").innerHTML = html;
});
}

// ▶️ PLAYER
function play(url){
document.getElementById("content").innerHTML="";
document.getElementById("playerBox").style.display="block";
let video = document.getElementById("video");
video.pause();
video.src="";
if(Hls.isSupported()){
const hls=new Hls();
hls.loadSource(url);
hls.attachMedia(video);
}else{
video.src=url;
}
video.volume=0.8;
}

// 👤 AUTH
function register(){
let email = prompt("Email");
let pass = prompt("Password");
auth.createUserWithEmailAndPassword(email, pass)
.then(()=>alert("สมัครสำเร็จ"))
.catch(e=>alert(e.message));
}

function login(){
let email = prompt("Email");
let pass = prompt("Password");
auth.signInWithEmailAndPassword(email, pass)
.then(()=>alert("ล็อกอินแล้ว"))
.catch(()=>alert("ผิด"));
}

function logout(){
auth.signOut();
alert("ออกแล้ว");
}

// 🎬 Series: เปิดหน้ารายการตอนมือถือ/คอม
function openSeriesSafe(name, image, episodes){
let html = `<button onclick="loadSeries()">⬅ กลับ</button>`;
html += `<h2 style='text-align:center;'>${name}</h2>`;
html += `<div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;">`;
episodes.forEach(ep=>{
html += `
<div class="card" onclick="play('${ep.url}')">
<div style="padding:10px;background:#222;border-radius:10px;">
${ep.ep}
</div>
</div>
`;
});
html += `</div>`;
document.getElementById("content").innerHTML = html;
}
</script>

</body>
</html>
