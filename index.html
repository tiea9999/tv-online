<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIEA IPTV PRO</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{margin:0;background:#0b0b0b;color:#fff;font-family:sans-serif;display:flex}
.sidebar{width:220px;background:#111;padding:10px}
.menu-btn{width:100%;padding:12px;margin-bottom:10px;background:#1a1a1a;border:0;color:#fff;border-radius:10px}
.menu-btn.active{background:#00c853}
.content{flex:1;padding:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.card{background:#171717;border-radius:10px;overflow:hidden;cursor:pointer}
.card img{width:100%;height:180px;object-fit:cover}
.card-title{padding:8px;text-align:center;font-size:13px}
</style>
</head>

<body>

<div class="sidebar">
<button class="menu-btn active" data-source="https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/M3U/Dooball.json">📺 ทีวี</button>
<button class="menu-btn" data-source="https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/Ezmovie.json">🎬 หนัง</button>
<button class="menu-btn" data-source="https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/Flixmono.json">📺 ซีรีส์</button>
<button class="menu-btn" data-source="https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/Vip.json">🔐 VIP</button>
<button class="menu-btn" onclick="location.href='live-old.html'">⚽ ตารางแข่งขัน</button>
</div>

<div class="content">
<div id="grid" class="grid"></div>
</div>

<script>

const grid = document.getElementById("grid");
let historyStack = [];

// ===== MX =====
function openMx(url){
    try{
        const u = new URL(url);
        let intent = "intent://" + u.host + u.pathname + u.search +
        "#Intent;scheme=" + u.protocol.replace(":","") +
        ";package=com.mxtech.videoplayer.ad;end";

        location.href = intent;
        setTimeout(()=>{
            location.href = intent.replace("videoplayer.ad","videoplayer.pro");
        },1000);
    }catch{}
}

// ===== PLAY =====
function play(url){
    if(!url) return;

    if(url.includes("master.txt")){
        openMx(url);
        return;
    }

    if(url.includes(".m3u8")){
        document.body.innerHTML="<video id='v' controls autoplay style='width:100%;height:100%;background:#000'></video>";
        let v=document.getElementById("v");

        if(Hls.isSupported()){
            let hls=new Hls();
            hls.loadSource(url);
            hls.attachMedia(v);
        }else{
            v.src=url;
        }
        return;
    }

    openMx(url);
}

// ===== PARSE =====
function parse(data){
    let list=[];

    if(Array.isArray(data)){
        data.forEach(i=>{
            if(i.episodes){
                list.push({
                    title:i.title,
                    img:i.poster||i.image,
                    type:"folder",
                    items:i.episodes
                });
            }else{
                list.push({
                    title:i.title||i.name,
                    img:i.poster||i.image,
                    url:i.url||i.stream
                });
            }
        });
    }

    else if(data.channels){
        data.channels.forEach(i=>{
            list.push({
                title:i.name,
                img:i.logo,
                url:i.url
            });
        });
    }

    else if(data.groups){
        data.groups.forEach(g=>{
            (g.items||g.stations||[]).forEach(i=>{
                if(i.episodes){
                    list.push({
                        title:i.title,
                        img:i.poster,
                        type:"folder",
                        items:i.episodes
                    });
                }else{
                    list.push({
                        title:i.title||i.name,
                        img:i.poster||i.logo,
                        url:i.url
                    });
                }
            });
        });
    }

    else if(data.type==="menu"){
        data.items.forEach(i=>{
            list.push({
                title:i.title,
                img:i.poster||i.image,
                source:i.source,
                type:"source"
            });
        });
    }

    return list;
}

// ===== LOAD =====
async function load(url){
    const res=await fetch(url);
    const data=await res.json();
    const list=parse(data);
    render(list);
}

// ===== RENDER =====
function render(list){
    grid.innerHTML="";

    list.forEach(item=>{
        let div=document.createElement("div");
        div.className="card";

        div.innerHTML=`
        <img src="${item.img||''}" onerror="this.src='https://via.placeholder.com/300x450?text=No+Image'">
        <div class="card-title">${item.title}</div>
        `;

        div.onclick=()=>{
            if(item.type==="source"){
                historyStack.push(list);
                load(item.source);
            }
            else if(item.type==="folder"){
                historyStack.push(list);
                render(item.items.map(ep=>({
                    title:ep.title||ep.name,
                    img:ep.poster||item.img,
                    url:ep.url||ep.stream
                })));
            }
            else{
                play(item.url);
            }
        };

        grid.appendChild(div);
    });
}

// ===== MENU =====
document.querySelectorAll(".menu-btn").forEach(btn=>{
    btn.onclick=()=>{
        document.querySelectorAll(".menu-btn").forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");

        if(btn.dataset.source){
            historyStack=[];
            load(btn.dataset.source);
        }
    };
});

// ===== INIT =====
load(document.querySelector(".menu-btn.active").dataset.source);

</script>

</body>
</html>
