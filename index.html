<!DOCTYPE html>
<html lang="th">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIEA IPTV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{margin:0;background:#111;color:white;font-family:sans-serif;display:flex;height:100vh}
.sidebar{width:200px;background:#000}
.menu-item{padding:15px;cursor:pointer}
.menu-item:hover{background:#333}

.main{flex:1;display:flex;flex-direction:column}

#player{width:100%;height:250px;background:black;}

.fullscreen{
position:fixed !important;
top:0;left:0;
width:100% !important;
height:100% !important;
z-index:9999;
}

.controls{
display:flex;
gap:10px;
padding:5px;
background:#000;
}

.btn{
background:#333;
color:#fff;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
gap:10px;
padding:10px;
overflow:auto;
}

.card{
background:#222;
padding:10px;
text-align:center;
border-radius:10px;
cursor:pointer;
}

.card img{max-height:50px}

.back-btn{
background:#444;
font-weight:bold;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="menu-item" onclick="openLive()">🏟 ตารางแข่งขันกีฬา</div>
  <div class="menu-item" onclick="openTVMenu()">📺 TV</div>
  <div class="menu-item" onclick="openMovie()">🎬 Movie</div>
  <div class="menu-item" onclick="openSeries()">🎞 Series</div>
  
  <div class="menu-item" onclick="openShort()">📱 หนังสั้นแนวตั้ง</div>
  <div class="menu-item" onclick="openAnime()">🍥 อนิเมะ</div>
  
  <div class="menu-item" onclick="openVip()">🔒 Vip</div>
</div>

<div class="main">

<video id="player" controls autoplay playsinline preload="auto"></video>

<div class="controls">
  <div class="btn" onclick="toggleFullscreen()">⛶ ขยายจอ</div>
</div>

<div id="list" class="grid"></div>

</div>

<script src="channels.js"></script>

<script>
const player = document.getElementById("player");
const list = document.getElementById("list");

let isFull = false;
let currentIndex = 0;
let currentSources = [];
let hls = null;

/* ================= PLAY ================= */
function play(source){
  currentSources = Array.isArray(source) ? source : [source];
  currentIndex = 0;
  startPlayer();
}

/* ================= START ================= */
function startPlayer(){
  let url = currentSources[currentIndex];

  if(hls){
    hls.destroy();
    hls = null;
  }

  if(Hls.isSupported()){
    hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(player);

    hls.on(Hls.Events.MANIFEST_PARSED, ()=> player.play());

    hls.on(Hls.Events.ERROR, function(event,data){
      if(data.fatal) nextSource();
    });

  }else{
    player.src = url;
    player.play();
  }
}

/* ================= NEXT ================= */
function nextSource(){
  currentIndex++;
  if(currentIndex < currentSources.length){
    startPlayer();
  }
}

/* ================= FULLSCREEN ================= */
function toggleFullscreen(){
  player.classList.toggle("fullscreen");
  isFull = !isFull;
}

/* ================= MENU ================= */
function openTVMenu(){
  list.innerHTML = "";

  const groups = [
    {name:"Digital", key:"digital"},
    {name:"Movie", key:"movie"},
    {name:"Sport", key:"sport"},
    {name:"Kids", key:"kids"},
    {name:"Documentary", key:"documentary"}
  ];

  groups.forEach(g=>{
    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`<div style="padding:20px">${g.name}</div>`;
    div.onclick=()=>openTVGroup(g.key);
    list.appendChild(div);
  });
}

/* ================= GROUP ================= */
function openTVGroup(group){
  list.innerHTML="";

  const back=document.createElement("div");
  back.className="card back-btn";
  back.innerHTML="⬅️ กลับ";
  back.onclick=openTVMenu;
  list.appendChild(back);

  const data = channels.tv[group];
  if(!data) return;

  data.forEach(ch=>{
    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`<img src="${ch.logo}"><div>${ch.name}</div>`;
    div.onclick=()=>play(ch.url);
    list.appendChild(div);
  });
}

/* ================= PAGE ================= */
function openLive(){ window.location.href="live.html"; }
function openMovie(){ window.location.href="037hd.html"; }
function openSeries(){ window.location.href="myseries.html"; }

/* 🔥 เพิ่มใหม่ */
function openShort(){
  window.location.href="short.html"; // <-- ใส่ลิงก์เอง
}

function openAnime(){
  window.location.href="animegood.html"; // <-- ใส่ลิงก์เอง
}

/* VIP */
function openVip(){
  const password = prompt("กรุณาใส่รหัส VIP");
  if(password === "9999"){
    window.location.href="https://tiea9999.github.io/tv-online/VIP.html";
  }else{
    alert("รหัสไม่ถูกต้อง!");
  }
}
</script>

</body>
</html>
