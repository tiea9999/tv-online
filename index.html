<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>TIEA IPTV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>

<style>
*{box-sizing:border-box}
body{
    margin:0;
    background:#0b0b0b;
    color:#fff;
    font-family:sans-serif;
    overflow:hidden;
}
.app{
    display:flex;
    width:100vw;
    height:100vh;
}
.sidebar{
    width:220px;
    background:#111;
    border-right:1px solid #222;
    padding:12px 10px;
    overflow-y:auto;
    flex-shrink:0;
}
.brand{
    text-align:center;
    font-size:22px;
    font-weight:bold;
    color:#00e5ff;
    margin-bottom:14px;
}
.menu-btn,.top-btn,.player-btn,.back-btn{
    border:0;
    border-radius:12px;
    cursor:pointer;
    color:#fff;
    outline:none;
}
.menu-btn{
    width:100%;
    background:#1a1a1a;
    padding:14px 12px;
    margin-bottom:10px;
    text-align:left;
    font-size:16px;
}
.menu-btn.active,.menu-btn:focus{
    background:#00c853;
}
.content{
    flex:1;
    overflow-y:auto;
    padding:14px;
}
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    margin-bottom:12px;
    flex-wrap:wrap;
}
.title{
    font-size:22px;
    font-weight:bold;
    color:#00e5ff;
}
.subtext{
    font-size:14px;
    color:#bbb;
}
.action-row{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
}
.top-btn,.back-btn{
    background:#1c1c1c;
    padding:12px 14px;
    font-size:14px;
}
#statusBox{
    display:none;
    background:rgba(255,255,255,.08);
    border-radius:10px;
    padding:10px 12px;
    margin-bottom:12px;
    font-size:14px;
}
#topExtra{
    display:flex;
    gap:8px;
    margin-bottom:12px;
    flex-wrap:wrap;
}
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
    gap:12px;
}
.card{
    background:#171717;
    border-radius:12px;
    overflow:hidden;
    cursor:pointer;
    min-height:220px;
    display:flex;
    flex-direction:column;
}
.card:focus{
    box-shadow:0 0 0 4px #00e5ff;
}
.thumb{
    width:100%;
    height:170px;
    background:#000;
    object-fit:contain;
}
.card-title{
    padding:10px 8px 12px;
    font-size:14px;
    text-align:center;
    line-height:1.35;
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
}
.empty{
    padding:30px 10px;
    text-align:center;
    color:#aaa;
}
#playerWrap{
    position:fixed;
    inset:0;
    background:#000;
    z-index:9999;
    display:none;
}
#videoPlayer{
    width:100%;
    height:100%;
    background:#000;
    object-fit:contain;
}
#playerUi{
    position:absolute;
    top:12px;
    left:12px;
    right:12px;
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    z-index:10001;
    pointer-events:none;
}
#playerLeft,#playerRight{
    display:flex;
    gap:8px;
    pointer-events:auto;
    flex-wrap:wrap;
}
.player-btn{
    padding:12px 14px;
    font-size:14px;
}
.home-btn{background:#2196f3}
.close-btn{background:#e53935}
.mx-btn{background:#ff9800}
.vlc-btn{background:#7b1fa2}
.web-btn{background:#00897b}
#playerStatus{
    position:absolute;
    left:12px;
    right:12px;
    bottom:12px;
    z-index:10001;
    background:rgba(0,0,0,.7);
    border-radius:12px;
    padding:10px 12px;
    font-size:14px;
    text-align:center;
    display:none;
}
@media (max-width:900px){
    .sidebar{width:185px}
    .grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
}
</style>
</head>

<body>
<div class="app">
    <aside class="sidebar">
        <div class="brand">TIEA IPTV</div>

        <button class="menu-btn active" tabindex="0"
            data-source="https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/M3U/Dooball.json"
            data-title="📺 ทีวี">📺 ทีวี</button>

        <button class="menu-btn" tabindex="0"
            data-source="https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/Ezmovie.json"
            data-title="🎬 หนัง">🎬 หนัง</button>

        <button class="menu-btn" tabindex="0"
            data-source="https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/Flixmono.json"
            data-title="📺 ซีรีส์">📺 ซีรีส์</button>

        <button class="menu-btn" tabindex="0"
            data-link="live-old.html">⚽ ตารางแข่งขัน</button>
    </aside>

    <main class="content">
        <div class="topbar">
            <div>
                <div id="pageTitle" class="title">📺 ทีวี</div>
                <div class="subtext">ใช้รีโมทเลื่อนแล้วกด Enter เพื่อเลือก</div>
            </div>
            <div class="action-row">
                <button id="focusFirstBtn" class="top-btn" tabindex="0">โฟกัสรายการแรก</button>
                <button id="reloadBtn" class="top-btn" tabindex="0">รีโหลด</button>
                <button id="homeTopBtn" class="top-btn" tabindex="0">หน้าโฮม</button>
            </div>
        </div>

        <div id="statusBox"></div>
        <div id="topExtra"></div>
        <div id="grid" class="grid"></div>
    </main>
</div>

<div id="playerWrap">
    <video id="videoPlayer" controls playsinline autoplay muted></video>

    <div id="playerUi">
        <div id="playerLeft">
            <button id="playerHomeBtn" class="player-btn home-btn" tabindex="0">🏠 หน้าโฮม</button>
            <button id="playerCloseBtn" class="player-btn close-btn" tabindex="0">✕ ปิด</button>
        </div>
        <div id="playerRight">
            <button id="playerWebBtn" class="player-btn web-btn" tabindex="0">▶ Web</button>
            <button id="playerMxBtn" class="player-btn mx-btn" tabindex="0">▶ MX</button>
            <button id="playerVlcBtn" class="player-btn vlc-btn" tabindex="0">▶ VLC</button>
        </div>
    </div>

    <div id="playerStatus"></div>
</div>

<script>
const grid = document.getElementById("grid");
const pageTitle = document.getElementById("pageTitle");
const statusBox = document.getElementById("statusBox");
const topExtra = document.getElementById("topExtra");
const playerWrap = document.getElementById("playerWrap");
const playerStatus = document.getElementById("playerStatus");
const video = document.getElementById("videoPlayer");
const menuButtons = Array.from(document.querySelectorAll(".menu-btn"));

let currentSource = menuButtons[0].dataset.source;
let currentTitle = menuButtons[0].dataset.title || "📺 ทีวี";
let currentItem = null;
let currentServerIndex = 0;
let currentEpisodeList = [];
let currentEpisodeIndex = -1;
let preferredPlayer = "auto";
let hls = null;
let dashPlayer = null;
let navigationStack = [];
let isLoading = false;

function setStatus(msg){
    statusBox.textContent = msg || "";
    statusBox.style.display = msg ? "block" : "none";
}

function setPlayerStatus(msg){
    playerStatus.textContent = msg || "";
    playerStatus.style.display = msg ? "block" : "none";
}

function clearPlayers(){
    if(hls){
        try{ hls.destroy(); }catch(e){}
        hls = null;
    }
    if(dashPlayer){
        try{ dashPlayer.reset(); }catch(e){}
        dashPlayer = null;
    }
    try{ video.pause(); }catch(e){}
    video.removeAttribute("src");
    video.load();
    setPlayerStatus("");
}

function showPlayer(){
    playerWrap.style.display = "block";
}

function closePlayer(){
    clearPlayers();
    playerWrap.style.display = "none";
    if(currentItem && currentItem._cardEl){
        currentItem._cardEl.focus();
    }
}

function goHome(){
    closePlayer();
    navigationStack = [];
    pageTitle.textContent = currentTitle;
    const firstMenu = document.querySelector(".menu-btn.active") || menuButtons[0];
    if(firstMenu) firstMenu.focus();
}

function openIntentUrl(intentUrl){
    try{
        const a = document.createElement("a");
        a.href = intentUrl;
        a.style.display = "none";
        document.body.appendChild(a);
        a.click();
        a.remove();
    }catch(e){
        console.error(e);
    }
}

function openMx(url){
    if(!url) return;
    try{
        const u = new URL(url);
        const adIntent =
            "intent://" + u.host + u.pathname + u.search +
            "#Intent;scheme=" + u.protocol.replace(":", "") +
            ";package=com.mxtech.videoplayer.ad;end";
        openIntentUrl(adIntent);
    }catch(e){
        console.error(e);
        setPlayerStatus("เปิด MX ไม่ได้");
    }
}

function openVlc(url){
    if(!url) return;
    try{
        const u = new URL(url);
        const vlcIntent =
            "intent://" + u.host + u.pathname + u.search +
            "#Intent;scheme=" + u.protocol.replace(":", "") +
            ";package=org.videolan.vlc;end";
        openIntentUrl(vlcIntent);
    }catch(e){
        console.error(e);
        setPlayerStatus("เปิด VLC ไม่ได้");
    }
}

function getPlayableUrl(item, idx = 0){
    if(!item) return "";
    if(Array.isArray(item.servers) && item.servers.length){
        return item.servers[idx]?.url || item.servers[0]?.url || "";
    }
    return item.url || item.stream || item.link || item.source || "";
}

function getServerCount(item){
    if(Array.isArray(item?.servers) && item.servers.length) return item.servers.length;
    return getPlayableUrl(item) ? 1 : 0;
}

function tryNextServer(item, idx, reason){
    const total = getServerCount(item);
    if(idx + 1 < total){
        setPlayerStatus(reason + " กำลังสลับ Server " + (idx + 2));
        setTimeout(() => playItem(item, idx + 1, currentEpisodeList, currentEpisodeIndex), 500);
    }else{
        setPlayerStatus("เล่นไม่ได้ ลองกด Web / MX / VLC");
    }
}

function playNextEpisode(){
    if(!currentEpisodeList.length) return;
    if(currentEpisodeIndex < 0) return;
    const nextIndex = currentEpisodeIndex + 1;
    if(nextIndex >= currentEpisodeList.length){
        setPlayerStatus("จบตอนสุดท้ายแล้ว");
        return;
    }
    playItem(currentEpisodeList[nextIndex], 0, currentEpisodeList, nextIndex);
}

function playItem(item, serverIndex = 0, episodeList = [], episodeIndex = -1){
    currentItem = item;
    currentServerIndex = serverIndex;
    currentEpisodeList = Array.isArray(episodeList) ? episodeList : [];
    currentEpisodeIndex = typeof episodeIndex === "number" ? episodeIndex : -1;

    const url = getPlayableUrl(item, serverIndex);
    if(!url){
        setPlayerStatus("ไม่พบลิงก์สตรีม");
        return;
    }

    clearPlayers();
    showPlayer();

    const lower = url.toLowerCase();
    setPlayerStatus("กำลังเล่น " + (item.title || "รายการ"));

    const forceWeb = preferredPlayer === "web";
    const forceMx = preferredPlayer === "mx";
    const forceVlc = preferredPlayer === "vlc";

    if(forceMx){
        openMx(url);
        return;
    }

    if(forceVlc){
        openVlc(url);
        return;
    }

    // ซีรีส์พวกลิงก์แบบนี้ อย่า auto เด้ง intent
    if(
        lower.includes("cumpon1.com") ||
        lower.includes("/api/files/") ||
        lower.includes("master.txt") ||
        lower.includes("streamwish") ||
        lower.includes("filemoon") ||
        lower.includes("vidoza") ||
        lower.includes("dood") ||
        lower.includes("embed") ||
        lower.includes("watch")
    ){
        video.src = url;
        video.muted = false;
        video.volume = 1;
        video.play().catch(() => {
            setPlayerStatus("ลิงก์นี้เล่นในเว็บไม่ได้ ลองกด MX หรือ VLC ด้านบน");
        });
        return;
    }

    if(lower.includes(".m3u8") || forceWeb){
        if(Hls.isSupported()){
            hls = new Hls({
                enableWorker: true,
                lowLatencyMode: true,
                backBufferLength: 90,
                manifestLoadingMaxRetry: 2,
                levelLoadingMaxRetry: 2,
                fragLoadingMaxRetry: 2
            });

            hls.loadSource(url);
            hls.attachMedia(video);

            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                video.muted = false;
                video.volume = 1;
                video.play().catch(() => {
                    tryNextServer(item, serverIndex, "HLS เล่นไม่ได้");
                });
            });

            hls.on(Hls.Events.ERROR, (event, data) => {
                if(data && data.fatal){
                    tryNextServer(item, serverIndex, "สตรีมเสีย");
                }
            });
        }else if(video.canPlayType("application/vnd.apple.mpegurl")){
            video.src = url;
            video.play().catch(() => {
                tryNextServer(item, serverIndex, "เล่นไม่ได้");
            });
        }else{
            setPlayerStatus("อุปกรณ์นี้ไม่รองรับ HLS");
        }
        return;
    }

    if(
        lower.endsWith(".mp4") ||
        lower.endsWith(".mkv") ||
        lower.endsWith(".avi") ||
        lower.endsWith(".mov")
    ){
        video.src = url;
        video.muted = false;
        video.volume = 1;
        video.play().catch(() => {
            setPlayerStatus("ไฟล์นี้เล่นในเว็บไม่ได้ ลองกด MX ด้านบน");
        });
        return;
    }

    if(lower.includes(".mpd")){
        try{
            dashPlayer = dashjs.MediaPlayer().create();
            dashPlayer.initialize(video, url, true);
        }catch(e){
            setPlayerStatus("DASH เล่นไม่ได้");
        }
        return;
    }

    video.src = url;
    video.play().catch(() => {
        setPlayerStatus("เล่นไม่ได้ ลองกด MX หรือ VLC ด้านบน");
    });
}

function parseM3U(text){
    const lines = text.split(/\r?\n/);
    const list = [];
    let current = null;

    for(let i = 0; i < lines.length; i++){
        const line = lines[i].trim();
        if(!line) continue;

        if(line.startsWith("#EXTINF:")){
            const logoMatch = line.match(/tvg-logo="([^"]*)"/i);
            const name = line.split(",").pop()?.trim() || "ไม่ทราบชื่อ";
            current = {
                title: name,
                logo: logoMatch ? logoMatch[1] : "",
                url: "",
                servers: [],
                type: "video"
            };
        }else if(!line.startsWith("#")){
            if(current){
                current.url = line;
                current.servers = [{ name: "Main", url: line }];
                list.push(current);
                current = null;
            }
        }
    }
    return list;
}

function normalizeVideoItem(i, fallbackImg = ""){
    return {
        title: i.title || i.name || "ไม่มีชื่อ",
        logo: i.poster || i.image || i.thumbnail || i.logo || fallbackImg || "",
        url: i.url || i.stream || i.link || i.source || "",
        source: i.source || "",
        servers: Array.isArray(i.servers) ? i.servers : [],
        type: i.type || "video"
    };
}

function parse(data){
    let list = [];

    if(data?.type === "menu" && Array.isArray(data.items)){
        return data.items.map(i => ({
            title: i.title || i.name || "ไม่มีชื่อ",
            logo: i.poster || i.image || i.thumbnail || i.logo || "",
            type: "source",
            source: i.source || i.url || ""
        }));
    }

    if(Array.isArray(data)){
        data.forEach(i => {
            if(Array.isArray(i.episodes) && i.episodes.length){
                list.push({
                    title: i.title || i.name || "ไม่มีชื่อ",
                    logo: i.poster || i.image || i.thumbnail || i.logo || "",
                    type: "folder",
                    items: i.episodes.map((ep, epIndex) => ({
                        ...normalizeVideoItem(ep, i.poster || i.image || i.thumbnail || i.logo || ""),
                        _episodeIndex: epIndex
                    }))
                });
            } else if (i.type === "source" && (i.source || i.url)) {
                list.push({
                    title: i.title || i.name || "ไม่มีชื่อ",
                    logo: i.poster || i.image || i.thumbnail || i.logo || "",
                    type: "source",
                    source: i.source || i.url || ""
                });
            } else {
                const item = normalizeVideoItem(i);
                if(item.url || item.source || item.servers.length) list.push(item);
            }
        });
        return list;
    }

    if(data?.channels && Array.isArray(data.channels)){
        data.channels.forEach(i => {
            const item = normalizeVideoItem(i);
            if(item.url || item.source || item.servers.length) list.push(item);
        });
        return list;
    }

    if(data?.groups && Array.isArray(data.groups)){
        data.groups.forEach(g => {
            const arr = g.items || g.stations || g.groups || [];
            arr.forEach(i => {
                if(Array.isArray(i.episodes) && i.episodes.length){
                    list.push({
                        title: i.title || i.name || "ไม่มีชื่อ",
                        logo: i.poster || i.image || i.thumbnail || i.logo || "",
                        type: "folder",
                        items: i.episodes.map((ep, epIndex) => ({
                            ...normalizeVideoItem(ep, i.poster || i.image || i.thumbnail || i.logo || ""),
                            _episodeIndex: epIndex
                        }))
                    });
                } else if (i.type === "source" && (i.source || i.url)) {
                    list.push({
                        title: i.title || i.name || "ไม่มีชื่อ",
                        logo: i.poster || i.image || i.thumbnail || i.logo || "",
                        type: "source",
                        source: i.source || i.url || ""
                    });
                } else {
                    const item = normalizeVideoItem(i);
                    if(item.url || item.source || item.servers.length) list.push(item);
                }
            });
        });
        return list;
    }

    if(data?.items && Array.isArray(data.items)){
        data.items.forEach(i => {
            if(Array.isArray(i.episodes) && i.episodes.length){
                list.push({
                    title: i.title || i.name || "ไม่มีชื่อ",
                    logo: i.poster || i.image || i.thumbnail || i.logo || "",
                    type: "folder",
                    items: i.episodes.map((ep, epIndex) => ({
                        ...normalizeVideoItem(ep, i.poster || i.image || i.thumbnail || i.logo || ""),
                        _episodeIndex: epIndex
                    }))
                });
            } else if (i.source || i.type === "source") {
                list.push({
                    title: i.title || i.name || "ไม่มีชื่อ",
                    logo: i.poster || i.image || i.thumbnail || i.logo || "",
                    type: "source",
                    source: i.source || i.url || ""
                });
            } else {
                const item = normalizeVideoItem(i);
                if(item.url || item.source || item.servers.length) list.push(item);
            }
        });
    }

    return list;
}

async function load(url){
    if(isLoading) return;
    isLoading = true;

    try{
        setStatus("กำลังโหลด...");
        const res = await fetch(url, { cache: "no-store" });
        if(!res.ok) throw new Error("โหลดไม่สำเร็จ");

        const text = await res.text();
        const trimmed = text.trim();

        if(trimmed.startsWith("#EXTM3U") || trimmed.includes("#EXTINF")){
            render(parseM3U(text));
            setStatus("");
            return;
        }

        const data = JSON.parse(text);
        render(parse(data));
        setStatus("");
    }catch(e){
        console.error(e);
        grid.innerHTML = `<div class="empty">โหลดไม่สำเร็จ</div>`;
        setStatus("โหลดไม่สำเร็จ");
    }finally{
        setTimeout(() => { isLoading = false; }, 300);
    }
}

function render(list){
    grid.innerHTML = "";
    topExtra.innerHTML = "";

    if(navigationStack.length){
        const back = document.createElement("button");
        back.className = "back-btn";
        back.textContent = "← ย้อนกลับ";
        back.onclick = () => {
            const prev = navigationStack.pop();
            pageTitle.textContent = prev.title;
            render(prev.list);
        };
        topExtra.appendChild(back);
    }

    if(!list.length){
        grid.innerHTML = `<div class="empty">ไม่พบรายการ</div>`;
        return;
    }

    list.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "card";
        div.tabIndex = 0;

        div.innerHTML = `
            <img class="thumb" src="${item.logo || ''}" onerror="this.src='https://via.placeholder.com/300x450?text=No+Image'">
            <div class="card-title">${item.title}</div>
        `;

        div.onclick = () => {
            if(item._busy) return;
            item._busy = true;

            if(item.type === "source" && item.source){
                navigationStack.push({ list, title: pageTitle.textContent });
                pageTitle.textContent = item.title || pageTitle.textContent;
                load(item.source);
                setTimeout(() => { item._busy = false; }, 500);
                return;
            }

            if(item.type === "folder"){
                const episodeList = (item.items || []).map((ep, epIndex) => ({
                    ...ep,
                    _episodeList: item.items || [],
                    _episodeIndex: epIndex
                }));
                navigationStack.push({ list, title: pageTitle.textContent });
                pageTitle.textContent = item.title || pageTitle.textContent;
                render(episodeList);
                item._busy = false;
                return;
            }

            playItem(
                item,
                0,
                item._episodeList || list,
                typeof item._episodeIndex === "number" ? item._episodeIndex : -1
            );

            setTimeout(() => { item._busy = false; }, 500);
        };

        div.onkeydown = (e) => {
            if(e.key === "Enter"){
                e.preventDefault();
                div.click();
            }
        };

        item._cardEl = div;
        grid.appendChild(div);

        if(index === 0){
            setTimeout(() => div.focus(), 100);
        }
    });
}

menuButtons.forEach(btn => {
    btn.onclick = () => {
        if(btn.dataset.link){
            location.href = btn.dataset.link;
            return;
        }

        if(!btn.dataset.source) return;

        menuButtons.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");

        navigationStack = [];
        currentSource = btn.dataset.source;
        currentTitle = btn.dataset.title || btn.textContent.trim();
        pageTitle.textContent = currentTitle;
        load(currentSource);
    };
});

document.getElementById("playerCloseBtn").onclick = closePlayer;
document.getElementById("playerHomeBtn").onclick = goHome;

document.getElementById("playerWebBtn").onclick = () => {
    preferredPlayer = "web";
    if(currentItem){
        playItem(currentItem, currentServerIndex, currentEpisodeList, currentEpisodeIndex);
    }
};

document.getElementById("playerMxBtn").onclick = () => {
    preferredPlayer = "mx";
    const url = getPlayableUrl(currentItem, currentServerIndex);
    openMx(url);
};

document.getElementById("playerVlcBtn").onclick = () => {
    preferredPlayer = "vlc";
    const url = getPlayableUrl(currentItem, currentServerIndex);
    openVlc(url);
};

video.addEventListener("ended", () => {
    playNextEpisode();
});

document.getElementById("reloadBtn").onclick = () => load(currentSource);

document.getElementById("focusFirstBtn").onclick = () => {
    const firstCard = grid.querySelector(".card");
    if(firstCard) firstCard.focus();
};

document.getElementById("homeTopBtn").onclick = () => {
    navigationStack = [];
    pageTitle.textContent = currentTitle;
    load(currentSource);
};

currentSource = document.querySelector(".menu-btn.active").dataset.source;
load(currentSource);
</script>
</body>
</html>
