<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIEA IPTV</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
body{
  background:#0f172a;
  color:white;
  font-family:sans-serif;
  margin:0;
}
header{
  font-size:24px;
  padding:15px;
  text-align:center;
}
nav{
  display:flex;
  justify-content:space-around;
  background:#1e293b;
  padding:10px 0;
}
nav button{
  background:none;
  border:none;
  color:white;
  font-size:16px;
  cursor:pointer;
}
nav button.active{
  color:#facc15;
}
.player{
  max-width:900px;
  margin:auto;
  padding:10px;
  position:sticky;
  top:0;
  z-index:10;
}
video{
  width:100%;
  border-radius:10px;
  background:black;
}
#fullscreenBtn{
  margin-top:5px;
  background:#facc15;
  color:#0f172a;
  border:none;
  padding:5px 10px;
  border-radius:5px;
  cursor:pointer;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:15px;
  padding:20px;
}
.card{
  background:#1e293b;
  border-radius:10px;
  padding:10px;
  cursor:pointer;
  text-align:center;
}
.card img{
  max-height:50px;
  margin-bottom:5px;
}
h2{
  padding:10px;
  text-align:left;
}
</style>
</head>
<body>

<header>TIEA IPTV</header>

<div class="player">
  <video id="player" controls autoplay playsinline></video>
  <button id="fullscreenBtn">ขยายจอ</button>
</div>

<nav>
  <button data-tab="sports" class="active">ตารางแข่งขันกีฬา</button>
  <button data-tab="tv">TV</button>
  <button data-tab="movie">Movie</button>
  <button data-tab="series">Series</button>
</nav>

<div id="content"></div>

<script src="channels.js"></script>
<script>
const video=document.getElementById("player");
const content=document.getElementById("content");
const fullscreenBtn=document.getElementById("fullscreenBtn");
const navButtons=document.querySelectorAll("nav button");

let lastChannel={ tv:0, movie:0, series:0, sports:0 };

function play(url){
  if(Hls.isSupported()){
    const hls=new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  }else{
    video.src=url;
  }
  video.play();
  window.scrollTo({top:0,behavior:"smooth"});
}

function showTab(tab){
  content.innerHTML="";
  navButtons.forEach(b=>b.classList.remove("active"));
  document.querySelector(`nav button[data-tab="${tab}"]`).classList.add("active");

  if(tab==="sports"){
    const h2=document.createElement("h2");
    h2.innerText="ตารางแข่งขันกีฬา";
    content.appendChild(h2);

    channels.sports.forEach(s=>{
      const div=document.createElement("div");
      div.className="card";
      div.innerHTML=`<img src="${s.logo}" alt=""><div>${s.name}</div>`;
      div.onclick=()=>play(s.url);
      content.appendChild(div);
    });

  }else{
    const items=channels[tab];
    if(!items) return;

    const grid=document.createElement("div");
    grid.className="grid";
    items.forEach((ch,i)=>{
      const div=document.createElement("div");
      div.className="card";
      div.innerHTML=`<img src="${ch.logo||''}" alt=""><div>${ch.name}</div>`;
      div.onclick=()=>{ play(ch.url); lastChannel[tab]=i; };
      grid.appendChild(div);
    });
    content.appendChild(grid);

    // เล่นช่องแรก/ล่าสุด
    if(items.length>0){
      play(items[lastChannel[tab]].url);
    }
  }
}

// เลือกแท็บ
navButtons.forEach(b=>{
  b.addEventListener("click",()=>showTab(b.dataset.tab));
});

// ขยายจอ
fullscreenBtn.onclick=()=>{
  if(video.requestFullscreen){
    video.requestFullscreen();
  }else if(video.webkitRequestFullscreen){
    video.webkitRequestFullscreen();
  }else if(video.msRequestFullscreen){
    video.msRequestFullscreen();
  }
};

// โหลดแท็บเริ่มต้น
showTab("sports");
</script>
</body>
</html>
