<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIEA IPTV</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            background: #000;
            color: #fff;
            overflow: hidden;
        }

        /* SIDEBAR */
        #menu {
            width: 220px;
            background: #111;
            padding: 15px;
            overflow-y: auto;
        }

        /* LOGO ใหม่ (ใหญ่ + กลาง) */
        .logo-box {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-box img {
            width: 180px;
            /* 🔥 ขยายใหญ่ */
            max-width: 100%;
        }

        /* ปุ่มด้านบน */
        .top-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .home-btn,
        .fullscreen-btn {
            flex: 1;
            padding: 10px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .home-btn {
            background: linear-gradient(90deg, #00c6ff, #0072ff);
        }

        .fullscreen-btn {
            background: linear-gradient(90deg, #ff512f, #dd2476);
        }

        .menu-title {
            margin-top: 10px;
            padding: 10px;
            background: #222;
            border-radius: 6px;
        }

        .menu-link {
            padding: 10px;
            margin-top: 5px;
            cursor: pointer;
            border-radius: 6px;
        }

        .menu-link:hover {
            background: #e94560;
        }

        /* PLAYER */
        #main-player {
            flex: 1;
            position: relative;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #welcome {
            text-align: center;
        }

        #welcome img {
            width: 320px;
            /* 🔥 โลโก้กลางใหญ่ */
            margin-bottom: 10px;
        }

        #iframePlayer {
            position: absolute;
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }
    </style>
</head>

<body>

    <div id="menu">

        <!-- LOGO -->
        <div class="logo-box">
            <img src="">
        </div>

        <!-- ปุ่ม -->
        <div class="top-buttons">
            <div class="home-btn" id="homeBtn">🏠 หน้าแรก</div>
            <div class="fullscreen-btn" id="fullscreenBtn">⛶ เต็มจอ</div>
        </div>

        <!-- เมนู -->
    <div class="menu-title">
        <span>ตารางแข่งขัน</span>
    </div>
    
    <div class="menu-link" data-url="https://tiea9999.github.io/tv-online/live.html" data-type="page">Ball66
    </div>
    
    <div class="menu-link" data-url="https://tiea9999.github.io/tv/DKL.html" data-type="page">DKL
    </div>
   
        <div class="menu-title">📺 ทีวี</div>
        <div class="menu-link" data-url="https://tiea9999.github.io/tv-online/ball66.html">DOOBALL</div>

        <div class="menu-title">🎬 หนัง</div>
        <div class="menu-link" data-url="https://tiea9999.github.io/tv-online/037hd.html">037HD</div>

        <div class="menu-title">📺 ซีรีส์</div>
        <div class="menu-link" data-url="https://tiea9999.github.io/tv-online/flixmono.html">FLIXMONO</div>

        <div class="menu-title">🔐 VIP</div>
        <div class="menu-link" data-url="https://tiea9999.github.io/tv-online/VIP.html" data-pass="9999">เข้า VIP</div>

    </div>

    <div id="main-player">

        <div id="welcome">
            <img src="https://www.dropbox.com/scl/fi/nfxxskq5ydbebgvs1lcfi/output_857d150a-0947-4571-a612-402b9466aa4d_512x512_1773067860534.png?rlkey=92c2e2ilfdsm12r7tajb63p5d&dl=1">
            <h1> </h1>
        </div>

        <iframe id="iframePlayer" allowfullscreen></iframe>

    </div>

    <script>
        const links=document.querySelectorAll(".menu-link");
const iframe=document.getElementById("iframePlayer");
const welcome=document.getElementById("welcome");
const homeBtn=document.getElementById("homeBtn");
const fullscreenBtn=document.getElementById("fullscreenBtn");

links.forEach(link=>{
  link.addEventListener("click",()=>{

    const url=link.dataset.url;
    const pass=link.dataset.pass;

    if(pass){
      const input=prompt("ใส่รหัส VIP");
      if(input!==pass)return;
    }

    iframe.src=url;
    iframe.style.display="block";
    welcome.style.display="none";
  });
});

// HOME
homeBtn.onclick=()=>{
  iframe.src="";
  iframe.style.display="none";
  welcome.style.display="block";
};

// FULLSCREEN
fullscreenBtn.onclick=()=>{
  const el = document.documentElement;

  if(!document.fullscreenElement){
    el.requestFullscreen();
  }else{
    document.exitFullscreen();
  }
};
    </script>

</body>

</html>
