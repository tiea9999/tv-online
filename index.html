function createStableHls(isMovie=false){return new Hls({enableWorker:false,autoStartLoad:true,startPosition:-1,lowLatencyMode:false,maxBufferLength:isMovie?16:10,maxMaxBufferLength:isMovie?24:16,backBufferLength:isMovie?12:8,maxBufferHole:.5,manifestLoadingMaxRetry:1,levelLoadingMaxRetry:1,fragLoadingMaxRetry:2,manifestLoadingRetryDelay:500,levelLoadingRetryDelay:500,fragLoadingRetryDelay:500,liveSyncDurationCount:3,liveMaxLatencyDurationCount:8,capLevelToPlayerSize:true,testBandwidth:false,startFragPrefetch:false})}
function attachPlaybackSuccessHandlers(){const ok=()=>clearFallbackTimer();video.addEventListener("playing",ok,{once:true});video.addEventListener("loadeddata",ok,{once:true});video.addEventListener("canplay",ok,{once:true})}
async function playItem(item,serverIndex=0,candidateIndex=0){currentItem=item;currentServerIndex=serverIndex;clearPlayer();const candidates=buildPlayCandidates(item,serverIndex),url=candidates[candidateIndex]||"";if(!url){setStatus("ไม่พบลิงก์เล่น");return}const lower=url.toLowerCase(),movieMode=isMovieItem(item)||currentKind==="series";function tryNextCandidateOrServer(){clearFallbackTimer();if(candidateIndex+1<candidates.length){playItem(item,serverIndex,candidateIndex+1);return}if(Array.isArray(item.servers)&&item.servers.length>serverIndex+1){playItem(item,serverIndex+1,0);return}setStatus("เล่นผ่านเว็บไม่สำเร็จ • ลองกด MX หรือ PLAYER")}showPlayer();attachPlaybackSuccessHandlers();fallbackTimer=setTimeout(()=>{if(video.readyState<2||video.currentTime===0)tryNextCandidateOrServer()},4500);if(lower.includes(".m3u8")){if(video.canPlayType("application/vnd.apple.mpegurl")){video.src=url;tryStartVideoWithSound(tryNextCandidateOrServer);video.addEventListener("error",tryNextCandidateOrServer,{once:true});return}if(Hls.isSupported()){hls=createStableHls(movieMode);hls.loadSource(url);hls.attachMedia(video);hls.on(Hls.Events.MANIFEST_PARSED,()=>tryStartVideoWithSound(tryNextCandidateOrServer));hls.on(Hls.Events.ERROR,(e,data)=>{if(data?.fatal){if(data.type===Hls.ErrorTypes.MEDIA_ERROR){try{hls.recoverMediaError();return}catch(err){}}tryNextCandidateOrServer()}});return}}video.src=url;tryStartVideoWithSound(tryNextCandidateOrServer);video.addEventListener("error",tryNextCandidateOrServer,{once:true})}
async function loadCurrentMenu(){try{setStatus("กำลังโหลดรายการ...");const list=await loadSource(currentSource,currentKind);renderGrid(list);pageTitle.textContent=currentTitle;setStatus("")}catch(e){console.error(e);setStatus("โหลดรายการไม่สำเร็จ\n"+e.message);grid.className="grid";grid.innerHTML=`<div style="padding:20px;color:#aaa">โหลดรายการไม่สำเร็จ</div>`}}
function focusFirstCard(){const target=grid.querySelector(".card")||grid.querySelector(".more-btn")||epsGrid.querySelector(".ep-btn")||document.querySelector(".menu-btn.active");if(target)target.focus()}
async function restoreReturnState(){const state=getReturnState();if(!state||!state.source)return false;try{currentSource=state.source;currentTitle=state.title||currentTitle;currentKind=state.kind||currentKind;sectionExpandState=state.expand||{};pageTitle.textContent=currentTitle;const list=await loadSource(currentSource,currentKind);renderGrid(list);if(state.mode==="episodes"&&state.seriesTitle){const found=list.find(item=>item.type==="series"&&item.title===state.seriesTitle);if(found)showEpisodes(found,false)}clearReturnState();return true}catch(e){console.error(e);clearReturnState();return false}}
function visibleFocusable(){return Array.from(document.querySelectorAll(".menu-btn,.top-btn,.more-btn,.card,.ep-btn,.player-btn")).filter(el=>{const r=el.getBoundingClientRect();return r.width&&r.height&&getComputedStyle(el).display!=="none"&&getComputedStyle(el).visibility!=="hidden"})}
function moveFocus(delta){const list=visibleFocusable();if(!list.length)return;let i=list.indexOf(document.activeElement);if(i<0)i=0;else i=Math.max(0,Math.min(list.length-1,i+delta));list[i].focus();try{list[i].scrollIntoView({block:"nearest",inline:"nearest"})}catch(e){}}
document.addEventListener("keydown",e=>{const code=e.keyCode||e.which||0;if([24,25,164,173,174,175].includes(code)){e.preventDefault();e.stopPropagation();return}if(playerWrap.style.display==="block"){showPlayerUi();if(e.key==="Escape"||e.key==="Backspace"||code===10009||code===4){e.preventDefault();closePlayer()}return}if(["ArrowDown","ArrowRight"].includes(e.key)||[20,22,39,40].includes(code)){e.preventDefault();moveFocus(1);return}if(["ArrowUp","ArrowLeft"].includes(e.key)||[19,21,37,38].includes(code)){e.preventDefault();moveFocus(-1);return}if(e.key==="Enter"||e.key==="OK"||code===13||code===23||code===66){const a=document.activeElement;if(a&&typeof a.click==="function"){e.preventDefault();a.click()}return}if(e.key==="Escape"||e.key==="Backspace"||code===10009||code===4){e.preventDefault();if(currentMode==="episodes"){epsWrap.style.display="none";listView.style.display="block";currentMode="list";currentSeries=null;clearReturnState();setTimeout(focusFirstCard,60);return}location.href=HOME_URL}},true);
document.addEventListener("touchstart",e=>{const t=e.changedTouches&&e.changedTouches[0];if(!t)return;startX=t.clientX;startY=t.clientY;ignoreTap=false},{passive:true});
document.addEventListener("touchmove",e=>{const t=e.changedTouches&&e.changedTouches[0];if(!t)return;if(Math.abs(t.clientX-startX)>12||Math.abs(t.clientY-startY)>12)ignoreTap=true},{passive:true});
document.getElementById("vipBtn").onclick=()=>{const pass=prompt("กรอกรหัส VIP");if(pass==="1234")location.href="https://tiea9999.github.io/tv-online/VIP.html";else if(pass!==null)alert("รหัสไม่ถูกต้อง")};
menuButtons.forEach(btn=>{btn.onclick=async()=>{menuButtons.forEach(b=>b.classList.remove("active"));btn.classList.add("active");if(btn.dataset.link){location.href=btn.dataset.link;return}historyStack=[];currentSeries=null;sectionExpandState={};clearReturnState();currentSource=btn.dataset.source||"";currentTitle=btn.dataset.title||btn.textContent.trim();currentKind=btn.dataset.kind||"tv";pageTitle.textContent=currentTitle;closePlayer();await loadCurrentMenu()}});
document.getElementById("reloadBtn").onclick=async()=>{cache={};await loadCurrentMenu()};
document.getElementById("backBtn").onclick=async()=>{closePlayer();if(currentMode==="episodes"){epsWrap.style.display="none";listView.style.display="block";currentMode="list";currentSeries=null;clearReturnState();setTimeout(focusFirstCard,60);return}const prev=historyStack.pop();if(prev&&prev.source){currentSource=prev.source;currentTitle=prev.title;currentKind=prev.kind||currentKind;pageTitle.textContent=currentTitle;currentSeries=null;await loadCurrentMenu()}};
document.getElementById("playerHomeBtn").onclick=()=>{location.href=HOME_URL};
document.getElementById("playerCloseBtn").onclick=closePlayer;
document.getElementById("playerExternalBtn").onclick=()=>openExternalPlayer(getPlayableUrl(currentItem,currentServerIndex));
document.getElementById("playerMxBtn").onclick=()=>openMx(getPlayableUrl(currentItem,currentServerIndex));
["mousemove","mousedown","touchstart"].forEach(evt=>playerWrap.addEventListener(evt,()=>{if(playerWrap.style.display==="block")showPlayerUi()}));
window.addEventListener("pageshow",async()=>{const restored=await restoreReturnState();if(!restored&&!grid.innerHTML.trim())loadCurrentMenu()});
restoreReturnState().then(restored=>{if(!restored)loadCurrentMenu()});
</script>
