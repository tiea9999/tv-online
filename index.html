<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIEA IPTV PRO</title>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-analytics.js";
  import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // 🔹 Firebase Config
  const firebaseConfig = {
    apiKey: "AIzaSyD56tjCIPBM3nctC5P2NzBgLOShcbx1w8A",
    authDomain: "tiea-iptv.firebaseapp.com",
    projectId: "tiea-iptv",
    storageBucket: "tiea-iptv.firebasestorage.app",
    messagingSenderId: "1031384335454",
    appId: "1:1031384335454:web:34e41ad2d93705834920cf",
    measurementId: "G-Z9G1KQJ3HB"
  };

  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
  const db = getFirestore(app);

  window.loadData = async function(type){
    document.getElementById("playerBox").style.display="none";
    const querySnapshot = await getDocs(collection(db, type));
    let html = "";

    querySnapshot.forEach(doc => {
      const data = doc.data();
      if(type === "series"){
        html += `
          <div class="card" onclick="showEpisodes('${doc.id}')">
            <img src="${data.image}">
            <div>${data.name}</div>
          </div>
        `;
      } else {
        html += `
          <div class="card" onclick="play('${data.url}')">
            <img src="${data.image}">
            <div>${data.name}</div>
          </div>
        `;
      }
    });

    document.getElementById("content").innerHTML = html;
  }

  // 🔹 Player
  window.play = function(url){
    document.getElementById("content").innerHTML="";
    document.getElementById("playerBox").style.display="block";
    let video = document.getElementById("video");
    video.pause();
    video.src = url;
    video.volume = 0.8;
    video.play();
  }

  // 🔹 ซีรีย์ Episodes
  window.showEpisodes = async function(docId){
    const docRef = await getDocs(collection(db, "series"));
    const docSnap = docRef.docs.find(d => d.id === docId);
    const episodes = docSnap.data().episodes;
    let html = `<h2>${docSnap.data().name}</h2>`;
    episodes.forEach(ep => {
      html += `<div class="card" onclick="play('${ep.url}')"><div>${ep.ep}</div></div>`;
    });
    document.getElementById("content").innerHTML = html;
  }

</script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{display:flex;height:100vh;background:#000;color:#fff;}
#menu{width:230px;background:#111;padding:10px;overflow-y:auto;}
.menu-title{padding:10px;margin-top:10px;background:#e94560;border-radius:6px;cursor:pointer;text-align:center;}
#main{flex:1;position:relative;}
.grid{display:flex;flex-wrap:wrap;gap:12px;padding:15px;justify-content:center;overflow:auto;height:100%;}
.card{width:110px;cursor:pointer;text-align:center;}
.card img{width:100%;border-radius:10px;}
#playerBox{position:absolute;top:0;left:0;width:100%;height:100%;display:none;background:#000;}
video{width:100%;height:100%;}
</style>

</head>
<body>

<!-- MENU -->
<div id="menu">
  <div class="menu-title" onclick="loadData('movies')">🎬 หนัง</div>
  <div class="menu-title" onclick="loadData('series')">📺 ซีรีส์</div>
  <div class="menu-title" onclick="loadData('vip')">🔐 VIP</div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="content" class="grid"><h2>เลือกเมนู</h2></div>
  <div id="playerBox"><video id="video" controls autoplay></video></div>
</div>

</body>
</html>
