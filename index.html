<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>TIEA IPTV TV MODE</title>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>

    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            background: #0b0b0b;
            color: #fff;
            font-family: sans-serif;
            overflow: hidden;
        }

        .app {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        .sidebar {
            width: 240px;
            background: #111;
            border-right: 1px solid #222;
            padding: 14px 10px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .brand {
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: #00e5ff;
            margin-bottom: 14px;
        }

        .menu-btn {
            width: 100%;
            background: #1a1a1a;
            border: 0;
            color: #fff;
            border-radius: 12px;
            padding: 14px 12px;
            margin-bottom: 10px;
            text-align: left;
            font-size: 16px;
            cursor: pointer;
            outline: none;
        }

        .menu-btn:focus,
        .menu-btn.active:focus,
        .menu-btn.active {
            background: #00c853;
            color: #fff;
            box-shadow: 0 0 0 3px rgba(255, 255, 255, .18);
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 14px;
            background: #0b0b0b;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .title {
            font-size: 22px;
            font-weight: bold;
            color: #00e5ff;
        }

        .subtext {
            font-size: 14px;
            color: #bbb;
        }

        .action-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .top-btn,
        .back-btn {
            background: #1c1c1c;
            border: 0;
            color: #fff;
            border-radius: 12px;
            padding: 12px 14px;
            cursor: pointer;
            font-size: 14px;
            outline: none;
        }

        .top-btn:focus,
        .back-btn:focus {
            background: #2196f3;
            box-shadow: 0 0 0 3px rgba(255, 255, 255, .18);
        }

        .status-box {
            display: none;
            background: rgba(255, 255, 255, .08);
            color: #fff;
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 12px;
            font-size: 14px;
        }

        #topExtra {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }

        .card {
            background: #171717;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            outline: none;
            min-height: 210px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card:focus {
            box-shadow: 0 0 0 4px #00e5ff;
            transform: scale(1.02);
        }

        .thumb {
            width: 100%;
            height: 150px;
            background: #000;
            object-fit: contain;
        }

        .card-title {
            padding: 10px 8px 12px;
            font-size: 14px;
            text-align: center;
            line-height: 1.35;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .empty {
            padding: 30px 10px;
            text-align: center;
            color: #aaa;
        }

        #playerWrap {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: none;
        }

        #videoPlayer {
            width: 100%;
            height: 100%;
            background: #000;
            object-fit: contain;
        }

        #playerUi {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 10001;
            pointer-events: none;
        }

        #playerLeft,
        #playerRight {
            display: flex;
            gap: 8px;
            pointer-events: auto;
            flex-wrap: wrap;
        }

        .player-btn {
            border: 0;
            border-radius: 12px;
            padding: 12px 14px;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            outline: none;
        }

        .player-btn:focus {
            box-shadow: 0 0 0 3px rgba(255, 255, 255, .2);
        }

        .home-btn { background: #2196f3; }
        .close-btn { background: #e53935; }
        .mx-btn { background: #ff9800; }
