<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TIEA IPTV PRO</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    :root{
      --bg:#05070b;
      --panel:#0c1016;
      --panel-2:#121824;
      --line:rgba(255,255,255,.07);
      --text:#ffffff;
      --muted:#95a1b3;
      --brand:#00e5ff;
      --green:#00c853;
      --shadow:0 10px 30px rgba(0,0,0,.35);
      --glow:0 0 18px rgba(0,229,255,.22);
      --radius:14px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:radial-gradient(circle at top,#0d1523 0%,#05070b 40%,#030406 100%);color:var(--text);font-family:Arial,sans-serif;overflow-x:hidden}
    body{min-height:100vh}

    .app{display:flex;min-height:100vh}

    .sidebar{
      width:210px;
      background:linear-gradient(180deg,rgba(14,19,29,.96),rgba(7,10,15,.98));
      backdrop-filter:blur(8px);
      padding:12px;
      flex-shrink:0;
      position:fixed;
      top:0;
      left:0;
      height:100vh;
      z-index:2000;
      transform:translateX(-172px);
      transition:transform .25s ease;
      overflow-y:auto;
      border-right:1px solid var(--line);
      box-shadow:var(--shadow);
    }
    .sidebar:hover,
    .sidebar.show{transform:translateX(0)}

    .sidebar-handle{
      position:fixed;
      left:0;
      top:50%;
      transform:translateY(-50%);
      width:18px;
      height:98px;
      background:linear-gradient(180deg,#00e5ff,#00c853);
      border-radius:0 12px 12px 0;
      z-index:2100;
      box-shadow:0 0 20px rgba(0,229,255,.35);
    }

    .brand{
      text-align:center;
      font-size:24px;
      font-weight:800;
      color:var(--brand);
      margin-bottom:14px;
      letter-spacing:.5px;
      text-shadow:0 0 12px rgba(0,229,255,.25);
    }

    .menu-btn,.top-btn,.ep-btn{
      width:100%;
      border:0;
      border-radius:12px;
      background:linear-gradient(180deg,#1a2330,#111722);
      color:#fff;
      padding:12px;
      margin-bottom:8px;
      cursor:pointer;
      text-align:left;
      font-size:15px;
      transition:.18s ease;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.03);
    }
    .menu-btn:hover,.top-btn:hover,.ep-btn:hover{transform:translateY(-1px)}
    .menu-btn.active,.menu-btn:focus,.top-btn:focus,.ep-btn:focus{
      background:linear-gradient(180deg,#00d26a,#00b352);
      outline:none;
      color:#fff;
      box-shadow:0 0 18px rgba(0,200,83,.28);
    }

    .main{
      flex:1;
      padding:16px;
      margin-left:40px;
    }

    .hero{
      background:linear-gradient(135deg,rgba(0,229,255,.12),rgba(0,200,83,.10),rgba(255,255,255,.03));
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px;
      margin-bottom:14px;
      box-shadow:var(--shadow);
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      align-items:flex-start;
    }
    .title{
      font-size:26px;
      font-weight:800;
      color:var(--brand);
      text-shadow:0 0 12px rgba(0,229,255,.22);
    }
    .sub{
      color:var(--muted);
      font-size:13px;
      margin-top:4px;
      line-height:1.45;
    }
    .tools{display:flex;gap:8px;flex-wrap:wrap}
    .top-btn{
      width:auto;
      margin-bottom:0;
      padding:10px 14px;
      background:linear-gradient(180deg,#162030,#0e1520);
      border:1px solid var(--line);
    }

    .status{
      display:none;
      background:rgba(255,255,255,.05);
      border:1px solid var(--line);
      padding:10px 12px;
      border-radius:12px;
      margin-bottom:12px;
      font-size:14px;
      white-space:pre-wrap;
      color:#d3dceb;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
      gap:14px;
    }

    .card{
      background:linear-gradient(180deg,#121826 0%,#0a0e15 100%);
      border-radius:16px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.05);
      color:#fff;
      padding:0;
      text-align:left;
      cursor:pointer;
      position:relative;
      box-shadow:var(--shadow);
      transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }
    .card:hover,
    .card:focus{
      transform:translateY(-3px) scale(1.01);
      outline:none;
      border-color:rgba(0,229,255,.28);
      box-shadow:0 10px 30px rgba(0,0,0,.42), var(--glow);
    }
    .card::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(to top,rgba(0,0,0,.66),transparent 52%);
      pointer-events:none;
      z-index:1;
    }
    .card img{
      width:100%;
      height:190px;
      object-fit:contain;
      padding:20px;
      background:
        radial-gradient(circle at top,rgba(0,229,255,.08),transparent 45%),
        radial-gradient(circle at bottom,rgba(0,200,83,.10),transparent 40%),
        linear-gradient(135deg,#101826,#05070b);
      display:block;
      filter:drop-shadow(0 0 14px rgba(0,229,255,.18));
    }
    .card.tv img{
      object-fit:contain;
      padding:14px;
      height:150px;
      background:linear-gradient(135deg,#0f1520,#05070b);
    }
    .card-title{
      position:relative;
      z-index:2;
      padding:10px 10px 12px;
      font-size:14px;
      line-height:1.4;
      min-height:48px;
      color:#f5f8ff;
      text-shadow:0 1px 2px rgba(0,0,0,.5);
    }

    .eps-wrap{display:none}
    .eps-title{
      font-size:22px;
      font-weight:800;
      color:var(--brand);
      margin:2px 0 12px;
      text-shadow:0 0 10px rgba(0,229,255,.18);
    }
    .eps-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}

    .ep-btn{
      background:linear-gradient(180deg,#141c29,#0c111a);
      border:1px solid var(--line);
      border-radius:12px;
      padding:14px 12px;
      margin-bottom:0;
      min-height:58px;
    }

    .empty{
      padding:24px;
      border:1px solid var(--line);
      border-radius:16px;
      background:rgba(255,255,255,.04);
      color:#a9b5c7;
    }

    #playerWrap{
      position:fixed;
      inset:0;
      background:#000;
      display:none;
      z-index:9999;
    }
    #videoPlayer{
      width:100%;
      height:100%;
      background:#000;
    }
    #playerBar{
      position:absolute;
      top:12px;
      left:12px;
      display:flex;
      gap:8px;
      z-index:10000;
      flex-wrap:wrap;
      opacity:1;
      transition:opacity .25s ease;
    }
    #playerBar.hide-ui{
      opacity:0;
      pointer-events:none;
    }
    .player-btn{
      border:0;
      border-radius:12px;
      padding:10px 14px;
      color:#fff;
      cursor:pointer;
      font-weight:800;
      box-shadow:var(--shadow);
    }
    .btn-home{background:#2196f3}
    .btn-close{background:#e53935}
    .btn-player{background:#009688}
    .btn-mx{background:#ff9800}

    @media (max-width:900px){
      .sidebar{width:170px;transform:translateX(-136px)}
      .main{margin-left:30px;padding:12px}
      .grid{grid-template-columns:repeat(auto-fill,minmax(128px,1fr))}
      .card img{height:165px}
      .card.tv img{height:130px}
    }

    @media (max-width:600px){
      .title{font-size:22px}
      .sub{font-size:12px}
      .grid{grid-template-columns:repeat(auto-fill,minmax(116px,1fr));gap:10px}
      .card img{height:150px;padding:16px}
      .card-title{font-size:13px}
      .eps-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr))}
    }
  </style>
</head>
<body>
  <div class="sidebar-handle" id="sidebarHandle"></div>

  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">TIEA IPTV</div>
      <button class="menu-btn" data-link="live.html">⚽ ตารางแข่งขัน</button>
      <button class="menu-btn active" data-title="📺 ทีวี" data-source="https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/M3U/Dooball.json">📺 ทีวี</button>
      <button class="menu-btn" data-title="🎬 หนัง" data-source="https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/Ezmovie.json">🎬 หนัง</button>
      <button class="menu-btn" data-title="🎞️ Flixmono" data-source="https://raw.githubusercontent.com/tiea9999/tv-online/main/Flixmono.json">📺 ซีรีส์</button>
      <button class="menu-btn" data-title="📺 Goseries" data-source="https://raw.githubusercontent.com/tiea9999/tv-online/main/Goseries.json">📺 Goseries</button>
      <button class="menu-btn" data-title="🎞️ VIP" data-source="https://raw.githubusercontent.com/tiea9999/tv-online/main/Vip.json">🎞️ VIP</button>
    </aside>

    <main class="main">
      <div class="hero">
        <div class="topbar">
          <div>
            <div id="pageTitle" class="title">📺 ทีวี</div>
            <div class="sub">ดีไซน์ใหม่แบบโปร • เมนูซ่อนอัตโนมัติ • ซีรีย์ไม่มีรูปใช้โลโก้ TIEA IPTV</div>
          </div>
          <div class="tools">
            <button id="reloadBtn" class="top-btn">รีโหลด</button>
            <button id="backBtn" class="top-btn">ย้อนกลับ</button>
          </div>
        </div>
      </div>

      <div id="statusBox" class="status"></div>

      <div id="listView">
        <div id="grid" class="grid"></div>
      </div>

      <div id="epsWrap" class="eps-wrap">
        <div id="epsTitle" class="eps-title">ตอนทั้งหมด</div>
        <div id="epsGrid" class="eps-grid"></div>
      </div>
    </main>
  </div>

  <div id="playerWrap">
    <video id="videoPlayer" controls playsinline webkit-playsinline autoplay></video>
    <div id="playerBar">
      <button id="playerHomeBtn" class="player-btn btn-home">🏠 หน้าโฮม</button>
      <button id="playerExternalBtn" class="player-btn btn-player">▶ PLAYER</button>
      <button id="playerMxBtn" class="player-btn btn-mx">▶ MX</button>
      <button id="playerCloseBtn" class="player-btn btn-close">✕ ปิด</button>
    </div>
  </div>

  <script>
    const SERIES_FALLBACK_IMAGE = "https://dl.dropboxusercontent.com/scl/fi/k77ovxc35qm0girjo43mt/logo.png?rlkey=1x7w8nk1fl6gptnt9jiaugt54";

    const grid = document.getElementById("grid");
    const epsWrap = document.getElementById("epsWrap");
    const epsGrid = document.getElementById("epsGrid");
    const epsTitle = document.getElementById("epsTitle");
    const pageTitle = document.getElementById("pageTitle");
    const statusBox = document.getElementById("statusBox");
    const listView = document.getElementById("listView");
    const playerWrap = document.getElementById("playerWrap");
    const playerBar = document.getElementById("playerBar");
    const video = document.getElementById("videoPlayer");
    const sidebar = document.getElementById("sidebar");
    const sidebarHandle = document.getElementById("sidebarHandle");

    const menuButtons = Array.from(document.querySelectorAll(".menu-btn"));
    const sourceButtons = Array.from(document.querySelectorAll(".menu-btn[data-source]"));

    let currentSource = sourceButtons[0].dataset.source;
    let currentTitle = sourceButtons[0].dataset.title;
    let currentItem = null;
    let currentServerIndex = 0;
    let currentMode = "list";
    let hls = null;
    let cache = {};
    let historyStack = [];
    let playerUiTimer = null;

    video.setAttribute("playsinline", "true");
    video.setAttribute("webkit-playsinline", "true");

    video.addEventListener("loadedmetadata", () => {
      video.muted = false;
      video.volume = 1;
    });

    video.addEventListener("canplay", () => {
      video.muted = false;
      video.volume = 1;
    });

    function setStatus(msg) {
      statusBox.textContent = msg || "";
      statusBox.style.display = msg ? "block" : "none";
    }

    function showSidebar() {
      sidebar.classList.add("show");
    }

    function hideSidebar() {
      sidebar.classList.remove("show");
    }

    function focusFirstMenu() {
      const firstMenu = document.querySelector('.sidebar .menu-btn[data-source]');
      if (firstMenu) setTimeout(() => firstMenu.focus(), 50);
    }

    sidebarHandle.addEventListener("mouseenter", showSidebar);
    sidebarHandle.addEventListener("click", showSidebar);
    sidebar.addEventListener("mouseleave", () => {
      if (currentMode === "list" && playerWrap.style.display !== "block") {
        hideSidebar();
      }
    });

    function clearPlayer() {
      if (hls) {
        try { hls.destroy(); } catch(e) {}
        hls = null;
      }
      try { video.pause(); } catch(e) {}
      video.removeAttribute("src");
      video.src = "";
      video.load();
    }

    function showPlayerUi() {
      playerBar.classList.remove("hide-ui");
      if (playerUiTimer) clearTimeout(playerUiTimer);
      playerUiTimer = setTimeout(() => {
        if (playerWrap.style.display === "block") playerBar.classList.add("hide-ui");
      }, 2500);
    }

    function showPlayer() {
      playerWrap.style.display = "block";
      showPlayerUi();
    }

    function closePlayer(focusMenu = false) {
      if (playerUiTimer) {
        clearTimeout(playerUiTimer);
        playerUiTimer = null;
      }
      clearPlayer();
      playerWrap.style.display = "none";
      playerBar.classList.remove("hide-ui");

      if (focusMenu) {
        showSidebar();
        focusFirstMenu();
      }
    }

    function openExternalPlayer(url) {
      if (!url) return;
      try {
        const u = new URL(url);
        location.href =
          "intent://" + u.host + u.pathname + u.search +
          "#Intent;scheme=" + u.protocol.replace(":", "") +
          ";action=android.intent.action.VIEW;type=video/*;end";
      } catch (e) {
        location.href = url;
      }
    }

    function openMx(url) {
      if (!url) return;
      location.href = "intent:" + url + "#Intent;package=com.mxtech.videoplayer.ad;end";
    }

    function mapServers(arr) {
      if (!Array.isArray(arr)) return [];
      return arr.map(s => ({
        name: s?.name || "",
        url: s?.url || s?.link || s?.file || s?.source || ""
      })).filter(s => s.url);
    }

    function getPlayableUrl(item, idx = 0) {
      if (!item) return "";
      if (Array.isArray(item.servers) && item.servers.length) {
        return item.servers[idx]?.url || item.servers[0]?.url || "";
      }
      return item.url || item.link || item.stream || item.source || item.file || "";
    }

    function normalizeItems(data) {
      const out = [];
      const seen = new Set();

      function add(obj) {
        const key = `${obj.type}|${obj.title}|${obj.url || ""}|${obj.episodes?.length || 0}`.toLowerCase();
        if (!seen.has(key)) {
          seen.add(key);
          out.push(obj);
        }
      }

      function badTitle(title = "") {
        const t = String(title).toLowerCase().trim();
        return t === "main" || t === "backup" || t === "m3u8" || t === "master";
      }

      function walk(node, inheritedImage = "") {
        if (!node) return;

        if (Array.isArray(node)) {
          node.forEach(x => walk(x, inheritedImage));
          return;
        }

        if (typeof node !== "object") return;

        const img = node.image || node.poster || node.logo || node.thumb || inheritedImage || "";

        if (node.type === "menu" && Array.isArray(node.items)) {
          node.items.forEach(item => {
            add({
              title: item.title || item.name || "ไม่มีชื่อ",
              image: item.image || item.poster || item.logo || "",
              url: item.source || item.url || item.link || "",
              servers: [],
              episodes: [],
              type: "source"
            });
          });
          return;
        }

        if (Array.isArray(node.episodes) && node.episodes.length) {
          add({
            title: node.title || node.name || "ไม่มีชื่อ",
            image: img,
            url: node.url || node.link || node.source || "",
            servers: [],
            type: "series",
            episodes: node.episodes.map((ep, i) => ({
              title: ep.title || ep.name || ep.ep_name || `EP${i + 1}`,
              image: ep.image || ep.poster || img || "",
              url: ep.url || ep.link || ep.source || ep.stream || ep.file || "",
              servers: mapServers(ep.servers)
            }))
          });
          return;
        }

        const title = node.title || node.name || node.ep_name || node.episode || "";
        const url = node.url || node.link || node.stream || node.source || node.file || "";
        const servers = mapServers(node.servers);

        if (title && !badTitle(title) && (url || servers.length)) {
          add({
            title,
            image: img,
            url: url || servers[0]?.url || "",
            servers: [],
            episodes: [],
            type: "video"
          });
        }

        Object.values(node).forEach(v => {
          if (Array.isArray(v) || (v && typeof v === "object")) walk(v, img);
        });
      }

      walk(data);
      return out;
    }

    async function loadSource(sourceUrl) {
      if (cache[sourceUrl]) return cache[sourceUrl];

      const lower = sourceUrl.toLowerCase();

      if (lower.endsWith(".m3u8") && !lower.includes(".json")) {
        const direct = [{
          title: "Live Stream",
          image: "",
          url: sourceUrl,
          servers: [],
          episodes: [],
          type: "video"
        }];
        cache[sourceUrl] = direct;
        return direct;
      }

      const res = await fetch(sourceUrl);
      if (!res.ok) throw new Error("โหลดไฟล์ไม่สำเร็จ: " + res.status);

      const text = await res.text();
      const trimmed = text.trim();
      if (!trimmed) return [];

      let result = [];

      if (trimmed.startsWith("{") || trimmed.startsWith("[")) {
        result = normalizeItems(JSON.parse(text));
      } else if (trimmed.includes("#EXTM3U") || trimmed.includes("#EXTINF")) {
        const lines = text.split(/\r?\n/);
        let current = null;

        for (const raw of lines) {
          const line = raw.trim();
          if (!line) continue;

          if (line.startsWith("#EXTINF:")) {
            const logoMatch = line.match(/tvg-logo="([^"]*)"/i);
            const name = line.split(",").pop()?.trim() || "ไม่มีชื่อ";
            current = {
              title: name,
              image: logoMatch ? logoMatch[1] : "",
              url: "",
              servers: [],
              episodes: [],
              type: "video"
            };
          } else if (!line.startsWith("#") && current) {
            current.url = line;
            result.push(current);
            current = null;
          }
        }
      }

      cache[sourceUrl] = result;
      return result;
    }

    function renderGrid(list) {
      currentMode = "list";
      listView.style.display = "block";
      epsWrap.style.display = "none";
      grid.innerHTML = "";

      if (!list.length) {
        grid.innerHTML = `<div class="empty">ไม่พบรายการ</div>`;
        return;
      }

      const isTV = currentTitle.includes("ทีวี");
      let finalList = list;

      if (isTV) {
        const seen = new Set();
        finalList = list.filter(item => {
          const title = String(item.title || "").toLowerCase();

          if (
            title.includes("backup") ||
            title.includes("bkp") ||
            title.includes("สำรอง") ||
            title.includes("main") ||
            title.includes("m3u8")
          ) return false;

          const key = title.replace(/[^a-z0-9ก-๙]/gi, "");
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        });
      }

      finalList.forEach(item => {
        const card = document.createElement("button");
        card.className = "card" + (isTV ? " tv" : "");
        card.type = "button";

        const isSeriesCard =
          currentTitle.includes("Flixmono") ||
          currentTitle.includes("Goseries") ||
          currentTitle.includes("ซีรีส์");

        const imgSrc = item.image || (isSeriesCard ? SERIES_FALLBACK_IMAGE : "");
        const fallback = SERIES_FALLBACK_IMAGE.replace(/'/g, "\\'");

        card.innerHTML = `
          ${imgSrc
            ? `<img src="${imgSrc}" alt="" loading="lazy" onerror="this.onerror=null;this.src='${fallback}'">`
            : `<div style="height:${isTV ? 150 : 190}px;background:linear-gradient(135deg,#101826,#05070b)"></div>`
          }
          <div class="card-title">${item.title || "ไม่มีชื่อ"}</div>
        `;

        const runOpen = async () => {
          if (item.type === "source") {
            historyStack.push({ title: currentTitle, source: currentSource, mode: currentMode });
            currentSource = item.url;
            currentTitle = item.title || currentTitle;
            pageTitle.textContent = currentTitle;
            await loadCurrentMenu();
            return;
          }

          if (item.type === "series" && item.episodes && item.episodes.length) {
            historyStack.push({ title: currentTitle, source: currentSource, mode: currentMode });
            showEpisodes(item);
            hideSidebar();
            return;
          }

          playItem(item, 0);
          hideSidebar();
        };

        card.onclick = runOpen;
        card.onmousedown = (e) => {
          e.preventDefault();
          runOpen();
        };
        card.ontouchstart = () => runOpen();

        grid.appendChild(card);
      });
    }

    function showEpisodes(seriesItem) {
      currentMode = "episodes";
      listView.style.display = "none";
      epsWrap.style.display = "block";
      epsTitle.textContent = seriesItem.title || "ตอนทั้งหมด";
      epsGrid.innerHTML = "";

      const eps = Array.isArray(seriesItem.episodes) ? [...seriesItem.episodes].reverse() : [];

      if (!eps.length) {
        epsGrid.innerHTML = `<div class="empty">ไม่พบตอน</div>`;
        return;
      }

      eps.forEach((ep, i) => {
        const btn = document.createElement("button");
        btn.className = "ep-btn";
        btn.type = "button";
        btn.textContent = ep.title || `EP${i + 1}`;

        const runPlay = () => playItem(ep, 0);

        btn.onclick = runPlay;
        btn.onmousedown = (e) => {
          e.preventDefault();
          runPlay();
        };
        btn.ontouchstart = (e) => {
          e.preventDefault();
          runPlay();
        };
        btn.onkeydown = (e) => {
          if (e.key === "Enter" || e.key === " " || e.keyCode === 13 || e.keyCode === 32 || e.keyCode === 23) {
            e.preventDefault();
            runPlay();
          }
        };
        btn.onkeyup = (e) => {
          if (e.key === "Enter" || e.key === " " || e.keyCode === 13 || e.keyCode === 32 || e.keyCode === 23) {
            e.preventDefault();
            runPlay();
          }
        };

        epsGrid.appendChild(btn);
      });

      setTimeout(() => {
        const firstBtn = epsGrid.querySelector(".ep-btn");
        if (firstBtn) {
          firstBtn.focus();
          firstBtn.scrollIntoView({ block: "center" });
        }
      }, 100);
    }

    function tryStartVideoWithSound() {
      video.muted = false;
      video.volume = 1;
      const p = video.play();
      if (p && typeof p.then === "function") p.catch(() => {});
    }

    async function detectStreamType(url) {
      try {
        const res = await fetch(url);
        const text = await res.text();
        const trimmed = text.trim();

        if (trimmed.startsWith("#EXTM3U") || trimmed.includes("#EXT-X-STREAM-INF")) return "hls";
        if (trimmed.startsWith("<!DOCTYPE html") || trimmed.startsWith("<html")) return "html";
        return "unknown";
      } catch (e) {
        return "unknown";
      }
    }

    function createPlayerHls() {
      return new Hls({
        enableWorker: true,
        autoStartLoad: true,
        maxBufferLength: 20,
        maxMaxBufferLength: 30
      });
    }

    async function playByWebStyle(url) {
      const lower = url.toLowerCase();

      if (lower.includes(".m3u8")) {
        showPlayer();
        if (Hls.isSupported()) {
          hls = createPlayerHls();
          hls.loadSource(url);
          hls.attachMedia(video);
          hls.on(Hls.Events.MANIFEST_PARSED, () => tryStartVideoWithSound());
          hls.on(Hls.Events.ERROR, () => {});
        }
        return true;
      }

      if (lower.match(/\.(mp4|mkv|avi|mov)$/)) {
        showPlayer();
        video.src = url;
        tryStartVideoWithSound();
        return true;
      }

      const detected = await detectStreamType(url);

      if (detected === "hls") {
        showPlayer();
        if (Hls.isSupported()) {
          hls = createPlayerHls();
          hls.loadSource(url);
          hls.attachMedia(video);
          hls.on(Hls.Events.MANIFEST_PARSED, () => tryStartVideoWithSound());
          hls.on(Hls.Events.ERROR, () => {});
        }
        return true;
      }

      return false;
    }

    async function playItem(item, serverIndex = 0) {
      currentItem = item;
      currentServerIndex = serverIndex;
      clearPlayer();

      const url = getPlayableUrl(item, serverIndex);
      if (!url) {
        setStatus("ไม่พบลิงก์เล่น");
        return;
      }

      const lower = url.toLowerCase();
      const isMovie = currentTitle.includes("หนัง");
      const isSeries =
        currentTitle.includes("Flixmono") ||
        currentTitle.includes("Goseries") ||
        currentTitle.includes("ซีรีส์") ||
        (item.title || "").toUpperCase().includes("EP");

      if (isMovie || isSeries) {
        const played = await playByWebStyle(url);
        if (!played) {
          if (
            lower.includes("/play/") ||
            lower.includes("/embed/") ||
            lower.includes("ok-hd.com/play/") ||
            lower.includes("top-cdn.com/play/")
          ) {
            location.href = url;
            return;
          }

          setStatus("ลิงก์นี้เล่นในเว็บไม่ได้ ลองกด PLAYER หรือ MX");
          currentItem = item;
          currentServerIndex = serverIndex;
        }
        return;
      }

      if (lower.includes(".m3u8")) {
        showPlayer();
        if (Hls.isSupported()) {
          hls = createPlayerHls();
          hls.loadSource(url);
          hls.attachMedia(video);
          hls.on(Hls.Events.MANIFEST_PARSED, () => tryStartVideoWithSound());
          hls.on(Hls.Events.ERROR, () => {});
        }
        return;
      }

      if (lower.match(/\.(mp4|mkv|avi|mov)$/)) {
        showPlayer();
        video.src = url;
        tryStartVideoWithSound();
        return;
      }

      location.href = url;
    }

    async function loadCurrentMenu() {
      try {
        setStatus("กำลังโหลดรายการ...");
        const list = await loadSource(currentSource);
        renderGrid(list);
        pageTitle.textContent = currentTitle;
        setStatus("");
      } catch (e) {
        console.error(e);
        setStatus("โหลดรายการไม่สำเร็จ\n" + e.message);
        grid.innerHTML = `<div class="empty">โหลดรายการไม่สำเร็จ</div>`;
      }
    }

    menuButtons.forEach(btn => {
      btn.onclick = async () => {
        menuButtons.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");

        if (btn.dataset.link) {
          location.href = btn.dataset.link;
          return;
        }

        historyStack = [];
        currentSource = btn.dataset.source || "";
        currentTitle = btn.dataset.title || btn.textContent.trim();
        pageTitle.textContent = currentTitle;
        closePlayer();
        await loadCurrentMenu();
      };
    });

    document.getElementById("reloadBtn").onclick = loadCurrentMenu;

    document.getElementById("backBtn").onclick = async () => {
      if (playerWrap.style.display === "block") {
        closePlayer(true);
        return;
      }

      if (currentMode === "episodes") {
        epsWrap.style.display = "none";
        listView.style.display = "block";
        currentMode = "list";
        showSidebar();
        focusFirstMenu();
        return;
      }

      const prev = historyStack.pop();
      if (prev && prev.source) {
        currentSource = prev.source;
        currentTitle = prev.title;
        pageTitle.textContent = currentTitle;
        await loadCurrentMenu();
        showSidebar();
        focusFirstMenu();
      } else {
        showSidebar();
        focusFirstMenu();
      }
    };

    document.getElementById("playerHomeBtn").onclick = () => {
      closePlayer();
      epsWrap.style.display = "none";
      listView.style.display = "block";
      currentMode = "list";
      showSidebar();
      focusFirstMenu();
    };

    document.getElementById("playerCloseBtn").onclick = () => closePlayer(true);

    document.getElementById("playerExternalBtn").onclick = () => {
      const url = getPlayableUrl(currentItem, currentServerIndex);
      openExternalPlayer(url);
    };

    document.getElementById("playerMxBtn").onclick = () => {
      const url = getPlayableUrl(currentItem, currentServerIndex);
      openMx(url);
    };

    ["mousemove", "mousedown", "touchstart"].forEach(evt => {
      playerWrap.addEventListener(evt, () => {
        if (playerWrap.style.display === "block") showPlayerUi();
      });
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft" || e.keyCode === 37) {
        if (playerWrap.style.display !== "block" && currentMode === "list") showSidebar();
      }

      if (e.key === "ArrowRight" || e.keyCode === 39) {
        if (playerWrap.style.display !== "block") hideSidebar();
      }

      if (e.key === "Escape" || e.key === "Backspace" || e.keyCode === 10009) {
        if (playerWrap.style.display === "block") {
          e.preventDefault();
          closePlayer(true);
          return;
        }

        if (currentMode === "episodes") {
          e.preventDefault();
          epsWrap.style.display = "none";
          listView.style.display = "block";
          currentMode = "list";
          showSidebar();
          focusFirstMenu();
          return;
        }
      }

      if (playerWrap.style.display === "block") showPlayerUi();
    });

    loadCurrentMenu();
  </script>
</body>
</html>
