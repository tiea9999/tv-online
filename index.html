<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIEA IPTV</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{display:flex;height:100vh;background:#000;color:#fff;overflow:hidden;}
#menu{width:220px;background:#111;padding:15px;overflow-y:auto;z-index:10;}
.menu-link{padding:10px;margin-bottom:5px;cursor:pointer;border-radius:6px;display:none;}
.menu-link:hover{background:#e94560;}
.menu-title{margin-top:10px;padding:10px;font-weight:bold;background:#222;border-radius:6px;cursor:pointer;}
#main-player{flex:1;position:relative;display:flex;justify-content:center;align-items:center;background:#000;}
#welcome{text-align:center;pointer-events:none;}
#iframePlayer{position:absolute;width:100%;height:100%;border:none;opacity:0;transition:0.3s;}
#floatingPlayer{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:none;z-index:9999;}
#playerControls{position:absolute;top:10px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:10;}
#playerControls button{background:rgba(0,0,0,0.6);border:none;color:#fff;padding:8px 12px;border-radius:8px;cursor:pointer;}
#playerControls button:hover{background:red;}
#floatFrame{width:100%;height:100%;border:none;}
</style>
</head>
<body>

<div id="menu">
  <div class="menu-title">📺 ทีวี</div>
  <div class="menu-link" data-url="https://tiea9999.github.io/tv-online/ball66.html">DOOBALL</div>

  <div class="menu-title">🎬 หนัง</div>
  <div class="menu-link" data-url="https://tiea9999.github.io/tv-online/ezmovie.html">EZMOVIE</div>

  <div class="menu-title">📺 ซีรีส์</div>
  <div class="menu-link" data-url="https://tiea9999.github.io/tv-online/goseries4k.html">GOSERIES</div>

  <div class="menu-title">🔐 VIP</div>
  <div class="menu-link" data-url="https://tiea9999.github.io/tv-online/VIP.html" data-pass="9999">เข้า VIP</div>
</div>

<div id="main-player">
  <div id="welcome">
    <img src="https://www.dropbox.com/scl/fi/nfxxskq5ydbebgvs1lcfi/output_857d150a-0947-4571-a612-402b9466aa4d_512x512_1773067860534.png?rlkey=92c2e2ilfdsm12r7tajb63p5d&dl=1">
  </div>
  <iframe id="iframePlayer" allow="autoplay; fullscreen; encrypted-media" allowfullscreen></iframe>
</div>

<div id="floatingPlayer">
  <div id="playerControls">
    <button id="btnBack">⏪</button>
    <button id="btnForward">⏩</button>
    <button id="btnReload">🔄</button>
    <button id="btnFullscreen">⛶</button>
    <button id="closePlayer">✕</button>
  </div>
  <iframe id="floatFrame" allowfullscreen></iframe>
</div>

<script>
const links = document.querySelectorAll(".menu-link");
const iframe = document.getElementById("iframePlayer");
const welcome = document.getElementById("welcome");
const floatPlayer = document.getElementById("floatingPlayer");
const floatFrame = document.getElementById("floatFrame");
let historyStack = [], historyIndex = -1;

// Accordion Menu
const titles = document.querySelectorAll(".menu-title");
titles.forEach(title => {
  title.addEventListener("click", () => {
    links.forEach(link => link.style.display = "none");
    let next = title.nextElementSibling;
    while(next && next.classList.contains("menu-link")){
      next.style.display = "block";
      next = next.nextElementSibling;
    }
  });
});

// ฟังก์ชันตั้ง volume สำหรับ iframe/video + retry
function trySetVolume(frame, vol, tries=10, delay=300){
  if(tries<=0) return;
  try{
    const vids = frame.contentWindow.document.querySelectorAll("video");
    if(vids.length){
      vids.forEach(v=>{v.muted=false; v.volume=vol; v.play().catch(()=>{});});
    }else{
      setTimeout(()=>trySetVolume(frame, vol, tries-1, delay), delay);
    }
  }catch(e){
    setTimeout(()=>trySetVolume(frame, vol, tries-1, delay), delay);
  }
}

// กดเล่นรายการ
links.forEach(link => {
  link.addEventListener("click", () => {
    const url = link.dataset.url;
    const pass = link.dataset.pass;

    // VIP PASSWORD
    if(pass){
      const input = prompt("กรุณาใส่รหัส VIP");
      if(input !== pass){ alert("รหัสไม่ถูกต้อง"); return; }
    }

    // Floating Player: หนัง/ซีรีส์/VIP
    if(url.includes("037hd") || url.includes("flixmono") || url.includes("VIP") || url.includes("goseries4k")){
      floatFrame.src = url;
      floatPlayer.style.display = "block";
      trySetVolume(floatFrame, 0.8); // <-- volume 80% อัตโนมัติ
      historyStack = historyStack.slice(0, historyIndex+1);
      historyStack.push(url);
      historyIndex++;
      return;
    }

    // TV
    let finalUrl = url;
    if(url.includes("iptv") || url.includes("3bb")){
      finalUrl += (url.includes("?")?"&":"?")+"autoplay=1&muted=0";
    }

    iframe.style.opacity = 0;
    setTimeout(()=>{ iframe.src = finalUrl; }, 100);
    iframe.onload = ()=>{
      iframe.style.opacity = 1;
      welcome.style.display = "none";
      trySetVolume(iframe, 0.8);
    };
  });
});

// คลิกครั้งเดียวเปิดเสียง body
document.body.addEventListener("click", ()=>{
  const vids = document.querySelectorAll("video");
  vids.forEach(v=>{v.muted=false; v.volume=0.8; v.play().catch(()=>{});});
},{once:true});

// Controls
document.getElementById("closePlayer").onclick = () => { floatPlayer.style.display="none"; floatFrame.src=""; };
document.getElementById("btnBack").onclick = () => { if(historyIndex>0){ historyIndex--; floatFrame.src=historyStack[historyIndex]; trySetVolume(floatFrame,0.8); } };
document.getElementById("btnForward").onclick = () => { if(historyIndex<historyStack.length-1){ historyIndex++; floatFrame.src=historyStack[historyIndex]; trySetVolume(floatFrame,0.8); } };
document.getElementById("btnReload").onclick = () => { floatFrame.src=floatFrame.src; trySetVolume(floatFrame,0.8); };
document.getElementById("btnFullscreen").onclick = () => { if(floatFrame.requestFullscreen){ floatFrame.requestFullscreen(); } };
</script>

</body>
</html>
