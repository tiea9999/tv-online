<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIEA IPTV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  background:#05070b;
  color:#fff;
  font-family:sans-serif;
}

/* ===== Sidebar ===== */
.sidebar{
  width:210px;
  position:fixed;
  top:0;
  left:0;
  height:100vh;
  background:#0c1016;
  padding:10px;
  transform:translateX(-150px); /* ✅ ไม่บังแล้ว */
  transition:.25s;
  z-index:999;
}
.sidebar:hover,.sidebar.show{
  transform:translateX(0);
}

.sidebar-handle{
  position:fixed;
  left:0;
  top:50%;
  transform:translateY(-50%);
  width:24px;  /* ✅ จับง่ายขึ้น */
  height:110px;
  background:linear-gradient(#00e5ff,#00c853);
  border-radius:0 10px 10px 0;
  z-index:1000;
}

.brand{
  text-align:center;
  color:#00e5ff;
  font-size:22px;
  font-weight:bold;
  margin-bottom:10px;
}

.menu-btn{
  width:100%;
  padding:12px;
  margin-bottom:8px;
  background:#1b2330;
  border:0;
  border-radius:10px;
  color:#fff;
}

/* ===== Main ===== */
.main{
  margin-left:70px; /* ✅ ดันออก ไม่โดนบัง */
  padding:14px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:14px;
  padding-left:6px; /* ✅ กันชนเพิ่ม */
}

/* ===== Card ===== */
.card{
  background:#111;
  border-radius:14px;
  overflow:hidden;
  border:1px solid #222;
  transition:.2s;
  cursor:pointer;
  position:relative;
}

.card img{
  width:100%;
  height:170px;
  object-fit:contain;
  padding:15px;
  transition:.2s;
}

/* 🔥 เอฟเฟกลอย */
.card:hover img,
.card:focus img{
  transform:translateY(-12px) scale(1.08);
  filter:drop-shadow(0 0 18px gold);
}

/* 🔥 กรอบเหลือง */
.card:focus{
  outline:5px solid gold;
  transform:scale(1.08);
  z-index:10;
}

.card-title{
  padding:8px;
  font-size:14px;
}

/* ===== Player ===== */
#playerWrap{
  position:fixed;
  inset:0;
  background:#000;
  display:none;
  z-index:9999;
}
#videoPlayer{
  width:100%;
  height:100%;
}

/* ===== Focus Menu ===== */
.menu-btn:focus{
  outline:4px solid gold;
}
</style>
</head>

<body>

<div class="sidebar-handle"></div>

<div class="sidebar">
  <div class="brand">TIEA IPTV</div>
  <button class="menu-btn">📺 ทีวี</button>
  <button class="menu-btn">🎬 หนัง</button>
  <button class="menu-btn">📺 ซีรีส์</button>
  <button class="menu-btn">📺 Goseries</button>
  <button class="menu-btn">🎞️ VIP</button>
</div>

<div class="main">
  <div class="grid">

    <div class="card" tabindex="0">
      <img src="https://dl.dropboxusercontent.com/scl/fi/k77ovxc35qm0girjo43mt/logo.png">
      <div class="card-title">ตัวอย่างช่อง</div>
    </div>

    <div class="card" tabindex="0">
      <img src="https://dl.dropboxusercontent.com/scl/fi/k77ovxc35qm0girjo43mt/logo.png">
      <div class="card-title">ตัวอย่างช่อง</div>
    </div>

  </div>
</div>

<div id="playerWrap">
  <video id="videoPlayer" controls></video>
</div>

</body>
</html>
