<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIEA IPTV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{margin:0;background:#0b0b0b;color:#fff;font-family:sans-serif;display:flex}
.sidebar{width:220px;background:#111;padding:10px}
.menu-btn{width:100%;padding:12px;margin-bottom:10px;background:#1a1a1a;border:0;color:#fff;border-radius:10px}
.menu-btn.active{background:#00c853}
.content{flex:1;padding:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.card{background:#171717;border-radius:10px;overflow:hidden;cursor:pointer}
.card img{width:100%;height:180px;object-fit:cover}
.card-title{padding:8px;text-align:center;font-size:13px}
</style>
</head>

<body>

<div class="sidebar">
<button class="menu-btn active"
data-source="https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/M3U/Dooball.json">📺 ทีวี</button>

<button class="menu-btn"
data-source="https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/Ezmovie.json">🎬 หนัง</button>

<button class="menu-btn"
data-source="https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/Flixmono.json">📺 ซีรีส์</button>

<button class="menu-btn"
data-source="https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/Vip.json">🔐 VIP</button>

<button class="menu-btn"
onclick="location.href='live-old.html'">⚽ ตารางแข่งขัน</button>
</div>

<div class="content">
<div id="grid" class="grid"></div>
</div>

<script>

const grid = document.getElementById("grid");

// ===== MX FIX =====
function openMx(url){
    try{
        const u = new URL(url);

        const intent =
        "intent://" + u.host + u.pathname + u.search +
        "#Intent;scheme=" + u.protocol.replace(":","") +
        ";package=com.mxtech.videoplayer.ad;end";

        location.href = intent;

        setTimeout(()=>{
            location.href = intent.replace("videoplayer.ad","videoplayer.pro");
        },1000);

    }catch(e){
        console.log("MX error");
    }
}

// ===== PLAY =====
function play(url){
    if(!url) return;

    if(url.includes("master.txt")){
        openMx(url);
        return;
    }

    if(url.includes(".m3u8")){
        document.body.innerHTML = "<video id='v' controls autoplay style='width:100%;height:100%;background:#000'></video>";
        const v = document.getElementById("v");

        if(Hls.isSupported()){
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(v);
        }else{
            v.src = url;
        }
        return;
    }

    openMx(url);
}

// ===== NORMALIZE =====
function normalize(data){
    let list = [];

    if (Array.isArray(data)) {
        list = data.map(i => ({
            title: i.title || i.name || "ไม่มีชื่อ",
            img: i.poster || i.image || i.thumbnail || i.logo || "",
            url: i.url || i.stream || i.link || i.source || ""
        }));
    }

    else if (data.channels) {
        list = data.channels.map(i => ({
            title: i.name || i.title || "ไม่มีชื่อ",
            img: i.logo || i.image || "",
            url: i.url
        }));
    }

    else if (data.groups) {
        data.groups.forEach(g=>{
            (g.stations || g.items || []).forEach(i=>{
                list.push({
                    title: i.title || i.name || "ไม่มีชื่อ",
                    img: i.poster || i.image || i.logo || "",
                    url: i.url || i.stream || i.link
                });
            });
        });
    }

    else if (data.type === "menu") {
        list = data.items.map(i => ({
            title: i.title,
            img: i.poster || i.image || "",
            source: i.source,
            type: "source"
        }));
    }

    return list;
}

// ===== LOAD =====
async function load(url){
    const res = await fetch(url);
    const data = await res.json();

    const list = normalize(data);

    render(list);
}

// ===== RENDER =====
function render(list){
    grid.innerHTML = "";

    if(!list.length){
        grid.innerHTML = "ไม่พบรายการ";
        return;
    }

    list.forEach(item=>{
        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
        <img src="${item.img||''}" 
        onerror="this.src='https://via.placeholder.com/300x450?text=No+Image'">
        <div class="card-title">${item.title}</div>
        `;

        div.onclick = ()=>{
            if(item.source){
                load(item.source);
            }else{
                play(item.url);
            }
        };

        grid.appendChild(div);
    });
}

// ===== MENU =====
document.querySelectorAll(".menu-btn").forEach(btn=>{
    btn.onclick = ()=>{
        document.querySelectorAll(".menu-btn").forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");

        if(btn.dataset.source){
            load(btn.dataset.source);
        }
    };
});

// ===== INIT =====
load(document.querySelector(".menu-btn.active").dataset.source);

</script>

</body>
</html>
