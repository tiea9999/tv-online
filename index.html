<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIEA IPTV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{margin:0;background:#0b0b0b;color:#fff;font-family:sans-serif;display:flex}
.sidebar{width:220px;background:#111;padding:10px}
.menu-btn{width:100%;padding:12px;margin-bottom:10px;background:#1a1a1a;border:0;color:#fff;border-radius:10px}
.menu-btn.active{background:#00c853}
.content{flex:1;padding:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.card{background:#171717;border-radius:10px;overflow:hidden}
.card img{width:100%;height:160px;object-fit:cover}
.card-title{padding:8px;text-align:center;font-size:13px}
</style>
</head>

<body>

<div class="sidebar">
<button class="menu-btn active"
data-source="https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/M3U/Dooball.json">📺 ทีวี</button>

<button class="menu-btn"
data-source="https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/Ezmovie.json">🎬 หนัง</button>

<button class="menu-btn"
data-source="https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/Flixmono.json">📺 ซีรีส์</button>

<button class="menu-btn"
data-source="https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/Vip.json">🔐 VIP</button>

<button class="menu-btn"
onclick="location.href='live-old.html'">⚽ ตารางแข่งขัน</button>
</div>

<div class="content">
<div id="grid" class="grid"></div>
</div>

<script>
const grid = document.getElementById("grid");
let currentData = [];

// ===== MX FIX =====
function openMx(url){
    try{
        const u = new URL(url);

        const intent =
        "intent://" + u.host + u.pathname + u.search +
        "#Intent;scheme=" + u.protocol.replace(":","") +
        ";package=com.mxtech.videoplayer.ad;end";

        location.href = intent;

        setTimeout(()=>{
            location.href = intent.replace("videoplayer.ad","videoplayer.pro");
        },1000);

    }catch(e){
        console.log("MX error");
    }
}

// ===== PLAY =====
function play(url){
    if(!url) return;

    if(url.includes("master.txt")){
        openMx(url);
        return;
    }

    if(url.includes(".m3u8")){
        let v = document.createElement("video");
        v.controls = true;
        v.style.width="100%";
        document.body.innerHTML="";
        document.body.appendChild(v);

        if(Hls.isSupported()){
            let hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(v);
        }else{
            v.src=url;
        }
        v.play();
        return;
    }

    openMx(url);
}

// ===== LOAD =====
async function load(url){
    const res = await fetch(url);
    const data = await res.json();

    if(data.type==="menu"){
        currentData = data.items;
    }else{
        currentData = [];

        if(data.groups){
            data.groups.forEach(g=>{
                (g.stations||g.items||[]).forEach(i=>{
                    currentData.push({
                        title:i.title||i.name,
                        img:i.logo||i.image,
                        url:i.url
                    });
                });
            });
        }
    }

    render();
}

// ===== RENDER =====
function render(){
    grid.innerHTML="";

    currentData.forEach(item=>{
        let div=document.createElement("div");
        div.className="card";

        div.innerHTML=`
        <img src="${item.img||''}">
        <div class="card-title">${item.title}</div>
        `;

        div.onclick=()=>{
            if(item.source){
                load(item.source);
            }else{
                play(item.url);
            }
        };

        grid.appendChild(div);
    });
}

// ===== MENU =====
document.querySelectorAll(".menu-btn").forEach(btn=>{
    btn.onclick=()=>{
        document.querySelectorAll(".menu-btn").forEach(b=>b.classList.remove("active"));
        btn.classList.add("active");

        if(btn.dataset.source){
            load(btn.dataset.source);
        }
    };
});

load(document.querySelector(".menu-btn.active").dataset.source);
</script>

</body>
</html>
