<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIEA IPTV</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{margin:0;background:#111;color:white;font-family:sans-serif;display:flex;height:100vh}
.sidebar{width:200px;background:#000}
.menu-item{padding:15px;cursor:pointer}
.menu-item:hover{background:#333}

.main{flex:1;display:flex;flex-direction:column}
video{width:100%;height:250px;background:black}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
gap:10px;
padding:10px;
overflow:auto;
}

.card{
background:#222;
padding:10px;
text-align:center;
border-radius:10px;
cursor:pointer;
}
.card img{max-height:50px}

/* ปุ่มกลับ */
.back-btn{
background:#444;
font-weight:bold;
}
</style>

</head>

<body>

<div class="sidebar">
  <div class="menu-item" onclick="openLive()">🏟 ตารางแข่งขันกีฬา</div>
  <div class="menu-item" onclick="openTVMenu()">📺 TV</div>
  <div class="menu-item" onclick="openMovie()">🎬 Movie</div>
  <div class="menu-item" onclick="openSeries()">🎞 Series</div>
</div>

<div class="main">
<video id="player" controls autoplay></video>
<div id="list" class="grid"></div>
</div>

<script src="channels.js"></script>

<script>
const player = document.getElementById("player");
const list = document.getElementById("list");

let lastTV = localStorage.getItem("lastTV") || 0;

/* ▶️ PLAY */
function play(url){
  if(window.hls) window.hls.destroy();

  if(Hls.isSupported()){
    const hls = new Hls();
    window.hls = hls;
    hls.loadSource(url);
    hls.attachMedia(player);
    hls.on(Hls.Events.MANIFEST_PARSED,function(){
      player.play();
    });
  }else{
    player.src = url;
    player.play();
  }
}

/* 📺 เมนูหลัก TV */
function openTVMenu(){
  list.innerHTML = "";

  const groups = [
    {name:"Digital", key:"digital"},
    {name:"Movie", key:"movie"},
    {name:"Sport", key:"sport"},
    {name:"Kids", key:"kids"},
    {name:"Documentary", key:"documentary"}
  ];

  groups.forEach(g=>{
    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`<div style="padding:20px">${g.name}</div>`;
    div.onclick=()=>openTVGroup(g.key);
    list.appendChild(div);
  });
}

/* 📺 เปิดหมวด + ปุ่มย้อนกลับ */
function openTVGroup(group){

  list.innerHTML="";

  // 🔙 ปุ่มกลับ
  const backBtn = document.createElement("div");
  backBtn.className="card back-btn";
  backBtn.innerHTML="⬅️ กลับ";
  backBtn.onclick=openTVMenu;
  list.appendChild(backBtn);

  const data = channels.tv[group];
  if(!data) return;

  data.forEach((ch,i)=>{
    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`<img src="${ch.logo}"><div>${ch.name}</div>`;

    div.onclick=()=>{
      play(ch.url);
      localStorage.setItem("lastTV", i);
    };

    list.appendChild(div);
  });

  // ▶️ เล่นช่องแรก
  if(data[0]){
    play(data[0].url);
  }
}

/* 🏟 LIVE */
function openLive(){
  window.location.href="live.html";
}

/* 🎬 MOVIE */
function openMovie(){
  list.innerHTML=`<iframe src="movie.html" style="width:100%;height:80vh;border:none;"></iframe>`;
}

/* 🎞 SERIES */
function openSeries(){
  list.innerHTML=`<iframe src="series.html" style="width:100%;height:80vh;border:none;"></iframe>`;
}
</script>

</body>
</html>
