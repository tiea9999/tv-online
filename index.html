<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIEA IPTV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{margin:0;background:#111;color:white;font-family:sans-serif;display:flex;height:100vh}
.sidebar{width:200px;background:#000}
.menu-item{padding:15px;cursor:pointer}
.menu-item:hover{background:#333}

.main{flex:1;display:flex;flex-direction:column}

#player{
width:100%;
height:250px;
background:black;
}

.fullscreen{
position:fixed !important;
top:0;
left:0;
width:100% !important;
height:100% !important;
z-index:9999;
}

.controls{
display:flex;
gap:10px;
padding:5px;
background:#000;
}

.btn{
background:#333;
color:#fff;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
gap:10px;
padding:10px;
overflow:auto;
}

.card{
background:#222;
padding:10px;
text-align:center;
border-radius:10px;
cursor:pointer;
}
.card img{max-height:50px}

.back-btn{
background:#444;
font-weight:bold;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="menu-item" onclick="openLive()">🏟 ตารางแข่งขันกีฬา</div>
  <div class="menu-item" onclick="openTVMenu()">📺 TV</div>
  <div class="menu-item" onclick="openMovie()">🎬 Movie</div>
  <div class="menu-item" onclick="openSeries()">🎞 Series</div>
<div class="menu-item" onclick="openVip()">🎞 Vip</div>

</div>

<div class="main">

<video id="player" controls autoplay playsinline preload="auto"></video>

<div class="controls">
  <div class="btn" onclick="toggleFullscreen()">⛶ ขยายจอ</div>
</div>

<div id="list" class="grid"></div>

</div>

<script src="channels.js"></script>

<script>

const player = document.getElementById("player");
const list = document.getElementById("list");

let isFull = false;
let currentIndex = 0;
let currentSources = [];
let hls = null;

/* ================= PLAY (MULTI SERVER) ================= */
function play(source){

  // รองรับทั้ง url เดียว และหลายลิงก์
  if(Array.isArray(source)){
    currentSources = source;
  }else{
    currentSources = [source];
  }

  currentIndex = 0;
  startPlayer();
}

/* ================= START ================= */
function startPlayer(){

  let url = currentSources[currentIndex];

  if(hls){
    hls.destroy();
    hls = null;
  }

  if(Hls.isSupported()){

    hls = new Hls({

      maxBufferLength: 40,
      maxMaxBufferLength: 80,
      backBufferLength: 120,

      maxBufferHole: 0.5,
      highBufferWatchdogPeriod: 2,

      enableWorker: true,
      lowLatencyMode: false,

      capLevelToPlayerSize: true,
      startLevel: -1

    });

    hls.loadSource(url);
    hls.attachMedia(player);

    hls.on(Hls.Events.MANIFEST_PARSED, ()=>{
      player.play();
    });

    /* 🔥 ERROR HANDLER + AUTO SWITCH */
    hls.on(Hls.Events.ERROR, function(event, data){

      if(data.fatal){

        console.log("❌ error → เปลี่ยน server");

        nextSource();

      }

    });

  }else{
    player.src = url;
    player.play();
  }
}

/* ================= NEXT SERVER ================= */
function nextSource(){

  currentIndex++;

  if(currentIndex < currentSources.length){

    console.log("🔄 เปลี่ยนลิงก์:", currentIndex);
    startPlayer();

  }else{

    console.log("❌ ลิงก์หมดแล้ว");
  }
}

/* ================= FULLSCREEN ================= */
function toggleFullscreen(){
  if(!isFull){
    player.classList.add("fullscreen");
    isFull = true;
  }else{
    player.classList.remove("fullscreen");
    isFull = false;
  }
}

/* ================= MENU ================= */
function openTVMenu(){
  list.innerHTML = "";

  const groups = [
    {name:"Digital", key:"digital"},
    {name:"Movie", key:"movie"},
    {name:"Sport", key:"sport"},
    {name:"Kids", key:"kids"},
    {name:"Documentary", key:"documentary"}
  ];

  groups.forEach(g=>{
    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`<div style="padding:20px">${g.name}</div>`;
    div.onclick=()=>openTVGroup(g.key);
    list.appendChild(div);
  });
}

/* ================= GROUP ================= */
function openTVGroup(group){

  list.innerHTML="";

  const backBtn = document.createElement("div");
  backBtn.className="card back-btn";
  backBtn.innerHTML="⬅️ กลับ";
  backBtn.onclick=openTVMenu;
  list.appendChild(backBtn);

  const data = channels.tv[group];
  if(!data) return;

  data.forEach((ch,i)=>{

    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`<img src="${ch.logo}"><div>${ch.name}</div>`;

    div.onclick=()=>{

      // 🔥 รองรับ multi server
      play(ch.url);

    };

    list.appendChild(div);
  });

  if(data[0]) play(data[0].url);
}

/* ================= PAGE ================= */
function openLive(){ window.location.href="live.html"; }
function openMovie(){ window.location.href="037hd.html"; }
function openMovie(){ window.location.href="vip.html"; }  
function openSeries(){ window.location.href="https://tiea9999.github.io/tv/myseries.html"; }

</script>

</body>
</html>
