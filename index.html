<script>
const HOME_URL='https://tiea9999.github.io/tv-online/index.html';

const INITIAL_LIMIT=16;
const grid=document.getElementById('grid'),epsWrap=document.getElementById('epsWrap'),epsGrid=document.getElementById('epsGrid'),epsTitle=document.getElementById('epsTitle'),listView=document.getElementById('listView'),pageTitle=document.getElementById('pageTitle'),statusBox=document.getElementById('statusBox'),playerWrap=document.getElementById('playerWrap'),playerBar=document.getElementById('playerBar'),video=document.getElementById('videoPlayer'),menuButtons=[...document.querySelectorAll('.menu-btn')];
let currentSource='',currentTitle='TIEA IPTV',currentKind='',currentItem=null,currentServerIndex=0,currentMode='home',currentSeries=null,cache={},hls=null,sectionExpandState={},fallbackTimer=null,playerUiTimer=null,startX=0,startY=0,ignoreTap=false;
function setStatus(msg){statusBox.textContent=msg||'';statusBox.style.display=msg?'block':'none'}
function safe(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function getThumb(i){return i?.image||i?.poster||i?.thumb||i?.logo||i?.cover||''}
function mapServers(a){return Array.isArray(a)?a.map((s,i)=>({name:s?.name||`Server ${i+1}`,url:s?.url||s?.link||s?.file||s?.source||s?.stream||''})).filter(s=>s.url):[]}
function getPlayableUrl(i,idx=0){if(!i)return'';if(Array.isArray(i.servers)&&i.servers.length)return i.servers[idx]?.url||i.servers[0]?.url||'';return i.url||i.link||i.stream||i.source||i.file||''}
function normalizeGroups(n){if(Array.isArray(n?.groups)&&n.groups.length)return n.groups.filter(Boolean).map(x=>String(x).trim()).filter(Boolean);let f=n?.category||n?.group||n?.group_title||'';return f?[String(f).trim()]:[]}
function toProxyUrl(url){if(!url||url.includes(WORKER_PROXY)||!/^https?:/i.test(url)||!/\.m3u8($|\?)/i.test(url))return url;return WORKER_PROXY+encodeURIComponent(url)}
function buildPlayCandidates(item,idx=0){let direct=getPlayableUrl(item,idx);if(!direct)return[];let proxy=toProxyUrl(direct);return[...new Set([direct,proxy].filter(Boolean))]}
function normalize(input){let out=[],seen=new Set();function add(o){let k=`${o.type}|${o.title}|${o.url||''}|${o.episodes?.length||0}`.toLowerCase();if(!seen.has(k)){seen.add(k);out.push(o)}}function walk(n,img0=''){if(!n)return;if(Array.isArray(n)){n.forEach(x=>walk(x,img0));return}if(typeof n!=='object')return;let img=getThumb(n)||img0||'',title=n.title||n.name||n.channel||n.ep_name||n.episode||'ไม่มีชื่อ',url=n.url||n.link||n.stream||n.source||n.file||'',servers=mapServers(n.servers),groups=normalizeGroups(n);if(Array.isArray(n.episodes)&&n.episodes.length){add({title,image:img,url,servers:[],type:'series',category:groups[0]||'',groups,latest_ep:n.latest_ep||n.episodes.length,total_ep:n.total_ep||n.episodes.length,year:n.year||'',language:n.language||'',status:n.status||'',episodes:n.episodes.map((ep,i)=>({title:ep.title||ep.name||ep.ep_name||`EP${i+1}`,image:getThumb(ep)||img||'',url:ep.url||ep.link||ep.source||ep.stream||ep.file||'',servers:mapServers(ep.servers),type:'episode'}))});return}if(Array.isArray(n.items)&&n.items.length){n.items.forEach(x=>walk(x,img));return}if(Array.isArray(n.data)&&n.data.length){n.data.forEach(x=>walk(x,img));return}if(Array.isArray(n.channels)&&n.channels.length){n.channels.forEach(x=>walk(x,img));return}if(url||servers.length)add({title,image:img,url:url||servers[0]?.url||'',servers,type:n.type||'movie',category:groups[0]||'',groups,year:n.year||'',language:n.language||'',status:n.status||''})}walk(input);return out}
function normalizeM3U(text){let res=[],cur=null;text.split(/\r?\n/).forEach(raw=>{let line=raw.trim();if(!line)return;if(line.startsWith('#EXTINF')){let logo=(line.match(/tvg-logo="([^"]*)"/i)||[])[1]||'',group=(line.match(/group-title="([^"]*)"/i)||[])[1]||'ทีวีออนไลน์',title=line.split(',').pop()?.trim()||'ไม่มีชื่อ';cur={title,image:logo,url:'',servers:[],type:'video',category:group,groups:[group]}}else if(!line.startsWith('#')&&cur){cur.url=line;cur.servers=[{name:'Main',url:line}];res.push(cur);cur=null}});return res}
async function loadSource(url,kind){let key=kind+'|'+url;if(cache[key])return cache[key];let res=await fetch(url,{cache:'no-store'});if(!res.ok)throw new Error('โหลดไฟล์ไม่สำเร็จ: '+res.status);let text=await res.text(),t=text.trim(),result=[];if(t.startsWith('{')||t.startsWith('['))result=normalize(JSON.parse(text));else if(t.includes('#EXTM3U')||t.includes('#EXTINF'))result=normalizeM3U(text);cache[key]=result;return result}
function createCard(item,isTV,open){let c=document.createElement('button');c.className='card'+(isTV?' tv':'');c.type='button';c.tabIndex=0;let meta=[];if(item.year)meta.push(item.year);if(item.language)meta.push(item.language);if(item.category&&currentKind!=='series')meta.push(item.category);if(item.status==='ongoing'&&item.latest_ep&&item.total_ep)meta.push(`EP ${item.latest_ep}/${item.total_ep}`);let th=getThumb(item);c.innerHTML=`${th?`<img src="${safe(th)}" loading="lazy" decoding="async" onerror="this.onerror=null;this.src='https://via.placeholder.com/300x450?text=NO+IMAGE'">`:`<div style="height:${isTV?130:165}px;background:#000"></div>`}<div class="card-title">${safe(item.title)}</div>${meta.length?`<div class="card-meta">${safe(meta.join(' • '))}</div>`:''}`;c.onclick=e=>{if(ignoreTap){ignoreTap=false;e.preventDefault();return}open()};c.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();open()}};return c}
function order(cat){let t=String(cat||'');if(t.includes('ซีรี่ย์มาใหม่'))return 0;if(t.includes('จีน'))return 1;if(t.includes('ญี่ปุ่น'))return 2;if(t.includes('เกาหลี'))return 3;if(t.includes('ไทย'))return 4;if(t.includes('หนัง'))return 5;if(t.includes('ละครสั้น'))return 6;return 99}
function renderGrouped(list){grid.innerHTML='';grid.className='';let groups={};list.forEach(item=>{let cats=Array.isArray(item.groups)&&item.groups.length?item.groups:[item.category||'อื่นๆ'];cats.forEach(cat=>{if(!groups[cat])groups[cat]=[];if(!groups[cat].some(x=>x.title===item.title))groups[cat].push(item)})});Object.keys(groups).sort((a,b)=>{let oa=order(a),ob=order(b);return oa!==ob?oa-ob:a.localeCompare(b,'th')}).forEach(cat=>{let s=document.createElement('div'),head=document.createElement('div'),title=document.createElement('div'),more=document.createElement('button'),g=document.createElement('div'),items=groups[cat];s.className='section';head.className='section-head';title.className='section-title';title.textContent=cat;more.className='more-btn';more.type='button';g.className='grid';function draw(){g.innerHTML='';let exp=!!sectionExpandState[cat],shown=exp?items:items.slice(0,INITIAL_LIMIT);shown.forEach(item=>g.appendChild(createCard(item,false,()=>{if(item.type==='series'&&item.episodes?.length)showEpisodes(item);else playItem(item)})));more.textContent=exp?'ดูน้อยลง':`ดูทั้งหมด (${items.length})`;more.style.display=items.length>INITIAL_LIMIT?'block':'none'}more.onclick=()=>{sectionExpandState[cat]=!sectionExpandState[cat];draw();more.focus()};head.appendChild(title);head.appendChild(more);s.appendChild(head);s.appendChild(g);grid.appendChild(s);draw()})}
function renderGrid(list){currentMode='list';listView.style.display='block';epsWrap.style.display='none';grid.innerHTML='';if(!list.length){grid.className='grid';grid.innerHTML='<div style="padding:20px;color:#aaa">ไม่พบรายการ</div>';return}if(currentKind==='series'){renderGrouped(list);setTimeout(focusFirst,80);return}grid.className='grid';list.forEach(item=>grid.appendChild(createCard(item,currentKind==='tv',()=>{if(item.type==='series'&&item.episodes?.length)showEpisodes(item);else playItem(item)})));setTimeout(focusFirst,80)}
function showEpisodes(series){currentSeries=series;currentMode='episodes';listView.style.display='none';epsWrap.style.display='block';epsTitle.textContent=series.title||'ตอนทั้งหมด';epsGrid.innerHTML='';let eps=series.episodes||[];if(!eps.length){epsGrid.innerHTML='<div style="padding:20px;color:#aaa">ไม่พบตอน</div>';return}eps.forEach((ep,i)=>{let b=document.createElement('button');b.className='ep-btn';b.type='button';b.textContent=ep.title||`EP${i+1}`;b.onclick=()=>playItem(ep);b.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();playItem(ep)}};epsGrid.appendChild(b)});setTimeout(()=>epsGrid.querySelector('.ep-btn')?.focus(),80)}
function clearPlayer(){if(fallbackTimer){clearTimeout(fallbackTimer);fallbackTimer=null}if(hls){try{hls.destroy()}catch(e){}hls=null}try{video.pause()}catch(e){}video.removeAttribute('src');video.src='';try{video.load()}catch(e){}}
function showPlayer(){playerWrap.style.display='block';showPlayerUi()}function closePlayer(){clearPlayer();playerWrap.style.display='none';playerBar.classList.remove('hide-ui');setTimeout(focusFirst,80)}function showPlayerUi(){playerBar.classList.remove('hide-ui');if(playerUiTimer)clearTimeout(playerUiTimer);playerUiTimer=setTimeout(()=>{if(playerWrap.style.display==='block')playerBar.classList.add('hide-ui')},3000)}
function makeHls(){return new Hls({enableWorker:false,lowLatencyMode:false,maxBufferLength:10,maxMaxBufferLength:16,backBufferLength:8,manifestLoadingMaxRetry:1,levelLoadingMaxRetry:1,fragLoadingMaxRetry:2,fragLoadingRetryDelay:500,capLevelToPlayerSize:true,testBandwidth:false,startFragPrefetch:false})}
function startVideo(url,fail){showPlayer();video.muted=true;video.volume=.85;if(video.canPlayType('application/vnd.apple.mpegurl')){video.src=url;video.play().then(()=>setTimeout(()=>video.muted=false,700)).catch(fail);video.addEventListener('error',fail,{once:true});return}if(Hls.isSupported()){hls=makeHls();hls.loadSource(url);hls.attachMedia(video);hls.on(Hls.Events.MANIFEST_PARSED,()=>video.play().then(()=>setTimeout(()=>video.muted=false,700)).catch(fail));hls.on(Hls.Events.ERROR,(e,d)=>{if(d?.fatal)fail()});return}video.src=url;video.play().then(()=>setTimeout(()=>video.muted=false,700)).catch(fail)}
function playItem(item,serverIndex=0,candidateIndex=0){currentItem=item;currentServerIndex=serverIndex;clearPlayer();let candidates=buildPlayCandidates(item,serverIndex),url=candidates[candidateIndex]||'';if(!url){setStatus('ไม่พบลิงก์เล่น');return}function fail(){if(fallbackTimer){clearTimeout(fallbackTimer);fallbackTimer=null}if(candidateIndex+1<candidates.length){playItem(item,serverIndex,candidateIndex+1);return}if(item.servers?.length>serverIndex+1){playItem(item,serverIndex+1,0);return}setStatus('เล่นผ่านเว็บไม่สำเร็จ • ลองกด MX หรือ PLAYER')}fallbackTimer=setTimeout(()=>{if(video.readyState<2)fail()},4500);startVideo(url,fail)}
async function loadCurrent(){try{setStatus('กำลังโหลดรายการ...');let list=await loadSource(currentSource,currentKind);renderGrid(list);pageTitle.textContent=currentTitle;setStatus('')}catch(e){console.error(e);setStatus('โหลดรายการไม่สำเร็จ\n'+e.message);grid.className='grid';grid.innerHTML='<div style="padding:20px;color:#aaa">โหลดรายการไม่สำเร็จ</div>'}}
function focusFirst(){let t=grid.querySelector('.card')||grid.querySelector('.more-btn')||epsGrid.querySelector('.ep-btn')||document.querySelector('.menu-btn.active');if(t)t.focus()}
function webview(){let ua=navigator.userAgent||'';return /; wv\)|AppCreator|wv/i.test(ua)}function canIntent(){return /Android/i.test(navigator.userAgent||'')&&!webview()}function openExternal(url){if(!url)return;if(!canIntent()){setStatus('WebView/App24 บางเครื่องไม่รองรับ intent');return}try{let u=new URL(url);location.href='intent://'+u.host+u.pathname+u.search+'#Intent;scheme='+u.protocol.replace(':','')+';action=android.intent.action.VIEW;type=video/*;end'}catch(e){location.href=url}}function openMx(url){if(!url)return;if(!canIntent()){setStatus('WebView/App24 บางเครื่องไม่รองรับ MX intent');return}location.href='intent:'+url+'#Intent;package=com.mxtech.videoplayer.ad;type=video/*;end'}
function focusables(){return[...document.querySelectorAll('.menu-btn,.top-btn,.more-btn,.card,.ep-btn,.player-btn')].filter(el=>{let r=el.getBoundingClientRect();return r.width>0&&r.height>0&&getComputedStyle(el).display!=='none'})}function move(delta){let list=focusables(),i=list.indexOf(document.activeElement);if(i<0)i=0;else i=Math.max(0,Math.min(list.length-1,i+delta));if(list[i]){list[i].focus();list[i].scrollIntoView({block:'nearest'})}}
document.addEventListener('keydown',e=>{let code=e.keyCode||e.which||0;if([24,25,164,173,174,175].includes(code)){e.preventDefault();e.stopPropagation();return}if(playerWrap.style.display==='block'){showPlayerUi();if(e.key==='Escape'||e.key==='Backspace'||code===10009||code===4){e.preventDefault();closePlayer()}return}if(['ArrowDown','ArrowRight'].includes(e.key)||[20,22,39,40].includes(code)){e.preventDefault();move(1);return}if(['ArrowUp','ArrowLeft'].includes(e.key)||[19,21,37,38].includes(code)){e.preventDefault();move(-1);return}if(e.key==='Enter'||e.key==='OK'||[13,23,66].includes(code)){let a=document.activeElement;if(a&&a.click){e.preventDefault();a.click()}return}if(e.key==='Escape'||e.key==='Backspace'||code===10009||code===4){e.preventDefault();if(currentMode==='episodes'){epsWrap.style.display='none';listView.style.display='block';currentMode='list';setTimeout(focusFirst,80);return}location.href=HOME_URL}},true);
document.addEventListener('touchstart',e=>{let t=e.changedTouches&&e.changedTouches[0];if(!t)return;startX=t.clientX;startY=t.clientY;ignoreTap=false},{passive:true});document.addEventListener('touchmove',e=>{let t=e.changedTouches&&e.changedTouches[0];if(!t)return;if(Math.abs(t.clientX-startX)>14||Math.abs(t.clientY-startY)>14)ignoreTap=true},{passive:true});
menuButtons.forEach(btn=>btn.onclick=async()=>{menuButtons.forEach(b=>b.classList.remove('active'));btn.classList.add('active');if(btn.dataset.link){location.href=btn.dataset.link;return}sectionExpandState={};currentSource=btn.dataset.source||'';currentTitle=btn.dataset.title||btn.textContent.trim();currentKind=btn.dataset.kind||'';pageTitle.textContent=currentTitle;closePlayer();await loadCurrent()});
document.getElementById('homeBtn').onclick=()=>location.href=HOME_URL;document.getElementById('reloadBtn').onclick=async()=>{cache={};await loadCurrent()};document.getElementById('backBtn').onclick=()=>{if(currentMode==='episodes'){epsWrap.style.display='none';listView.style.display='block';currentMode='list';setTimeout(focusFirst,80)}else location.href=HOME_URL};document.getElementById('playerHomeBtn').onclick=()=>location.href=HOME_URL;document.getElementById('playerCloseBtn').onclick=closePlayer;document.getElementById('playerExternalBtn').onclick=()=>openExternal(getPlayableUrl(currentItem,currentServerIndex));document.getElementById('playerMxBtn').onclick=()=>openMx(getPlayableUrl(currentItem,currentServerIndex));['mousemove','mousedown','touchstart'].forEach(evt=>playerWrap.addEventListener(evt,()=>{if(playerWrap.style.display==='block')showPlayerUi()}));
