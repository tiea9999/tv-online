<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIEA IPTV</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
body{background:#0f172a;color:white;font-family:sans-serif;margin:0;padding:0;}
header{font-size:24px;padding:15px;text-align:center;}
.tabs{display:flex;overflow-x:auto;background:#1e293b;padding:5px;}
.tabs button{flex:0 0 auto;margin:0 5px;padding:10px 15px;background:#334155;color:white;border:none;border-radius:8px;cursor:pointer;font-size:16px;}
.tabs button:hover{background:#64748b;}
.player{max-width:900px;margin:15px auto;padding:10px;position:relative;}
video{width:100%;border-radius:10px;background:black;}
.player button{position:absolute;bottom:10px;right:10px;padding:5px 10px;background:#64748b;color:white;border:none;border-radius:5px;cursor:pointer;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:15px;padding:10px;}
.card{background:#1e293b;border-radius:10px;padding:10px;cursor:pointer;text-align:center;}
.card img{max-height:50px;width:auto;margin-bottom:5px;}
</style>
</head>
<body>

<header>TIEA IPTV</header>

<div class="tabs">
  <button onclick="showCategory('sports')">🏟 ตารางแข่งขันกีฬา</button>
  <button onclick="openTV()">📺 TV</button>
  <button onclick="showCategory('movie')">🎬 Movie</button>
  <button onclick="showCategory('series')">🎞 Series</button>
</div>

<div class="player">
  <video id="player" controls autoplay playsinline></video>
  <button onclick="toggleFullscreen()">ขยายจอ</button>
</div>

<div id="content"></div>

<script src="channels.js"></script>
<script>
const video = document.getElementById("player");
const content = document.getElementById("content");

function play(url){
  if(Hls.isSupported()){
    const hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  } else {
    video.src = url;
  }
  video.play();
  video.scrollIntoView({behavior:"smooth"});
  localStorage.setItem('lastChannel', url);
}

function toggleFullscreen(){
  if(!document.fullscreenElement){
    video.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

function clearContent(){content.innerHTML="";}

// เปิด TV และเล่นช่องแรก/ช่องล่าสุด
function openTV(){
  clearContent();
  const last = localStorage.getItem('lastChannel');
  const firstChannel = channels.tv.digital[0].url;
  play(last || firstChannel);

  Object.keys(channels.tv).forEach(group=>{
    const title = document.createElement("h2");
    title.innerText = group.toUpperCase();
    title.style.padding="10px";
    title.style.textAlign="left";
    content.appendChild(title);

    const grid = document.createElement("div");
    grid.className="grid";

    channels.tv[group].forEach(ch=>{
      const div = document.createElement("div");
      div.className="card";
      div.innerHTML=`<img src="${ch.logo}"><div>${ch.name}</div>`;
      div.onclick = ()=>play(ch.url);
      grid.appendChild(div);
    });
    content.appendChild(grid);
  });
}

// แสดง Movie / Series / ตารางกีฬา
function showCategory(cat){
  clearContent();
  if(!channels[cat]) return;
  channels[cat].forEach(item=>{
    const div = document.createElement("div");
    div.className="card";
    div.innerHTML=`<img src="${item.logo || ''}"><div>${item.name}</div>`;
    div.onclick=()=>play(item.url);
    content.appendChild(div);
  });
}

// โหลด TV เป็นค่าเริ่มต้น
openTV();
</script>
</body>
</html>
