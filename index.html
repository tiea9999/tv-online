<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIEA IPTV NETFLIX UI</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif}
.sidebar{width:220px;background:#111;position:fixed;height:100%;padding:10px}
.menu-btn{width:100%;padding:12px;margin-bottom:10px;background:#222;border:0;color:#fff;border-radius:10px;cursor:pointer}
.content{margin-left:240px;padding:10px}
.row{display:flex;gap:10px;overflow-x:auto;margin-bottom:20px}
.card{min-width:140px;background:#171717;border-radius:10px;cursor:pointer}
.card img{width:100%;height:180px;object-fit:cover}
.card-title{text-align:center;font-size:13px;padding:6px}

#playerWrap{position:fixed;inset:0;background:#000;display:none}
#videoPlayer{width:100%;height:100%}

#playerBar{position:absolute;top:10px;left:10px;display:flex;gap:10px}
.btn{padding:10px;background:#222;border:0;color:#fff;border-radius:10px}
</style>
</head>

<body>

<div class="sidebar">
<button class="menu-btn" onclick="loadData('https://raw.githubusercontent.com/tiea9999/tv-online/main/M3U/Dooball.json')">📺 ทีวี</button>
<button class="menu-btn" onclick="loadData('https://raw.githubusercontent.com/tiea9999/tv-online/main/Ezmovie.json')">🎬 หนัง</button>
<button class="menu-btn" onclick="loadData('https://raw.githubusercontent.com/tiea9999/tv-online/main/Flixmono.json')">📺 ซีรีส์</button>
</div>

<div class="content" id="content"></div>

<div id="playerWrap">
<video id="videoPlayer" controls autoplay></video>

<div id="playerBar">
<button class="btn" onclick="setPlayer('web')">Web</button>
<button class="btn" onclick="setPlayer('mx')">MX</button>
<button class="btn" onclick="setPlayer('vlc')">VLC</button>
<button class="btn" onclick="closePlayer()">❌</button>
</div>
</div>

<script>

let playerMode = "auto"
let currentList = []
let currentIndex = -1
let hls

function setPlayer(mode){
    playerMode = mode
}

function openMX(url){
    location.href = "intent:" + url + "#Intent;package=com.mxtech.videoplayer.ad;end"
}

function openVLC(url){
    location.href = "intent:" + url + "#Intent;package=org.videolan.vlc;end"
}

function play(item,index,list){
    currentList = list
    currentIndex = index

    const url = item.url || item.link || item.stream
    const lower = url.toLowerCase()

    document.getElementById("playerWrap").style.display="block"

    if(playerMode==="mx"){openMX(url);return}
    if(playerMode==="vlc"){openVLC(url);return}

    if(lower.includes(".m3u8")){
        if(Hls.isSupported()){
            if(hls)hls.destroy()
            hls = new Hls()
            hls.loadSource(url)
            hls.attachMedia(videoPlayer)
        }else{
            videoPlayer.src=url
        }
        return
    }

    if(lower.includes(".mp4")){
        openMX(url)
        return
    }

    openVLC(url)
}

videoPlayer.onended = ()=>{
    const next = currentIndex+1
    if(next < currentList.length){
        play(currentList[next],next,currentList)
    }
}

function closePlayer(){
    document.getElementById("playerWrap").style.display="none"
}

function render(list){
    const content = document.getElementById("content")
    content.innerHTML=""

    const row = document.createElement("div")
    row.className="row"

    list.forEach((item,i)=>{
        const card = document.createElement("div")
        card.className="card"

        card.innerHTML = `
        <img src="${item.logo || item.poster || ''}">
        <div class="card-title">${item.title}</div>
        `

        card.onclick = ()=>{
            if(item.episodes){
                render(item.episodes)
            }else{
                play(item,i,list)
            }
        }

        row.appendChild(card)
    })

    content.appendChild(row)
}

async function loadData(url){
    const res = await fetch(url)
    const data = await res.json()

    let list = []

    if(Array.isArray(data)){
        list = data
    }else if(data.items){
        list = data.items
    }else if(data.channels){
        list = data.channels
    }

    render(list)
}

</script>

</body>
</html>
