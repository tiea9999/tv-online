<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIEA IPTV PRO</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{display:flex;height:100vh;background:#000;color:#fff;}

#menu{
width:230px;
background:#111;
padding:10px;
overflow-y:auto;
}

.menu-title{
padding:10px;
margin-top:10px;
background:#e94560;
border-radius:6px;
cursor:pointer;
}

.menu-link{
padding:8px;
cursor:pointer;
text-align:center;
}
.menu-link:hover{background:#333;}

#search{
width:100%;
padding:8px;
margin-top:10px;
border-radius:6px;
border:none;
}

#main{
flex:1;
overflow:auto;
}

.grid{
display:flex;
flex-wrap:wrap;
gap:12px;
padding:15px;
justify-content:center;
}

.card{
width:110px;
cursor:pointer;
text-align:center;
position:relative;
}

.card img{
width:100%;
border-radius:10px;
}

.star{
position:absolute;
top:5px;
right:5px;
background:#000;
padding:2px 5px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="menu">

<div class="menu-title" onclick="goTV()">📡 ทีวี</div>

<div class="menu-title" onclick="loadJSON('movie')">🎬 หนัง</div>

<div class="menu-title" onclick="loadJSON('series')">📺 ซีรีส์</div>

<div class="menu-title" onclick="loadFav()">⭐ รายการโปรด</div>

<div class="menu-title" onclick="loadRecent()">⏱ ล่าสุด</div>

<input id="search" placeholder="ค้นหา..." oninput="search()">

</div>

<div id="main"></div>

<script>

let currentList = [];

// TV
function goTV(){
location.href = "https://tiea9999.github.io/tv/ball66.html";
}

// โหลด JSON
async function loadJSON(type){
let url = type === "movie" ? "movie.json" : "series.json";

const res = await fetch(url);
const data = await res.json();

currentList = type === "movie" ? data.movies : data.series;

render(currentList);
}

// แสดงรายการ
function render(list){
let html = '<div class="grid">';

list.forEach(item=>{
html += `
<div class="card" onclick="play('${item.url}')">
<img src="${item.image}">
<div>${item.name}</div>
<div class="star" onclick="addFav(event,'${item.name}','${item.image}','${item.url}')">⭐</div>
</div>
`;
});

html += "</div>";

document.getElementById("main").innerHTML = html;
}

// เล่น
function play(url){

// บันทึกล่าสุด
let rec = JSON.parse(localStorage.getItem("recent")||"[]");
rec.unshift(url);
localStorage.setItem("recent",JSON.stringify(rec.slice(0,20)));

location.href = "player.html?url=" + encodeURIComponent(url);
}

// โปรด
function addFav(e,name,img,url){
e.stopPropagation();

let fav = JSON.parse(localStorage.getItem("fav")||"[]");

fav.push({name,image:img,url});

localStorage.setItem("fav",JSON.stringify(fav));

alert("เพิ่มโปรดแล้ว");
}

function loadFav(){
let fav = JSON.parse(localStorage.getItem("fav")||"[]");
render(fav);
}

// ล่าสุด
function loadRecent(){
let rec = JSON.parse(localStorage.getItem("recent")||"[]");

let list = rec.map(u=>({
name:"ล่าสุด",
image:"https://via.placeholder.com/150",
url:u
}));

render(list);
}

// ค้นหา
function search(){
let val = document.getElementById("search").value.toLowerCase();

let filtered = currentList.filter(i =>
i.name.toLowerCase().includes(val)
);

render(filtered);
}

</script>

</body>
</html>
