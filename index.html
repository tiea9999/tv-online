<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>TIEA IPTV ULTRA FINAL NETFLIX + AUTO FIX</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #060606;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }
    :root{
      --bg:#060606;
      --panel:#111;
      --panel2:#171717;
      --line:#2a2a2a;
      --accent:#00d0ff;
      --accent2:#00ff95;
      --danger:#ff5252;
      --text:#fff;
      --muted:#a9a9a9;
      --focus:0 0 0 3px rgba(0,208,255,.95),0 0 18px rgba(0,208,255,.55);
    }
    body {
      background: radial-gradient(circle at top right, rgba(0,208,255,.08), transparent 25%), var(--bg);
    }
    .app {
      display: flex;
      width: 100vw;
      height: 100vh;
    }
    .sidebar {
      width: 235px;
      min-width: 235px;
      height: 100%;
      background: linear-gradient(180deg,#111,#0b0b0b);
      border-right: 1px solid var(--line);
      overflow-y: auto;
      padding: 14px 10px 90px;
      flex-shrink: 0;
    }
    .brand {
      text-align: center;
      font-weight: 900;
      font-size: 26px;
      color: var(--accent);
      letter-spacing: 1px;
      margin: 4px 0 14px;
      text-shadow: 0 0 18px rgba(0,208,255,.35);
    }
    .subbrand {
      color: #9befff;
      font-size: 12px;
      margin-top: 2px;
    }
    .group-title {
      color: #9fd4e0;
      font-size: 12px;
      margin: 18px 8px 8px;
      opacity: .9;
    }
    .menu-btn, .focusable {
      outline: none;
    }
    .menu-btn {
      display: block;
      width: 100%;
      text-align: left;
      background: var(--panel2);
      border: 1px solid #202020;
      color: #fff;
      padding: 12px 12px;
      border-radius: 14px;
      margin: 7px 0;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease, background .15s ease;
    }
    .menu-btn.active {
      border-color: rgba(0,208,255,.8);
      background: linear-gradient(180deg, rgba(0,208,255,.16), rgba(0,208,255,.08));
    }
    .menu-btn:focus,
    .top-btn:focus,
    .more-btn:focus,
    .card:focus,
    .ep-btn:focus,
    .player-btn:focus,
    .modal-btn:focus {
      outline: none;
      box-shadow: var(--focus);
      border-color: rgba(0,208,255,.85);
    }
    .menu-btn:active,
    .card:active,
    .ep-btn:active,
    .top-btn:active,
    .player-btn:active,
    .more-btn:active,
    .modal-btn:active {
      transform: scale(.985);
    }
    .main {
      flex: 1;
      overflow: auto;
      padding: 14px 14px 90px;
      scroll-behavior: smooth;
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      background: linear-gradient(180deg, rgba(6,6,6,.98), rgba(6,6,6,.9));
      padding: 4px 0 12px;
      margin-bottom: 10px;
      backdrop-filter: blur(8px);
    }
    .title {
      font-size: 24px;
      font-weight: 900;
      color: var(--accent);
      letter-spacing: .3px;
    }
    .sub {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }
    .tools {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .top-btn, .more-btn, .ep-btn, .player-btn, .modal-btn {
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      background: #1a1a1a;
      color: #fff;
      padding: 10px 12px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
    }
    .status {
      display: none;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      color: #e7f7ff;
      margin-bottom: 14px;
      white-space: pre-wrap;
      font-size: 14px;
    }
    .section {
      margin-bottom: 20px;
    }
    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin: 0 0 10px;
    }
    .section-title {
      flex: 1;
      font-size: 18px;
      font-weight: 900;
      color: #dffaff;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,.055);
      border: 1px solid rgba(255,255,255,.06);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
    }
    .card {
      display: block;
      width: 100%;
      border: 1px solid #202020;
      border-radius: 16px;
      overflow: hidden;
      background: linear-gradient(180deg,#141414,#0d0d0d);
      color: #fff;
      padding: 0;
      text-align: left;
      cursor: pointer;
    }
    .card img {
      display: block;
      width: 100%;
      height: 205px;
      object-fit: cover;
      background: #000;
    }
    .card.tv img {
      object-fit: contain;
      padding: 8px;
      height: 145px;
    }
    .no-thumb {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg,#111,#1b1b1b);
      color: #6be8ff;
      font-size: 13px;
      font-weight: 700;
    }
    .card-title {
      padding: 10px 10px 4px;
      font-size: 14px;
      line-height: 1.35;
      min-height: 46px;
      font-weight: 700;
      word-break: break-word;
    }
    .card-meta {
      padding: 0 10px 10px;
      font-size: 12px;
      color: #aeb8bd;
      line-height: 1.35;
      min-height: 22px;
    }

    .sample-card {
      min-height: 100%;
    }
    .sample-card .sample-art {
      height: 185px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, rgba(0,208,255,.18), rgba(0,0,0,.08) 55%), linear-gradient(180deg,#113842,#0d0f1d);
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .sample-card .sample-icon {
      font-size: 54px;
      filter: drop-shadow(0 3px 8px rgba(255,255,255,.08));
    }
    .sample-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 10px 12px;
    }
    .sample-tag {
      font-size: 11px;
      font-weight: 800;
      color: #dffcff;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(76,255,226,.45);
      background: rgba(0,208,255,.16);
      line-height: 1;
    }
    .eps-wrap { display: none; }
    .eps-title {
      font-size: 22px;
      font-weight: 900;
      color: var(--accent);
      margin-bottom: 12px;
    }
    .eps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(145px, 1fr));
      gap: 10px;
    }
    .ep-btn {
      text-align: left;
      padding: 14px 12px;
      min-height: 52px;
      background: linear-gradient(180deg,#161616,#0f0f0f);
    }
    #playerWrap {
      position: fixed;
      inset: 0;
      background: #000;
      display: none;
      z-index: 9999;
    }
    #videoPlayer {
      width: 100%;
      height: 100%;
      background: #000;
    }
    #iframePlayer {
      width: 100%;
      height: 100%;
      border: 0;
      background: #000;
      display: none;
    }
    #playerBar {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      display: flex;
      gap: 8px;
      z-index: 10001;
      flex-wrap: wrap;
      opacity: 1;
      transition: opacity .25s ease;
      align-items: center;
    }
    #playerBar.hide-ui {
      opacity: 0;
      pointer-events: none;
    }
    .player-btn { border: 0; }
    .btn-home { background: #0b7dda; }
    .btn-close { background: #d93025; }
    .btn-player { background: #00897b; }
    .btn-mx { background: #f39c12; }
    .btn-next { background: #7b1fa2; }
    .btn-retry { background: #455a64; }
    .player-note {
      margin-left: auto;
      background: rgba(0,0,0,.45);
      border: 1px solid rgba(255,255,255,.12);
      color: #d1f7ff;
      padding: 9px 12px;
      border-radius: 12px;
      font-size: 12px;
      max-width: 52vw;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .hidden { display: none !important; }
    @media (max-width: 900px) {
      .sidebar { width: 170px; min-width: 170px; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(125px, 1fr)); }
      .card img { height: 170px; }
      .card.tv img { height: 120px; }
    }
    @media (max-width: 700px) {
      .sidebar { width: 145px; min-width: 145px; padding-bottom: 110px; }
      .main { padding: 12px 12px 120px; }
      .title { font-size: 20px; }
      .sub { font-size: 12px; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(112px, 1fr)); gap: 10px; }
      .card img { height: 150px; }
      .card.tv img { height: 105px; }
      .player-note { display: none; }
    }
  </style>
</head>
<body>

  <script>
    const grid = document.getElementById('grid');
    const listView = document.getElementById('listView');
    const epsWrap = document.getElementById('epsWrap');
    const epsGrid = document.getElementById('epsGrid');
    const epsTitle = document.getElementById('epsTitle');
    const pageTitle = document.getElementById('pageTitle');
    const pageSub = document.getElementById('pageSub');
    const statusBox = document.getElementById('statusBox');
    const mainArea = document.getElementById('mainArea');
    const playerWrap = document.getElementById('playerWrap');
    const playerBar = document.getElementById('playerBar');
    const playerNote = document.getElementById('playerNote');
    const video = document.getElementById('videoPlayer');
    const iframePlayer = document.getElementById('iframePlayer');
    const menuButtons = Array.from(document.querySelectorAll('.menu-btn'));
    const vipBtn = document.getElementById('vipBtn');
    const reloadBtn = document.getElementById('reloadBtn');
    const backBtn = document.getElementById('backBtn');
    const playerHomeBtn = document.getElementById('playerHomeBtn');
    const playerExternalBtn = document.getElementById('playerExternalBtn');
    const playerMxBtn = document.getElementById('playerMxBtn');
    const playerRetryBtn = document.getElementById('playerRetryBtn');
    const playerNextBtn = document.getElementById('playerNextBtn');
    const playerCloseBtn = document.getElementById('playerCloseBtn');

    const HOME_URL = 'https://tiea9999.github.io/tv-online/index.html';
    const VIP_URL = 'https://tiea9999.github.io/tv/VIP.html';
    const PROXY = 'https://iptv.tawatchai250958.workers.dev/?url=';
    const RETURN_STATE_KEY = 'tiea_ultra_return_state_v3';
    const INITIAL_LIMIT = 18;
    const IMAGE_FALLBACK = 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="420" height="600"><rect width="100%" height="100%" fill="#111"/><text x="50%" y="50%" fill="#56e7ff" font-size="28" font-family="Arial" dominant-baseline="middle" text-anchor="middle">TIEA IPTV</text></svg>`);


    const SAMPLE_TV = {
      sections: [
        {
          title: 'ทีวีแนะนำ',
          items: [
            { title: 'MONOMAX 01', kind: 'play', group: 'ทีวี', source: 'https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/M3U/Dooball.json', match: 'monomax 01' },
            { title: 'MONOMAX 02', kind: 'play', group: 'ทีวี', source: 'https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/M3U/Dooball.json', match: 'monomax 02' },
            { title: 'SPORT DEMO', kind: 'play', group: 'กีฬา', source: 'https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/M3U/Dooball.json', match: 'sport' }
          ]
        },
        {
          title: 'หนังและซีรีส์',
          items: [
            { title: 'EZ Movie', kind: 'menu', targetKind: 'movie', targetTitle: '🎬 หนัง 24HD', targetSource: 'https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/movie24hd.json', group: 'หนัง', tag2: 'เมนูย่อย' },
            { title: 'MySeriesHD', kind: 'menu', targetKind: 'series', targetTitle: '📺 MySeries', targetSource: 'https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/MySeries.json', group: 'ซีรีส์', tag2: 'เมนูย่อย' },
            { title: 'GoSeries', kind: 'menu', targetKind: 'series', targetTitle: '📺 ซีรีส์ 24HD', targetSource: 'https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/series24hd.json', group: 'ซีรีส์', tag2: 'เมนูย่อย' }
          ]
        }
      ]
    };

    let currentSource = document.querySelector('.menu-btn[data-source].active')?.dataset.source || '';
    let currentTitle = document.querySelector('.menu-btn[data-source].active')?.dataset.title || '📺 ทีวีออนไลน์';
    let currentKind = document.querySelector('.menu-btn[data-source].active')?.dataset.kind || 'tv';
    let currentMode = 'list';
    let currentSeries = null;
    let currentItem = null;
    let currentServerIndex = 0;
    let currentPlayCandidates = [];
    let hls = null;
    let dash = null;
    let playerUiTimer = null;
    let movieFallbackTimer = null;
    let historyStack = [];
    let cache = {};
    let sectionExpandState = {};
    let focusIndex = 0;

    function setStatus(msg) {
      statusBox.textContent = msg || '';
      statusBox.style.display = msg ? 'block' : 'none';
    }

    function sanitize(text) {
      return String(text || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function getThumb(item) {
      return item?.image || item?.poster || item?.thumb || item?.logo || item?.cover || item?.poster_url || '';
    }

    function mapServers(arr) {
      if (!Array.isArray(arr)) return [];
      return arr.map((s, i) => ({
        name: s?.name || s?.title || `Server ${i + 1}`,
        url: s?.url || s?.link || s?.file || s?.source || s?.stream || ''
      })).filter(s => s.url);
    }

    function normalizeUrl(url) {
      return String(url || '').trim();
    }

    function getPlayableUrl(item, idx = 0) {
      if (!item) return '';
      if (Array.isArray(item.servers) && item.servers.length) {
        return normalizeUrl(item.servers[idx]?.url || item.servers[0]?.url || '');
      }
      return normalizeUrl(item.url || item.link || item.source || item.stream || item.file || '');
    }

    function buildPlayCandidates(url) {
      const raw = normalizeUrl(url);
      if (!raw) return [];
      const list = [raw];
      if (/^https?:/i.test(raw) && !raw.includes('iptv.tawatchai250958.workers.dev')) {
        list.push(PROXY + encodeURIComponent(raw));
      }
      return [...new Set(list)];
    }

    function isHlsUrl(url) {
      return /\.m3u8($|\?)/i.test(url);
    }

    function isDashUrl(url) {
      return /\.mpd($|\?)/i.test(url);
    }

    function isVideoFile(url) {
      return /\.(mp4|mkv|webm|mov|m4v|avi)($|\?)/i.test(url);
    }

    function isProbablyIframe(url) {
      return /player|embed|iframe|watch\//i.test(url) && !isHlsUrl(url) && !isDashUrl(url) && !isVideoFile(url);
    }

    function clearMovieFallbackTimer() {
      if (movieFallbackTimer) {
        clearTimeout(movieFallbackTimer);
        movieFallbackTimer = null;
      }
    }

    function destroyEngines() {
      if (hls) {
        try { hls.destroy(); } catch (e) {}
        hls = null;
      }
      if (dash) {
        try { dash.reset(); } catch (e) {}
        dash = null;
      }
    }

    function clearPlayer() {
      clearMovieFallbackTimer();
      destroyEngines();
      try { video.pause(); } catch (e) {}
      video.removeAttribute('src');
      video.src = '';
      video.load();
      iframePlayer.src = 'about:blank';
      iframePlayer.style.display = 'none';
      video.style.display = 'block';
      playerNextBtn.classList.add('hidden');
    }

    function showPlayerUi() {
      playerBar.classList.remove('hide-ui');
      if (playerUiTimer) clearTimeout(playerUiTimer);
      playerUiTimer = setTimeout(() => {
        if (playerWrap.style.display === 'block') playerBar.classList.add('hide-ui');
      }, 2800);
    }

    function showPlayer() {
      playerWrap.style.display = 'block';
      showPlayerUi();
      setTimeout(() => playerCloseBtn.focus(), 60);
    }

    function closePlayer() {
      if (playerUiTimer) {
        clearTimeout(playerUiTimer);
        playerUiTimer = null;
      }
      clearPlayer();
      playerWrap.style.display = 'none';
      playerBar.classList.remove('hide-ui');
      focusCurrentView();
    }

    function saveReturnState(extra = {}) {
      try {
        sessionStorage.setItem(RETURN_STATE_KEY, JSON.stringify({
          source: currentSource || '',
          title: currentTitle || '',
          kind: currentKind || '',
          mode: currentMode || 'list',
          seriesTitle: currentSeries?.title || '',
          expand: sectionExpandState || {},
          focusIndex,
          ...extra
        }));
      } catch (e) {}
    }

    function getReturnState() {
      try {
        const raw = sessionStorage.getItem(RETURN_STATE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch (e) {
        return null;
      }
    }

    function clearReturnState() {
      try { sessionStorage.removeItem(RETURN_STATE_KEY); } catch (e) {}
    }

    function openLink(url) {
      if (!url) return;
      location.href = url;
    }

    function openExternalPlayer(url) {
      if (!url) return;
      saveReturnState();
      try {
        const u = new URL(url);
        location.href = 'intent://' + u.host + u.pathname + u.search + '#Intent;scheme=' + u.protocol.replace(':','') + ';action=android.intent.action.VIEW;type=video/*;end';
      } catch (e) {
        location.href = url;
      }
    }

    function openMx(url) {

    function isMovieItem(item) {
      return currentKind === 'movie' || item?.type === 'movie';

    function categoryOrder(cat) {
      const text = String(cat || '');
      if (text.includes('2026')) return 1;
      if (text.includes('2025')) return 2;
      if (text.includes('ใหม่')) return 3;
      if (text.includes('จีน')) return 4;
      if (text.includes('เกาหลี')) return 5;
      if (text.includes('ญี่ปุ่น')) return 6;
      if (text.includes('ไทย')) return 7;
      if (text.includes('ฝรั่ง')) return 8;
      if (text.includes('พากย์ไทย')) return 9;
      if (text.includes('ซับไทย')) return 10;
      return 99;
    }

    function makeCategory(node, fallback = 'อื่นๆ') {
      const cat = String(node?.category || node?.group || node?.genre || '').trim();
      const sub = String(node?.subcategory || node?.sub_group || '').trim();
      if (currentKind === 'series') return cat || sub || fallback;
      if (cat && sub && cat !== sub) return `${cat} • ${sub}`;
      return cat || sub || fallback;
    }

    function normalizeMovieOrSeries(input) {
      const out = [];
      const seen = new Set();

      function add(item) {
        if (!item) return;
        const key = [item.type, item.title, item.url, item.category, item.year, item.episodes?.length || 0].join('|').toLowerCase();
        if (seen.has(key)) return;
        seen.add(key);
        out.push(item);
      }

      function walk(node, inherited = {}) {
        if (!node) return;
        if (Array.isArray(node)) {
          node.forEach(n => walk(n, inherited));
          return;
        }
        if (typeof node !== 'object') return;

        const image = getThumb(node) || inherited.image || '';
        const title = node.title || node.name || node.movie_name || node.series_name || node.ep_name || node.episode || 'ไม่มีชื่อ';
        const url = normalizeUrl(node.url || node.link || node.stream || node.source || node.file || '');
        const servers = mapServers(node.servers || node.server || []);
        const category = makeCategory(node, inherited.category || 'อื่นๆ');

        if (Array.isArray(node.episodes) && node.episodes.length) {
          add({
            title,
            image,
            url,
            servers: [],
            type: 'series',
            category,
            status: node.status || '',
            year: node.year || '',
            language: node.language || node.lang || '',
            episodes: node.episodes.map((ep, i) => ({
              title: ep.title || ep.name || ep.ep_name || `EP${i + 1}`,
              image: getThumb(ep) || image || '',
              url: normalizeUrl(ep.url || ep.link || ep.stream || ep.source || ep.file || ''),
              servers: mapServers(ep.servers || ep.server || []),
              type: 'episode'
            })).filter(ep => ep.url || ep.servers.length)
          });
          return;
        }

        if (Array.isArray(node.items) && node.items.length) {
          const nextInherited = {
            image,
            category: makeCategory(node, inherited.category || title || 'อื่นๆ')
          };
          node.items.forEach(child => walk(child, nextInherited));
          return;
        }

        if (node.type === 'menu' && Array.isArray(node.items)) {
          node.items.forEach(child => walk(child, inherited));
          return;
        }

        if ((url || servers.length) && title) {
          add({
            title,
            image,
            url: url || servers[0]?.url || '',
            servers,
            type: currentKind === 'movie' ? 'movie' : (node.type || 'video'),
            category,
            status: node.status || '',
            year: node.year || '',
            language: node.language || node.lang || ''
          });
          return;
        }

        Object.values(node).forEach(v => {
          if (Array.isArray(v) || (v && typeof v === 'object')) walk(v, { image, category });
        });
      }

      walk(input, {});
      return out;
    }

    function normalizeTV(data) {
      const out = [];
      if (Array.isArray(data)) return normalizeMovieOrSeries(data);
      if (Array.isArray(data?.items)) return normalizeMovieOrSeries(data.items);

      if (Array.isArray(data?.groups)) {
        data.groups.forEach(group => {
          const groupName = group?.name || 'ทีวี';
          const stations = Array.isArray(group?.stations) ? group.stations : [];
          const subGroups = Array.isArray(group?.groups) ? group.groups : [];

          stations.forEach((s, i) => {
            const url = normalizeUrl(s?.url || s?.link || s?.file || s?.source || s?.stream || '');
            if (!url) return;
            out.push({
              title: s?.name || `${groupName} ${i + 1}`,
              image: s?.image || s?.logo || group?.image || '',
              url,
              servers: [{ name: s?.name || 'Main', url }],
              type: 'video',
              category: groupName,
              language: s?.info || ''
            });
          });

          subGroups.forEach(sub => {
            const subStations = Array.isArray(sub?.stations) ? sub.stations : [];
            subStations.forEach((s, i) => {
              const url = normalizeUrl(s?.url || s?.link || s?.file || s?.source || s?.stream || '');
              if (!url) return;
              out.push({
                title: s?.name || sub?.name || `${groupName} ${i + 1}`,
                image: s?.image || s?.logo || sub?.image || group?.image || '',
                url,
                servers: [{ name: s?.name || 'Main', url }],
                type: 'video',
                category: sub?.name || groupName,
                language: s?.info || ''
              });
            });
          });
        });
      }

      return out;
    }

    function normalizeM3U(text) {
      const result = [];
      const lines = String(text || '').split(/\r?\n/);
      let current = null;
      for (const raw of lines) {
        const line = raw.trim();
        if (!line) continue;
        if (line.startsWith('#EXTINF:')) {
          const logo = (line.match(/tvg-logo="([^"]*)"/i) || [])[1] || '';
          const group = (line.match(/group-title="([^"]*)"/i) || [])[1] || 'ทีวี';
          const name = line.split(',').pop()?.trim() || 'ไม่มีชื่อ';
          current = {
            title: name,
            image: logo,
            url: '',
            servers: [],
            type: 'video',
            category: group,
            language: ''
          };
        } else if (!line.startsWith('#') && current) {
          current.url = line;
          current.servers = [{ name: 'Main', url: line }];
          result.push(current);
          current = null;
        }
      }
      return result;
    }

    async function fetchText(url) {
      const res = await fetch(url, { cache: 'no-store' });
      if (!res.ok) throw new Error('โหลดไฟล์ไม่สำเร็จ: ' + res.status);
      return await res.text();
    }

    async function loadSource(sourceUrl, kind = currentKind) {
      const cacheKey = `${kind}|${sourceUrl}`;
      if (cache[cacheKey]) return cache[cacheKey];
      const lower = String(sourceUrl || '').toLowerCase();

      if (lower.endsWith('.m3u8') && !lower.includes('.json')) {
        const direct = [{ title: 'Live Stream', image: '', url: sourceUrl, servers: [{ name: 'Main', url: sourceUrl }], type: 'video', category: 'ถ่ายทอดสด' }];
        cache[cacheKey] = direct;
        return direct;
      }

      const text = await fetchText(sourceUrl);
      const trimmed = text.trim();
      if (!trimmed) return [];

      let result = [];
      if (trimmed.startsWith('{') || trimmed.startsWith('[')) {
        const json = JSON.parse(trimmed);
        if (kind === 'tv') result = normalizeTV(json);
        else if (Array.isArray(json)) result = normalizeMovieOrSeries(json);
        else if (Array.isArray(json?.items)) result = normalizeMovieOrSeries(json.items);
        else result = normalizeMovieOrSeries(json);
      } else if (trimmed.includes('#EXTM3U') || trimmed.includes('#EXTINF')) {
        result = normalizeM3U(trimmed);
      }

      cache[cacheKey] = result;
      return result;
    }

    async function playItem(item, serverIndex = 0) {
      currentItem = item;
      currentServerIndex = serverIndex;
      clearPlayer();
      const directUrl = getPlayableUrl(item, serverIndex);
      if (!directUrl) {
        setStatus('❌ ไม่พบลิงก์เล่น');
        return;
      }

      const candidates = buildPlayCandidates(directUrl);
      currentPlayCandidates = candidates.map(c => c.url);
      const isAndroid = /Android/i.test(navigator.userAgent);
      const movieMode = isMovieItem(item);
      let attemptIndex = 0;
      let switchedToExternal = false;

      playerNote.textContent = item.title || 'กำลังเล่น';
      updateNextServerButton();
      showPlayer();

      const goExternal = () => {
        if (switchedToExternal) return;
        switchedToExternal = true;
        clearMovieFallbackTimer();
        try {
          openMx(directUrl);
        } catch (e) {
          openExternalPlayer(directUrl);
        }
      };

      const playCandidate = (candidateIndex) => {
        attemptIndex = candidateIndex;
        const candidate = candidates[candidateIndex];
        if (!candidate?.url) {
          goExternal();
          return;
        }

        const playUrl = candidate.url;
        const isProxyMode = candidate.mode === 'proxy';

        clearPlayer();
        showPlayer();
        playerNote.textContent = (item.title || 'กำลังเล่น') + (isProxyMode ? ' • Proxy fallback' : ' • Direct');

        const fallbackNext = () => {
          clearMovieFallbackTimer();
          if (switchedToExternal) return;
          if (attemptIndex + 1 < candidates.length) {
            playCandidate(attemptIndex + 1);
          } else {
            goExternal();
          }
        };

        attachPlaybackSuccessHandlers(() => {
          playerNote.textContent = item.title || 'กำลังเล่น';
        });

        if (movieMode || isAndroid) startMovieFallback(fallbackNext);

        try {
          if (isProbablyIframe(playUrl)) {
            clearMovieFallbackTimer();
            if (!isProxyMode) {
              showIframe(playUrl);
            } else {
              fallbackNext();
            }
            return;
          }

          if (isHlsUrl(playUrl)) {
            if (Hls.isSupported()) {
              hls = createStableHls(movieMode);
              hls.loadSource(playUrl);
              hls.attachMedia(video);
              hls.on(Hls.Events.MANIFEST_PARSED, () => {
                tryStartVideoWithSound(fallbackNext);
              });
              hls.on(Hls.Events.ERROR, (event, data) => {
                if (!data?.fatal) return;
                try {
                  if (data.type === Hls.ErrorTypes.MEDIA_ERROR && !isProxyMode) {
                    hls.recoverMediaError();
                    return;
                  }
                } catch (e) {}
                fallbackNext();
              });
              return;
            }
            video.src = playUrl;
            video.preload = 'auto';
            video.addEventListener('error', fallbackNext, { once: true });
            tryStartVideoWithSound(fallbackNext);
            return;
          }

          if (isDashUrl(playUrl)) {
            dash = dashjs.MediaPlayer().create();
            dash.updateSettings({
              streaming: {
                abr: { autoSwitchBitrate: { video: true, audio: true } },
                buffer: {
                  fastSwitchEnabled: false,
                  bufferToKeep: 6,
                  stableBufferTime: 8,
                  bufferTimeAtTopQuality: 10,
                  bufferTimeAtTopQualityLongForm: 12
                }
              }
            });
            dash.initialize(video, playUrl, true);
            video.muted = true;
            video.play().then(() => {
              setTimeout(() => {
                video.muted = false;
                video.volume = 1;
              }, 300);
            }).catch(fallbackNext);
            video.addEventListener('error', fallbackNext, { once: true });
            return;
          }

          video.src = playUrl;
          video.preload = 'auto';
          video.playsInline = true;
          video.addEventListener('error', fallbackNext, { once: true });
          tryStartVideoWithSound(fallbackNext);
        } catch (e) {
          console.error(e);
          fallbackNext();
        }
      };

      playCandidate(0);
    }

      pageTitle.textContent = currentTitle;
      pageSub.textContent = currentKind === 'tv'
        ? 'ทีวีออนไลน์ + SAMPLE_TV + รีโมท + PLAYER/MX'
        : currentKind === 'movie'
          ? 'หนัง 24HD + เล่นในกล่อง/โปรเจคเตอร์'
          : 'ซีรีส์ + แยกหมวด + กดเข้าไปถึงเห็นตอน';

      try {
        const list = await loadSource(currentSource, currentKind);
        renderGrid(list);
        setStatus('');
      } catch (e) {
        console.error(e);
        setStatus('❌ โหลดไม่สำเร็จ\n' + (e?.message || e));
        grid.innerHTML = '';
      }
    }

    function setActiveMenu(button) {
      menuButtons.forEach(btn => btn.classList.remove('active'));
      if (button) button.classList.add('active');
    }

    async function activateDataMenu(button) {
      rememberFocus();
      setActiveMenu(button);
      currentSource = button.dataset.source || currentSource;
      currentTitle = button.dataset.title || currentTitle;
      currentKind = button.dataset.kind || currentKind;
      currentSeries = null;
      currentMode = 'list';
      sectionExpandState = {};
      historyStack = [];
      await loadCurrentMenu();
    }

    async function restoreReturnState() {
      const state = getReturnState();
      if (!state?.source) return false;
      try {
        currentSource = state.source;
        currentTitle = state.title || currentTitle;
        currentKind = state.kind || currentKind;
        sectionExpandState = state.expand || {};
        focusIndex = state.focusIndex || 0;
        const activeBtn = menuButtons.find(btn => btn.dataset.source === currentSource && btn.dataset.kind === currentKind);
        setActiveMenu(activeBtn || null);
        const list = await loadSource(currentSource, currentKind);
        renderGrid(list);
        if (state.mode === 'episodes' && state.seriesTitle) {
          const found = list.find(item => item.type === 'series' && item.title === state.seriesTitle);
          if (found) showEpisodes(found, false);
        }
        clearReturnState();
        return true;
      } catch (e) {
        console.error(e);
        clearReturnState();
        return false;
      }
    }

    menuButtons.forEach(btn => {
      const run = async () => {
        const link = btn.dataset.link;
        if (link) {
          openLink(link);
          return;
        }
        if (btn.dataset.source) await activateDataMenu(btn);
      };
      btn.onclick = run;
      btn.onmousedown = e => { e.preventDefault(); run(); };
      btn.ontouchstart = e => { e.preventDefault(); run(); };
    });

    vipBtn.onclick = () => {
      const pass = prompt('รหัส VIP');
      if (pass === null) return;
      openLink(VIP_URL);
    };

    reloadBtn.onclick = async () => {
      cache = {};
      await loadCurrentMenu();
    };

    backBtn.onclick = async () => {
      if (playerWrap.style.display === 'block') {
        closePlayer();
        return;
      }
      if (currentMode === 'episodes') {
        currentMode = 'list';
        currentSeries = null;
        listView.style.display = 'block';
        epsWrap.style.display = 'none';
        focusCurrentView();
        return;
      }
      const prev = historyStack.pop();
      if (prev?.source) {
        currentSource = prev.source;
        currentTitle = prev.title;
        currentKind = prev.kind;
        await loadCurrentMenu();
        return;
      }
      openLink(HOME_URL);
    };

    playerHomeBtn.onclick = () => openLink(HOME_URL);
    playerCloseBtn.onclick = closePlayer;
    playerRetryBtn.onclick = () => currentItem && playItem(currentItem, currentServerIndex);
    playerExternalBtn.onclick = () => {
      const url = getPlayableUrl(currentItem, currentServerIndex) || currentPlayCandidates[0] || '';
      openExternalPlayer(url);
    };
    playerMxBtn.onclick = () => {
      const url = getPlayableUrl(currentItem, currentServerIndex) || currentPlayCandidates[0] || '';
      openMx(url);
    };
    playerNextBtn.onclick = () => {
      if (!currentItem?.servers?.length) return;
      currentServerIndex = (currentServerIndex + 1) % currentItem.servers.length;
      playItem(currentItem, currentServerIndex);
    };

    ['mousemove','click','touchstart'].forEach(ev => {
      document.addEventListener(ev, () => {
        if (playerWrap.style.display === 'block') showPlayerUi();
      }, { passive: true });
    });

    document.addEventListener('keydown', async (e) => {
      if (e.key === 'Escape' || e.key === 'Backspace') {
        e.preventDefault();
        if (playerWrap.style.display === 'block') {
          closePlayer();
          return;
        }
        if (currentMode === 'episodes') {
          currentMode = 'list';
          currentSeries = null;
          listView.style.display = 'block';
          epsWrap.style.display = 'none';
          focusCurrentView();
          return;
        }
      }

      if (playerWrap.style.display === 'block') {
        if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) showPlayerUi();
        if (e.key === 'Enter' && document.activeElement === playerCloseBtn) closePlayer();
        return;
      }

      const focusables = getCurrentFocusable();
      if (!focusables.length) return;
      const current = document.activeElement;
      let idx = focusables.indexOf(current);
      if (idx < 0) idx = 0;

      const cols = currentMode === 'episodes'
        ? Math.max(1, Math.floor(epsGrid.clientWidth / 150))
        : Math.max(1, Math.floor(mainArea.clientWidth / (currentKind === 'tv' ? 150 : 165)));

      if (e.key === 'ArrowRight') {
        e.preventDefault();
        focusElementByIndex(Math.min(idx + 1, focusables.length - 1));
      } else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        focusElementByIndex(Math.max(idx - 1, 0));
      } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        focusElementByIndex(Math.min(idx + cols, focusables.length - 1));
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        focusElementByIndex(Math.max(idx - cols, 0));
      }
    });

    window.addEventListener('pageshow', async () => {
      const restored = await restoreReturnState();
      if (!restored) await loadCurrentMenu();
    });
  </script>
</body>
</html>
