<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIEA IPTV SIMPLE</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
*{box-sizing:border-box}
body{margin:0;background:#000;color:#fff;font-family:sans-serif}

.app{display:flex;min-height:100vh}
.sidebar{width:180px;background:#111;padding:10px}
.brand{text-align:center;font-size:22px;color:#00e5ff;margin-bottom:10px}

.menu-btn{
width:100%;padding:12px;margin-bottom:8px;border:0;border-radius:10px;
background:#222;color:#fff;text-align:left;font-size:15px;cursor:pointer
}
.menu-btn.active{background:#00c853}

.main{flex:1;padding:10px}
.title{font-size:22px;color:#00e5ff;margin-bottom:10px}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.card{
background:#111;border-radius:10px;overflow:hidden;border:0;color:#fff;
cursor:pointer
}
.card img{width:100%;height:150px;object-fit:cover;background:#000}
.card.tv img{object-fit:contain;padding:8px}
.card-title{padding:8px;font-size:14px}

#playerWrap{position:fixed;inset:0;background:#000;display:none;z-index:9999}
#videoPlayer{width:100%;height:100%}
#playerBar{position:absolute;top:10px;left:10px;display:flex;gap:8px}

.player-btn{
border:0;border-radius:10px;padding:10px;color:#fff;font-weight:bold
}
.btn-home{background:#2196f3}
.btn-close{background:#e53935}
.btn-player{background:#009688}
.btn-mx{background:#ff9800}

@media(max-width:800px){
.sidebar{width:140px}
}
</style>
</head>

<body>

<div class="app">

<!-- 🔥 MENU -->
<aside class="sidebar">
<div class="brand">TIEA IPTV</div>

<button class="menu-btn active"
data-title="📺 ทีวี"
data-source="https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/M3U/Dooball.json">
📺 ทีวี
</button>

<button class="menu-btn"
data-title="🎬 หนัง"
data-source="https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/Ezmovie.json">
🎬 หนัง
</button>

<button class="menu-btn"
data-title="📺 ซีรีส์"
data-source="https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/MySeries.json">
📺 ซีรีส์
</button>

<button class="menu-btn"
data-title="🎞️ Flixmono"
data-source="https://raw.githubusercontent.com/tiea9999/tv-online/main/Flixmono.json">
🎞️ Flixmono
</button>

<!-- ✅ FIX ตาราง -->
<button class="menu-btn"
onclick="window.location.href="live.html">
⚽ ตารางแข่งขัน
</button>

</aside>

<!-- 🔥 CONTENT -->
<main class="main">
<div id="pageTitle" class="title">📺 ทีวี</div>
<div id="grid" class="grid"></div>
</main>

</div>

<!-- 🔥 PLAYER -->
<div id="playerWrap">
<video id="videoPlayer" controls autoplay playsinline></video>

<div id="playerBar">
<button class="player-btn btn-home" onclick="closePlayer()">🏠</button>
<button class="player-btn btn-player" onclick="openExternal()">▶</button>
<button class="player-btn btn-mx" onclick="openMx()">MX</button>
<button class="player-btn btn-close" onclick="closePlayer()">✕</button>
</div>
</div>

<script>

const grid = document.getElementById("grid");
const video = document.getElementById("videoPlayer");
const playerWrap = document.getElementById("playerWrap");

let currentSource = document.querySelector(".menu-btn").dataset.source;
let currentTitle = "📺 ทีวี";
let currentUrl = "";
let hls = null;

// โหลดข้อมูล
async function loadMenu(){
grid.innerHTML = "กำลังโหลด...";
try{
const res = await fetch(currentSource);
const data = await res.json();

const list = Array.isArray(data) ? data : (data.channels || data.items || []);

render(list);

}catch(e){
grid.innerHTML = "โหลดไม่สำเร็จ";
}
}

// render
function render(list){
grid.innerHTML = "";

list.forEach(item=>{
const card = document.createElement("div");
card.className = "card";

card.innerHTML = `
<img src="${item.logo || item.image || ''}" onerror="this.style.display='none'">
<div class="card-title">${item.name || item.title}</div>
`;

card.onclick = ()=>{
const url = item.url || item.link || item.stream;

if(currentTitle.includes("หนัง")){
openExternalPlayer(url); // 🔥 หนังไม่เล่นเว็บ
}else{
play(url);
}
};

grid.appendChild(card);
});
}

// play
function play(url){
currentUrl = url;
playerWrap.style.display = "block";

if(hls){
hls.destroy();
hls = null;
}

if(url.includes(".m3u8")){
if(Hls.isSupported()){
hls = new Hls({
maxBufferLength:10,
maxMaxBufferLength:15
});
hls.loadSource(url);
hls.attachMedia(video);
}else{
video.src = url;
}
}else{
video.src = url;
}
}

// ปิด
function closePlayer(){
playerWrap.style.display = "none";
video.pause();
video.src = "";
if(hls){hls.destroy();hls=null;}
}

// external
function openExternal(){
openExternalPlayer(currentUrl);
}

function openExternalPlayer(url){
try{
const u = new URL(url);
location.href =
"intent://" + u.host + u.pathname + u.search +
"#Intent;scheme=" + u.protocol.replace(":","") +
";action=android.intent.action.VIEW;type=video/*;end";

setTimeout(()=>openMx(url),1000);
}catch(e){
openMx(url);
}
}

// mx
function openMx(){
location.href = "intent:" + currentUrl + "#Intent;package=com.mxtech.videoplayer.ad;end";
}

// menu click
document.querySelectorAll(".menu-btn").forEach(btn=>{
btn.onclick = async ()=>{
if(btn.dataset.source){
document.querySelectorAll(".menu-btn").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");

currentSource = btn.dataset.source;
currentTitle = btn.dataset.title;
document.getElementById("pageTitle").innerText = currentTitle;

await loadMenu();
}
};
});

loadMenu();

</script>
</body>
</html>
