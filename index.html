<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>TIEA IPTV TV MODE</title>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #0b0b0b;
      color: #fff;
      font-family: sans-serif;
      overflow: hidden;
    }

    .app {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    .sidebar {
      width: 240px;
      background: #111;
      border-right: 1px solid #222;
      padding: 14px 10px;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .brand {
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      color: #00e5ff;
      margin-bottom: 14px;
    }

    .menu-btn {
      width: 100%;
      background: #1a1a1a;
      border: 0;
      color: #fff;
      border-radius: 12px;
      padding: 14px 12px;
      margin-bottom: 10px;
      text-align: left;
      font-size: 16px;
      cursor: pointer;
      outline: none;
      transition: transform .12s ease, box-shadow .12s ease, background .12s ease;
    }

    .menu-btn:hover,
    .menu-btn:focus,
    .menu-btn.active,
    .menu-btn.active:focus {
      background: #00c853;
      box-shadow: 0 0 0 4px rgba(255,255,255,.22), 0 0 0 8px rgba(0,229,255,.28);
      transform: scale(1.03);
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      background: #0b0b0b;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .title {
      font-size: 22px;
      font-weight: bold;
      color: #00e5ff;
    }

    .subtext {
      font-size: 14px;
      color: #bbb;
    }

    .action-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .top-btn {
      background: #1c1c1c;
      border: 0;
      color: #fff;
      border-radius: 12px;
      padding: 12px 14px;
      cursor: pointer;
      font-size: 14px;
      outline: none;
      transition: transform .12s ease, box-shadow .12s ease, background .12s ease;
    }

    .top-btn:hover,
    .top-btn:focus {
      background: #2196f3;
      box-shadow: 0 0 0 4px rgba(255,255,255,.22), 0 0 0 8px rgba(33,150,243,.28);
      transform: scale(1.03);
    }

    .status-box {
      display: none;
      background: rgba(255,255,255,.08);
      color: #fff;
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 12px;
      font-size: 15px;
      font-weight: bold;
    }

    #remoteHint {
      display: block;
      background: rgba(0,229,255,.10);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }

    .card {
      background: #171717;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      outline: none;
      min-height: 210px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      transition: transform .12s ease, box-shadow .12s ease, background .12s ease;
    }

    .card:hover,
    .card:focus,
    .card.focused-remote {
      box-shadow: 0 0 0 4px #00e5ff, 0 0 0 8px rgba(255,255,255,.18);
      transform: scale(1.03);
      background: #222;
    }

    .thumb {
      width: 100%;
      height: 150px;
      background: #000;
      object-fit: contain;
    }

    .card-title {
      padding: 10px 8px 12px;
      font-size: 14px;
      text-align: center;
      line-height: 1.35;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .empty {
      padding: 30px 10px;
      text-align: center;
      color: #aaa;
    }

    #playerWrap {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 9999;
      display: none;
    }

    #videoPlayer {
      width: 100%;
      height: 100%;
      background: #000;
      object-fit: contain;
      pointer-events: auto;
    }

    #playerUi {
      position: absolute;
      top: 20px;
      left: 20px;
      right: 20px;
      z-index: 10060;
      display: flex !important;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: none;
      opacity: 1;
      transition: opacity .25s ease;
    }

    #playerLeft,
    #playerRight {
      display: flex !important;
      gap: 12px;
      flex-wrap: wrap;
      pointer-events: auto;
    }

    .player-btn {
      border: 0;
      border-radius: 14px;
      padding: 16px 20px;
      color: #fff;
      cursor: pointer;
      font-size: 17px;
      font-weight: bold;
      outline: none;
      opacity: 1;
      min-width: 110px;
      pointer-events: auto;
      transition: transform .12s ease, box-shadow .12s ease, background .12s ease;
    }

    .player-btn:hover,
    .player-btn:focus {
      box-shadow: 0 0 0 4px rgba(255,255,255,.28), 0 0 0 8px rgba(0,229,255,.35);
      transform: scale(1.06);
    }

    .home-btn { background: #2196f3; }
    .stop-btn { background: #8e24aa; }
    .close-btn { background: #e53935; }
    .mx-btn { background: #ff9800; }

    #playerStatus {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 16px;
      z-index: 10061;
      background: rgba(0,0,0,.72);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 16px;
      font-weight: bold;
      text-align: center;
      display: none;
      opacity: 1;
      transition: opacity .25s ease;
    }

    #playerWrap.ui-hidden #playerUi,
    #playerWrap.ui-hidden #playerStatus {
      opacity: 0;
      pointer-events: none;
    }

    @media (max-width: 900px) {
      .sidebar { width: 185px; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">TIEA IPTV</div>

      <button class="menu-btn active" tabindex="0"
        data-source="https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/M3U/Dooball.json"
        data-title="📺 ทีวี">📺 ทีวี</button>

      <button class="menu-btn" tabindex="0"
        data-source="https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/Ezmovie.json"
        data-title="🎬 หนัง">🎬 หนัง</button>

      <button class="menu-btn" tabindex="0"
        data-source="https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/MySeries.json"
        data-title="📺 ซีรีส์">📺 ซีรีส์</button>

      <button class="menu-btn" tabindex="0"
        data-link="live.html">⚽ ตารางแข่งขัน</button>
    </aside>

    <main class="content">
      <div class="topbar">
        <div>
          <div id="pageTitle" class="title">📺 ทีวี</div>
          <div class="subtext">ใช้รีโมทหรือเม้าท์เลือกได้</div>
        </div>
        <div class="action-row">
          <button id="focusFirstBtn" class="top-btn" tabindex="0">โฟกัสรายการแรก</button>
          <button id="reloadBtn" class="top-btn" tabindex="0">รีโหลด</button>
          <button id="homeTopBtn" class="top-btn" tabindex="0">หน้าโฮม</button>
        </div>
      </div>

      <div id="statusBox" class="status-box"></div>
      <div id="remoteHint" class="status-box">โฟกัส: -</div>
      <div id="grid" class="grid"></div>
    </main>
  </div>

  <div id="playerWrap">
    <video id="videoPlayer" playsinline autoplay muted tabindex="-1"></video>

    <div id="playerUi">
      <div id="playerLeft">
        <button id="playerHomeBtn" class="player-btn home-btn" tabindex="0">🏠 หน้าโฮม</button>
        <button id="playerStopBtn" class="player-btn stop-btn" tabindex="0">⏹ หยุด</button>
        <button id="playerCloseBtn" class="player-btn close-btn" tabindex="0">✕ ปิด</button>
      </div>
      <div id="playerRight">
        <button id="playerMxBtn" class="player-btn mx-btn" tabindex="0">▶ MX</button>
      </div>
    </div>

    <div id="playerStatus"></div>
  </div>

  <script>
    const grid = document.getElementById("grid");
    const pageTitle = document.getElementById("pageTitle");
    const statusBox = document.getElementById("statusBox");
    const remoteHint = document.getElementById("remoteHint");
    const playerWrap = document.getElementById("playerWrap");
    const playerStatus = document.getElementById("playerStatus");
    const video = document.getElementById("videoPlayer");
    const menuButtons = Array.from(document.querySelectorAll(".menu-btn"));

    let currentSource = menuButtons[0].dataset.source;
    let currentTitle = menuButtons[0].dataset.title || "📺 ทีวี";
    let currentList = [];
    let currentItem = null;
    let currentServerIndex = 0;
    let hls = null;
    let dashPlayer = null;
    let navigationStack = [];
    let playerUiTimer = null;

    function setStatus(msg) {
      statusBox.textContent = msg || "";
      statusBox.style.display = msg ? "block" : "none";
    }

    function setPlayerStatus(msg) {
      playerStatus.textContent = msg || "";
      playerStatus.style.display = msg ? "block" : "none";
    }

    function updateRemoteHint(el) {
      document.querySelectorAll(".focused-remote").forEach(x => x.classList.remove("focused-remote"));
      if (!el) {
        remoteHint.textContent = "โฟกัส: -";
        return;
      }
      el.classList.add("focused-remote");
      const cardTitle = el.querySelector?.(".card-title");
      const text = cardTitle ? cardTitle.textContent.trim() : el.textContent.trim();
      remoteHint.textContent = "โฟกัส: " + text;
    }

    document.addEventListener("focusin", (e) => updateRemoteHint(e.target));

    function showPlayerUiTemporarily() {
      playerWrap.classList.remove("ui-hidden");

      if (playerUiTimer) clearTimeout(playerUiTimer);

      if (!(currentTitle.includes("ซีรีส์") || pageTitle.textContent.includes("ตอนที่"))) {
        playerUiTimer = setTimeout(() => {
          if (playerWrap.style.display === "block") {
            playerWrap.classList.add("ui-hidden");
          }
        }, 3500);
      }
    }

    function clearPlayers() {
      if (hls) {
        try { hls.destroy(); } catch (e) {}
        hls = null;
      }
      if (dashPlayer) {
        try { dashPlayer.reset(); } catch (e) {}
        dashPlayer = null;
      }
      try { video.pause(); } catch (e) {}
      video.removeAttribute("src");
      video.load();
      setPlayerStatus("");
    }

    function showPlayer() {
      playerWrap.style.display = "block";
      video.style.display = "block";
      playerWrap.classList.remove("ui-hidden");

      setTimeout(() => {
        const btn = document.getElementById("playerHomeBtn");
        if (btn) {
          btn.focus();
          updateRemoteHint(btn);
        }
        showPlayerUiTemporarily();
      }, 50);
    }

    function closePlayer() {
      clearPlayers();
      playerWrap.style.display = "none";
      playerWrap.classList.remove("ui-hidden");
      if (playerUiTimer) clearTimeout(playerUiTimer);

      if (currentItem && currentItem._cardEl) {
        currentItem._cardEl.focus();
        updateRemoteHint(currentItem._cardEl);
      }
    }

    function stopPlayer() {
      try { video.pause(); } catch (e) {}
      try { video.currentTime = 0; } catch (e) {}
      setPlayerStatus("หยุดเล่นแล้ว");
      showPlayerUiTemporarily();
    }

    function goHome() {
      closePlayer();
      navigationStack = [];
      pageTitle.textContent = currentTitle;
      loadCurrentSource();
      const active = document.querySelector(".menu-btn.active") || menuButtons[0];
      if (active) {
        active.focus();
        updateRemoteHint(active);
      }
    }

    function getPlayableUrl(item, idx = 0) {
      if (!item) return "";
      if (Array.isArray(item.servers) && item.servers.length) {
        return item.servers[idx]?.url || item.servers[0]?.url || "";
      }
      return item.url || item.stream || item.link || item.source || "";
    }

    function getServerCount(item) {
      if (Array.isArray(item?.servers) && item.servers.length) return item.servers.length;
      return getPlayableUrl(item) ? 1 : 0;
    }

    function openMx(url) {
      if (!url) return;
      window.location.href = "intent:" + url + "#Intent;package=com.mxtech.videoplayer.ad;end";
    }

    function openSystemPlayer(url) {
      if (!url) return;
      try {
        const u = new URL(url);
        const intent =
          "intent://" + u.host + u.pathname + u.search +
          "#Intent;scheme=" + u.protocol.replace(":", "") +
          ";action=android.intent.action.VIEW;type=video/*;end";
        window.location.href = intent;
      } catch (e) {
        setPlayerStatus("เปิดตัวเล่นในเครื่องไม่ได้");
      }
    }

    function playItem(item, serverIndex = 0) {
      currentItem = item;
      currentServerIndex = serverIndex;
      clearPlayers();

      const url = getPlayableUrl(item, serverIndex);
      if (!url) {
        setPlayerStatus("ไม่พบลิงก์สตรีม");
        return;
      }

      const lower = url.toLowerCase();

      const fallbackToSystem = (reason = "เล่นผ่านเว็บไม่ได้") => {
        setPlayerStatus(reason + " กำลังเปิดตัวเล่นในเครื่อง...");
        openSystemPlayer(url);
      };

      if (currentTitle.includes("ซีรีส์") || pageTitle.textContent.includes("ตอนที่")) {
        window.location.href = url;
        return;
      }

      if (lower.includes(".m3u8")) {
        showPlayer();

        if (Hls.isSupported()) {
          hls = new Hls({
            enableWorker: true,
            autoStartLoad: true,
            manifestLoadingMaxRetry: 2,
            levelLoadingMaxRetry: 2,
            fragLoadingMaxRetry: 2
          });

          hls.loadSource(url);
          hls.attachMedia(video);

          hls.on(Hls.Events.MANIFEST_PARSED, () => {
            video.muted = true;
            video.play().then(() => {
              setTimeout(() => { video.muted = false; }, 300);
            }).catch(() => fallbackToSystem("HLS autoplay ไม่สำเร็จ"));
          });

          hls.on(Hls.Events.ERROR, (event, data) => {
            if (data && data.fatal) fallbackToSystem("สตรีมเว็บมีปัญหา");
          });
        } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
          video.src = url;
          video.muted = true;
          video.play().then(() => {
            setTimeout(() => { video.muted = false; }, 300);
          }).catch(() => fallbackToSystem("อุปกรณ์ไม่เล่น HLS"));
        } else {
          fallbackToSystem("อุปกรณ์ไม่รองรับ HLS");
        }
        return;
      }

      if (
        lower.endsWith(".mp4") ||
        lower.endsWith(".mkv") ||
        lower.endsWith(".avi") ||
        lower.endsWith(".mov")
      ) {
        showPlayer();
        video.src = url;
        video.muted = true;
        video.play().then(() => {
          setTimeout(() => { video.muted = false; }, 300);
        }).catch(() => fallbackToSystem("ไฟล์เล่นผ่านเว็บไม่ได้"));
        return;
      }

      if (lower.includes(".mpd")) {
        showPlayer();
        try {
          dashPlayer = dashjs.MediaPlayer().create();
          dashPlayer.initialize(video, url, true);
        } catch (e) {
          fallbackToSystem("DASH เล่นไม่ได้");
        }
        return;
      }

      fallbackToSystem("ลิงก์ชนิดนี้เหมาะกับตัวเล่นในเครื่อง");
    }

    function parseM3U(text) {
      const lines = text.split(/\r?\n/);
      const list = [];
      let current = null;

      for (const raw of lines) {
        const line = raw.trim();
        if (!line) continue;

        if (line.startsWith("#EXTINF:")) {
          const logoMatch = line.match(/tvg-logo="([^"]*)"/i);
          const groupMatch = line.match(/group-title="([^"]*)"/i);
          const name = line.split(",").pop()?.trim() || "ไม่ทราบชื่อ";
          current = {
            title: name,
            logo: logoMatch ? logoMatch[1] : "",
            group: groupMatch ? groupMatch[1] : "",
            url: "",
            servers: []
          };
        } else if (!line.startsWith("#") && current) {
          current.url = line;
          current.servers = [{ name: "Main", url: line }];
          list.push(current);
          current = null;
        }
      }
      return list;
    }

    function normalizeJson(data) {
      let list = [];

      if (Array.isArray(data)) {
        list = data.map(item => {
          if (Array.isArray(item.episodes) && item.episodes.length) {
            return {
              title: item.title || item.name || "ไม่มีชื่อ",
              logo: item.poster || item.logo || item.image || "",
              type: "folder",
              items: item.episodes.map((ep, idx) => ({
                title: ep.title || ep.name || `ตอนที่ ${idx + 1}`,
                logo: ep.poster || ep.logo || ep.image || item.poster || item.logo || item.image || "",
                url: ep.url || ep.stream || ep.link || ep.source || "",
                group: item.title || item.name || "",
                type: "video",
                servers: Array.isArray(ep.servers) ? ep.servers.filter(s => s && s.url) : []
              }))
            };
          }

          return {
            title: item.title || item.name || "ไม่มีชื่อ",
            logo: item.logo || item.poster || item.image || "",
            url: item.url || item.stream || item.link || item.source || "",
            group: item.group || item.category || "",
            type: item.type || "video",
            servers: Array.isArray(item.servers) ? item.servers.filter(x => x && x.url) : []
          };
        });
      } else if (data.channels && Array.isArray(data.channels)) {
        list = data.channels.map(item => ({
          title: item.title || item.name || "ไม่มีชื่อ",
          logo: item.logo || item.poster || item.image || "",
          url: item.url || item.stream || item.link || item.source || "",
          group: item.group || item.category || "",
          type: item.type || "video",
          servers: Array.isArray(item.servers) ? item.servers.filter(x => x && x.url) : []
        }));
      } else if (data.groups && Array.isArray(data.groups)) {
        data.groups.forEach(g => {
          (g.items || g.stations || []).forEach(item => {
            if (Array.isArray(item.episodes) && item.episodes.length) {
              list.push({
                title: item.title || item.name || "ไม่มีชื่อ",
                logo: item.poster || item.logo || item.image || "",
                type: "folder",
                items: item.episodes.map((ep, idx) => ({
                  title: ep.title || ep.name || `ตอนที่ ${idx + 1}`,
                  logo: ep.poster || ep.logo || ep.image || item.poster || item.logo || item.image || "",
                  url: ep.url || ep.stream || ep.link || ep.source || "",
                  group: item.title || item.name || "",
                  type: "video",
                  servers: Array.isArray(ep.servers) ? ep.servers.filter(s => s && s.url) : []
                }))
              });
            } else {
              list.push({
                title: item.title || item.name || "ไม่มีชื่อ",
                logo: item.logo || item.poster || item.image || g.image || g.logo || "",
                url: item.url || item.stream || item.link || item.source || "",
                group: g.title || g.name || "",
                type: item.type || "video",
                servers: Array.isArray(item.servers) ? item.servers.filter(x => x && x.url) : []
              });
            }
          });
        });
      } else if (data.items && Array.isArray(data.items)) {
        list = data.items.map(item => {
          if (Array.isArray(item.episodes) && item.episodes.length) {
            return {
              title: item.title || item.name || "ไม่มีชื่อ",
              logo: item.poster || item.logo || item.image || "",
              type: "folder",
              items: item.episodes.map((ep, idx) => ({
                title: ep.title || ep.name || `ตอนที่ ${idx + 1}`,
                logo: ep.poster || ep.logo || ep.image || item.poster || item.logo || item.image || "",
                url: ep.url || ep.stream || ep.link || ep.source || "",
                group: item.title || item.name || "",
                type: "video",
                servers: Array.isArray(ep.servers) ? ep.servers.filter(s => s && s.url) : []
              }))
            };
          }

          return {
            title: item.title || item.name || "ไม่มีชื่อ",
            logo: item.logo || item.poster || item.image || "",
            url: item.url || item.stream || item.link || item.source || "",
            group: item.group || item.category || "",
            type: item.type || "",
            servers: Array.isArray(item.servers) ? item.servers.filter(x => x && x.url) : []
          };
        });
      }

      return list.map(item => {
        if ((!item.url || item.url === "") && item.servers?.length) {
          item.url = item.servers[0].url;
        }
        return item;
      }).filter(item =>
        item.url ||
        item.servers?.length ||
        item.type === "source" ||
        item.type === "folder" ||
        (Array.isArray(item.items) && item.items.length)
      );
    }

    async function loadSource(sourceUrl) {
      if (!sourceUrl) return { mode: "items", data: [] };

      const lower = sourceUrl.toLowerCase();

      if (lower.endsWith(".m3u8") && !lower.includes(".json")) {
        return {
          mode: "items",
          data: [{
            title: "Live Stream",
            logo: "",
            url: sourceUrl,
            group: "",
            servers: [{ name: "Main", url: sourceUrl }]
          }]
        };
      }

      const res = await fetch(sourceUrl);
      if (!res.ok) throw new Error("โหลดไฟล์ไม่สำเร็จ: " + res.status);

      const text = await res.text();
      const trimmed = text.trim();

      if (!trimmed) return { mode: "items", data: [] };

      if (trimmed.startsWith("{") || trimmed.startsWith("[")) {
        const parsed = JSON.parse(text);

        if (
          parsed &&
          !Array.isArray(parsed) &&
          parsed.type === "menu" &&
          Array.isArray(parsed.items)
        ) {
          return {
            mode: "menu",
            title: parsed.title || "",
            data: parsed.items.map(item => ({
              title: item.title || item.name || "ไม่มีชื่อ",
              source: item.source || item.url || "",
              type: item.type || "source",
              logo: item.logo || item.image || ""
            }))
          };
        }

        return {
          mode: "items",
          data: normalizeJson(parsed)
        };
      }

      if (text.includes("#EXTM3U") || text.includes("#EXTINF")) {
        return {
          mode: "items",
          data: parseM3U(text)
        };
      }

      return { mode: "items", data: [] };
    }

    function renderGrid(result) {
      grid.innerHTML = "";
      const list = result?.data || [];

      if (!list.length) {
        grid.innerHTML = `<div class="empty">ไม่พบรายการ</div>`;
        return;
      }

      if (result.mode === "menu") {
        list.forEach((item, index) => {
          const card = document.createElement("div");
          card.className = "card";
          card.tabIndex = 0;
          card.innerHTML = `
            <img class="thumb" src="${item.logo || ""}" onerror="this.style.display='none'">
            <div class="card-title">${item.title || "ไม่มีชื่อ"}</div>
          `;

          card.onclick = async () => {
            if (!item.source) return;
            navigationStack.push({
              source: currentSource,
              title: pageTitle.textContent,
              inlineData: currentList
            });
            currentSource = item.source;
            pageTitle.textContent = item.title || pageTitle.textContent;
            await loadCurrentSource();
          };

          card.onmousedown = (e) => {
            e.preventDefault();
            card.click();
          };

          card.onkeydown = (e) => {
            if (e.key === "Enter") {
              e.preventDefault();
              card.click();
            }
          };

          grid.appendChild(card);

          if (index === 0) {
            setTimeout(() => {
              card.focus();
              updateRemoteHint(card);
            }, 100);
          }
        });
        return;
      }

      list.forEach((item, index) => {
        const card = document.createElement("div");
        card.className = "card";
        card.tabIndex = 0;
        card.innerHTML = `
          <img class="thumb" src="${item.logo || ""}" onerror="this.style.display='none'">
          <div class="card-title">${item.title || "ไม่มีชื่อ"}</div>
        `;

        if (item.type === "folder" || (Array.isArray(item.items) && item.items.length)) {
          card.onclick = () => {
            navigationStack.push({
              source: currentSource,
              title: pageTitle.textContent,
              inlineData: currentList
            });
            pageTitle.textContent = item.title || pageTitle.textContent;
            currentList = { mode: "items", data: item.items };
            renderGrid(currentList);
          };

          card.onmousedown = (e) => {
            e.preventDefault();
            card.click();
          };
        } else if (item.type === "source" && item.url) {
          card.onclick = async () => {
            navigationStack.push({
              source: currentSource,
              title: pageTitle.textContent,
              inlineData: currentList
            });
            currentSource = item.url;
            pageTitle.textContent = item.title || pageTitle.textContent;
            await loadCurrentSource();
          };

          card.onmousedown = (e) => {
            e.preventDefault();
            card.click();
          };
        } else {
          card.onclick = () => playItem(item, 0);
          card.onmousedown = (e) => {
            e.preventDefault();
            playItem(item, 0);
          };
        }

        card.onkeydown = (e) => {
          if (e.key === "Enter") {
            e.preventDefault();
            card.click();
          }
        };

        item._cardEl = card;
        grid.appendChild(card);

        if (index === 0) {
          setTimeout(() => {
            card.focus();
            updateRemoteHint(card);
          }, 100);
        }
      });
    }

    async function loadCurrentSource() {
      try {
        setStatus("กำลังโหลดรายการ...");
        const result = await loadSource(currentSource);
        currentList = result;
        renderGrid(result);
        setStatus("");
      } catch (e) {
        console.error(e);
        setStatus("โหลดรายการไม่สำเร็จ");
        grid.innerHTML = `<div class="empty">โหลดรายการไม่สำเร็จ</div>`;
      }
    }

    function focusByDelta(currentEl, key) {
      const cards = Array.from(document.querySelectorAll("#grid .card"));
      const menuBtns = Array.from(document.querySelectorAll(".menu-btn"));
      const topBtns = Array.from(document.querySelectorAll(".top-btn"));
      const playerBtns = Array.from(document.querySelectorAll("#playerWrap .player-btn"));

      const inPlayer = playerWrap.style.display === "block";

      if (inPlayer) {
        const idx = playerBtns.indexOf(currentEl);
        if (idx !== -1) {
          if (key === "ArrowRight" && idx < playerBtns.length - 1) {
            playerBtns[idx + 1].focus();
            updateRemoteHint(playerBtns[idx + 1]);
            return true;
          }
          if (key === "ArrowLeft" && idx > 0) {
            playerBtns[idx - 1].focus();
            updateRemoteHint(playerBtns[idx - 1]);
            return true;
          }
        }
        return false;
      }

      if (!currentEl) return false;

      if (currentEl.classList.contains("menu-btn")) {
        const idx = menuBtns.indexOf(currentEl);
        if (key === "ArrowDown" && idx < menuBtns.length - 1) {
          menuBtns[idx + 1].focus();
          updateRemoteHint(menuBtns[idx + 1]);
          return true;
        }
        if (key === "ArrowUp" && idx > 0) {
          menuBtns[idx - 1].focus();
          updateRemoteHint(menuBtns[idx - 1]);
          return true;
        }
        if (key === "ArrowRight") {
          if (topBtns[0]) {
            topBtns[0].focus();
            updateRemoteHint(topBtns[0]);
            return true;
          }
          if (cards[0]) {
            cards[0].focus();
            updateRemoteHint(cards[0]);
            return true;
          }
        }
      }

      if (currentEl.classList.contains("top-btn")) {
        const idx = topBtns.indexOf(currentEl);
        if (key === "ArrowRight" && idx < topBtns.length - 1) {
          topBtns[idx + 1].focus();
          updateRemoteHint(topBtns[idx + 1]);
          return true;
        }
        if (key === "ArrowLeft" && idx > 0) {
          topBtns[idx - 1].focus();
          updateRemoteHint(topBtns[idx - 1]);
          return true;
        }
        if (key === "ArrowLeft" && idx === 0) {
          const activeMenu = document.querySelector(".menu-btn.active") || menuBtns[0];
          activeMenu.focus();
          updateRemoteHint(activeMenu);
          return true;
        }
        if (key === "ArrowDown" && cards[0]) {
          cards[0].focus();
          updateRemoteHint(cards[0]);
          return true;
        }
      }

      if (currentEl.classList.contains("card")) {
        const idx = cards.indexOf(currentEl);
        if (idx === -1) return false;
        const cols = Math.max(1, Math.floor(grid.clientWidth / 172));

        if (key === "ArrowRight" && idx < cards.length - 1) {
          cards[idx + 1].focus();
          updateRemoteHint(cards[idx + 1]);
          return true;
        }
        if (key === "ArrowLeft") {
          if (idx > 0) {
            cards[idx - 1].focus();
            updateRemoteHint(cards[idx - 1]);
            return true;
          } else {
            const activeMenu = document.querySelector(".menu-btn.active") || menuBtns[0];
            activeMenu.focus();
            updateRemoteHint(activeMenu);
            return true;
          }
        }
        if (key === "ArrowDown" && idx + cols < cards.length) {
          cards[idx + cols].focus();
          updateRemoteHint(cards[idx + cols]);
          return true;
        }
        if (key === "ArrowUp") {
          if (idx - cols >= 0) {
            cards[idx - cols].focus();
            updateRemoteHint(cards[idx - cols]);
            return true;
          } else if (topBtns[0]) {
            topBtns[0].focus();
            updateRemoteHint(topBtns[0]);
            return true;
          }
        }
      }

      return false;
    }

    menuButtons.forEach(btn => {
      btn.addEventListener("click", async () => {
        menuButtons.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");

        navigationStack = [];

        if (btn.dataset.link) {
          window.location.href = btn.dataset.link;
          return;
        }

        currentSource = btn.dataset.source || "";
        currentTitle = btn.dataset.title || btn.textContent.trim();
        pageTitle.textContent = currentTitle;
        await loadCurrentSource();
      });

      btn.onmousedown = (e) => {
        e.preventDefault();
        btn.click();
      };

      btn.addEventListener("keydown", e => {
        if (e.key === "Enter") {
          e.preventDefault();
          btn.click();
        }
      });
    });

    document.getElementById("reloadBtn").onclick = loadCurrentSource;
    document.getElementById("reloadBtn").onmousedown = (e) => {
      e.preventDefault();
      loadCurrentSource();
    };

    document.getElementById("focusFirstBtn").onclick = () => {
      const firstCard = grid.querySelector(".card");
      if (firstCard) {
        firstCard.focus();
        updateRemoteHint(firstCard);
      }
    };
    document.getElementById("focusFirstBtn").onmousedown = (e) => {
      e.preventDefault();
      const firstCard = grid.querySelector(".card");
      if (firstCard) {
        firstCard.focus();
        updateRemoteHint(firstCard);
      }
    };

    document.getElementById("homeTopBtn").onclick = () => {
      navigationStack = [];
      const active = document.querySelector(".menu-btn.active") || menuButtons[0];
      if (active) {
        active.focus();
        updateRemoteHint(active);
      }
      pageTitle.textContent = currentTitle;
    };
    document.getElementById("homeTopBtn").onmousedown = (e) => {
      e.preventDefault();
      navigationStack = [];
      const active = document.querySelector(".menu-btn.active") || menuButtons[0];
      if (active) {
        active.focus();
        updateRemoteHint(active);
      }
      pageTitle.textContent = currentTitle;
    };

    document.getElementById("playerHomeBtn").onclick = goHome;
    document.getElementById("playerHomeBtn").onmousedown = (e) => {
      e.preventDefault();
      goHome();
    };

    document.getElementById("playerStopBtn").onclick = stopPlayer;
    document.getElementById("playerStopBtn").onmousedown = (e) => {
      e.preventDefault();
      stopPlayer();
    };

    document.getElementById("playerCloseBtn").onclick = closePlayer;
    document.getElementById("playerCloseBtn").onmousedown = (e) => {
      e.preventDefault();
      closePlayer();
    };

    document.getElementById("playerMxBtn").onclick = () => {
      const url = getPlayableUrl(currentItem, currentServerIndex);
      openMx(url);
    };
    document.getElementById("playerMxBtn").onmousedown = (e) => {
      e.preventDefault();
      const url = getPlayableUrl(currentItem, currentServerIndex);
      openMx(url);
    };

    playerWrap.addEventListener("mousemove", () => {
      if (playerWrap.style.display === "block") {
        showPlayerUiTemporarily();
      }
    });

    playerWrap.addEventListener("mousedown", () => {
      if (playerWrap.style.display === "block") {
        showPlayerUiTemporarily();
      }
    });

    document.addEventListener("keydown", function (e) {
      const inPlayer = playerWrap.style.display === "block";

      if (inPlayer) {
        showPlayerUiTemporarily();
      }

      if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.key)) {
        const moved = focusByDelta(document.activeElement, e.key);
        if (moved) {
          e.preventDefault();
          return;
        }
      }

      if (inPlayer) {
        if (
          e.key === "Escape" ||
          e.key === "Backspace" ||
          e.key === "BrowserBack" ||
          e.key === "GoBack" ||
          e.key === "Back" ||
          e.keyCode === 27 ||
          e.keyCode === 8 ||
          e.keyCode === 10009
        ) {
          e.preventDefault();
          closePlayer();
          navigationStack = [];
          pageTitle.textContent = currentTitle;
          loadCurrentSource();
          return;
        }

        const playerBtns = Array.from(document.querySelectorAll("#playerWrap .player-btn"));
        const idx = playerBtns.indexOf(document.activeElement);

        if (playerBtns.length) {
          if ((e.key === "ArrowRight" || e.keyCode === 39) && idx < playerBtns.length - 1) {
            e.preventDefault();
            playerBtns[idx + 1].focus();
            updateRemoteHint(playerBtns[idx + 1]);
            return;
          }

          if ((e.key === "ArrowLeft" || e.keyCode === 37) && idx > 0) {
            e.preventDefault();
            playerBtns[idx - 1].focus();
            updateRemoteHint(playerBtns[idx - 1]);
            return;
          }

          if ((e.key === "Enter" || e.keyCode === 13) && document.activeElement?.classList.contains("player-btn")) {
            e.preventDefault();
            document.activeElement.click();
            return;
          }
        }
      }

      if ((e.key === "Escape" || e.key === "Backspace") && !inPlayer) {
        if (navigationStack.length > 0) {
          e.preventDefault();
          const prev = navigationStack.pop();
          currentSource = prev.source;
          pageTitle.textContent = prev.title;

          if (prev.inlineData) {
            currentList = prev.inlineData;
            renderGrid(currentList);
          } else {
            loadCurrentSource();
          }
          return;
        }

        const activeEl = document.activeElement;
        if (activeEl?.classList?.contains("card")) {
          e.preventDefault();
          const activeMenu = document.querySelector(".menu-btn.active") || menuButtons[0];
          activeMenu.focus();
          updateRemoteHint(activeMenu);
        }
      }
    });

    loadCurrentSource();
  </script>
</body>
</html>
