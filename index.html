<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIEA IPTV FIX REAL</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;}
.menu{display:flex;gap:10px;padding:10px;background:#111;flex-wrap:wrap;}
.menu button{padding:8px 12px;background:#333;color:#fff;border:none;border-radius:6px;cursor:pointer;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;padding:10px;}
.card{background:#111;padding:8px;border-radius:10px;cursor:pointer;text-align:center;}
img{width:100%;height:200px;object-fit:cover;border-radius:8px;}

#player{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:none;z-index:999;}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:none;z-index:998;}
video,iframe{width:100%;height:100%;}
</style>
</head>

<body>

<div class="menu" id="menu"></div>
<div class="grid" id="grid"></div>

<div id="overlay"></div>
<div id="player">
<video id="video" controls autoplay playsinline></video>
</div>

<script>

const PROXY = "https://iptv.tawatchai250958.workers.dev/?url=";

const PLAYLISTS = [
{name:"ซีรีย์มาใหม่",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/new.json"},
{name:"ซีรี่ย์จีน",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/chinese.json"},
{name:"ซีรี่ย์ญี่ปุ่น",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/japan.json"},
{name:"ซีรี่ย์เกาหลี",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/korea.json"},
{name:"ซีรี่ย์ไทย",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/thai.json"},
{name:"ซีรีย์แนวตั้ง",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/short.json"}
];

let grid=document.getElementById("grid");
let video=document.getElementById("video");
let hls=null;

/* MENU */
const menu=document.getElementById("menu");
PLAYLISTS.forEach(pl=>{
let btn=document.createElement("button");
btn.textContent=pl.name;
btn.onclick=()=>load(pl.url);
menu.appendChild(btn);
});

/* LOAD */
async function load(url){
grid.innerHTML="กำลังโหลด...";
try{
let res=await fetch(url);
let data=await res.json();

if(!Array.isArray(data)){
grid.innerHTML="❌ JSON ไม่ถูกต้อง";
return;
}

render(data);

}catch(e){
grid.innerHTML="❌ โหลดไม่ได้";
}
}

/* SHOW MOVIES */
function render(data){
grid.innerHTML="";
data.forEach(item=>{

let div=document.createElement("div");
div.className="card";

div.innerHTML=`
<img src="${item.image || ''}">
<div>${item.title || 'ไม่มีชื่อ'}</div>
`;

div.onclick=()=>showEpisodes(item);

grid.appendChild(div);

});
}

/* SHOW EP */
function showEpisodes(item){
grid.innerHTML="";

if(!item.episodes){
grid.innerHTML="❌ ไม่มีตอน";
return;
}

item.episodes.forEach(ep=>{
let div=document.createElement("div");
div.className="card";
div.textContent=ep.name;

div.onclick=()=>playServers(ep.servers);

grid.appendChild(div);
});
}

/* RESET */
function reset(){
if(hls){hls.destroy();hls=null;}
video.pause();
video.src="";
}

/* PLAY */
function play(url){

url = PROXY + encodeURIComponent(url);

return new Promise((resolve,reject)=>{

if(url.includes(".m3u8") && Hls.isSupported()){
hls=new Hls();
hls.loadSource(url);
hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED,()=>{
video.play().then(resolve);
});

hls.on(Hls.Events.ERROR,(e,d)=>{
if(d.fatal) reject();
});
return;
}

/* MP4 */
video.src=url;
video.onloadeddata=()=>{
video.play().then(resolve);
};
video.onerror=reject;

});
}

/* SERVER */
async function playServers(servers){

document.getElementById("overlay").style.display="block";
document.getElementById("player").style.display="block";

for(let s of servers){

let url=s.url;

/* iframe */
if(!url.includes(".m3u8") && !url.includes(".mp4")){
document.getElementById("player").innerHTML=
`<iframe src="${url}" allowfullscreen></iframe>`;
return;
}

try{
await play(url);
return;
}catch(e){
continue;
}

}

alert("❌ ไม่มี server ใช้ได้");

}

/* CLOSE */
document.getElementById("overlay").onclick=()=>{
reset();
document.getElementById("overlay").style.display="none";
document.getElementById("player").style.display="none";
};

</script>

</body>
</html>
