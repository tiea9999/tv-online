<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIEA IPTV</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#020617;
    color:#fff;
    display:flex;
}

.sidebar{
    width:200px;
    background:#0f172a;
    height:100vh;
    padding:10px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.logo{
    text-align:center;
    font-size:18px;
    font-weight:bold;
    color:#00e5ff;
    margin-bottom:10px;
}

.menu-btn{
    padding:10px;
    background:#1e293b;
    border:none;
    color:#fff;
    border-radius:8px;
    cursor:pointer;
    text-align:left;
}

.menu-btn.active{
    background:#00e5ff;
    color:#000;
    font-weight:bold;
}

.content{
    flex:1;
    padding:10px;
    overflow:auto;
}

.row-title{
    margin:10px 0;
    font-size:18px;
    color:#00e5ff;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
    gap:10px;
}

.card{
    background:#1e293b;
    border-radius:10px;
    overflow:hidden;
    cursor:pointer;
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card-title{
    padding:8px;
    font-size:13px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}
</style>
</head>

<body>

<div class="sidebar">
    <div class="logo">TIEA IPTV</div>

    <button class="menu-btn active" onclick="loadSource(tv)">📺 ทีวี</button>
    <button class="menu-btn" onclick="loadSource(movie)">🎬 หนัง</button>
    <button class="menu-btn" onclick="loadSource(series)">📺 ซีรีส์</button>
    <button class="menu-btn" onclick="loadSource(vip)">🔐 VIP</button>
    <button class="menu-btn" onclick="goLive()">⚽ ตารางแข่งขัน</button>
</div>

<div class="content" id="content"></div>

<script>
const tv = "https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/M3U/Dooball.json";
const movie = "https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/Ezmovie.json";
const vip = "https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/Vip.json";
const series = "https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/series_menu.json";

async function loadSource(url){
    try{
        const res = await fetch(url);
        const data = await res.json();
        render(data);
    }catch{
        document.getElementById("content").innerHTML = "โหลดไม่สำเร็จ";
    }
}

function render(data){
    const c = document.getElementById("content");
    c.innerHTML = "";

    if(data.type === "menu"){
        data.items.forEach(item=>{
            const div = document.createElement("div");
            div.className = "row-title";
            div.innerText = item.title;
            div.onclick = ()=>loadSource(item.source);
            c.appendChild(div);
        });
        return;
    }

    if(data.groups){
        data.groups.forEach(g=>{
            const title = document.createElement("div");
            title.className = "row-title";
            title.innerText = g.name;
            c.appendChild(title);

            const grid = document.createElement("div");
            grid.className = "grid";

            g.items.forEach(item=>{
                const card = document.createElement("div");
                card.className = "card";

                card.innerHTML = `
                    <img src="${item.image || ''}">
                    <div class="card-title">${item.name}</div>
                `;

                card.onclick = ()=>{
                    if(item.url){
                        window.location.href = "intent:" + item.url + "#Intent;package=com.mxtech.videoplayer.ad;end";
                    }
                };

                grid.appendChild(card);
            });

            c.appendChild(grid);
        });
    }
}

function goLive(){
    window.location.href = "live-old.html";
}

loadSource(tv);
</script>

</body>
</html>
