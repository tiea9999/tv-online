<!DOCTYPE html>

<html lang="th">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TIEA IPTV</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">

    <link rel="icon"
        href="https://raw.githubusercontent.com/tiea9999/tv-online/main/logo.png">

    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        header {
            font-size: 28px;
            padding: 20px;
            background: #020617;
        }

        .logo {
            width: 90px;
            margin-top: 15px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            padding: 30px;
            max-width: 900px;
            margin: auto;
        }

        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            text-decoration: none;
            color: white;
            transition: 0.25s;
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 10px #3b82f6;
        }

        .card img {
            width: 60px;
            margin-bottom: 10px;
        }
    </style>

</head>

<body>

    <img class="logo" src="https://dl.dropboxusercontent.com/scl/fi/nfxxskq5ydbebgvs1lcfi/output_857d150a-0947-4571-a612-402b9466aa4d_512x512_1773067860534.png">

    <header>TIEA IPTV</header>

    <div class="grid">

        <a class="card" href="inwhd.html">
            <img src="https://cdn-icons-png.flaticon.com/512/3659/3659899.png">
            <div>📺 TV</div>
        </a>

        <a class="card" href="iptv.html">
            <img src="https://cdn-icons-png.flaticon.com/512/3659/3659899.png">
            <div>📡 IPTV</div>
        </a>

        <a class="card" href="24hd.html">
            <img src="https://cdn-icons-png.flaticon.com/512/3659/3659784.png">

        </a>

        <a class="card" href="seriesday.html">
            <img src="https://cdn-icons-png.flaticon.com/512/3659/3659784.png">
            <div>📺 ซีรีย์</div>
        </a>

        <a class="card" href="MOVIE03.html">
            <img src="https://cdn-icons-png.flaticon.com/512/3659/3659784.png">

        </a>

            <img src="https://cdn-icons-png.flaticon.com/512/1828/1828884.png">
            <div>⭐ VIP</div>
        </a>

    <script>
        if("serviceWorker" in navigator){

navigator.serviceWorker.register("sw.js");

}
