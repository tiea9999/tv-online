<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIEA IPTV</title>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            background: #000;
            color: #fff;
            overflow: hidden;
        }

        #menu {
            width: 220px;
            background: #111;
            padding: 15px;
            overflow-y: auto;
        }

        .menu-link {
            padding: 10px;
            margin-bottom: 5px;
            cursor: pointer;
            border-radius: 6px;
        }

        .menu-link:hover {
            background: #e94560;
        }

        .menu-title {
            margin-top: 10px;
            padding: 10px;
            background: #222;
            border-radius: 6px;
        }

        #main-player {
            flex: 1;
            position: relative;
            background: #000;
        }

        #welcome {
            text-align: center;
            margin-top: 100px;
        }

        #iframePlayer,
        #videoPlayer {
            position: absolute;
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }

        /* FLOAT PLAYER */
        #floatingPlayer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: none;
            z-index: 9999;
        }

        #playerControls {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
        }

        #playerControls button {
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            border: none;
            padding: 8px;
            border-radius: 6px;
        }

        #floatFrame {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* LOGO */
        #appLogo {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 60px;
            opacity: 0.8;
            z-index: 9999;
        }
    </style>
</head>

<body>

    <img id="appLogo" src="https://www.dropbox.com/scl/fi/qmxborwldhasptwy7e25v/TIEA-IPTV.png?rlkey=lskyoeb3637zo3eqa3j4ye0uy&dl=1">

    <div id="menu">

        <div class="menu-title">📺 ทีวี</div>
        <div class="menu-link" data-url="https://tiea9999.github.io/tv-online/ball66.html">DOOBALL66TV</div>

        <div class="menu-title">🎬 หนัง</div>
        <div class="menu-link" data-url="https://tiea9999.github.io/tv-online/037hd.html">037HD</div>

        <div class="menu-title">📺 ซีรีส์</div>
        <div class="menu-link" data-url="https://tiea9999.github.io/tv-online/flixmono.html">FLIXMONO</div>

        <div class="menu-title">🔐 VIP</div>
        <div class="menu-link" data-url="https://tiea9999.github.io/tv-online/VIP.html" data-pass="9999">เข้า VIP</div>

    </div>

    <div id="main-player">
        <div id="welcome">
            <h1>TIEA IPTV</h1>
        </div>

        <iframe id="iframePlayer" allow="autoplay; fullscreen"></iframe>
        <video id="videoPlayer" controls playsinline></video>
    </div>

    <!-- PLAYER -->
    <div id="floatingPlayer">
        <div id="playerControls">
            <button id="closePlayer">✕</button>
        </div>
        <iframe id="floatFrame"></iframe>
    </div>

    <script>
        const links=document.querySelectorAll(".menu-link");
const iframe=document.getElementById("iframePlayer");
const video=document.getElementById("videoPlayer");
const welcome=document.getElementById("welcome");

const floatPlayer=document.getElementById("floatingPlayer");
const floatFrame=document.getElementById("floatFrame");

links.forEach(link=>{
  link.addEventListener("click",()=>{

    const url=link.dataset.url;
    const pass=link.dataset.pass;

    if(pass){
      const input=prompt("ใส่รหัส VIP");
      if(input!==pass)return;
    }

    // 🎬 หนัง/ซีรีส์/VIP
    if(url.includes("037hd") || url.includes("flixmono") || url.includes("VIP")){
      floatFrame.src=url;
      floatPlayer.style.display="block";
      return;
    }

    // 📺 ถ้าเป็น m3u8 → ใช้ HLS
    if(url.includes(".m3u8")){
      iframe.style.display="none";
      video.style.display="block";

      if(Hls.isSupported()){
        const hls=new Hls({maxBufferLength:10});
        hls.loadSource(url);
        hls.attachMedia(video);
      }else{
        video.src=url;
      }

      video.volume=0.8;
      video.play();
      return;
    }

    // 📺 fallback iframe (3BB)
    video.style.display="none";
    iframe.style.display="block";

    iframe.src=url;
  });
});

// close
document.getElementById("closePlayer").onclick=()=>{
  floatPlayer.style.display="none";
  floatFrame.src="";
};
    </script>

</body>

</html>
