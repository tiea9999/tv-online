<!-- 🔥 เฉพาะ SCRIPT ส่วนสำคัญที่แก้ -->
<script>

const movieAPI = "movie.json";
const seriesAPI = "series.json";

const links = document.querySelectorAll(".menu-link");
const iframe = document.getElementById("iframePlayer");
const welcome = document.getElementById("welcome");

// 🔥 ฟังก์ชันโหลด JSON
async function loadJSON(type){
  let url = type === "movie" ? movieAPI : seriesAPI;

  const res = await fetch(url);
  const data = await res.json();

  showList(type === "movie" ? data.movies : data.series);
}

// 🔥 แสดงรายการแทน iframe
function showList(list){
  iframe.style.display="none";
  welcome.style.display="none";

  let html = '<div style="display:flex;flex-wrap:wrap;gap:15px;justify-content:center;padding:20px;">';

  list.forEach(item=>{
    html += `
      <div onclick="playVideo('${item.url}')"
      style="width:120px;cursor:pointer;text-align:center;">
        <img src="${item.image}" style="width:100%;border-radius:10px;">
        <div style="font-size:12px;margin-top:5px;">${item.name}</div>
      </div>
    `;
  });

  html += "</div>";

  document.getElementById("main-player").innerHTML = html;
}

// 🔥 เล่นวิดีโอ
function playVideo(url){
  window.location.href = "player.html?url=" + encodeURIComponent(url);
}

// 🔥 ดักเมนูหนัง/ซีรีส์
links.forEach(link=>{
  link.addEventListener("click",(e)=>{

    const menu = link.closest(".submenu");

    // 🎬 หนัง
    if(menu && menu.id === "movieMenu"){
      e.preventDefault();
      loadJSON("movie");
      return;
    }

    // 📺 ซีรีส์
    if(menu && menu.id === "seriesMenu"){
      e.preventDefault();
      loadJSON("series");
      return;
    }

  });
});

</script>
