<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>TIEA IPTV ULTRA FINAL NETFLIX + AUTO FIX</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #060606;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }
    :root{
      --bg:#060606;
      --panel:#111;
      --panel2:#171717;
      --line:#2a2a2a;
      --accent:#00d0ff;
      --accent2:#00ff95;
      --danger:#ff5252;
      --text:#fff;
      --muted:#a9a9a9;
      --focus:0 0 0 3px rgba(0,208,255,.95),0 0 18px rgba(0,208,255,.55);
    }
    .app {
      display: flex;
      width: 100vw;
      height: 100vh;
      background: radial-gradient(circle at top right, rgba(0,208,255,.08), transparent 25%), #060606;
    }
    .sidebar {
      width: 235px;
      min-width: 235px;
      height: 100%;
      background: linear-gradient(180deg,#111,#0b0b0b);
      border-right: 1px solid var(--line);
      overflow-y: auto;
      padding: 14px 10px 90px;
    }
    .brand {
      text-align: center;
      font-weight: 900;
      font-size: 26px;
      color: var(--accent);
      letter-spacing: 1px;
      margin: 4px 0 14px;
      text-shadow: 0 0 18px rgba(0,208,255,.35);
    }
    .subbrand {
      color: #9befff;
      font-size: 12px;
      margin-top: 2px;
    }
    .group-title {
      color: #9fd4e0;
      font-size: 12px;
      margin: 18px 8px 8px;
      opacity: .9;
    }
    .menu-btn, .focusable {
      outline: none;
    }
    .menu-btn {
      display: block;
      width: 100%;
      text-align: left;
      background: var(--panel2);
      border: 1px solid #202020;
      color: #fff;
      padding: 12px 12px;
      border-radius: 14px;
      margin: 7px 0;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
    }
    .menu-btn.active {
      border-color: rgba(0,208,255,.8);
      background: linear-gradient(180deg, #10222a, #131313);
    }
    .menu-btn:focus, .card:focus, .top-btn:focus, .player-btn:focus, .page-btn:focus, .episode-btn:focus, .server-btn:focus {
      box-shadow: var(--focus);
      border-color: var(--accent);
    }
    .menu-btn:active, .card:active, .top-btn:active, .player-btn:active, .page-btn:active, .episode-btn:active, .server-btn:active {
      transform: scale(.98);
    }
    .main {
      flex: 1;
      min-width: 0;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(11,11,11,.96);
      flex-wrap: wrap;
    }
    .top-btn {
      border: 1px solid #2b2b2b;
      background: #171717;
      color: #fff;
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
    .top-btn.home { background: linear-gradient(180deg,#01aa63,#00874f); }
    .top-btn.reload { background: linear-gradient(180deg,#14698b,#0f4c64); }
    .top-btn.live { background: linear-gradient(180deg,#5a2f8f,#43226d); }
    .status {
      flex: 1;
      min-width: 200px;
      padding: 10px 12px;
      border-radius: 12px;
      background: #101010;
      border: 1px solid #222;
      color: #c7f7ff;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .content {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 14px;
    }
    .hero {
      border: 1px solid #222;
      background: linear-gradient(135deg, rgba(0,208,255,.12), rgba(0,0,0,.05) 35%), linear-gradient(180deg,#171717,#0e0e0e);
      border-radius: 20px;

      margin-bottom: 14px;

    .hero-title {
      font-size: 26px;
      font-weight: 900;
      color: #fff;
      margin-bottom: 6px;
    }
    .hero-sub {
      color: #a8edf7;
      font-size: 14px;
      line-height: 1.45;
    }
    .section {
      margin-bottom: 22px;
    }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 0 0 10px;
    }
    .section-title {
      font-size: 20px;
      font-weight: 800;
      color: #fff;
    }
    .section-tools {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .badge {
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #121212;
      border: 1px solid #262626;
      color: #9deeff;
    }
    .see-all-btn, .page-btn {
      border: 1px solid #2d2d2d;
      background: #171717;
      color: #fff;
      padding: 8px 12px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 12px;
    }
    .card {
      position: relative;
      border: 1px solid #242424;
      border-radius: 18px;
      background: linear-gradient(180deg,#171717,#0e0e0e);
      overflow: hidden;
      cursor: pointer;
      padding: 0;
      text-align: left;
      color: inherit;
      min-height: 240px;
    }
    .thumb {
      width: 100%;
      height: 160px;
      object-fit: cover;
      display: block;
      background: #111;
    }
    .thumb.fallback {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      color: #00d0ff;
      background: linear-gradient(135deg,#0c2730,#111);
    }
    .card-body {
      padding: 12px;
    }
    .card-title {
      font-size: 15px;
      font-weight: 800;
      line-height: 1.35;
      min-height: 40px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-meta {
      margin-top: 8px;
      font-size: 12px;
      color: #9cdce6;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .tag {

      border-radius: 999px;

    }
    .inline-note {

    }
    .player-panel {
      position: fixed;
      inset: 0;
      display: none;
      background: rgba(0,0,0,.93);
      z-index: 9999;
      flex-direction: column;
    }
    .player-panel.show { display: flex; }
    .player-top {
      display: flex;
      gap: 10px;
      padding: 12px;
      border-bottom: 1px solid #222;
      align-items: center;
      flex-wrap: wrap;
      background: rgba(10,10,10,.98);
    }
    .player-title {
      flex: 1;
      min-width: 180px;
      font-weight: 800;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .player-btn {
      border: 1px solid #2d2d2d;
      background: #171717;
      color: #fff;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }
    .player-btn.close { background: linear-gradient(180deg,#7b2020,#601919); }
    .player-btn.home { background: linear-gradient(180deg,#00a760,#008450); }
    .player-btn.mx { background: linear-gradient(180deg,#1164a5,#0b4a7c); }
    .player-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 12px;
      gap: 10px;
    }
    .video-shell {
      flex: 1;
      min-height: 220px;
      background: #000;
      border: 1px solid #222;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
    }
    video {

      background: #000;
    }
    .player-hint {
      font-size: 13px;
      color: #b8ecf7;
      border: 1px solid #1e3b41;
      background: #0d171a;
      border-radius: 12px;
      padding: 10px 12px;
    }
    .player-extra {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,.86);
      z-index: 9998;
      padding: 20px;
    }
    .modal.show { display: flex; }
    .modal-box {
      width: min(1200px, 100%);
      max-height: 92vh;
      background: linear-gradient(180deg,#151515,#0c0c0c);
      border: 1px solid #2a2a2a;
      border-radius: 22px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .modal-head {
      padding: 12px 14px;
      border-bottom: 1px solid #222;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;

    .modal-title { font-size: 20px; font-weight: 900; flex: 1; }
    .modal-body {

      overflow: auto;

    .modal-foot {
      padding: 10px 14px 14px;
      border-top: 1px solid #222;

    }
    .episode-list, .server-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
      margin-top: 14px;
    }
    .episode-btn, .server-btn {
      border: 1px solid #2a2a2a;
      background: #161616;
      color: #fff;
      padding: 12px;
      border-radius: 14px;

      border: 1px solid #242424;

    .detail-sub {
      color: #a9edf7;
      font-size: 14px;
      line-height: 1.5;
    }
    .hidden { display: none !important; }
    @media (max-width: 860px) {
      .sidebar { width: 190px; min-width: 190px; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
      .thumb { height: 140px; }
    }
  </style>

  <script>
    const HOME_URL = 'https://tiea9999.github.io/tv-online/index.html';
    const LIVE_URL = 'https://tiea9999.github.io/tv-online/live.html';
    const RAW = 'https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/';
    const PROXY = 'https://iptv.tawatchai250958.workers.dev/?url=';

    const SOURCES = {
      'tv-main': [
        { title:'IPTV ไทย', type:'m3u', source: RAW + 'M3U/Vip.json' },
        { title:'DOOBALL Menu', type:'json', source: RAW + 'M3U/Dooball.json' }
      ],
      'movie-24hd': [
        { title:'Movie 24HD', type:'json', source: RAW + 'movie24hd.json' }
      ],
      'series-24hd': [
        { title:'Series 24HD', type:'json', source: RAW + 'series24hd.json' }
      ],
      'myseries-only': [
        { title:'MySeriesHD', type:'json', source: RAW + 'MySeries.json' }
      ]
    };

    const SAMPLE_TV = [
      { title:'MONOMAX 01', image:'', url:'https://monomax-sz.thaicdn.com/mono29hd/mono29hd.stream/playlist.m3u8', group:'ทีวี', type:'tv' },
      { title:'MONOMAX 02', image:'', url:'https://monomax-sz.thaicdn.com/mono_plus/mono_plus.stream/playlist.m3u8', group:'ทีวี', type:'tv' },
      { title:'SPORT DEMO', image:'', url:'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8', group:'กีฬา', type:'tv' }
    ];

    const state = {
      rows: [],
      modalItems: [],
      modalTitle: '',
      page: 1,
      perPage: 20,
      activeSource: null,
      detailStack: [],
      currentUrl: '',
      currentTitle: '',
      hls: null,
      dash: null,
      firstInteractDone: false
    };

    const content = document.getElementById('content');
    const statusText = document.getElementById('statusText');
    const modal = document.getElementById('modal');
    const modalBody = document.getElementById('modalBody');
    const modalTitle = document.getElementById('modalTitle');
    const modalCount = document.getElementById('modalCount');
    const pageInfo = document.getElementById('pageInfo');
    const playerPanel = document.getElementById('playerPanel');
    const playerTitle = document.getElementById('playerTitle');
    const video = document.getElementById('video');

    function setStatus(msg) {
      statusText.textContent = msg;
    }

    function escapeHtml(str='') {
      return String(str).replace(/[&<>'"]/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[s]));
    }

    function normalizeImage(item) {
      return item.image || item.poster || item.thumb || item.logo || item.icon || '';
    }

    function normalizeTitle(item, fallback='ไม่มีชื่อ') {
      return item.title || item.name || item.channel || item.ep || item.episode || fallback;
    }

    function normalizeUrl(item) {
      return item.url || item.link || item.file || item.stream || item.source || '';
    }

    function normalizeServers(item) {
      if (!item) return [];
      if (Array.isArray(item.servers)) {
        return item.servers.map((s, i) => ({
          name: s.name || `Server ${i+1}`,
          url: s.url || s.link || s.file || s.source || ''
        })).filter(s => s.url);
      }
      const direct = normalizeUrl(item);
      return direct ? [{ name:'Main', url: direct }] : [];
    }

    function normalizeEpisodes(item) {
      const eps = Array.isArray(item.episodes) ? item.episodes : Array.isArray(item.items) ? item.items : [];
      return eps.map((ep, i) => ({
        title: normalizeTitle(ep, `EP ${i+1}`),
        image: normalizeImage(ep) || normalizeImage(item),
        servers: normalizeServers(ep),
        raw: ep
      }));
    }

    function isPlayable(url='') {
      return /\.m3u8($|\?)/i.test(url) || /\.mpd($|\?)/i.test(url) || /\.(mp4|mkv|webm|mov)($|\?)/i.test(url) || /^https?:/i.test(url);
    }

    function isJsonLike(url='') {
      return /\.json($|\?)/i.test(url);
    }

    function isM3uLike(url='') {
      return /\.m3u($|\?)/i.test(url) || /\.m3u8($|\?)/i.test(url);
    }

    async function fetchText(url) {
      const res = await fetch(url, { cache:'no-store' });
      if (!res.ok) throw new Error('โหลดไม่สำเร็จ: ' + res.status);
      return await res.text();
    }

    async function fetchJson(url) {
      const res = await fetch(url, { cache:'no-store' });
      if (!res.ok) throw new Error('โหลด JSON ไม่สำเร็จ: ' + res.status);
      return await res.json();
    }

    function parseM3U(text) {
      const lines = text.split(/\r?\n/);
      const items = [];
      let meta = null;
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;
        if (line.startsWith('#EXTINF')) {
          const title = (line.split(',').slice(1).join(',') || 'ไม่มีชื่อ').trim();
          const logo = (line.match(/tvg-logo="([^"]+)"/i) || [,''])[1];
          const group = (line.match(/group-title="([^"]+)"/i) || [,'ทีวี'])[1];
          meta = { title, image: logo, group, type:'tv' };
        } else if (!line.startsWith('#') && meta) {
          items.push({ ...meta, url: line });
          meta = null;
        }
      }
      return items;
    }

    function flattenJson(data, parentTitle='') {
      const out = [];

      function makeGroup(node, fallback='รายการ') {
        const parts = [];
        const cat = node && node.category ? String(node.category).trim() : '';
        const sub = node && node.subcategory ? String(node.subcategory).trim() : '';
        const typ = node && node.type ? String(node.type).trim() : '';

        if (cat) parts.push(cat);
        if (sub && sub !== cat) parts.push(sub);

        if (!parts.length && parentTitle) parts.push(parentTitle);
        if (!parts.length && typ && !['movie','series','episode','menu'].includes(typ)) parts.push(typ);
        if (!parts.length) parts.push(fallback);

        return parts.join(' • ');
      }

      function walk(node, inheritedGroup='') {
        if (Array.isArray(node)) {
          node.forEach((item, idx) => walk(item, inheritedGroup || `หมวด ${idx+1}`));
          return;
        }

        if (!node || typeof node !== 'object') return;

        if (node.type === 'menu' && Array.isArray(node.items)) {
          node.items.forEach(item => {
            out.push({
              title: normalizeTitle(item),
              image: normalizeImage(item),
              kind: 'submenu',
              source: item.source || item.url || item.link || '',
              group: makeGroup(item, inheritedGroup || parentTitle || 'เมนู')
            });
          });
          return;
        }

        const items = Array.isArray(node.items) ? node.items : Array.isArray(node.data) ? node.data : [];
        if (items.length) {
          const nextGroup = makeGroup(node, inheritedGroup || parentTitle || 'รายการ');
          items.forEach(item => walk(item, nextGroup));
          return;
        }

        const title = normalizeTitle(node, parentTitle || 'ไม่มีชื่อ');
        const image = normalizeImage(node);
        const servers = normalizeServers(node);
        const episodes = normalizeEpisodes(node);
        const subSource = node.source && isJsonLike(node.source) ? node.source : '';
        const group = makeGroup(node, inheritedGroup || parentTitle || 'รายการ');

        if (episodes.length) {
          out.push({
            title,
            image,
            kind:'series',
            episodes,
            group,
            raw:node
          });
        } else if (servers.length) {
          out.push({
            title,
            image,
            kind:'playable',
            servers,
            group,
            raw:node
          });
        } else if (subSource) {
          out.push({
            title,
            image,
            kind:'submenu',
            source: subSource,
            group
          });
        }
      }

      walk(data, parentTitle);
      return out;
    }


    function makeCard(item, idx, modalMode=false) {
      const image = item.image ? `<img class="thumb" src="${escapeHtml(item.image)}" loading="lazy" referrerpolicy="no-referrer" onerror="this.outerHTML='<div class=\'thumb fallback\'>📺</div>'">` : `<div class="thumb fallback">📺</div>`;
      const tags = [];
      if (item.group) tags.push(`<span class="tag">${escapeHtml(item.group)}</span>`);
      if (item.kind === 'series') tags.push('<span class="tag">มี EP</span>');
      if (item.kind === 'submenu') tags.push('<span class="tag">เมนูย่อย</span>');
      if (item.kind === 'playable') tags.push('<span class="tag">กดเล่นได้</span>');
      return `
        <button class="card focusable" data-item-index="${idx}" data-modal-mode="${modalMode ? '1':'0'}">
          ${image}
          <div class="card-body">
            <div class="card-title">${escapeHtml(item.title)}</div>
            <div class="card-meta">${tags.join('')}</div>
          </div>
        </button>
      `;
    }

    function renderHome() {
      const rows = state.rows.length ? state.rows : [
        { title:'ทีวีแนะนำ', items: SAMPLE_TV },
        { title:'หนัง/ซีรีส์', items: [] }
      ];

      content.innerHTML = `
        <div class="hero">
          <div class="hero-title">TIEA IPTV ULTRA FINAL NETFLIX + AUTO FIX</div>
          <div class="hero-sub">เวอร์ชันนี้เน้นใช้งานกับ Android TV / Smart TV / กล่อง / โปรเจคเตอร์ • เหลือเฉพาะ ทีวีออนไลน์ / IPTV เดิม / SPORT TV / DOOBALL66 / 3BB / หนัง 24HD / ซีรีส์ 24HD / MySeries / LIVE / VIP พร้อมระบบ AUTO FIX</div>
          <div class="inline-note">หมายเหตุ: ถ้าแหล่งบางตัว CORS / 403 / DRM จะอาจต้องกด MX หรือ PLAYER ภายนอก</div>
        </div>
        ${rows.map((row, rowIdx) => `
          <div class="section">
            <div class="section-head">
              <div class="section-title">${escapeHtml(row.title)}</div>
              <div class="section-tools">
                <div class="badge">โชว์ ${Math.min(15, row.items.length)} / ${row.items.length}</div>
                <button class="see-all-btn focusable" data-row-index="${rowIdx}">ดูทั้งหมด</button>
              </div>
            </div>
            <div class="grid">
              ${row.items.slice(0, 15).map((item, i) => makeCard(item, i)).join('')}
            </div>
          </div>
        `).join('')}
      `;
      bindHomeEvents(rows);
    }

    function bindHomeEvents(rows) {
      content.querySelectorAll('[data-row-index]').forEach(btn => {
        btn.onclick = () => {
          const row = rows[Number(btn.dataset.rowIndex)];
          openModal(row.title, row.items);
        };
      });
      const cards = content.querySelectorAll('.card');
      cards.forEach(card => {
        card.onclick = () => {
          const section = card.closest('.section');
          const seeAllBtn = section.querySelector('[data-row-index]');
          const row = rows[Number(seeAllBtn.dataset.rowIndex)];
          const item = row.items[Number(card.dataset.itemIndex)];
          openItem(item);
        };
      });
    }

    function openModal(title, items) {
      state.modalTitle = title;
      state.modalItems = items || [];
      state.page = 1;
      modal.classList.add('show');
      renderModalPage();
      setTimeout(() => focusFirst(modal), 50);
    }

    function renderModalPage() {
      modalTitle.textContent = state.modalTitle;
      modalCount.textContent = `ทั้งหมด ${state.modalItems.length} รายการ`;
      const totalPages = Math.max(1, Math.ceil(state.modalItems.length / state.perPage));
      if (state.page > totalPages) state.page = totalPages;
      const start = (state.page - 1) * state.perPage;
      const pageItems = state.modalItems.slice(start, start + state.perPage);
      modalBody.innerHTML = `<div class="grid">${pageItems.map((item, i) => makeCard(item, start + i, true)).join('')}</div>`;
      pageInfo.textContent = `หน้า ${state.page} / ${totalPages}`;
      modalBody.querySelectorAll('.card').forEach(card => {
        card.onclick = () => openItem(state.modalItems[Number(card.dataset.itemIndex)]);
      });
    }

    function closeModal() {
      modal.classList.remove('show');
    }

    async function loadSourceGroup(key) {
      try {
        markActiveMenu(key);
        setStatus('กำลังโหลด ' + key + ' ...');
        const defs = SOURCES[key] || [];
        const allItems = [];
        for (const def of defs) {
          try {
            if (def.type === 'json') {
              const json = await fetchJson(def.source);
              const items = flattenJson(json, def.title);
              allItems.push(...items);
            } else if (def.type === 'm3u') {
              const maybeJson = await fetchJson(def.source).catch(() => null);
              if (maybeJson) {
                allItems.push(...flattenJson(maybeJson, def.title));
              } else {
                const text = await fetchText(def.source);
                allItems.push(...parseM3U(text));
              }
            }
          } catch (e) {
            console.warn(def.title, e);
          }
        }
        const grouped = groupItems(allItems);
        state.rows = grouped.length ? grouped : [{ title:'ตัวอย่างทีวี', items:SAMPLE_TV }];
        state.activeSource = key;
        renderHome();
        setStatus(`โหลดสำเร็จ: ${key} • ${allItems.length} รายการ`);
      } catch (e) {
        console.error(e);
        state.rows = [{ title:'ตัวอย่างทีวี', items:SAMPLE_TV }];
        renderHome();
        setStatus('โหลดไม่สำเร็จ ใช้ข้อมูลตัวอย่างแทน • ' + e.message);
      }
    }

    function groupItems(items) {
      const map = new Map();
      items.forEach(item => {
        const key = item.group || 'รายการ';
        if (!map.has(key)) map.set(key, []);
        map.get(key).push(item);
      });
      return Array.from(map.entries())
        .sort((a, b) => a[0].localeCompare(b[0], 'th'))
        .map(([title, arr]) => ({ title, items: arr }));
    }

    async function openSubmenu(title, sourceUrl) {
      try {
        setStatus('กำลังเปิดเมนูย่อย: ' + title);
        const json = await fetchJson(sourceUrl);
        const items = flattenJson(json, title);
        const groups = groupItems(items);
        state.rows = groups.length ? groups : [{ title, items }];
        state.detailStack.push({ type:'rows', rows: state.rows, title });
        renderHome();
        setStatus(`เปิดเมนู ${title} แล้ว • ${items.length} รายการ`);
      } catch (e) {
        setStatus('เปิดเมนูย่อยไม่สำเร็จ: ' + e.message);
      }
    }

    function openSeries(item) {
      const eps = item.episodes || [];
      content.innerHTML = `
        <div class="detail-box">
          <div class="detail-title">${escapeHtml(item.title)}</div>
          <div class="detail-sub">เลือกตอนเพื่อเล่นได้เลย • ถ้าตอนไหนเล่นไม่ได้ให้ลอง server อื่น หรือกด MX / PLAYER</div>
        </div>
        <div class="episode-list">
          ${eps.map((ep, i) => `
            <button class="episode-btn focusable" data-ep-index="${i}">${escapeHtml(ep.title || ('EP '+(i+1)))}</button>
          `).join('')}
        </div>
      `;
      content.querySelectorAll('[data-ep-index]').forEach(btn => {
        btn.onclick = () => openEpisode(item, eps[Number(btn.dataset.epIndex)]);
      });
      setStatus(`เปิดรายการตอนแล้ว: ${item.title} • ${eps.length} ตอน`);
    }

    function openEpisode(seriesItem, ep) {
      const servers = ep.servers || [];
      if (!servers.length) {
        setStatus('❌ ไม่มี server');
        return;
      }
      content.innerHTML = `
        <div class="detail-box">
          <div class="detail-title">${escapeHtml(seriesItem.title)}</div>
          <div class="detail-sub">${escapeHtml(ep.title)} • เลือก server หรือกดอันแรกเพื่อเล่นทันที</div>
        </div>
        <div class="server-list">
          ${servers.map((s, i) => `<button class="server-btn focusable" data-sv-index="${i}">${escapeHtml(s.name || ('Server '+(i+1)))}</button>`).join('')}
        </div>
      `;
      content.querySelectorAll('[data-sv-index]').forEach(btn => {
        btn.onclick = () => playUrl(servers[Number(btn.dataset.svIndex)].url, `${seriesItem.title} - ${ep.title}`);
      });
      setTimeout(() => {
        const first = servers[0];
        if (first) playUrl(first.url, `${seriesItem.title} - ${ep.title}`);
      }, 300);
    }

    async function openItem(item) {
      if (!item) return;
      if (item.kind === 'submenu' && item.source) {
        return openSubmenu(item.title, item.source);
      }
      if (item.kind === 'series') {
        return openSeries(item);
      }
      const servers = item.servers || [];
      if (item.url) return playUrl(item.url, item.title);
      if (servers.length) return playUrl(servers[0].url, item.title);
      setStatus('❌ ไม่พบลิงก์เล่น');
    }

    function cleanupPlayers() {
      try { if (state.hls) { state.hls.destroy(); state.hls = null; } } catch(e){}
      try { if (state.dash) { state.dash.reset(); state.dash = null; } } catch(e){}
      try { video.pause(); video.removeAttribute('src'); video.load(); } catch(e){}
    }

    function buildPlayCandidates(url) {
      const list = [];
      if (!url) return list;
      list.push(url);
      if (/^https?:/i.test(url) && !url.includes('iptv.tawatchai250958.workers.dev')) {
        list.push(PROXY + encodeURIComponent(url));
      }
      return [...new Set(list)];
    }

    function attachAutoFallback(candidates, title) {
      let switched = false;
      const tryNext = () => {
        if (switched) return;
        switched = true;
        const next = candidates[1];
        if (next) {
          setStatus('ลิงก์หลักไม่ขึ้น • กำลังลอง proxy ให้: ' + title);
          playUrl(next, title, true);
        } else {
          setStatus('เล่นผ่านเว็บไม่ขึ้น • กำลังเปิด PLAYER ภายนอก');
          openExternalPlayer('intent');
        }
      };

      const timer = setTimeout(() => {
        if (video.readyState < 2 || video.currentTime === 0) tryNext();
      }, 2800);

      const clearTimer = () => clearTimeout(timer);
      video.addEventListener('playing', clearTimer, { once:true });
      video.addEventListener('loadeddata', clearTimer, { once:true });
      video.addEventListener('canplay', clearTimer, { once:true });

      return tryNext;
    }


    async function playUrl(url, title='กำลังเล่น', skipProxyBuild=false) {
      if (!url) {
        setStatus('❌ Missing url parameter');
        return;
      }

      const candidates = skipProxyBuild ? [url] : buildPlayCandidates(url);
      const currentUrl = candidates[0] || url;

      state.currentUrl = currentUrl;
      state.currentTitle = title;
      playerTitle.textContent = title;
      playerPanel.classList.add('show');
      cleanupPlayers();
      setStatus('กำลังเล่น: ' + title);

      try {
        video.muted = true;
        video.volume = 0.8;

        const fallbackToNext = attachAutoFallback(candidates, title);

        if (/\.mpd($|\?)/i.test(currentUrl)) {
          state.dash = dashjs.MediaPlayer().create();
          state.dash.initialize(video, currentUrl, true);
          video.addEventListener('error', fallbackToNext, { once:true });
        } else if (Hls.isSupported() && /\.m3u8($|\?)/i.test(currentUrl)) {
          state.hls = new Hls({
            enableWorker: true,
            lowLatencyMode: false,
            backBufferLength: 90,
            fragLoadingRetry: 6,
            manifestLoadingRetryDelay: 500,
            levelLoadingRetryDelay: 500
          });
          state.hls.loadSource(currentUrl);
          state.hls.attachMedia(video);
          state.hls.on(Hls.Events.MANIFEST_PARSED, async () => {
            try { await video.play(); } catch(e){}
          });
          state.hls.on(Hls.Events.ERROR, (event, data) => {
            if (data && data.fatal) fallbackToNext();
          });
        } else {
          video.src = currentUrl;
          await video.play().catch(() => {});
          video.addEventListener('error', fallbackToNext, { once:true });
        }

        setTimeout(async () => {
          try {
            video.muted = false;
            await video.play();
          } catch(e) {}
        }, 1200);

        setTimeout(() => focusFirst(playerPanel), 120);
      } catch (e) {
        console.error(e);
        if (!skipProxyBuild && candidates[1]) {
          setStatus('เล่นผ่านเว็บไม่สำเร็จ • กำลังลอง proxy');
          return playUrl(candidates[1], title, true);
        }
        setStatus('เล่นผ่านเว็บไม่สำเร็จ • ลองกด MX หรือ PLAYER');
      }
    }

    function closePlayer() {
      playerPanel.classList.remove('show');
      cleanupPlayers();
      setStatus('ปิดตัวเล่นแล้ว');
    }

    function openExternalPlayer(mode='intent') {
      const url = state.currentUrl;
      if (!url) return;
      if (mode === 'mx') {
        window.location.href = 'intent:' + url + '#Intent;package=com.mxtech.videoplayer.ad;type=video/*;end';
      } else {
        window.location.href = 'intent:' + url + '#Intent;type=video/*;end';
      }
    }

    function goHome() {
      window.location.href = HOME_URL;
    }

    function markActiveMenu(key) {
      document.querySelectorAll('.menu-btn').forEach(btn => btn.classList.remove('active'));
      const active = document.querySelector(`.menu-btn[data-source="${key}"]`) || document.querySelector('.menu-btn[data-action="home"]');
      if (active) active.classList.add('active');
    }

    function focusFirst(root=document) {
      const el = root.querySelector('.focusable');
      if (el) el.focus();
    }

    function setupEvents() {
      document.getElementById('homeBtn').onclick = goHome;
      document.getElementById('reloadBtn').onclick = () => location.reload();
      document.getElementById('liveBtn').onclick = () => window.location.href = LIVE_URL;
      document.getElementById('closeModalBtn').onclick = closeModal;
      document.getElementById('prevPageBtn').onclick = () => { if (state.page > 1) { state.page--; renderModalPage(); } };
      document.getElementById('nextPageBtn').onclick = () => { const total = Math.max(1, Math.ceil(state.modalItems.length / state.perPage)); if (state.page < total) { state.page++; renderModalPage(); } };
      document.getElementById('closePlayerBtn').onclick = closePlayer;
      document.getElementById('playerHomeBtn').onclick = goHome;
      document.getElementById('mxBtn').onclick = () => openExternalPlayer('mx');
      document.getElementById('extBtn').onclick = () => openExternalPlayer('intent');

      document.querySelectorAll('.menu-btn').forEach(btn => {
        btn.onclick = async () => {
          const source = btn.dataset.source;
          const link = btn.dataset.link;
          const action = btn.dataset.action;
          if (source) return loadSourceGroup(source);
          if (link) return window.location.href = link;
          if (action === 'home') {
            state.detailStack = [];
            markActiveMenu('');
            renderHome();
            setStatus('กลับหน้าแรกแล้ว');
          }
          if (action === 'live-page') window.location.href = LIVE_URL;
        };
      });

      document.addEventListener('keydown', e => {
        if (e.key === 'Escape' || e.key === 'Backspace') {
          if (playerPanel.classList.contains('show')) {
            e.preventDefault();
            closePlayer();
            return;
          }
          if (modal.classList.contains('show')) {
            e.preventDefault();
            closeModal();
            return;
          }
        }
      });

      document.addEventListener('pointerdown', () => state.firstInteractDone = true, { passive:true });
    }

    function boot() {
      state.rows = [
        { title:'ทีวีออนไลน์', items: SAMPLE_TV },
        { title:'รายการหลัก', items: [
          { title:'หนัง 24HD', image:'', kind:'submenu', source: RAW + 'movie24hd.json', group:'หนัง' },
          { title:'ซีรีส์ 24HD', image:'', kind:'submenu', source: RAW + 'series24hd.json', group:'ซีรีส์' },
          { title:'MySeriesHD', image:'', kind:'submenu', source: RAW + 'MySeries.json', group:'ซีรีส์' }
        ] }
      ];
      renderHome();
      setupEvents();
      setTimeout(() => focusFirst(document), 100);
    }

    boot();
  </script>
</body>
</html>
