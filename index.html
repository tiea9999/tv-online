<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />

  <style>
    *{box-sizing:border-box}
    :root{
      --bg:#070707;
      --panel:#111;
      --panel2:#181818;
      --line:#2a2a2a;
      --text:#fff;

      --danger:#a02828;

    html,body{

      width:100%;

      color:var(--text);

    body{

      letter-spacing:1px;

    }

  ],

};

const TV_ITEMS = [
  { title:'DOOBALL66', kind:'external', link:'https://tiea9999.github.io/tv/ball66.html', group:'ทีวีออนไลน์', image:'' },
  { title:'3BB TV', kind:'external', link:'https://tiea9999.github.io/tv/3bb.html', group:'ทีวีออนไลน์', image:'' }
];

const state = {
  rows: [],
  modalItems: [],
  modalTitle: '',
  page: 1,
  perPage: 20,
  currentUrl: '',
  currentTitle: '',
  hls: null,
  dash: null,
  modalReturnSelector: ''
};

const content = document.getElementById('content');
const statusText = document.getElementById('statusText');
const modal = document.getElementById('modal');
const modalBody = document.getElementById('modalBody');
const modalTitle = document.getElementById('modalTitle');
const modalCount = document.getElementById('modalCount');

function setStatus(msg){ statusText.textContent = msg; }
function escapeHtml(str=''){ return String(str).replace(/[&<>'"]/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[s])); }
function normalizeImage(item){ return item.image || item.poster || item.thumb || item.logo || item.icon || ''; }
function normalizeTitle(item, fallback='ไม่มีชื่อ'){ return item.title || item.name || item.channel || item.ep || item.episode || fallback; }
function normalizeUrl(item){ return item.url || item.link || item.file || item.stream || item.source || ''; }
function isJsonLike(url=''){ return /\.json($|\?)/i.test(url); }
function isM3uLike(url=''){ return /\.m3u($|\?)/i.test(url) || /\.m3u8($|\?)/i.test(url); }

function normalizeServers(item) {
  if (!item) return [];
  if (Array.isArray(item.servers)) {
    return item.servers.map((s, i) => ({
      name: s.name || `Server ${i+1}`,
      url: s.url || s.link || s.file || s.stream || s.source || ''
    })).filter(s => s.url);
  }
  const direct = normalizeUrl(item);
  return direct ? [{ name:'Main', url: direct }] : [];
}

function normalizeEpisodes(item) {
  const eps = Array.isArray(item.episodes) ? item.episodes : [];
  return eps.map((ep, i) => ({
    title: normalizeTitle(ep, `EP ${i+1}`),
    image: normalizeImage(ep) || normalizeImage(item),
    servers: normalizeServers(ep),
    raw: ep
  }));
}

async function fetchText(url) {
  const res = await fetch(url, { cache:'no-store' });
  if (!res.ok) throw new Error('โหลดไม่สำเร็จ: ' + res.status);
  return await res.text();
}

async function fetchJson(url) {
  const res = await fetch(url, { cache:'no-store' });
  if (!res.ok) throw new Error('โหลด JSON ไม่สำเร็จ: ' + res.status);
  return await res.json();
}

function absolutize(url, base='') {
  try { return new URL(url, base || location.href).href; } catch(e) { return url; }
}

function parseM3U(text, base='') {
  const lines = text.split(/\r?\n/);
  const items = [];
  let meta = null;
  for (const rawLine of lines) {
    const line = rawLine.trim();
    if (!line) continue;
    if (line.startsWith('#EXTINF')) {
      const title = (line.split(',').slice(1).join(',') || 'ไม่มีชื่อ').trim();
      const logo = (line.match(/tvg-logo="([^"]+)"/i) || [,''])[1];
      const group = (line.match(/group-title="([^"]+)"/i) || [,'ทีวีออนไลน์'])[1];
      meta = { title, image: logo, group, kind:'playable', servers:[] };
    } else if (!line.startsWith('#') && meta) {
      const playUrl = absolutize(line, base);
      meta.servers = [{ name:'Main', url: playUrl }];
      items.push(meta);
      meta = null;
    }
  }
  return items;
}

function flattenJson(data, parentTitle='') {
  const out = [];
  function walk(node, inheritedGroup='') {
    if (Array.isArray(node)) {
      node.forEach(item => walk(item, inheritedGroup));
      return;
    }
    if (!node || typeof node !== 'object') return;

    const title = normalizeTitle(node, parentTitle || 'ไม่มีชื่อ');
    const image = normalizeImage(node);
    const group = String(node.group || node.category || node.subcategory || inheritedGroup || parentTitle || 'รายการ').trim();
    const servers = normalizeServers(node);
    const episodes = normalizeEpisodes(node);

    if (node.type === 'menu' && Array.isArray(node.items)) {
      node.items.forEach(item => {
        out.push({
          title: normalizeTitle(item),
          image: normalizeImage(item),
          kind:'submenu',
          source: item.source || item.url || item.link || '',
          group: String(item.group || item.category || group || 'เมนู').trim()
        });
      });
      return;
    }

    const listLike = Array.isArray(node.items) ? node.items :
      Array.isArray(node.data) ? node.data :
      Array.isArray(node.channels) ? node.channels :
      Array.isArray(node.results) ? node.results :
      Array.isArray(node.playlists) ? node.playlists : null;

    if (listLike && listLike.length) {
      listLike.forEach(item => walk(item, group));
      return;
    }

    if (episodes.length) {
      out.push({ title, image, kind:'series', episodes, group, raw:node });
      return;
    }
    if (servers.length) {
      out.push({ title, image, kind:'playable', servers, group, raw:node });
      return;
    }

    const subSource = node.source && isJsonLike(node.source) ? node.source : '';
    if (subSource) out.push({ title, image, kind:'submenu', source: subSource, group });
  }
  walk(data, parentTitle);
  return out;
}

function groupItems(items) {
  const map = new Map();
  items.forEach(item => {
    const key = item.group || 'รายการ';
    if (!map.has(key)) map.set(key, []);
    map.get(key).push(item);
  });
  return Array.from(map.entries()).map(([title, arr]) => ({ title, items: arr }));
}

function makeCard(item, idx, sectionIndex, modalMode=false) {

async function loadSourceGroup(key) {
  try {
    markActiveMenu(key);
    setStatus('กำลังโหลด ' + key + ' ...');
    const defs = SOURCES[key] || [];
    const allItems = [];

    for (const def of defs) {
      try {
        if (def.type === 'json') {
          const json = await fetchJson(def.source);
          allItems.push(...flattenJson(json, def.title));
        } else if (def.type === 'm3u') {
          const text = await fetchText(def.source);
          allItems.push(...parseM3U(text, def.source));
        }
      } catch (e) {
        console.warn(def.title, e);
      }
    }

    state.rows = groupItems(allItems);
    if (!state.rows.length) state.rows = [{ title:'รายการ', items:[] }];
    renderHome();
    setStatus(`โหลดสำเร็จ: ${key} • ${allItems.length} รายการ`);
    setTimeout(() => focusFirst(document), 80);
  } catch (e) {
    console.error(e);
    setStatus('โหลดไม่สำเร็จ • ' + e.message);
  }
}

async function openSubmenu(title, sourceUrl) {

      items = flattenJson(json, title);

}

function cleanupPlayers() {
  try { if (state.hls) { state.hls.destroy(); state.hls = null; } } catch(e){}
  try { if (state.dash) { state.dash.reset(); state.dash = null; } } catch(e){}
  try { video.pause(); video.removeAttribute('src'); video.load(); } catch(e){}
}

function shouldProxyUrl(url='') {
  if (!/^https?:/i.test(url)) return false;
  if (url.includes('iptv.tawatchai250958.workers.dev')) return false;
  if (DIRECT_ONLY_PATTERNS.some(rx => rx.test(url))) return false;
  return /\.m3u8($|\?)/i.test(url);
}

function buildPlayCandidates(url) {
  const list = [];
  if (!url) return list;
  list.push(url);
  if (shouldProxyUrl(url)) list.push(PROXY + encodeURIComponent(url));
  return [...new Set(list)];
}

function attachAutoFallback(candidates, title) {
  let switched = false;
  const tryNext = () => {
    if (switched) return;
    switched = true;
    const idx = candidates.indexOf(state.currentUrl);
    const next = candidates[idx + 1];
    if (next) {
      setStatus('ลิงก์หลักไม่ขึ้น • กำลังลอง fallback ในเว็บ: ' + title);
      playUrl(next, title, true);
    } else {
      setStatus('เล่นผ่านเว็บไม่ขึ้น • ลองกด MX หรือ PLAYER');
    }
  };

  const timer = setTimeout(() => {
    if (video.readyState < 2 || (video.currentTime === 0 && video.paused)) tryNext();
  }, 3200);

  const clear = () => clearTimeout(timer);
  video.addEventListener('loadeddata', clear, { once:true });
  video.addEventListener('canplay', clear, { once:true });
  video.addEventListener('playing', clear, { once:true });
  return tryNext;
}

async function playUrl(url, title='กำลังเล่น', skipProxyBuild=false) {
  if (!url) return setStatus('❌ Missing url parameter');

  const candidates = skipProxyBuild ? [url] : buildPlayCandidates(url);
  const currentUrl = candidates[0] || url;

  state.currentUrl = currentUrl;
  state.currentTitle = title;
  playerTitle.textContent = title;
  playerPanel.classList.add('show');
  cleanupPlayers();
  setStatus('กำลังเล่น: ' + title);

  try {
    video.muted = true;
    video.volume = 0.8;
    video.preload = 'metadata';
    video.playsInline = true;
    video.setAttribute('playsinline', '');
    video.setAttribute('webkit-playsinline', '');
    video.tabIndex = -1;
    video.blur();

    const fallback = attachAutoFallback(candidates, title);

    if (/\.mpd($|\?)/i.test(currentUrl)) {
      state.dash = dashjs.MediaPlayer().create();
      state.dash.updateSettings({ streaming:{ lowLatencyEnabled:false } });
      state.dash.initialize(video, currentUrl, true);
      video.addEventListener('error', fallback, { once:true });
    } else if (/\.m3u8($|\?)/i.test(currentUrl)) {
      if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = currentUrl;
        await video.play().catch(() => {});
        video.addEventListener('error', fallback, { once:true });
      } else if (Hls.isSupported()) {
        state.hls = new Hls({
          enableWorker:false,
          lowLatencyMode:false,
          backBufferLength:10,
          maxBufferLength:6,
          maxMaxBufferLength:8,
          capLevelToPlayerSize:true,
          fragLoadingMaxRetry:1,
          manifestLoadingMaxRetry:1,
          levelLoadingMaxRetry:1,
          fragLoadingRetryDelay:500,
          manifestLoadingRetryDelay:500,
          levelLoadingRetryDelay:500,
          testBandwidth:false,
          startFragPrefetch:false
        });
        state.hls.loadSource(currentUrl);
        state.hls.attachMedia(video);
        state.hls.on(Hls.Events.MANIFEST_PARSED, async () => {
          try { await video.play(); } catch(e){}
        });
        state.hls.on(Hls.Events.ERROR, (event, data) => {
          if (!data || !data.fatal) return;
          if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
            try { state.hls.recoverMediaError(); } catch(e) { fallback(); }
            return;
          }
          fallback();
        });
      } else {
        video.src = currentUrl;
        await video.play().catch(() => {});
        video.addEventListener('error', fallback, { once:true });
      }
    } else {
      video.src = currentUrl;
      await video.play().catch(() => {});
      video.addEventListener('error', fallback, { once:true });
    }

    setTimeout(async () => {
      try {
        if (video.readyState >= 2) {
          video.muted = false;
          await video.play();
        }
      } catch(e){}
    }, 1200);

    setTimeout(() => focusEl(document.getElementById('closePlayerBtn')), 120);
  } catch (e) {
    console.error(e);
    const next = candidates[1];
    if (next) return playUrl(next, title, true);
    setStatus('เล่นผ่านเว็บไม่สำเร็จ • ลองกด MX หรือ PLAYER');
  }
}

function canUseIntentScheme() {
  const ua = navigator.userAgent || '';
  const isAndroid = /Android/i.test(ua);
  const isWebView = /; wv\)|Version\/\d+\.\d+ Chrome\/\d+\.\d+ Mobile Safari\//i.test(ua) || /AppCreator|wv/i.test(ua);
  return isAndroid && !isWebView;
}

function openExternalPlayer(mode='intent') {

  }
  try {
    if (mode === 'mx') {

    }

function goHome(){ window.location.href = HOME_URL; }

function markActiveMenu(keyOrAction) {
  document.querySelectorAll('.menu-btn').forEach(btn => btn.classList.remove('active'));
  const active =
    document.querySelector(`.menu-btn[data-source="${keyOrAction}"]`) ||
    document.querySelector(`.menu-btn[data-action="${keyOrAction}"]`) ||
    document.querySelector('.menu-btn[data-action="home"]');
  if (active) active.classList.add('active');
}

function isVisibleFocusable(el) {
  if (!el || el.disabled) return false;
  const style = window.getComputedStyle(el);
  if (style.display === 'none' || style.visibility === 'hidden') return false;
  const rect = el.getBoundingClientRect();
  return rect.width > 0 && rect.height > 0;
}

function focusEl(el) {
  if (!el || !isVisibleFocusable(el)) return false;
  el.focus();
  try { el.scrollIntoView({ block:'nearest', inline:'nearest' }); } catch(e){}
  return true;
}

function getActiveRoot() {
  if (playerPanel.classList.contains('show')) return playerPanel;
  if (modal.classList.contains('show')) return modal;
  return document;
}

function getVisibleList(selector, root=getActiveRoot()) {
  return Array.from(root.querySelectorAll(selector)).filter(isVisibleFocusable);
}

function focusFirst(root=document) {
  const el = getVisibleList('.menu-btn, .top-btn, .see-all-btn, .card, .page-btn, .episode-btn, .server-btn, .player-btn', root)[0];
  if (el) el.focus();
}

function getCardsInSection(sectionIndex) {
  return getVisibleList(`.card[data-section-index="${sectionIndex}"]`, document);
}

function moveHomeFocus(current, direction) {
  const menuBtns = getVisibleList('.menu-btn', document);
  const topBtns = getVisibleList('.top-btn', document);
  const seeAlls = getVisibleList('.see-all-btn', document);
  const role = current.dataset.navRole || '';
  const sectionIndex = Number(current.dataset.sectionIndex || 0);

  if (current.classList.contains('menu-btn')) {
    const idx = menuBtns.indexOf(current);
    if (direction === 'up') return focusEl(menuBtns[Math.max(0, idx - 1)] || current);
    if (direction === 'down') return focusEl(menuBtns[Math.min(menuBtns.length - 1, idx + 1)] || current);
    if (direction === 'right') return focusEl(seeAlls[0] || topBtns[0]);
    return false;
  }

  if (current.classList.contains('top-btn')) {
    const idx = topBtns.indexOf(current);
    if (direction === 'left') return focusEl(topBtns[Math.max(0, idx - 1)] || menuBtns[menuBtns.length - 1]);
    if (direction === 'right') return focusEl(topBtns[Math.min(topBtns.length - 1, idx + 1)] || current);
    if (direction === 'down') return focusEl(seeAlls[0] || getCardsInSection(0)[0]);
    if (direction === 'up') return focusEl(menuBtns[0] || current);
    return false;
  }

  if (role === 'see-all') {
    if (direction === 'left') return focusEl(menuBtns.find(b => b.classList.contains('active')) || menuBtns[0]);
    if (direction === 'up') return focusEl(topBtns[0] || current);
    if (direction === 'down') return focusEl(getCardsInSection(sectionIndex)[0] || current);
    return true;
  }

  if (role === 'card') {
    const cards = getCardsInSection(sectionIndex);
    const idx = cards.indexOf(current);
    const rectTop = current.getBoundingClientRect().top;
    const sameRow = cards.filter(el => Math.abs(el.getBoundingClientRect().top - rectTop) < 20);
    const colIndex = sameRow.indexOf(current);
    const cols = Math.max(1, sameRow.length || 1);

    if (direction === 'left') {
      if (colIndex <= 0) return focusEl(document.querySelector(`.see-all-btn[data-section-index="${sectionIndex}"]`) || menuBtns[0]);
      return focusEl(cards[idx - 1]);
    }
    if (direction === 'right') return focusEl(cards[idx + 1] || current);
    if (direction === 'up') {
      if (idx < cols) return focusEl(document.querySelector(`.see-all-btn[data-section-index="${sectionIndex}"]`) || topBtns[0]);
      return focusEl(cards[Math.max(0, idx - cols)] || current);
    }
    if (direction === 'down') {
      const next = cards[idx + cols];
      if (next) return focusEl(next);
      const nextSeeAll = document.querySelector(`.see-all-btn[data-section-index="${sectionIndex + 1}"]`);
      return focusEl(nextSeeAll || current);
    }
  }
  return false;
}

function moveModalFocus(current, direction) {
  const closeBtn = document.getElementById('closeModalBtn');
  const prevBtn = document.getElementById('prevPageBtn');
  const nextBtn = document.getElementById('nextPageBtn');
  const cards = getVisibleList('#modalBody .card', modal);

  if (current === closeBtn) {
    if (direction === 'down') return focusEl(cards[0] || prevBtn);
    return false;
  }

  if (current === prevBtn || current === nextBtn) {
    if (direction === 'up') return focusEl(cards[cards.length - 1] || closeBtn);
    if (direction === 'left') return focusEl(prevBtn);
    if (direction === 'right') return focusEl(nextBtn);
    return false;
  }

  if (current.classList.contains('card')) {
    const idx = cards.indexOf(current);
    const rectTop = current.getBoundingClientRect().top;
    const sameRow = cards.filter(el => Math.abs(el.getBoundingClientRect().top - rectTop) < 20);
    const cols = Math.max(1, sameRow.length || 1);
    if (direction === 'left') return focusEl(cards[Math.max(0, idx - 1)] || current);
    if (direction === 'right') return focusEl(cards[Math.min(cards.length - 1, idx + 1)] || current);
    if (direction === 'up') {
      if (idx < cols) return focusEl(closeBtn);
      return focusEl(cards[Math.max(0, idx - cols)] || current);
    }
    if (direction === 'down') return focusEl(cards[idx + cols] || prevBtn);
  }
  return false;
}

function movePlayerFocus(current, direction) {
  const btns = getVisibleList('.player-top .player-btn', playerPanel);
  const idx = btns.indexOf(current);
  if (btns.includes(current)) {
    if (direction === 'left') return focusEl(btns[Math.max(0, idx - 1)] || current);
    if (direction === 'right') return focusEl(btns[Math.min(btns.length - 1, idx + 1)] || current);
    return true;
  }
  return focusEl(document.getElementById('closePlayerBtn'));
}

function moveFocusByDirection(direction) {
  const root = getActiveRoot();
  const items = getVisibleList('.menu-btn, .top-btn, .see-all-btn, .card, .page-btn, .episode-btn, .server-btn, .player-btn', root);
  if (!items.length) return false;
  const current = items.includes(document.activeElement) ? document.activeElement : items[0];

  if (playerPanel.classList.contains('show')) return movePlayerFocus(current, direction);
  if (modal.classList.contains('show')) return moveModalFocus(current, direction);
  return moveHomeFocus(current, direction);
}

function installScrollSafeTap() {
  let startX = 0, startY = 0, moved = false;
  document.addEventListener('touchstart', e => {
    const t = e.changedTouches && e.changedTouches[0];
    if (!t) return;
    startX = t.clientX;
    startY = t.clientY;
    moved = false;
  }, { passive:true });

  document.addEventListener('touchmove', e => {
    const t = e.changedTouches && e.changedTouches[0];
    if (!t) return;
    if (Math.abs(t.clientX - startX) > 12 || Math.abs(t.clientY - startY) > 12) moved = true;
  }, { passive:true });

  document.addEventListener('click', e => {
    const btn = e.target && e.target.closest && e.target.closest('.card, .menu-btn, .see-all-btn, .episode-btn, .server-btn');
    if (btn && moved) {
      e.preventDefault();
      e.stopPropagation();
      moved = false;
    }
  }, true);
}

  document.querySelectorAll('.menu-btn').forEach(btn => {
    btn.onclick = async () => {
      const source = btn.dataset.source;
      const link = btn.dataset.link;
      const action = btn.dataset.action;

      if (source) return loadSourceGroup(source);
      if (link) return window.location.href = link;

      if (action === 'home') {
        markActiveMenu('home');
        state.rows = [
          { title:'ทีวีออนไลน์', items:TV_ITEMS },
          { title:'หนังและซีรีส์', items:[
            { title:'EZ Movie', image:'', kind:'submenu', source: RAW + 'Ezmovie.json', group:'หนัง' },
            { title:'MySeriesHD', image:'', kind:'submenu', source: RAW + 'MySeries.json', group:'ซีรีส์' },
            { title:'GoSeries', image:'', kind:'submenu', source: RAW + 'goseries_menu.json', group:'ซีรีส์' }
          ]}
        ];
        renderHome();
        setStatus('กลับหน้าแรกแล้ว');
        return setTimeout(() => focusFirst(document), 50);
      }

      if (action === 'home-tv') {
        markActiveMenu('home-tv');
        state.rows = [{ title:'ทีวีออนไลน์', items:TV_ITEMS }];
        renderHome();
        setStatus('เปิดทีวีออนไลน์แล้ว');
        return setTimeout(() => focusFirst(document), 50);
      }

      if (action === 'live-page') {
        return window.location.href = LIVE_URL;
      }
    };
  });

  document.addEventListener('keydown', e => {
    const key = e.key || '';
    const code = e.keyCode || e.which || 0;

    if ([24,25,164,173,174,175].includes(code)) {
      e.preventDefault();
      e.stopPropagation();
      return;
    }

    if ([37,38,39,40,19,20,21,22].includes(code) || ['ArrowLeft','ArrowUp','ArrowRight','ArrowDown'].includes(key)) {
      e.preventDefault();
      if (key === 'ArrowLeft' || code === 21 || code === 37) return moveFocusByDirection('left');
      if (key === 'ArrowRight' || code === 22 || code === 39) return moveFocusByDirection('right');
      if (key === 'ArrowUp' || code === 19 || code === 38) return moveFocusByDirection('up');
      if (key === 'ArrowDown' || code === 20 || code === 40) return moveFocusByDirection('down');
    }

    if (key === 'Enter' || key === 'OK' || key === 'NumpadEnter' || code === 23 || code === 13 || code === 66) {
      const active = document.activeElement;
      if (active && typeof active.click === 'function') {
        e.preventDefault();
        active.click();
      }
    }

    if (key === 'Escape' || key === 'Backspace' || code === 4 || code === 27 || code === 8 || code === 461 || code === 10009) {
      if (playerPanel.classList.contains('show')) {
        e.preventDefault();
        return closePlayer();
      }
      if (modal.classList.contains('show')) {
        e.preventDefault();
        return closeModal();
      }
    }
  }, true);

  document.addEventListener('focusin', e => {
    const el = e.target;
    if (el === video) {
      focusEl(document.getElementById('closePlayerBtn'));
      return;
    }
    if (el && typeof el.scrollIntoView === 'function' && isVisibleFocusable(el)) {
      el.scrollIntoView({ block:'nearest', inline:'nearest' });
    }
  });

  installScrollSafeTap();
}

function boot() {
  state.rows = [
    { title:'ทีวีออนไลน์', items:TV_ITEMS },
    { title:'หนังและซีรีส์', items:[
      { title:'EZ Movie', image:'', kind:'submenu', source: RAW + 'Ezmovie.json', group:'หนัง' },
      { title:'MySeriesHD', image:'', kind:'submenu', source: RAW + 'MySeries.json', group:'ซีรีส์' },
      { title:'GoSeries', image:'', kind:'submenu', source: RAW + 'goseries_menu.json', group:'ซีรีส์' }
    ]}
  ];
  renderHome();
  setupEvents();
  setTimeout(() => focusFirst(document), 100);
}

boot();
</script>
</body>
