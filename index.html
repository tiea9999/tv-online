<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIEA IPTV</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{margin:0;background:#0f172a;color:white;font-family:sans-serif;display:flex;height:100vh;overflow:hidden}

.sidebar{
  width:200px;
  background:#020617;
  padding-top:20px;
}

.menu-item{
  padding:15px;
  cursor:pointer;
}
.menu-item:focus{
  background:#1e293b;
  outline:none;
}

.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

.player{
  padding:10px;
}
video{
  width:100%;
  height:300px;
  border-radius:10px;
  background:black;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:15px;
  padding:15px;
  overflow:auto;
}

.card{
  background:#334155;
  padding:10px;
  border-radius:10px;
  text-align:center;
}
.card img{max-height:50px}

.card:focus{
  outline:3px solid yellow;
  transform:scale(1.05);
}
</style>

</head>

<body>

<!-- 🔥 เมนู -->

<div class="sidebar">
  <div class="menu-item" tabindex="0" onclick="openLive()">🏟 ตารางแข่งขันกีฬา</div>
  <div class="menu-item" tabindex="0" onclick="openTVMenu()">📺 TV</div>
  <div class="menu-item" tabindex="0" onclick="openMovie()">🎬 Movie</div>
  <div class="menu-item" tabindex="0" onclick="openSeries()">🎞 Series</div>
</div>

<div class="main">

<div class="player">
  <video id="player" controls playsinline></video>
</div>

<div id="list" class="grid"></div>

</div>

<script src="channels.js"></script>

<script>
const player = document.getElementById("player");
const list = document.getElementById("list");

let lastTV = localStorage.getItem("lastTV") || 0;

// ▶️ เล่น
function play(url){

  if(window.hls) window.hls.destroy();

  if(Hls.isSupported()){
    const hls = new Hls({
      maxBufferLength:30,
      liveSyncDuration:5
    });

    window.hls = hls;

    hls.loadSource(url);
    hls.attachMedia(player);

    hls.on(Hls.Events.MANIFEST_PARSED, ()=>{
      player.play();
    });

  }else{
    player.src = url;
    player.play();
  }
}

// 🏟 ตารางแข่งขัน (เปิด live.html)
function openLive(){
  window.location.href = "live.html";
}

// 🎬 Movie (ลิงก์เว็บ)
function openMovie(){
  window.location.href = "movie.html"; // หรือใส่ลิงก์เว็บคุณ
}

// 🎞 Series
function openSeries(){
  window.location.href = "series.html";
}

// 📺 เมนู TV
function openTVMenu(){
  list.innerHTML = "";

  const groups = [
    {name:"Digital", key:"digital"},
    {name:"บันเทิง", key:"movie"},
    {name:"สารคดี", key:"documentary"},
    {name:"การ์ตูน", key:"kids"}
  ];

  groups.forEach(g=>{
    const div=document.createElement("div");
    div.className="card";
    div.tabIndex=0;
    div.innerHTML=`<div style="padding:20px">${g.name}</div>`;
    div.onclick=()=>openTVGroup(g.key);
    list.appendChild(div);
  });

  focusFirst();
}

// 📺 เปิดหมวดย่อย
function openTVGroup(group){
  list.innerHTML="";

  channels.tv[group].forEach((ch,i)=>{
    const div=document.createElement("div");
    div.className="card";
    div.tabIndex=0;
    div.innerHTML=`<img src="${ch.logo}"><div>${ch.name}</div>`;

    div.onclick=()=>{
      play(ch.url);
      lastTV=i;
      localStorage.setItem("lastTV",i);
    };

    list.appendChild(div);
  });

  if(channels.tv[group].length){
    play(channels.tv[group][0].url);
  }

  focusFirst();
}

// 🎯 focus
function focusFirst(){
  setTimeout(()=>{
    const first=document.querySelector(".card");
    if(first) first.focus();
  },100);
}

// 🎮 รีโมท
document.addEventListener("keydown",e=>{
  const items=[...document.querySelectorAll(".card, .menu-item")];
  const i=items.indexOf(document.activeElement);

  let next;

  if(e.key==="ArrowRight") next=i+1;
  if(e.key==="ArrowLeft") next=i-1;
  if(e.key==="ArrowDown") next=i+4;
  if(e.key==="ArrowUp") next=i-4;
  if(e.key==="Enter") return document.activeElement.click();

  if(items[next]) items[next].focus();
});

// เริ่ม
document.querySelector(".menu-item").focus();
</script>

</body>
</html>
