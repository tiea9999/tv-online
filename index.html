<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIEA IPTV ULTRA FINAL</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif}
.sidebar{width:200px;background:#111;position:fixed;height:100%;padding:10px}
.menu{display:block;width:100%;margin:6px 0;padding:10px;background:#222;border:0;color:#fff;border-radius:10px}
.menu:focus{outline:2px solid #00e5ff}
.main{margin-left:210px;padding:10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
.card{background:#111;border-radius:10px;overflow:hidden}
.card img{width:100%;height:170px;object-fit:cover}
.title{padding:6px;font-size:13px}
</style>
</head>

<body>

<div class="sidebar">
<button class="menu" onclick="loadSeries()">📺 ซีรี่ย์ทั้งหมด</button>
</div>

<div class="main">
<div id="app"></div>
</div>

<script>

const RAW = "https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/";

const SERIES_ORDER = [
'ซีรี่ย์มาใหม่',
'ดูซีรี่ย์จีน',
'ดูซีรี่ย์เกาหลี',
'ดูซีรี่ย์ไทย',
'ซีรี่ย์ญี่ปุ่น',
'ดูละครสั้น',
'ดูหนังออนไลน์'
];

function cleanText(t){
 return String(t||'')
  .toLowerCase()
  .replace(/พากย์ไทย|ซับไทย|เสียงไทย|thai\s*dub|thai\s*sub/gi,'');
}

function detectCat(text){
 text = cleanText(text);

 if(text.includes('เกาหลี')) return 'ดูซีรี่ย์เกาหลี';
 if(text.includes('ญี่ปุ่น')) return 'ซีรี่ย์ญี่ปุ่น';
 if(text.includes('จีน')) return 'ดูซีรี่ย์จีน';
 if(text.includes('ไทย')) return 'ดูซีรี่ย์ไทย';
 if(text.includes('ละครสั้น')||text.includes('short')) return 'ดูละครสั้น';
 if(text.includes('หนัง')) return 'ดูหนังออนไลน์';
 if(text.includes('ใหม่')) return 'ซีรี่ย์มาใหม่';

 return 'ซีรี่ย์มาใหม่';
}

async function fetchJson(url){
 const r = await fetch(url);
 return await r.json();
}

function getItems(node){
 if(!node) return [];
 if(Array.isArray(node)) return node;

 for(const k of ['items','data','list']){
  if(Array.isArray(node[k])) return node[k];
 }

 return [];
}

async function deepLoad(url,cat){
 let json = await fetchJson(url);
 let items = getItems(json);
 let out = [];

 for(let i of items){
  let src = i.source || i.url;

  if(src && src.includes('.json')){
    out.push(...await deepLoad(src, detectCat(i.title||cat)));
  }else{
    let ep = getItems(i);

    if(ep.length){
      out.push({
        title:i.title,
        image:i.image||i.poster,
        group:cat,
        episodes:ep
      });
    }
  }
 }

 return out;
}

async function loadSeries(){
 let root = await fetchJson(RAW+"MySeries.json");
 let menus = getItems(root);

 let all = [];

 for(let m of menus){
  let cat = detectCat(m.title);
  all.push(...await deepLoad(m.source,cat));
 }

 render(all);
}

function render(items){
 let map = {};

 items.forEach(i=>{
  if(!map[i.group]) map[i.group]=[];
  map[i.group].push(i);
 });

 let html="";

 SERIES_ORDER.forEach(cat=>{
  if(!map[cat]) return;

  html+=`<h2>${cat}</h2><div class="grid">`;

  map[cat].forEach(m=>{
   html+=`
   <div class="card">
   <img src="${m.image||''}">
   <div class="title">${m.title}</div>
   </div>`;
  });

  html+="</div>";
 });

 document.getElementById("app").innerHTML=html;
}

</script>

</body>
</html>
