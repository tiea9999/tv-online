<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>TIEA IPTV TV MODE</title>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: #0b0b0b;
            color: #fff;
            font-family: sans-serif;
            overflow: hidden;
        }

        .app {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        .sidebar {
            width: 240px;
            background: #111;
            border-right: 1px solid #222;
            padding: 14px 10px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .brand {
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            color: #00e5ff;
            margin-bottom: 14px;
        }

        .menu-btn {
            width: 100%;
            background: #1a1a1a;
            border: 0;
            color: #fff;
            border-radius: 12px;
            padding: 14px 12px;
            margin-bottom: 10px;
            text-align: left;
            font-size: 16px;
            cursor: pointer;
            outline: none;
        }

        .menu-btn:focus,
        .menu-btn.active:focus,
        .menu-btn.active {
            background: #00c853;
            color: #fff;
            box-shadow: 0 0 0 3px rgba(255, 255, 255, .18);
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 14px;
            background: #0b0b0b;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .title {
            font-size: 22px;
            font-weight: bold;
            color: #00e5ff;
        }

        .subtext {
            font-size: 14px;
            color: #bbb;
        }

        .action-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .top-btn,
        .back-btn {
            background: #1c1c1c;
            border: 0;
            color: #fff;
            border-radius: 12px;
            padding: 12px 14px;
            cursor: pointer;
            font-size: 14px;
            outline: none;
        }

        .top-btn:focus,
        .back-btn:focus {
            background: #2196f3;
            box-shadow: 0 0 0 3px rgba(255, 255, 255, .18);
        }

        .status-box {
            display: none;
            background: rgba(255, 255, 255, .08);
            color: #fff;
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }

        .card {
            background: #171717;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            outline: none;
            min-height: 210px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card:focus {
            box-shadow: 0 0 0 4px #00e5ff;
            transform: scale(1.02);
        }

        .thumb {
            width: 100%;
            height: 150px;
            background: #000;
            object-fit: contain;
        }

        .card-title {
            padding: 10px 8px 12px;
            font-size: 14px;
            text-align: center;
            line-height: 1.35;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .empty {
            padding: 30px 10px;
            text-align: center;
            color: #aaa;
        }

        #playerWrap {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: none;
        }

        #videoPlayer {
            width: 100%;
            height: 100%;
            background: #000;
            object-fit: contain;
        }

        #playerUi {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 10001;
            pointer-events: none;
        }

        #playerLeft,
        #playerRight {
            display: flex;
            gap: 8px;
            pointer-events: auto;
            flex-wrap: wrap;
        }

        .player-btn {
            border: 0;
            border-radius: 12px;
            padding: 12px 14px;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            outline: none;
        }

        .player-btn:focus {
            box-shadow: 0 0 0 3px rgba(255, 255, 255, .2);
        }

        .home-btn {
            background: #2196f3;
        }

        .close-btn {
            background: #e53935;
        }

        .mx-btn {
            background: #ff9800;
        }

        #playerStatus {
            position: absolute;
            left: 12px;
            right: 12px;
            bottom: 12px;
            z-index: 10001;
            background: rgba(0, 0, 0, .7);
            border-radius: 12px;
            padding: 10px 12px;
            font-size: 14px;
            text-align: center;
            display: none;
        }

        @media (max-width: 900px) {
            .sidebar {
                width: 185px;
            }

            .grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }
        }
    </style>
</head>

<body>
    <div class="app">
        <aside class="sidebar">
            <div class="brand">TIEA IPTV</div>

            <button class="menu-btn active" tabindex="0"
                data-source="https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/M3U/Dooball.json"
                data-title="📺 ทีวี">📺 ทีวี</button>

            <button class="menu-btn" tabindex="0"
                data-source="https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/Ezmovie.json"
                data-title="🎬 หนัง">🎬 หนัง</button>

            <button class="menu-btn" tabindex="0"
                data-source="https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/MySeries.json"
                data-title="📺 ซีรีส์">📺 ซีรีส์</button>

            <button class="menu-btn" tabindex="0"
                data-source="https://raw.githubusercontent.com/tiea9999/tv-online/refs/heads/main/Vip.json"
                data-title="🔐 VIP">🔐 VIP</button>

            <button class="menu-btn" tabindex="0"
                data-link="live.html">⚽ ตารางแข่งขัน</button>
        </aside>

        <main class="content">
            <div class="topbar">
                <div>
                    <div id="pageTitle" class="title">📺 ทีวี</div>
                    <div class="subtext">ใช้รีโมทเลื่อนแล้วกด Enter เพื่อเลือก</div>
                </div>
                <div class="action-row">
                    <button id="focusFirstBtn" class="top-btn" tabindex="0">โฟกัสรายการแรก</button>
                    <button id="reloadBtn" class="top-btn" tabindex="0">รีโหลด</button>
                    <button id="homeTopBtn" class="top-btn" tabindex="0">หน้าโฮม</button>
                </div>
            </div>

            <div id="statusBox" class="status-box"></div>
            <div id="grid" class="grid"></div>
        </main>
    </div>

    <div id="playerWrap">
        <video id="videoPlayer" controls playsinline autoplay muted></video>

        <div id="playerUi">
            <div id="playerLeft">
                <button id="playerHomeBtn" class="player-btn home-btn" tabindex="0">🏠 หน้าโฮม</button>
                <button id="playerCloseBtn" class="player-btn close-btn" tabindex="0">✕ ปิด</button>
            </div>
            <div id="playerRight">
                <button id="playerMxBtn" class="player-btn mx-btn" tabindex="0">▶ MX</button>
            </div>
        </div>

        <div id="playerStatus"></div>
    </div>

    <script>
        const grid = document.getElementById("grid");
        const pageTitle = document.getElementById("pageTitle");
        const statusBox = document.getElementById("statusBox");
        const playerWrap = document.getElementById("playerWrap");
        const playerStatus = document.getElementById("playerStatus");
        const video = document.getElementById("videoPlayer");
        const menuButtons = Array.from(document.querySelectorAll(".menu-btn"));

        let currentSource = menuButtons[0].dataset.source;
        let currentTitle = menuButtons[0].dataset.title || "📺 ทีวี";
        let currentList = [];
        let currentItem = null;
        let currentServerIndex = 0;
        let hls = null;
        let dashPlayer = null;
        let navigationStack = [];

        function setStatus(msg) {
            statusBox.textContent = msg || "";
            statusBox.style.display = msg ? "block" : "none";
        }

        function setPlayerStatus(msg) {
            playerStatus.textContent = msg || "";
            playerStatus.style.display = msg ? "block" : "none";
        }

        function clearPlayers() {
            if (hls) {
                try { hls.destroy(); } catch (e) {}
                hls = null;
            }
            if (dashPlayer) {
                try { dashPlayer.reset(); } catch (e) {}
                dashPlayer = null;
            }
            try { video.pause(); } catch (e) {}
            video.removeAttribute("src");
            video.load();
            setPlayerStatus("");
        }

        function showPlayer() {
            playerWrap.style.display = "block";
        }

        function closePlayer() {
            clearPlayers();
            playerWrap.style.display = "none";
            if (currentItem && currentItem._cardEl) {
                currentItem._cardEl.focus();
            }
        }

        function goHome() {
            closePlayer();
            navigationStack = [];
            pageTitle.textContent = currentTitle;
            const firstMenu = document.querySelector(".menu-btn.active") || menuButtons[0];
            if (firstMenu) firstMenu.focus();
        }

        function getPlayableUrl(item, idx = 0) {
            if (!item) return "";
            if (Array.isArray(item.servers) && item.servers.length) {
                return item.servers[idx]?.url || item.servers[0]?.url || "";
            }
            return item.url || item.stream || "";
        }

        function getServerCount(item) {
            if (Array.isArray(item.servers) && item.servers.length) return item.servers.length;
            return getPlayableUrl(item) ? 1 : 0;
        }

        function openMx(url) {
            if (!url) return;
            const mxUrl = "intent:" + url + "#Intent;package=com.mxtech.videoplayer.ad;end";
            window.location.href = mxUrl;
        }

        function tryNextServer(item, currentIdx, reason) {
            const total = getServerCount(item);
            if (currentIdx + 1 < total) {
                setPlayerStatus(reason + " กำลังสลับ Server " + (currentIdx + 2));
                setTimeout(() => {
                    playItem(item, currentIdx + 1);
                }, 500);
            } else {
                setPlayerStatus("ทุก Server เล่นไม่ได้ ลองกด MX");
            }
        }

        function playItem(item, serverIndex = 0) {
            currentItem = item;
            currentServerIndex = serverIndex;

            clearPlayers();
            showPlayer();

            const url = getPlayableUrl(item, serverIndex);
            if (!url) {
                setPlayerStatus("ไม่พบลิงก์สตรีม");
                return;
            }

            const total = getServerCount(item);
            setPlayerStatus("กำลังเล่น " + (item.title || "รายการ") + (total > 1 ? " (Server " + (serverIndex + 1) + "/" + total + ")" : ""));

            const lower = url.toLowerCase();

            if (lower.includes(".mp4")) {
                video.src = url;
                video.muted = true;
                video.volume = 1;
                video.play().then(() => {
                    setTimeout(() => { video.muted = false; }, 300);
                }).catch(() => {
                    tryNextServer(item, serverIndex, "MP4 เล่นไม่ได้");
                });
                return;
            }

            if (lower.includes(".m3u8")) {
                if (Hls.isSupported()) {
                    hls = new Hls({
                        enableWorker: true,
                        manifestLoadingMaxRetry: 3,
                        levelLoadingMaxRetry: 3,
                        fragLoadingMaxRetry: 3
                    });

                    hls.loadSource(url);
                    hls.attachMedia(video);

                    hls.on(Hls.Events.MANIFEST_PARSED, () => {
                        video.muted = true;
                        video.volume = 1;
                        video.play().then(() => {
                            setTimeout(() => { video.muted = false; }, 300);
                        }).catch(() => {
                            tryNextServer(item, serverIndex, "HLS autoplay ไม่สำเร็จ");
                        });
                    });

                    hls.on(Hls.Events.ERROR, (event, data) => {
                        if (data.fatal) {
                            tryNextServer(item, serverIndex, "สตรีมหลักเล่นไม่ได้");
                        }
                    });
                } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
                    video.src = url;
                    video.play().catch(() => {
                        tryNextServer(item, serverIndex, "Native HLS เล่นไม่ได้");
                    });
                } else {
                    tryNextServer(item, serverIndex, "อุปกรณ์ไม่รองรับ HLS");
                }
                return;
            }

            if (lower.includes(".mpd")) {
                try {
                    dashPlayer = dashjs.MediaPlayer().create();
                    dashPlayer.initialize(video, url, true);
                } catch (e) {
                    tryNextServer(item, serverIndex, "DASH เล่นไม่ได้");
                }
                return;
            }

            video.src = url;
            video.play().catch(() => {
                tryNextServer(item, serverIndex, "เล่นไม่ได้");
            });
        }

        function parseM3U(text) {
            const lines = text.split(/\r?\n/);
            const list = [];
            let current = null;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;

                if (line.startsWith("#EXTINF:")) {
                    const logoMatch = line.match(/tvg-logo="([^"]*)"/i);
                    const groupMatch = line.match(/group-title="([^"]*)"/i);
                    const name = line.split(",").pop()?.trim() || "ไม่ทราบชื่อ";

                    current = {
                        title: name,
                        logo: logoMatch ? logoMatch[1] : "",
                        group: groupMatch ? groupMatch[1] : "",
                        url: "",
                        servers: []
                    };
                } else if (!line.startsWith("#")) {
                    if (current) {
                        current.url = line;
                        current.servers = [{ name: "Main", url: line }];
                        list.push(current);
                        current = null;
                    }
                }
            }

            return list;
        }

        function normalizeJson(data) {
            let list = [];

            // array ตรง
            if (Array.isArray(data)) {
                list = data.map(item => {
                    if (Array.isArray(item.episodes) && item.episodes.length) {
                        return {
                            title: item.title || item.name || "ไม่มีชื่อ",
                            logo: item.poster || item.logo || item.image || "",
                            type: "folder",
                            items: item.episodes.map((ep, idx) => ({
                                title: ep.title || ep.name || `ตอนที่ ${idx + 1}`,
                                logo: ep.poster || ep.logo || ep.image || item.poster || item.logo || item.image || "",
                                url: ep.url || ep.stream || ep.link || ep.source || "",
                                group: item.title || item.name || "",
                                type: "video",
                                servers: Array.isArray(ep.servers) ? ep.servers.filter(s => s && s.url) : []
                            }))
                        };
                    }

                    return {
                        title: item.title || item.name || "ไม่มีชื่อ",
                        logo: item.logo || item.poster || item.image || "",
                        url: item.url || item.stream || item.link || item.source || "",
                        group: item.group || item.category || "",
                        type: item.type || "video",
                        servers: Array.isArray(item.servers) ? item.servers.filter(x => x && x.url) : []
                    };
                });
            }

            // channels
            else if (data.channels && Array.isArray(data.channels)) {
                list = data.channels.map(item => ({
                    title: item.title || item.name || "ไม่มีชื่อ",
                    logo: item.logo || item.poster || item.image || "",
                    url: item.url || item.stream || item.link || item.source || "",
                    group: item.group || item.category || "",
                    type: item.type || "video",
                    servers: Array.isArray(item.servers) ? item.servers.filter(x => x && x.url) : []
                }));
            }

            // groups
            else if (data.groups && Array.isArray(data.groups)) {
                data.groups.forEach(g => {
                    (g.items || g.stations || []).forEach(item => {
                        if (Array.isArray(item.episodes) && item.episodes.length) {
                            list.push({
                                title: item.title || item.name || "ไม่มีชื่อ",
                                logo: item.poster || item.logo || item.image || "",
                                type: "folder",
                                items: item.episodes.map((ep, idx) => ({
                                    title: ep.title || ep.name || `ตอนที่ ${idx + 1}`,
                                    logo: ep.poster || ep.logo || ep.image || item.poster || item.logo || item.image || "",
                                    url: ep.url || ep.stream || ep.link || ep.source || "",
                                    group: item.title || item.name || "",
                                    type: "video",
                                    servers: Array.isArray(ep.servers) ? ep.servers.filter(s => s && s.url) : []
                                }))
                            });
                        } else {
                            list.push({
                                title: item.title || item.name || "ไม่มีชื่อ",
                                logo: item.logo || item.poster || item.image || g.image || g.logo || "",
                                url: item.url || item.stream || item.link || item.source || "",
                                group: g.title || g.name || "",
                                type: item.type || "video",
                                servers: Array.isArray(item.servers) ? item.servers.filter(x => x && x.url) : []
                            });
                        }
                    });
                });
            }

            // items ตรง
            else if (data.items && Array.isArray(data.items)) {
                list = data.items.map(item => {
                    if (Array.isArray(item.episodes) && item.episodes.length) {
                        return {
                            title: item.title || item.name || "ไม่มีชื่อ",
                            logo: item.poster || item.logo || item.image || "",
                            type: "folder",
                            items: item.episodes.map((ep, idx) => ({
                                title: ep.title || ep.name || `ตอนที่ ${idx + 1}`,
                                logo: ep.poster || ep.logo || ep.image || item.poster || item.logo || item.image || "",
                                url: ep.url || ep.stream || ep.link || ep.source || "",
                                group: item.title || item.name || "",
                                type: "video",
                                servers: Array.isArray(ep.servers) ? ep.servers.filter(s => s && s.url) : []
                            }))
                        };
                    }

                    return {
                        title: item.title || item.name || "ไม่มีชื่อ",
                        logo: item.logo || item.poster || item.image || "",
                        url: item.url || item.stream || item.link || item.source || "",
                        group: item.group || item.category || "",
                        type: item.type || "",
                        servers: Array.isArray(item.servers) ? item.servers.filter(x => x && x.url) : []
                    };
                });
            }

            return list.map(item => {
                if ((!item.url || item.url === "") && item.servers?.length) {
                    item.url = item.servers[0].url;
                }
                return item;
            }).filter(item =>
                item.url ||
                item.servers?.length ||
                item.type === "source" ||
                item.type === "folder" ||
                (Array.isArray(item.items) && item.items.length)
            );
        }

        async function loadSource(sourceUrl) {
            if (!sourceUrl) return { mode: "items", data: [] };

            const lower = sourceUrl.toLowerCase();

            if (lower.endsWith(".m3u8") && !lower.includes(".json")) {
                return {
                    mode: "items",
                    data: [{
                        title: "Live Stream",
                        logo: "",
                        url: sourceUrl,
                        group: "",
                        servers: [{ name: "Main", url: sourceUrl }]
                    }]
                };
            }

            const res = await fetch(sourceUrl);
            if (!res.ok) throw new Error("โหลดไฟล์ไม่สำเร็จ: " + res.status);

            const text = await res.text();
            const trimmed = text.trim();

            if (!trimmed) return { mode: "items", data: [] };

            if (trimmed.startsWith("{") || trimmed.startsWith("[")) {
                const parsed = JSON.parse(text);

                if (
                    parsed &&
                    !Array.isArray(parsed) &&
                    parsed.type === "menu" &&
                    Array.isArray(parsed.items)
                ) {
                    return {
                        mode: "menu",
                        title: parsed.title || "",
                        data: parsed.items.map(item => ({
                            title: item.title || item.name || "ไม่มีชื่อ",
                            source: item.source || item.url || "",
                            type: item.type || "source",
                            logo: item.logo || item.image || ""
                        }))
                    };
                }

                return {
                    mode: "items",
                    data: normalizeJson(parsed)
                };
            }

            if (text.includes("#EXTM3U") || text.includes("#EXTINF")) {
                return {
                    mode: "items",
                    data: parseM3U(text)
                };
            }

            return { mode: "items", data: [] };
        }

        function renderGrid(result) {
            grid.innerHTML = "";

            const list = result?.data || [];

            if (!list.length) {
                grid.innerHTML = `<div class="empty">ไม่พบรายการ</div>`;
                return;
            }

            // mode menu
            if (result.mode === "menu") {
                list.forEach((item, index) => {
                    const card = document.createElement("div");
                    card.className = "card";
                    card.tabIndex = 0;

                    card.innerHTML = `
                        <img class="thumb" src="${item.logo || ""}" onerror="this.style.display='none'">
                        <div class="card-title">${item.title || "ไม่มีชื่อ"}</div>
                    `;

                    card.onclick = async () => {
                        if (!item.source) return;
                        navigationStack.push({
                            source: currentSource,
                            title: pageTitle.textContent,
                            inlineData: currentList
                        });
                        currentSource = item.source;
                        pageTitle.textContent = item.title || pageTitle.textContent;
                        await loadCurrentSource();
                    };

                    card.onkeydown = async (e) => {
                        if (e.key === "Enter") {
                            e.preventDefault();
                            card.click();
                        }
                    };

                    grid.appendChild(card);

                    if (index === 0) {
                        setTimeout(() => card.focus(), 100);
                    }
                });
                return;
            }

            // mode items
            list.forEach((item, index) => {
                const card = document.createElement("div");
                card.className = "card";
                card.tabIndex = 0;

                card.innerHTML = `
                    <img class="thumb" src="${item.logo || ""}" onerror="this.style.display='none'">
                    <div class="card-title">${item.title || "ไม่มีชื่อ"}</div>
                `;

                // โฟลเดอร์ซีรีส์
                if (item.type === "folder" || (Array.isArray(item.items) && item.items.length)) {
                    card.onclick = () => {
                        navigationStack.push({
                            source: currentSource,
                            title: pageTitle.textContent,
                            inlineData: currentList
                        });

                        pageTitle.textContent = item.title || pageTitle.textContent;
                        currentList = {
                            mode: "items",
                            data: item.items
                        };
                        renderGrid(currentList);
                    };

                    card.onkeydown = (e) => {
                        if (e.key === "Enter") {
                            e.preventDefault();
                            card.click();
                        }
                    };
                }

                // source ย่อย
                else if (item.type === "source" && item.url) {
                    card.onclick = async () => {
                        navigationStack.push({
                            source: currentSource,
                            title: pageTitle.textContent,
                            inlineData: currentList
                        });

                        currentSource = item.url;
                        pageTitle.textContent = item.title || pageTitle.textContent;
                        await loadCurrentSource();
                    };

                    card.onkeydown = async (e) => {
                        if (e.key === "Enter") {
                            e.preventDefault();
                            card.click();
                        }
                    };
                }

                // วิดีโอปกติ
                else {
                    card.onclick = () => playItem(item, 0);
                    card.onkeydown = (e) => {
                        if (e.key === "Enter") {
                            e.preventDefault();
                            playItem(item, 0);
                        }
                    };
                }

                item._cardEl = card;
                grid.appendChild(card);

                if (index === 0) {
                    setTimeout(() => card.focus(), 100);
                }
            });
        }

        async function loadCurrentSource() {
            try {
                setStatus("กำลังโหลดรายการ...");
                const result = await loadSource(currentSource);
                currentList = result;
                renderGrid(result);
                setStatus("");
            } catch (e) {
                console.error(e);
                setStatus("โหลดรายการไม่สำเร็จ");
                grid.innerHTML = `<div class="empty">โหลดรายการไม่สำเร็จ</div>`;
            }
        }

        menuButtons.forEach(btn => {
            btn.addEventListener("click", async () => {
                menuButtons.forEach(b => b.classList.remove("active"));
                btn.classList.add("active");

                navigationStack = [];

                if (btn.dataset.link) {
                    window.location.href = btn.dataset.link;
                    return;
                }

                currentSource = btn.dataset.source || "";
                currentTitle = btn.dataset.title || btn.textContent.trim();
                pageTitle.textContent = currentTitle;

                await loadCurrentSource();
            });

            btn.addEventListener("keydown", e => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    btn.click();
                }
            });
        });

        document.getElementById("reloadBtn").onclick = loadCurrentSource;

        document.getElementById("focusFirstBtn").onclick = () => {
            const firstCard = grid.querySelector(".card");
            if (firstCard) firstCard.focus();
        };

        document.getElementById("homeTopBtn").onclick = () => {
            navigationStack = [];
            const active = document.querySelector(".menu-btn.active") || menuButtons[0];
            if (active) active.focus();
            pageTitle.textContent = currentTitle;
        };

        document.getElementById("playerCloseBtn").onclick = closePlayer;
        document.getElementById("playerHomeBtn").onclick = goHome;
        document.getElementById("playerMxBtn").onclick = () => {
            const url = getPlayableUrl(currentItem, currentServerIndex);
            openMx(url);
        };

        document.addEventListener("keydown", function(e) {
            const inPlayer = playerWrap.style.display === "block";

            if ((e.key === "Escape" || e.key === "Backspace") && inPlayer) {
                e.preventDefault();
                closePlayer();
                return;
            }

            if ((e.key === "Escape" || e.key === "Backspace") && !inPlayer) {
                if (navigationStack.length > 0) {
                    e.preventDefault();
                    const prev = navigationStack.pop();
                    currentSource = prev.source;
                    pageTitle.textContent = prev.title;

                    if (prev.inlineData) {
                        currentList = prev.inlineData;
                        renderGrid(currentList);
                    } else {
                        loadCurrentSource();
                    }
                    return;
                }

                const activeEl = document.activeElement;
                const isCard = activeEl && activeEl.classList && activeEl.classList.contains("card");
                if (isCard) {
                    e.preventDefault();
                    const activeMenu = document.querySelector(".menu-btn.active") || menuButtons[0];
                    if (activeMenu) activeMenu.focus();
                }
            }
        });

        loadCurrentSource();
    </script>
</body>

</html>
