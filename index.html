<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIEA IPTV PRO</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{margin:0;background:#0f172a;color:white;font-family:sans-serif;display:flex;height:100vh;overflow:hidden}

.sidebar{width:200px;background:#020617;padding-top:20px}
.menu-item{padding:15px;cursor:pointer}
.menu-item:focus{background:#1e293b;outline:none}

.main{flex:1;display:flex;flex-direction:column}

.player{padding:10px}
video{width:100%;height:260px;border-radius:10px;background:black}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
gap:15px;
padding:15px;
overflow:auto;
}

.card{
background:#334155;
padding:10px;
border-radius:10px;
text-align:center;
}
.card img{max-height:50px}

.card:focus{
outline:3px solid yellow;
transform:scale(1.05);
}
</style>

</head>

<body>

<div class="sidebar">
  <div class="menu-item" tabindex="0" onclick="openLive()">🏟 ตารางแข่งขันกีฬา</div>
  <div class="menu-item" tabindex="0" onclick="openTVMenu()">📺 TV</div>
  <div class="menu-item" tabindex="0" onclick="openMovie()">🎬 Movie</div>
  <div class="menu-item" tabindex="0" onclick="openSeries()">🎞 Series</div>
</div>

<div class="main">
<div class="player">
  <video id="player" controls playsinline></video>
</div>
<div id="list" class="grid"></div>
</div>

<script src="channels.js"></script>

<script>
const player = document.getElementById("player");
const list = document.getElementById("list");

let lastTV = localStorage.getItem("lastTV") || 0;

/* =======================
   🌐 PROXY
======================= */
function proxy(url){
  return "https://YOUR-WORKER.workers.dev/?url=" + encodeURIComponent(url);
}

/* =======================
   🧠 AI CHECK LINK (เร็ว + ใช้ได้)
======================= */
async function checkLink(url){

  try{
    const start = Date.now();

    const res = await fetch(proxy(url), {method:"HEAD", cache:"no-store"});

    if(!res.ok) return null;

    const speed = Date.now() - start;

    return {url, speed};

  }catch{
    return null;
  }

}

/* =======================
   🧠 AI SELECT BEST STREAM
======================= */
async function getBestStream(urls){

  if(!Array.isArray(urls)) return urls;

  const results = await Promise.all(urls.map(checkLink));

  const valid = results.filter(r=>r !== null);

  if(valid.length === 0){
    console.log("❌ ไม่มีลิงก์ใช้ได้");
    return urls[0];
  }

  valid.sort((a,b)=>a.speed - b.speed);

  console.log("⚡ best:", valid[0].url);

  return valid[0].url;
}

/* =======================
   ▶️ PLAY (AI VERSION)
======================= */
async function play(urls){

  const best = await getBestStream(urls);

  const url = proxy(best);

  if(window.hls) window.hls.destroy();

  if(Hls.isSupported()){

    const hls = new Hls({
      maxBufferLength:30,
      liveSyncDuration:5,
      enableWorker:true
    });

    window.hls = hls;

    hls.loadSource(url);
    hls.attachMedia(player);

    hls.on(Hls.Events.MANIFEST_PARSED, ()=>{
      player.play();
    });

    // 🔁 fallback
    hls.on(Hls.Events.ERROR, function(e,data){
      if(data.fatal){
        console.log("🔁 stream error → retry...");
        setTimeout(()=>play(urls),1500);
      }
    });

  }else{
    player.src = url;
    player.play();
  }
}

/* =======================
   🚀 PRELOAD
======================= */
let preloadCache = {};

function preload(urls){

  if(!Array.isArray(urls)) urls=[urls];

  urls.forEach(url=>{
    const p = proxy(url);
    if(!preloadCache[p]){
      fetch(p).catch(()=>{});
      preloadCache[p] = true;
    }
  });

}

/* =======================
   📺 TV MENU
======================= */
function openTVMenu(){

  list.innerHTML = "";

  const groups = [
    {name:"Digital", key:"digital"},
    {name:"บันเทิง", key:"movie"},
    {name:"สารคดี", key:"documentary"},
    {name:"การ์ตูน", key:"kids"}
  ];

  groups.forEach(g=>{
    const div=document.createElement("div");
    div.className="card";
    div.tabIndex=0;
    div.innerHTML=`<div style="padding:20px">${g.name}</div>`;
    div.onclick=()=>openTVGroup(g.key);
    list.appendChild(div);
  });

  focusFirst();
}

/* =======================
   📺 TV GROUP
======================= */
function openTVGroup(group){

  list.innerHTML="";

  const data = channels.tv[group];

  if(!data || data.length === 0){
    list.innerHTML = "<div style='padding:20px'>ไม่มีช่อง</div>";
    return;
  }

  data.forEach((ch,i)=>{
    const div=document.createElement("div");
    div.className="card";
    div.tabIndex=0;
    div.innerHTML=`<img src="${ch.logo||''}"><div>${ch.name}</div>`;

    div.onmouseenter = ()=>preload(ch.url);
    div.onfocus = ()=>preload(ch.url);

    div.onclick=()=>{
      play(ch.url);
      lastTV=i;
      localStorage.setItem("lastTV",i);
    };

    list.appendChild(div);
  });

  play(data[lastTV] ? data[lastTV].url : data[0].url);

  focusFirst();
}

/* =======================
   🏟 LIVE
======================= */
function openLive(){
  window.location.href = "live.html";
}

/* =======================
   🎬 MOVIE
======================= */
function openMovie(){
  list.innerHTML = `<iframe src="movie.html" style="width:100%;height:80vh;border:none;"></iframe>`;
}

/* =======================
   🎞 SERIES
======================= */
function openSeries(){
  list.innerHTML = `<iframe src="series.html" style="width:100%;height:80vh;border:none;"></iframe>`;
}

/* =======================
   🎯 FOCUS
======================= */
function focusFirst(){
  setTimeout(()=>{
    const first=document.querySelector(".card");
    if(first) first.focus();
  },100);
}

/* =======================
   🎮 REMOTE
======================= */
document.addEventListener("keydown",e=>{
  const items=[...document.querySelectorAll(".card, .menu-item")];
  const i=items.indexOf(document.activeElement);

  let next;

  if(e.key==="ArrowRight") next=i+1;
  if(e.key==="ArrowLeft") next=i-1;
  if(e.key==="ArrowDown") next=i+4;
  if(e.key==="ArrowUp") next=i-4;
  if(e.key==="Enter") return document.activeElement.click();

  if(items[next]) items[next].focus();
});

/* =======================
   🔙 BACK
======================= */
document.addEventListener("keydown", function(e){
  if(e.key === "Backspace" || e.key === "Escape"){
    openTVMenu();
  }
});

/* =======================
   🚀 START
======================= */
document.querySelector(".menu-item").focus();
</script>

</body>
</html>
