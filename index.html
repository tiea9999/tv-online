const $=id=>document.getElementById(id),content=$('content'),statusText=$('statusText'),video=$('video'),playerPanel=$('playerPanel');
function setStatus(t){statusText.textContent=t||'พร้อมใช้งาน'}function cleanUrl(u){return String(u||'').trim()}function isJsonUrl(u){return /\.json($|\?)/i.test(String(u||''))||String(u||'').includes('raw.githubusercontent.com')||String(u||'').includes('githubusercontent.com')}function imgOf(i){return i.poster||i.image||i.thumb||i.logo||i.cover||''}
function groupName(g){let t=String(g||'').trim();const map={'series':'ดูซีรี่ย์ออนไลน์','series-online':'ดูซีรี่ย์ออนไลน์','series-china':'ดูซีรี่ย์จีน','series-korea':'ดูซีรี่ย์เกาหลี','series-thai':'ดูซีรี่ย์ไทย','series-japan':'ซีรี่ย์ญี่ปุ่น','movie':'ดูหนังออนไลน์','short':'ดูละครสั้น','tv':'ทีวี','sport':'กีฬา'};if(map[t])return map[t];if(t.includes('ละครสั้น')||t.includes('หนังสั้น'))return 'ดูละครสั้น';if(t.includes('ดูหนัง')||t==='หนัง'||t.includes('หนังออนไลน์'))return 'ดูหนังออนไลน์';if(t.includes('จีน'))return 'ดูซีรี่ย์จีน';if(t.includes('เกาหลี'))return 'ดูซีรี่ย์เกาหลี';if(t.includes('ญี่ปุ่น'))return 'ซีรี่ย์ญี่ปุ่น';if(t.includes('ละครไทย')||t.includes('ซีรี่ย์ไทย')||t.includes('ซีรีย์ไทย'))return 'ดูซีรี่ย์ไทย';if(t.includes('ซีรี่ย์')||t.includes('ซีรีย์')||t.includes('ออนไลน์'))return 'ดูซีรี่ย์ออนไลน์';return t||'อื่นๆ'}
function groupsOf(item,parent=''){let arr=[];if(Array.isArray(item.groups))arr.push(...item.groups.map(groupName));if(typeof item.groups==='string')arr.push(groupName(item.groups));if(item.group)arr.push(groupName(item.group));if(item.category)arr.push(groupName(item.category));if(!arr.length&&parent)arr.push(groupName(parent));if(!arr.length)arr.push('อื่นๆ');return [...new Set(arr.filter(Boolean))]}
function serversOf(item){let out=[];if(Array.isArray(item.servers)){item.servers.forEach(s=>{const u=cleanUrl(s.url||s.link||s.file||s.source);if(u)out.push({name:s.name||'Main',url:u})})}const one=cleanUrl(item.url||item.link||item.stream||item.file);if(one&&!isJsonUrl(one))out.push({name:'Main',url:one});return out}
function episodesOf(item,img=''){if(!Array.isArray(item.episodes))return [];return item.episodes.map((ep,i)=>({title:ep.title||ep.name||ep.ep_name||`EP${i+1}`,image:imgOf(ep)||img,servers:serversOf(ep),type:'episode'})).filter(e=>e.servers.length)}
function calcStatus(item,eps){const raw=String(item.status||item.finish||item.end||item.complete||'').trim();if(raw)return raw;const title=String(item.title||'');if(title.includes('จบเรื่อง')||title.includes('ครบทุกตอน')||title.includes('(END)'))return 'จบแล้ว';const latest=Number(item.latest_ep||0),total=Number(item.total_ep||0);if(total&&latest&&latest>=total)return 'จบแล้ว';if(eps&&eps.some(e=>String(e.title||'').includes('ตอนจบ')))return 'จบแล้ว';if(eps&&eps.length)return 'ยังไม่จบ';return ''}
function normalize(data,parent=''){let out=[],seen=new Set();function add(obj){const k=[obj.kind,obj.title,obj.source,obj.servers?.[0]?.url,obj.episodes?.length].join('|').toLowerCase();if(seen.has(k))return;seen.add(k);out.push(obj)}function walk(node,pg=''){if(Array.isArray(node)){node.forEach(x=>walk(x,pg));return}if(!node||typeof node!=='object')return;const title=node.title||node.name||node.channel||'ไม่มีชื่อ',img=imgOf(node),gs=groupsOf(node,pg||parent),source=cleanUrl(node.source||node.url||node.link||node.file);if((node.type==='menu'||Array.isArray(node.items))&&Array.isArray(node.items)){node.items.forEach(x=>walk(x,title));return}if((node.type==='source'||source)&&source&&isJsonUrl(source)&&!node.episodes){add({kind:'folder',title,image:img,source,groups:gs,group:gs[0]||title,status:node.status||''});return}if(Array.isArray(node.data)){node.data.forEach(x=>walk(x,gs[0]));return}const eps=episodesOf(node,img),sv=serversOf(node);if(eps.length){add({kind:'series',title,image:img,groups:gs,group:gs[0],language:node.language||'',year:node.year||'',status:calcStatus(node,eps),latest_ep:node.latest_ep||eps.length,total_ep:node.total_ep||eps.length,episodes:eps,raw:node})}else if(sv.length){add({kind:'play',title,image:img,groups:gs,group:gs[0]||'อื่นๆ',language:node.language||'',year:node.year||'',status:calcStatus(node,[]),servers:sv,type:node.type||'video',raw:node})}}walk(data,parent);return out}
function parseM3U(text,parent='ทีวี'){const out=[];let cur=null;text.split(/\r?\n/).forEach(raw=>{const line=raw.trim();if(!line)return;if(line.startsWith('#EXTINF:')){const logo=line.match(/tvg-logo="([^"]*)"/i)?.[1]||'',group=groupName(line.match(/group-title="([^"]*)"/i)?.[1]||parent),title=line.split(',').pop()?.trim()||'ช่อง';cur={kind:'play',title,image:logo,group,groups:[group],servers:[],type:'tv'}}else if(!line.startsWith('#')&&cur){cur.servers=[{name:'Main',url:line}];out.push(cur);cur=null}});return out}
async function fetchText(url){const sep=url.includes('?')?'&':'?';const res=await fetch(url+sep+'t='+Date.now(),{cache:'no-store'});if(!res.ok)throw new Error('HTTP '+res.status);return await res.text()}
async function loadUrl(url,parent=''){const text=await fetchText(url),trim=text.trim();if(trim.startsWith('{')||trim.startsWith('['))return normalize(JSON.parse(text),parent);if(trim.includes('#EXTM3U')||trim.includes('#EXTINF'))return parseM3U(text,parent);return []}

async function loadFolder(item){setStatus('กำลังโหลด '+item.title+' ...');try{const items=await loadUrl(item.source,item.title);renderRows(makeRows(items),item.title);if(items.length){setStatus('โหลด '+item.title+' สำเร็จ '+items.length+' รายการ')}else{setStatus('โหลด '+item.title+' ได้ 0 รายการ')}}catch(e){setStatus('โหลดไม่สำเร็จ '+e.message)}}
async function preloadSources(){for(const key of ['series-main','movie-main','tv-main']){if(state.preloaded[key])continue;state.preloaded[key]=true;loadSourcePack(key).then(items=>console.log('preload',key,items.length)).catch(()=>{})}}
function makeRows(items){const order=['ดูซีรี่ย์ออนไลน์','ดูซีรี่ย์จีน','ดูซีรี่ย์เกาหลี','ดูซีรี่ย์ไทย','ซีรี่ย์ญี่ปุ่น','ดูหนังออนไลน์','ดูละครสั้น','ทีวี','กีฬา','อื่นๆ'];const map={};items.forEach(item=>{const cats=item.groups&&item.groups.length?item.groups:[item.group||'อื่นๆ'];cats.forEach(c=>{c=groupName(c);if(!map[c])map[c]=[];if(!map[c].some(x=>x.title===item.title))map[c].push(item)})});return Object.keys(map).sort((a,b)=>{const ia=order.indexOf(a)<0?99:order.indexOf(a),ib=order.indexOf(b)<0?99:order.indexOf(b);return ia-ib||a.localeCompare(b,'th')}).map(title=>({title,items:map[title]}))}
function renderHome(){state.activeSource='home';setStatus('หน้าแรก • กำลังโหลด MySeries + หนัง + ทีวี');content.innerHTML=`<div class="hero"><div class="hero-title">TIEA IPTV FINAL MYSeries HARD CUT 2 ONLY v3</div><div class="hero-sub">หน้าอยู่ /tv-online/ • MySeries แสดงเฉพาะ 2 โฟลเดอร์: ดูหนังออนไลน์ / ดูซีรี่ย์ออนไลน์ และ VIP ไป Vip.html</div></div><div id="homeRows"></div>`;Promise.all([loadSourcePack('series-main').catch(()=>[]),loadSourcePack('movie-main').catch(()=>[]),loadSourcePack('tv-main').catch(()=>SAMPLE_TV.map(x=>normalize([x])[0]))]).then(([series,movies,tv])=>{ series=getMySeriesTwoFolders();const rows=[{title:'MySeries ทั้งหมด',items:getMySeriesTwoFolders()},{title:'ดูหนังออนไลน์',items:movies.slice(0,30)},{title:'ทีวีออนไลน์',items:(tv.length?tv:SAMPLE_TV.map(x=>normalize([x])[0])).slice(0,30)}].filter(r=>r.items.length);renderRows(rows,'หน้าแรก',document.getElementById('homeRows'));setStatus('พร้อมใช้งาน • โหลดหน้าแรกสำเร็จ')});preloadSources()}
function renderRows(rows,title='รายการ',target=content){state.rows=rows;target.innerHTML='';rows.forEach(row=>{const sec=document.createElement('div');sec.className='section';sec.innerHTML=`<div class="section-head"><div class="section-title">${row.title}</div><div class="section-tools"><div class="badge">${row.items.length} รายการ</div><button class="see-all-btn">ดูทั้งหมด</button></div></div><div class="row"></div>`;const rowEl=sec.querySelector('.row');row.items.slice(0,18).forEach(item=>rowEl.appendChild(createCard(item)));sec.querySelector('.see-all-btn').onclick=()=>openModal(row.title,row.items);target.appendChild(sec)});if(!rows.length)target.innerHTML='<div class="hero"><div class="hero-title">ไม่พบรายการ</div><div class="hero-sub">ตรวจสอบชื่อไฟล์ JSON หรือโครงสร้างข้อมูลอีกครั้ง</div></div>';setTimeout(()=>document.querySelector('.card,.menu-btn.active')?.focus(),80)}
function epText(item){if(item.latest_ep&&item.total_ep)return 'EP.'+item.latest_ep+'/'+item.total_ep;if(item.total_ep)return 'EP.1-'+item.total_ep;if(item.episodes?.length)return 'EP.'+item.episodes.length;return ''}
function createCard(item){const btn=document.createElement('button'),isFolder=item.kind==='folder';btn.className='card'+(isFolder?' folder-card':'');btn.type='button';const image=isFolder?FOLDER_LOGO:imgOf(item),lang=item.language||'',ep=epText(item);let st=item.status||'';if(!st&&!isFolder&&item.kind==='series'){const le=Number(item.latest_ep||0),te=Number(item.total_ep||0);st=(te&&le&&le>=te)?'จบแล้ว':'ยังไม่จบ'}const done=String(st).includes('จบ')&&!String(st).includes('ยัง');btn.innerHTML=`<div class="card-glow"></div><div class="poster-wrap">${image?`<img class="thumb ${item.type==='tv'?'tv':''} ${isFolder?'folder-logo':''}" src="${image}" loading="lazy" onerror="this.onerror=null;this.outerHTML='<div class=&quot;thumb fallback&quot;>${isFolder?'📁':'🎬'}</div>'">`:`<div class="thumb fallback">${isFolder?'📁':'🎬'}</div>`}${(!isFolder&&lang)?`<div class="lang-ribbon">${lang}</div>`:''}${(!isFolder&&st)?`<div class="status-pill ${done?'done':''}">${st}</div>`:''}${(!isFolder&&ep)?`<div class="ep-pill">${ep}</div>`:''}</div><div class="card-body"><div class="card-title">${isFolder?'📁 ':''}${item.title||'ไม่มีชื่อ'}</div><div class="card-meta">${item.group?`<span class="tag">${item.group}</span>`:''}</div></div>`;btn.onclick=()=>openItem(item);btn.onkeydown=e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();openItem(item)}};return btn}
function openItem(item){if(item.kind==='folder'){loadFolder(item);return}if(item.kind==='series'&&item.episodes?.length){openDetail(item);return}playItem(item,0)}
function openDetail(item){const modal=$('modal');$('modalTitle').textContent=item.title;$('modalBody').innerHTML=`<div class="detail-box"><div class="detail-title">${item.title}</div><div class="detail-sub">${item.language?item.language+' • ':''}${item.status?item.status+' • ':''}${item.group||''}${item.total_ep?' • ทั้งหมด '+item.total_ep+' ตอน':''}</div></div><div class="episode-list"></div>`;const list=$('modalBody').querySelector('.episode-list');item.episodes.forEach((ep,i)=>{const b=document.createElement('button');b.className='episode-btn';b.textContent=ep.title||`EP${i+1}`;b.onclick=()=>{closeModal();playItem(ep,0,item.title+' '+b.textContent)};list.appendChild(b)});$('modalCount').textContent='ทั้งหมด '+item.episodes.length+' ตอน';$('pageInfo').textContent='เลือกตอน';$('prevPageBtn').style.display='none';$('nextPageBtn').style.display='none';modal.classList.add('show');setTimeout(()=>list.querySelector('.episode-btn')?.focus(),80)}
function openModal(title,items){state.modalItems=items;state.page=1;$('modalTitle').textContent=title;$('prevPageBtn').style.display='';$('nextPageBtn').style.display='';renderModalPage();$('modal').classList.add('show')}
function renderModalPage(){const total=state.modalItems.length,pages=Math.max(1,Math.ceil(total/state.perPage));state.page=Math.max(1,Math.min(state.page,pages));const start=(state.page-1)*state.perPage,items=state.modalItems.slice(start,start+state.perPage);$('modalBody').innerHTML='<div class="grid"></div>';const g=$('modalBody').querySelector('.grid');items.forEach(item=>g.appendChild(createCard(item)));$('modalCount').textContent='ทั้งหมด '+total+' รายการ';$('pageInfo').textContent='หน้า '+state.page+' / '+pages;$('prevPageBtn').disabled=state.page<=1;$('nextPageBtn').disabled=state.page>=pages;setTimeout(()=>g.querySelector('.card')?.focus(),80)}
function closeModal(){$('modal').classList.remove('show');$('prevPageBtn').style.display='';$('nextPageBtn').style.display=''}
function getUrl(item,serverIndex=0){return cleanUrl(item.servers?.[serverIndex]?.url||item.servers?.[0]?.url||item.url||item.link||item.stream||'')}

function forceVideoVolume(){
  try{
    video.muted=false;
    video.volume=1.0;
    video.playbackRate=1;
  }catch(e){}
}

function stopWatchdog(){
  if(state.watchdog){
    clearInterval(state.watchdog);
    state.watchdog=null;
  }
}

function startWatchdog(){
  stopWatchdog();
  state.lastTime=0;
  state.stuckCount=0;
  state.recoverCount=0;
  state.lastRecoverAt=0;

  state.watchdog=setInterval(()=>{
    if(!playerPanel.classList.contains('show')) return;
    if(!video) return;

    forceVideoVolume();

    if(video.paused){
      video.play().catch(()=>{});
    }

    const moved=Math.abs((video.currentTime||0)-(state.lastTime||0))>0.25;
    if(moved){
      state.stuckCount=0;
      state.recoverCount=0;
    }else if(!video.paused){
      state.stuckCount++;
    }

    state.lastTime=video.currentTime||0;

    if(state.stuckCount>=4 && Date.now()-state.lastRecoverAt>12000){
      state.stuckCount=0;
      state.recoverCount++;
      state.lastRecoverAt=Date.now();
      setStatus('สัญญาณค้าง • กำลังต่อใหม่ครั้งที่ '+state.recoverCount);

      try{
        if(state.hls){
          state.hls.stopLoad();
          setTimeout(()=>{ try{state.hls.startLoad(Math.max(0,video.currentTime-1));video.play().catch(()=>{});}catch(e){} },500);
          return;
        }
        if(state.dash){
          video.play().catch(()=>{});
          return;
        }
      }catch(e){}

      if(state.recoverCount>=3){
        openExternal(state.originalUrl||state.currentUrl);
      }
    }
  },5000);
}

function cleanupPlayer(){stopWatchdog();if(state.playTimer){clearTimeout(state.playTimer);state.playTimer=null}if(state.hls){try{state.hls.destroy()}catch(e){}state.hls=null}if(state.dash){try{state.dash.destroy()}catch(e){}state.dash=null}try{video.pause()}catch(e){}video.removeAttribute('src');video.src='';video.load()}
function playItem(item,serverIndex=0,displayTitle=''){const original=getUrl(item,serverIndex);if(!original){setStatus('ไม่พบลิงก์เล่น');return}cleanupPlayer();state.originalUrl=original;state.currentUrl=original;state.currentTitle=displayTitle||item.title||'กำลังเล่น';$('playerTitle').textContent=state.currentTitle;setStatus('กำลังเล่นผ่านเว็บก่อน • ถ้าไม่ขึ้นภาพให้กด PLAYER หรือ MX');playerPanel.classList.add('show');const preferProxy=item.type!=='tv';const candidates=preferProxy?[PROXY+encodeURIComponent(original),original]:[original,PROXY+encodeURIComponent(original)];playCandidate(candidates,item,serverIndex,0)}
function playCandidate(candidates,item,serverIndex,idx){const url=candidates[idx]||candidates[0];state.currentUrl=url;const direct=getUrl(item,serverIndex);const next=()=>{if(idx+1<candidates.length){playCandidate(candidates,item,serverIndex,idx+1);return}if(item.servers?.length>serverIndex+1){playItem(item,serverIndex+1);return}openMx(direct)};cleanupPlayer();playerPanel.classList.add('show');forceVideoVolume();startWatchdog();state.playTimer=setTimeout(()=>{if(video.readyState<2||video.currentTime===0)openExternal(direct)},6500);['playing','loadeddata','canplay'].forEach(ev=>video.addEventListener(ev,()=>{if(state.playTimer)clearTimeout(state.playTimer);state.stuckCount=0;forceVideoVolume()},{once:true}));const lower=url.toLowerCase();if(lower.includes('.mpd')){try{state.dash=dashjs.MediaPlayer().create();state.dash.initialize(video,url,true);forceVideoVolume();startWatchdog()}catch(e){next()}return}if(Hls.isSupported()&&lower.includes('.m3u8')){state.hls=new Hls({
enableWorker:false,
lowLatencyMode:false,
maxBufferLength:30,
maxMaxBufferLength:60,
backBufferLength:10,
maxBufferHole:.5,
fragLoadingTimeOut:20000,
manifestLoadingTimeOut:15000,
levelLoadingTimeOut:15000,
fragLoadingMaxRetry:8,
manifestLoadingMaxRetry:6,
levelLoadingMaxRetry:6,
fragLoadingRetryDelay:1000,
manifestLoadingRetryDelay:1000,
levelLoadingRetryDelay:1000,
startFragPrefetch:true,
capLevelToPlayerSize:true,
testBandwidth:false
});state.hls.loadSource(url);state.hls.attachMedia(video);state.hls.on(Hls.Events.MANIFEST_PARSED,()=>{forceVideoVolume();startWatchdog();video.play().catch(()=>{});});state.hls.on(Hls.Events.ERROR,(e,d)=>{
 if(!d) return;
 if(!d.fatal){
   if(d.type===Hls.ErrorTypes.NETWORK_ERROR){try{state.hls.startLoad()}catch(err){}}
   return;
 }
 if(d.type===Hls.ErrorTypes.NETWORK_ERROR){
   setStatus('network ค้าง • ต่อสัญญาณใหม่');
   try{state.hls.startLoad(Math.max(0,video.currentTime-1));video.play().catch(()=>{})}catch(err){next()}
   return;
 }
 if(d.type===Hls.ErrorTypes.MEDIA_ERROR){
   setStatus('media ค้าง • ซ่อม player');
   try{state.hls.recoverMediaError();video.play().catch(()=>{})}catch(err){next()}
   return;
 }
 next();
});return}video.src=url;forceVideoVolume();startWatchdog();video.play().catch(()=>next())}
function closePlayer(){cleanupPlayer();playerPanel.classList.remove('show')}
function saveReturnState(obj){try{sessionStorage.setItem('tiea_return_state',JSON.stringify({activeSource:state.activeSource,scroll:content.scrollTop,time:Date.now(),...obj}))}catch(e){}}
function restoreReturnState(){try{const raw=sessionStorage.getItem('tiea_return_state');if(!raw)return false;const data=JSON.parse(raw);sessionStorage.removeItem('tiea_return_state');if(data.activeSource&&data.activeSource!=='home'){loadMenuSource(data.activeSource).then(()=>setTimeout(()=>{content.scrollTop=data.scroll||0},500));return true}}catch(e){}return false}
function safeIntent(url,mode){url=url||state.originalUrl||state.currentUrl;if(!url)return;saveReturnState({player:mode||'external',url:url});try{const u=new URL(url),scheme=u.protocol.replace(':',''),hostPath=u.host+u.pathname+(u.search||'');let intent='';if(mode==='mx'){intent='intent://'+hostPath+'#Intent;scheme='+scheme+';action=android.intent.action.VIEW;type=video/*;package=com.mxtech.videoplayer.ad;S.browser_fallback_url='+encodeURIComponent(url)+';end'}else{intent='intent://'+hostPath+'#Intent;scheme='+scheme+';action=android.intent.action.VIEW;type=video/*;S.browser_fallback_url='+encodeURIComponent(url)+';end'}setTimeout(()=>{window.location.href=intent},80)}catch(e){window.location.href=url}}
function openMx(url){safeIntent(url||state.originalUrl||state.currentUrl,'mx')}function openExternal(url){safeIntent(url||state.originalUrl||state.currentUrl,'external')}
async function loadMenuSource(key){state.activeSource=key;const label=document.querySelector(`[data-source="${key}"]`)?.textContent?.trim()||'รายการ';setStatus('กำลังโหลด '+label+' ...');content.innerHTML='<div class="hero"><div class="hero-title">กำลังโหลด...</div><div class="hero-sub">'+label+'</div></div>';try{let items=await loadSourcePack(key);if(!items.length&&key==='tv-main')items=SAMPLE_TV.map(x=>normalize([x])[0]);if(key==='series-main'){
   renderRows([{title:'MySeries',items:items}],label);
  }else{
   if(key==='series-main'){
   renderRows([{title:'MySeries',items:items}],label);
  }else{
   if(key==='series-main'){renderRows([{title:'MySeries ทั้งหมด',items:getMySeriesTwoFolders()}],label);}else{renderRows(makeRows(items),label);}
  }
  }if(items.length){
   setStatus('โหลดสำเร็จ '+items.length+' รายการ');
  }else{
   setStatus('ไม่พบรายการ • ไฟล์หลัก/ไฟล์สำรองยังโหลดไม่ได้');
  }preloadSources()}catch(e){content.innerHTML='<div class="hero"><div class="hero-title">โหลดไม่สำเร็จ</div><div class="hero-sub">'+e.message+'</div></div>';setStatus('โหลดไม่สำเร็จ')}}
document.querySelectorAll('.menu-btn').forEach(btn=>{btn.onclick=()=>{document.querySelectorAll('.menu-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');if(btn.dataset.link){location.href=btn.dataset.link;return}if(btn.dataset.action==='home'){renderHome();return}if(btn.dataset.action==='live-page'){location.href=LIVE_URL;return}if(btn.dataset.link){location.href=btn.dataset.link;return}if(btn.dataset.source){loadMenuSource(btn.dataset.source);return}}});
$('homeBtn').onclick=()=>location.href=HOME_URL;$('reloadBtn').onclick=()=>{if(state.activeSource&&state.activeSource!=='home')loadMenuSource(state.activeSource);else renderHome()};$('liveBtn').onclick=()=>location.href=LIVE_URL;$('closePlayerBtn').onclick=closePlayer;$('playerHomeBtn').onclick=()=>location.href=HOME_URL;$('mxBtn').onclick=()=>openMx();$('extBtn').onclick=()=>openExternal();$('closeModalBtn').onclick=closeModal;$('prevPageBtn').onclick=()=>{state.page--;renderModalPage()};$('nextPageBtn').onclick=()=>{state.page++;renderModalPage()};
document.addEventListener('keydown',e=>{if(e.key==='Escape'||e.key==='Backspace'||e.keyCode===10009){e.preventDefault();if(playerPanel.classList.contains('show'))closePlayer();else if($('modal').classList.contains('show'))closeModal();else location.href=HOME_URL}});
document.addEventListener('keydown',e=>{const active=document.activeElement;if(!active||!active.classList||!active.classList.contains('card'))return;if(e.key==='ArrowRight'){const n=active.nextElementSibling;if(n&&n.classList.contains('card')){e.preventDefault();n.focus();n.scrollIntoView({block:'nearest',inline:'center'})}}if(e.key==='ArrowLeft'){const p=active.previousElementSibling;if(p&&p.classList.contains('card')){e.preventDefault();p.focus();p.scrollIntoView({block:'nearest',inline:'center'})}}});
window.addEventListener('pageshow',()=>{restoreReturnState()});if(!restoreReturnState())renderHome();
