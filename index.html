<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIEA IPTV ULTRA FIX</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:sans-serif;
}
#home{
  position:fixed;
  top:10px;
  left:10px;
  background:#00c853;
  border:none;
  padding:10px;
  border-radius:10px;
}
.card{
  padding:10px;
  border-bottom:1px solid #222;
  cursor:pointer;
}
video{
  width:100%;
  height:60vh;
  background:#000;
}
</style>
</head>

<body>

<button id="home">🏠 HOME</button>

<video id="v" controls autoplay playsinline></video>

<div id="list"></div>

<script>
const PROXY = "https://iptv.tawatchai250958.workers.dev/?url=";

const DATA = [
  {
    title:"MONO29",
    url:"https://monomax-sz.thaicdn.com/mono29hd/mono29hd.stream/playlist.m3u8"
  },
  {
    title:"TEST",
    url:"https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8"
  }
];

const list = document.getElementById("list");
const video = document.getElementById("v");

DATA.forEach(item=>{
  const div = document.createElement("div");
  div.className="card";
  div.innerText=item.title;

  div.onclick=()=>{
    play(item.url,item.title);
  };

  list.appendChild(div);
});

function play(url,title){

  let tryProxy=false;

  function start(src){
    video.src="";
    video.load();

    if(Hls.isSupported() && src.includes(".m3u8")){
      const hls=new Hls();
      hls.loadSource(src);
      hls.attachMedia(video);
      hls.on(Hls.Events.ERROR,()=>fallback());
    }else{
      video.src=src;
      video.onerror=fallback;
    }

    video.play().catch(()=>{});
  }

  function fallback(){
    if(!tryProxy){
      tryProxy=true;
      start(PROXY+encodeURIComponent(url));
    }else{
      alert("❌ เล่นไม่ได้");
    }
  }

  start(url);
}

document.getElementById("home").onclick=()=>{
  location.href="https://tiea9999.github.io/tv-online/index.html";
};
</script>

</body>
</html>
