<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV FINAL MOBILE PRO</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif}

/* SIDEBAR */
.sidebar{
position:fixed;width:200px;height:100%;
background:#111;padding:10px
}
.menu{
padding:10px;background:#222;margin-bottom:5px;border-radius:8px;cursor:pointer
}
.menu:hover{background:#00e5ff;color:#000}

.content{margin-left:210px}

/* CARD */
.row-header{
display:flex;justify-content:space-between;
padding:10px;
color:#00e5ff;
}

.row-items{display:flex;gap:10px;overflow-x:auto;padding:10px}

.card{
min-width:150px;
background:#111;
padding:8px;
border-radius:10px;
cursor:pointer;
transition:.2s;
}

.card:hover{transform:scale(1.05)}

img{
width:100%;
height:180px;
object-fit:cover;
border-radius:8px;
}

/* GRID */
.grid{
display:flex;
flex-wrap:wrap;
gap:10px;
padding:10px;
}

/* ===== PLAYER ===== */
#player{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:#000;
display:none;
z-index:999;
}

/* UI */
#playerUI{
position:absolute;
bottom:0;
left:0;
width:100%;
display:flex;
gap:10px;
justify-content:center;
align-items:center;
padding:15px;
background:linear-gradient(to top, rgba(0,0,0,0.9), transparent);
z-index:1001;
opacity:1;
transition:.3s;
}

#playerUI.hide{opacity:0}

/* buttons */
#playerUI button{
font-size:20px;
padding:12px 16px;
border:none;
border-radius:10px;
background:#ff9800;
color:#fff;
}

#seek{
width:60%;
}

/* floating mobile buttons */
#floatingControls{
position:absolute;
top:20px;
right:15px;
display:flex;
flex-direction:column;
gap:10px;
z-index:1002;
}

#floatingControls button{
font-size:18px;
padding:12px;
border-radius:50%;
background:rgba(0,0,0,0.6);
color:#fff;
border:none;
}

/* video */
video,iframe{
width:100%;
height:100%;
}
</style>
</head>

<body>

<div class="sidebar" id="menu"></div>
<div class="content" id="content"></div>

<!-- PLAYER -->
<div id="player">

<div id="floatingControls">
<button onclick="togglePlay()">⏯</button>
<button onclick="toggleFull()">⛶</button>
<button onclick="closePlayer()">✕</button>
</div>

<div id="playerUI">

<button onclick="prevEP()">⏮</button>
<button onclick="togglePlay()">⏯</button>
<button onclick="nextEP()">⏭</button>

<input type="range" id="seek" value="0">

</div>

<video id="video" playsinline controls></video>
<iframe id="frame"></iframe>

</div>

<script>

const SOURCES=[
{name:"🔥 มาใหม่",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/new.json"},
{name:"🇨🇳 จีน",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/chinese.json"},
{name:"🇯🇵 ญี่ปุ่น",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/japan.json"},
{name:"🇰🇷 เกาหลี",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/korea.json"},
{name:"🇹🇭 ไทย",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/thai.json"}
];

let menu=document.getElementById("menu");
let content=document.getElementById("content");

let video=document.getElementById("video");
let frame=document.getElementById("frame");
let player=document.getElementById("player");
let hls=null;

let currentEPList=[],currentEPIndex=0,currentKey="";
let fullData=[],currentPage=1,perPage=20;

/* ===== MENU ===== */
function buildMenu(){
menu.innerHTML=SOURCES.map((m,i)=>`
<div class="menu" data-i="${i}">${m.name}</div>
`).join("");
}

/* ===== LOAD ===== */
async function loadCategory(i){

content.innerHTML="LOADING...";
let data=await fetch(SOURCES[i].url).then(r=>r.json()).catch(()=>[]);

content.innerHTML=`
<div class="row-header">
<div>${SOURCES[i].name}</div>
<div onclick="openFull('${SOURCES[i].url}')">ดูทั้งหมด ▶</div>
</div>

<div class="row-items">
${data.slice(0,12).map(item=>cardHTML(item)).join("")}
</div>
`;
}

/* ===== FULL PAGE ===== */
async function openFull(url){
fullData=await fetch(url).then(r=>r.json()).catch(()=>[]);
currentPage=1;
renderPage();
}

function renderPage(){
let start=(currentPage-1)*perPage;
let data=fullData.slice(start,start+perPage);
let total=Math.ceil(fullData.length/perPage);

content.innerHTML=`
<button onclick="loadCategory(0)">⬅ กลับ</button>

<div class="grid">
${data.map(item=>cardHTML(item)).join("")}
</div>

<div style="padding:10px">
<button onclick="prevPage()">⬅</button>
หน้า ${currentPage}/${total}
<button onclick="nextPage()">➡</button>
</div>
`;
}

function nextPage(){if(currentPage*perPage<fullData.length){currentPage++;renderPage();}}
function prevPage(){if(currentPage>1){currentPage--;renderPage();}}

/* ===== CARD ===== */
function cardHTML(item){
return `
<div class="card" data-item='${encodeURIComponent(JSON.stringify(item))}'>
<img src="${item.image||''}">
<div>${item.title||item.name||""}</div>
</div>
`;
}

/* ===== CLICK ===== */
document.addEventListener("click",e=>{

let ep=e.target.closest(".ep");
if(ep){
currentEPIndex=parseInt(ep.dataset.i);
let data=JSON.parse(decodeURIComponent(ep.dataset.ep));
saveEP();
startPlay(data.servers||[{url:data.url}]);
return;
}

let c=e.target.closest(".card");
if(!c)return;

let item=JSON.parse(decodeURIComponent(c.dataset.item));

if(item.episodes){showEP(item);}
else startPlay([{url:item.url}]);

});

/* ===== EP ===== */
function showEP(item){

currentEPList=item.episodes;
currentKey="ep_"+(item.title||item.name);

currentEPIndex=parseInt(localStorage.getItem(currentKey)||0);

content.innerHTML=`
<h2>${item.title||""}</h2>

<div class="grid">
${item.episodes.map((ep,i)=>`
<div class="card ep ${i===currentEPIndex?'active':''}"
data-i="${i}"
data-ep='${encodeURIComponent(JSON.stringify(ep))}'>
${ep.name||("EP "+ep.ep)}
</div>
`).join("")}
</div>

<button onclick="loadCategory(0)">⬅ กลับ</button>
`;
}

function saveEP(){
localStorage.setItem(currentKey,currentEPIndex);
}

/* ===== PLAYER ===== */
function startPlay(list){
player.style.display="block";
playServers(list);
showUI();
}

async function playServers(list){
for(let s of list){
try{await play(s.url);return;}catch(e){}
}
alert("❌ เล่นไม่ได้");
}

function play(url){
return new Promise(res=>{
if(hls){hls.destroy();hls=null;}

if(url.includes(".m3u8")&&Hls.isSupported()){
video.style.display="block";frame.style.display="none";
hls=new Hls();
hls.loadSource(url);
hls.attachMedia(video);
hls.on(Hls.Events.MANIFEST_PARSED,()=>{video.play();res();});
return;
}

if(url.includes(".mp4")){
video.style.display="block";frame.style.display="none";
video.src=url;video.play();res();return;
}

video.style.display="none";frame.style.display="block";
frame.src=url;res();
});
}

/* ===== EP CONTROL ===== */
video.onended=()=>nextEP();

function nextEP(){
if(currentEPIndex<currentEPList.length-1){
currentEPIndex++;
saveEP();
let ep=currentEPList[currentEPIndex];
startPlay(ep.servers||[{url:ep.url}]);
}
}

function prevEP(){
if(currentEPIndex>0){
currentEPIndex--;
saveEP();
let ep=currentEPList[currentEPIndex];
startPlay(ep.servers||[{url:ep.url}]);
}
}

/* ===== CONTROL ===== */
function togglePlay(){video.paused?video.play():video.pause();}

function closePlayer(){
if(hls)hls.destroy();
video.pause();video.src="";
frame.src="";
player.style.display="none";
}

function toggleFull(){
if(!document.fullscreenElement){
player.requestFullscreen();
}else{
document.exitFullscreen();
}
}

/* ===== MOBILE UI ===== */
let ui=document.getElementById("playerUI");
let seek=document.getElementById("seek");
let hideTimer;

function showUI(){
ui.classList.remove("hide");
clearTimeout(hideTimer);
hideTimer=setTimeout(()=>ui.classList.add("hide"),4000);
}

player.addEventListener("touchstart",showUI);
player.addEventListener("touchmove",showUI);

video.addEventListener("timeupdate",()=>{
if(video.duration){
seek.value=(video.currentTime/video.duration)*100;
}
});

seek.addEventListener("input",()=>{
video.currentTime=(seek.value/100)*video.duration;
});

/* ===== MENU ===== */
menu.addEventListener("click",e=>{
let m=e.target.closest(".menu");
if(!m)return;
loadCategory(parseInt(m.dataset.i));
});

/* START */
buildMenu();
loadCategory(0);

</script>

</body>
</html>
