<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV ANDROID BOX FIX</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:sans-serif;
overflow:hidden;
}

/* HOME */
#homeBtn{
position:fixed;
top:10px;
left:10px;
z-index:9999;
padding:10px 14px;
background:#00c853;
color:#fff;
border:none;
border-radius:10px;
}

/* GRID */
.row-title{
padding:10px;
font-weight:bold;
color:#00e5ff;
}

.row-items{
display:flex;
gap:10px;
overflow-x:auto;
padding:10px;
}

.card,.ep{
min-width:150px;
background:#111;
border-radius:10px;
padding:8px;
text-align:center;
cursor:pointer;
}

.card:focus,.ep:focus{
outline:2px solid #00ffcc;
transform:scale(1.05);
}

img{
width:100%;
height:180px;
object-fit:cover;
border-radius:8px;
pointer-events:none;
}

/* LAYERS */
#overlay,#player{
position:fixed;
top:0;left:0;
width:100%;height:100%;
display:none;
}

#overlay{
background:rgba(0,0,0,.95);
z-index:999;
overflow:auto;
}

#player{
background:#000;
z-index:1000;
}

video,iframe{
width:100%;
height:100%;
border:none;
}

.btn{
position:absolute;
top:10px;
right:10px;
padding:10px;
background:#ff9800;
border:none;
border-radius:8px;
color:#fff;
z-index:1001;
}
</style>
</head>

<body>

<button id="homeBtn">🏠 HOME</button>

<div id="grid"></div>
<div id="overlay"></div>

<div id="player">
<button class="btn" onclick="closePlayer()">✕</button>
<video id="video" playsinline></video>
<iframe id="frame"></iframe>
</div>

<script>

/* ================= SOURCES ================= */
const SOURCES=[
{name:"🔥 มาใหม่",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/new.json"},
{name:"🇨🇳 จีน",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/chinese.json"},
{name:"🇯🇵 ญี่ปุ่น",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/japan.json"},
{name:"🇰🇷 เกาหลี",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/korea.json"},
{name:"🇹🇭 ไทย",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/thai.json"},
{name:"📱 แนวตั้ง",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/short.json"}
];

/* ================= STATE ================= */
let grid=document.getElementById("grid");
let overlay=document.getElementById("overlay");
let video=document.getElementById("video");
let frame=document.getElementById("frame");
let hls=null;

/* ================= SAFE FETCH (FIX ANDROID) ================= */
async function safeFetch(url){

try{
let ctrl=new AbortController();
let t=setTimeout(()=>ctrl.abort(),8000);

let res=await fetch(url,{
signal:ctrl.signal,
cache:"no-store"
});

clearTimeout(t);

if(!res.ok) return null;

return await res.json();

}catch(e){
return null;
}

}

/* ================= LOAD ALL ================= */
async function loadAll(){

grid.innerHTML="⚡ LOADING...";

for(let s of SOURCES){

let data=await safeFetch(s.url);

if(data && Array.isArray(data) && data.length){
renderRow(s.name,data);
}

}

refreshFocus();

}

/* ================= RENDER ================= */
function renderRow(title,data){

let row=document.createElement("div");

row.innerHTML=`
<div class="row-title">${title}</div>
<div class="row-items">
${data.slice(0,12).map(item=>`
<div class="card"
tabindex="0"
data-item='${encodeURIComponent(JSON.stringify(item))}'>
<img src="${item.image||''}">
<div>${item.title||item.name||""}</div>
</div>
`).join("")}
</div>
`;

grid.appendChild(row);

}

/* ================= INPUT ENGINE ================= */
function getCard(el){
while(el && !el.classList?.contains("card")){
el=el.parentElement;
}
return el;
}

function handle(e){

let ep=e.target.closest(".ep");
if(ep){
let d=JSON.parse(decodeURIComponent(ep.dataset.ep));
startPlay(d.servers);
return;
}

let card=getCard(e.target);
if(!card) return;

let item=JSON.parse(decodeURIComponent(card.dataset.item));
openItem(item);

}

/* ALL INPUT */
document.addEventListener("click",handle,true);
document.addEventListener("touchend",handle,true);
document.addEventListener("mousedown",handle,true);
document.addEventListener("pointerup",handle,true);

/* ================= EP ================= */
function openItem(item){

if(item.episodes && item.episodes.length){
showEP(item);
return;
}

startPlay([{url:item.url}]);

}

function showEP(item){

overlay.style.display="block";
grid.style.display="none";

let eps=[...item.episodes].sort((a,b)=>b.ep-a.ep);

overlay.innerHTML=`
<h2 style="padding:10px">${item.title||""}</h2>

<div style="display:flex;flex-wrap:wrap;gap:10px;padding:10px">
${eps.map(ep=>`
<div class="card ep"
tabindex="0"
data-ep='${encodeURIComponent(JSON.stringify(ep))}'>
${ep.name}
</div>
`).join("")}
</div>

<button class="btn" onclick="goHome()">HOME</button>
`;

}

/* ================= PLAY ================= */
function startPlay(servers){

overlay.style.display="none";
grid.style.display="none";

document.getElementById("player").style.display="block";

playServers(servers);

}

async function playServers(list){

for(let s of list){
try{
await play(s.url);
return;
}catch(e){}
}

alert("❌ no server");

}

function play(url){

return new Promise((res)=>{

video.style.display="block";
frame.style.display="none";

if(hls){
hls.destroy();
hls=null;
}

if(url.includes(".m3u8") && Hls.isSupported()){

hls=new Hls();
hls.loadSource(url);
hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED,()=>{
video.play().catch(()=>{});
res();
});

return;
}

if(url.includes(".mp4")){
video.src=url;
video.play().catch(()=>{});
res();
return;
}

frame.style.display="block";
video.style.display="none";
frame.src=url;

res();

});

}

/* ================= CLOSE ================= */
function closePlayer(){

if(hls) hls.destroy();

video.pause();
video.src="";
frame.src="";

document.getElementById("player").style.display="none";
grid.style.display="block";

}

/* ================= HOME (REAL FIX) ================= */
function goHome(){

closePlayer();

overlay.style.display="none";
grid.style.display="block";

refreshFocus();

}

/* BUTTON */
document.getElementById("homeBtn").onclick=goHome;

/* ================= ANDROID REMOTE FIX ================= */
let focusList=[];
let focusIndex=0;

function refreshFocus(){
focusList=[...document.querySelectorAll(".card")];
}

document.addEventListener("keydown",(e)=>{

if(focusList.length===0) refreshFocus();

if(e.key==="ArrowRight") focusIndex++;
if(e.key==="ArrowLeft") focusIndex--;
if(e.key==="ArrowDown") focusIndex+=5;
if(e.key==="ArrowUp") focusIndex-=5;

if(focusIndex<0) focusIndex=0;
if(focusIndex>=focusList.length) focusIndex=focusList.length-1;

let el=focusList[focusIndex];

if(el){
el.focus();
el.scrollIntoView({behavior:"smooth",block:"center"});
}

if(e.key==="Enter"){
el?.click();
}

if(e.key==="Escape" || e.key==="Backspace"){
goHome();
}

});

/* ================= BACK LOCK ================= */
history.pushState(null,null,location.href);

window.addEventListener("popstate",()=>{
goHome();
history.pushState(null,null,location.href);
});

/* START */
loadAll();

</script>

</body>
</html>
