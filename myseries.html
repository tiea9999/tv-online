<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIEA IPTV FINAL FIX</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body { margin:0; background:#000; color:#fff; font-family:sans-serif; }

.menu { display:flex; gap:10px; padding:10px; background:#111; }
.menu button { padding:10px; background:#333; color:#fff; border:none; border-radius:6px; }

.row { margin:10px; }
.row-items { display:flex; gap:10px; overflow-x:auto; }
.row-items::-webkit-scrollbar { display:none; }

.card {
    min-width:140px;
    background:#111;
    border-radius:10px;
    padding:6px;
    flex-shrink:0;
    text-align:center;
}

.card:focus {
    outline:3px solid #00c853;
    transform:scale(1.05);
}

img {
    width:100%;
    height:180px;
    object-fit:cover;
    border-radius:8px;
}

#player,#overlay {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    display:none;
}

#player { background:#000; z-index:999; }
#overlay { background:rgba(0,0,0,.9); z-index:998; }

video { width:100%; height:100%; }

.btn {
    position:absolute;
    top:20px;
    padding:10px;
    background:#ff9800;
    border:none;
    border-radius:8px;
    z-index:1000;
}

.home { left:20px; }
.close { right:20px; }
</style>
</head>

<body>

<div class="menu" id="menu"></div>
<div id="grid"></div>

<div id="overlay"></div>

<div id="player">
    <button class="btn home" onclick="goHome()">🏠</button>
    <button class="btn close" onclick="closePlayer()">✕</button>
    <video id="video" tabindex="0" playsinline webkit-playsinline controls></video>
</div>

<script>

const PROXY="https://iptv.tawatchai250958.workers.dev/?url=";

const PLAYLISTS=[
{name:"ซีรีย์",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/new.json"}
];

let video=document.getElementById("video");
let grid=document.getElementById("grid");
let overlay=document.getElementById("overlay");
let player=document.getElementById("player");

let hls=null,currentData=[];
let focusIndex=0;
let cards=[];

const menu=document.getElementById("menu");

PLAYLISTS.forEach(pl=>{
let b=document.createElement("button");
b.textContent=pl.name;
b.onclick=()=>load(pl.url);
menu.appendChild(b);
});

async function load(url){
grid.innerHTML="⚡ กำลังโหลด...";
let res=await fetch(url);
currentData=await res.json();
render(currentData);
}

function render(data){
grid.innerHTML="";

let row=document.createElement("div");
row.className="row";

let list=document.createElement("div");
list.className="row-items";

data.forEach(item=>{

let div=document.createElement("div");
div.className="card";
div.tabIndex=0;

div.innerHTML=`
<img src="${item.image||''}">
<div>${item.title||item.name}</div>
`;

div.onclick=()=>{
focusIndex = cards.indexOf(div);
openItem(item);
};

div.addEventListener("focus",()=>{
div.scrollIntoView({behavior:"smooth",inline:"center"});
});

list.appendChild(div);
});

row.appendChild(list);
grid.appendChild(row);

refreshFocus();
}

function openItem(item){
if(item.episodes){
grid.innerHTML="";
item.episodes.forEach(ep=>{
let d=document.createElement("div");
d.className="card";
d.tabIndex=0;
d.textContent=ep.name||"EP";

d.onclick=()=>{
focusIndex = cards.indexOf(d);
startPlay(ep.servers||[{url:ep.url}]);
};

grid.appendChild(d);
});
refreshFocus();
return;
}
startPlay(item.servers||[{url:item.url}]);
}

function startPlay(list){
overlay.style.display="block";
player.style.display="block";
playServers(list);
video.focus();
}

/* 🔥 ไม่บังคับ proxy */
function fix(url){
if(url.includes(".txt")) url=url.replace(".txt",".m3u8");
return url;
}

/* 🔥 player เสถียร */
function play(url){
return new Promise((res,rej)=>{

if(hls){ hls.destroy(); hls=null; }

video.pause();
video.src="";

if(url.includes(".m3u8")){
if(Hls.isSupported()){
hls=new Hls();
hls.loadSource(url);
hls.attachMedia(video);
hls.on(Hls.Events.MANIFEST_PARSED,()=>{
video.play().then(res).catch(rej);
});
hls.on(Hls.Events.ERROR,(e,d)=>{
if(d.fatal) rej();
});
return;
}else{
video.src=url;
}
}else{
video.src=url;
}

video.onloadeddata=()=>{
video.play().then(res).catch(rej);
};

video.onerror=rej;

});
}

/* 🔥 fallback proxy */
async function playServers(list){
for(let s of list){
try{
await play(fix(s.url));
return;
}catch{
try{
await play(PROXY + encodeURIComponent(s.url));
return;
}catch{}
}
}
alert("❌ ไม่มี server");
}

function closePlayer(){
if(hls) hls.destroy();
video.pause();
video.src="";
overlay.style.display="none";
player.style.display="none";
}

function goHome(){
closePlayer();
render(currentData);
}

/* 🔥 รีโมทเทพ */
function setSmartFocus(){
cards = Array.from(document.querySelectorAll(".card"));
if(cards.length===0) return;

if(focusIndex>=cards.length) focusIndex=0;
cards[focusIndex].focus();
}

function refreshFocus(){
setTimeout(setSmartFocus,200);
}

document.addEventListener("keydown",e=>{

if(cards.length===0) return;

if(e.key==="ArrowLeft") focusIndex--;
if(e.key==="ArrowRight") focusIndex++;
if(e.key==="ArrowUp") focusIndex-=5;
if(e.key==="ArrowDown") focusIndex+=5;

if(focusIndex<0) focusIndex=0;
if(focusIndex>=cards.length) focusIndex=cards.length-1;

let el=cards[focusIndex];

if(el){
e.preventDefault();
el.focus();
el.scrollIntoView({behavior:"smooth",block:"center",inline:"center"});
}

if(e.key==="Enter"){
cards[focusIndex]?.click();
}

if(e.key==="Escape"){
closePlayer();
}

});

/* เม้าส์ sync */
document.addEventListener("mouseover",e=>{
let c=e.target.closest(".card");
if(!c) return;

cards = Array.from(document.querySelectorAll(".card"));
focusIndex = cards.indexOf(c);
c.focus();
});

load(PLAYLISTS[0].url);

</script>

</body>
</html>
