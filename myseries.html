<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIEA IPTV FAST</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;}
.menu{display:flex;flex-wrap:wrap;gap:10px;padding:10px;background:#111;}
.menu button{padding:8px 12px;border:none;background:#333;color:#fff;border-radius:6px;cursor:pointer;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;padding:10px;}
.card{background:#111;padding:10px;border-radius:10px;cursor:pointer;text-align:center;}
img{width:100%;height:220px;object-fit:cover;border-radius:8px;}
#player{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:90%;max-width:900px;height:60%;background:#000;display:none;z-index:999;}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);display:none;z-index:998;}
video,iframe{width:100%;height:100%;}
</style>
</head>

<body>

<div class="menu" id="menu"></div>
<div class="grid" id="grid"></div>

<div id="overlay"></div>
<div id="player">
<video id="video" controls autoplay playsinline></video>
</div>

<script>

const PROXY = "https://iptv.tawatchai250958.workers.dev/?url=";

const PLAYLISTS = [
{name:"ซีรีย์มาใหม่",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/new.json"},
{name:"ซีรี่ย์จีน",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/chinese.json"},
{name:"ซีรี่ย์ญี่ปุ่น",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/japan.json"},
{name:"ซีรี่ย์เกาหลี",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/korea.json"},
{name:"ซีรี่ย์ไทย",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/thai.json"},
{name:"ซีรีย์แนวตั้ง",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/short.json"}
];

let data=[],video=document.getElementById("video");
let grid=document.getElementById("grid");
let hls=null;

/* MENU */
const menu=document.getElementById("menu");
PLAYLISTS.forEach(pl=>{
let btn=document.createElement("button");
btn.textContent=pl.name;
btn.onclick=()=>load(pl.url);
menu.appendChild(btn);
});

/* LOAD */
async function load(url){
grid.innerHTML="กำลังโหลด...";
let res=await fetch(url);
data=await res.json();
render();
}

/* UI */
function render(){
grid.innerHTML="";
data.forEach(item=>{
let div=document.createElement("div");
div.className="card";
div.innerHTML=`<img src="${item.image}"><div>${item.title}</div>`;
div.onclick=()=>showEp(item);
grid.appendChild(div);
});
}

function showEp(series){
grid.innerHTML="";
series.episodes.forEach(ep=>{
let div=document.createElement("div");
div.className="card";
div.innerHTML=ep.name;
div.onclick=()=>playFast(ep.servers);
grid.appendChild(div);
});
}

/* RESET */
function reset(){
if(hls){hls.destroy();hls=null;}
video.pause();
video.src="";
document.getElementById("player").innerHTML='<video id="video" controls autoplay playsinline></video>';
video=document.getElementById("video");
}

/* IFRAME */
function playIframe(url){
let player=document.getElementById("player");
player.innerHTML=`<iframe src="${url}" allowfullscreen allow="autoplay"></iframe>`;
}

/* PLAY CORE */
function play(url){

url = PROXY + encodeURIComponent(url);

return new Promise((resolve,reject)=>{

video.muted=true;

/* HLS */
if(url.includes(".m3u8") && Hls.isSupported()){
hls=new Hls();
hls.loadSource(url);
hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED,()=>{
video.play().then(()=>{
video.muted=false;
resolve();
});
});

hls.on(Hls.Events.ERROR,(e,d)=>{
if(d.fatal) reject();
});
return;
}

/* MP4 */
video.src=url;
video.onloadeddata=()=>{
video.play().then(()=>{
video.muted=false;
resolve();
});
};
video.onerror=reject;

});
}

/* 🔥 FAST SERVER */
async function playFast(servers){

reset();

overlay.style.display="block";
player.style.display="block";

/* เรียง server: m3u8 มาก่อน */
servers.sort((a,b)=>{
return (b.url.includes(".m3u8")?1:0) - (a.url.includes(".m3u8")?1:0);
});

let index = 0;

async function tryNext(){

if(index >= servers.length){
alert("❌ ไม่มี server ใช้ได้");
return;
}

let s = servers[index++];
let url = s.url;

/* iframe */
if(!url.includes(".m3u8") && !url.includes(".mp4")){
playIframe(url);
return;
}

try{
await play(url);

/* เช็ค 2 วิ */
setTimeout(()=>{
if(video.currentTime === 0){
tryNext();
}
},2000);

}catch(e){
tryNext();
}

}

tryNext();
}

/* CLOSE */
overlay.onclick=()=>{
reset();
overlay.style.display="none";
player.style.display="none";
};

</script>

</body>
</html>
