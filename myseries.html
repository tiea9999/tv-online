<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIEA IPTV (FINAL IFRAME)</title>

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;}
.menu{display:flex;gap:10px;padding:10px;background:#111;flex-wrap:wrap;}
.menu button{padding:8px;background:#333;color:#fff;border:none;border-radius:6px;cursor:pointer;}
.menu button:focus{outline:2px solid #00c853;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:10px;
padding:10px;
}

.card{
background:#111;
padding:8px;
border-radius:10px;
cursor:pointer;
text-align:center;
}
.card:focus{outline:2px solid #00c853;}

img{
width:100%;
height:200px;
object-fit:cover;
border-radius:8px;
}

/* PLAYER */
#player{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
display:none;
z-index:999;
}

iframe{
width:100%;
height:100%;
border:none;
}

/* BUTTONS */
.close-btn{
position:absolute;
top:20px;
right:20px;
background:red;
color:#fff;
border:none;
border-radius:50%;
width:40px;
height:40px;
cursor:pointer;
z-index:1000;
}

.home-btn{
position:absolute;
top:20px;
left:20px;
background:#ff9800;
color:#fff;
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
z-index:1000;
}
</style>
</head>

<body>

<div class="menu" id="menu"></div>
<div class="grid" id="grid"></div>

<div id="player"></div>

<script>

/* ================= CONFIG ================= */

const PLAYLISTS = [
{name:"ซีรีย์มาใหม่",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/new.json"},
{name:"ซีรี่ย์จีน",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/chinese.json"},
{name:"ซีรี่ย์ญี่ปุ่น",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/japan.json"},
{name:"ซีรี่ย์เกาหลี",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/korea.json"},
{name:"ซีรี่ย์ไทย",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/thai.json"},
{name:"ซีรีย์แนวตั้ง",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/short.json"}
];

let grid=document.getElementById("grid");
let player=document.getElementById("player");
let currentData=[];

/* ================= MENU ================= */

const menu=document.getElementById("menu");

PLAYLISTS.forEach(pl=>{
let btn=document.createElement("button");
btn.textContent=pl.name;
btn.tabIndex=0;

btn.onclick=()=>load(pl.url);

menu.appendChild(btn);
});

/* ================= LOAD ================= */

async function load(url){
grid.innerHTML="กำลังโหลด...";

try{
let res=await fetch(url);
let data=await res.json();
currentData=data;
render(data);
}catch(e){
grid.innerHTML="❌ โหลดไม่สำเร็จ";
}
}

/* ================= RENDER ================= */

function render(data){
grid.innerHTML="";

data.forEach(item=>{

let div=document.createElement("div");
div.className="card";
div.tabIndex=0;

div.innerHTML=`
<img src="${item.image||''}">
<div>${item.title||item.name}</div>
`;

div.onclick=()=>handleClick(item);
div.onkeydown=(e)=>{ if(e.key==="Enter") handleClick(item); };

grid.appendChild(div);

});
}

/* ================= CLICK ================= */

function handleClick(item){

if(item.episodes){
showEp(item);
return;
}

if(item.servers){
playServers(item.servers);
return;
}

if(item.url){
playServers([{url:item.url}]);
}

}

/* ================= EPISODES ================= */

function showEp(item){

grid.innerHTML="";

item.episodes.forEach(ep=>{

let div=document.createElement("div");
div.className="card";
div.tabIndex=0;
div.textContent=ep.name;

div.onclick=()=>playServers(ep.servers || [{url:ep.url}]);
div.onkeydown=(e)=>{ if(e.key==="Enter") playServers(ep.servers || [{url:ep.url}]); };

grid.appendChild(div);

});

}

/* ================= PLAY (IFRAME ONLY) ================= */

function playServers(servers){

player.style.display="block";

// 🔥 ใช้ iframe 100% (เสถียรสุด)
let url = servers[0].url;

player.innerHTML = `
<button class="home-btn" onclick="goHome()">🏠</button>
<button class="close-btn" onclick="closePlayer()">✕</button>

<iframe 
src="${url}" 
allow="autoplay; fullscreen; encrypted-media"
allowfullscreen>
</iframe>
`;

}

/* ================= CONTROL ================= */

function closePlayer(){
player.style.display="none";
player.innerHTML="";
}

function goHome(){
closePlayer();
render(currentData);
}

/* ================= REMOTE SUPPORT ================= */

document.addEventListener("keydown",(e)=>{

if(e.key==="Escape" || e.key==="Backspace"){
closePlayer();
}

});

/* ================= START ================= */

load(PLAYLISTS[0].url);

</script>

</body>
</html>
