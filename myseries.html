<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV ENGINE STABLE V2</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:sans-serif;
overflow:hidden;
}

/* ROW */
.row-title{
padding:10px;
font-weight:bold;
color:#00e5ff;
}

.row-items{
display:flex;
gap:10px;
overflow-x:auto;
padding:10px;
}

/* CARD */
.card,.ep{
min-width:150px;
background:#111;
border-radius:10px;
padding:8px;
text-align:center;
cursor:pointer;
user-select:none;
touch-action:manipulation;
}

.card:focus,.ep:focus{
outline:2px solid #00ffcc;
transform:scale(1.05);
}

img{
width:100%;
height:180px;
object-fit:cover;
border-radius:8px;
pointer-events:none;
}

/* OVERLAY / PLAYER */
#overlay,#player{
position:fixed;
top:0;left:0;
width:100%;height:100%;
display:none;
}

#overlay{
background:rgba(0,0,0,.95);
z-index:999;
overflow:auto;
}

#player{
background:#000;
z-index:1000;
}

video,iframe{
width:100%;
height:100%;
border:none;
}

.btn{
position:absolute;
top:10px;
right:10px;
padding:10px;
background:#ff9800;
border:none;
border-radius:8px;
color:#fff;
z-index:1001;
}
</style>
</head>

<body>

<div id="grid"></div>
<div id="overlay"></div>

<div id="player">
<button class="btn" onclick="closePlayer()">✕</button>
<video id="video" playsinline></video>
<iframe id="frame"></iframe>
</div>

<script>

/* ================= ENGINE CONFIG ================= */
const SOURCES=[
{name:"🔥 มาใหม่",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/new.json"},
{name:"🇨🇳 จีน",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/chinese.json"},
{name:"🇯🇵 ญี่ปุ่น",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/japan.json"},
{name:"🇰🇷 เกาหลี",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/korea.json"},
{name:"🇹🇭 ไทย",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/thai.json"},
{name:"📱 แนวตั้ง",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/short.json"}
];

const CACHE=new Map();

let grid=document.getElementById("grid");
let overlay=document.getElementById("overlay");
let video=document.getElementById("video");
let frame=document.getElementById("frame");
let hls=null;

/* ================= SAFE FETCH ENGINE ================= */
async function getJSON(url){
if(CACHE.has(url)) return CACHE.get(url);

try{
let res=await fetch(url,{cache:"force-cache"});
if(!res.ok) throw new Error("fetch fail");

let data=await res.json();
CACHE.set(url,data);
return data;

}catch(e){
console.log("LOAD FAIL:",url);
return [];
}
}

/* ================= LOAD ALL ROWS ================= */
async function loadAll(){

grid.innerHTML="⚡ LOADING IPTV ENGINE...";

for(let s of SOURCES){
let data=await getJSON(s.url);
renderRow(s.name,data);
}

}

/* ================= RENDER ================= */
function renderRow(title,data){

if(!data || !data.length) return;

let row=document.createElement("div");

row.innerHTML=`
<div class="row-title">${title}</div>
<div class="row-items">
${data.slice(0,12).map(item=>`
<div class="card"
tabindex="0"
data-item='${encodeURIComponent(JSON.stringify(item))}'>
<img loading="lazy" src="${item.image||''}">
<div>${item.title||item.name||""}</div>
</div>
`).join("")}
</div>
`;

grid.appendChild(row);

}

/* ================= UNIVERSAL INPUT ENGINE ================= */
function findCard(el){
while(el && !el.classList?.contains("card")){
el=el.parentElement;
}
return el;
}

function handleInput(e){

let ep=e.target.closest(".ep");
if(ep){
let data=JSON.parse(decodeURIComponent(ep.dataset.ep));
startPlay(data.servers);
return;
}

let card=findCard(e.target);
if(!card) return;

try{
let item=JSON.parse(decodeURIComponent(card.dataset.item));
openItem(item);
}catch(e){}

}

document.addEventListener("click",handleInput,true);
document.addEventListener("touchend",handleInput,true);
document.addEventListener("pointerup",handleInput,true);

/* ================= OPEN ITEM ================= */
function openItem(item){

if(!item) return;

// EP MODE
if(item.episodes && item.episodes.length){
showEpisodes(item);
return;
}

// NORMAL PLAY
startPlay([{url:item.url}]);

}

/* ================= EP ENGINE FIX ================= */
function showEpisodes(item){

overlay.style.display="block";
grid.style.display="none";

let eps=[...item.episodes].sort((a,b)=>b.ep-a.ep);

overlay.innerHTML=`
<h2 style="padding:10px;color:#00e5ff">${item.title||""}</h2>

<div style="display:flex;flex-wrap:wrap;gap:10px;padding:10px">
${eps.map(ep=>`
<div class="card ep"
tabindex="0"
data-ep='${encodeURIComponent(JSON.stringify(ep))}'>
${ep.name}
</div>
`).join("")}
</div>

<button class="btn" onclick="closeEP()">✕ Close</button>
`;

}

/* ================= PLAYER ENGINE ================= */
function startPlay(servers){

if(!servers || servers.length===0){
alert("No server");
return;
}

overlay.style.display="none";
grid.style.display="none";
document.getElementById("player").style.display="block";

playServers(servers);

}

/* ================= SERVER SWITCH ================= */
async function playServers(list){

for(let s of list){
try{
await play(s.url);
return;
}catch(e){}
}

alert("❌ No server working");

}

/* ================= PLAY ENGINE ================= */
function play(url){

return new Promise((res)=>{

video.style.display="block";
frame.style.display="none";

if(hls){
hls.destroy();
hls=null;
}

if(url.includes(".m3u8") && Hls.isSupported()){

hls=new Hls({
enableWorker:true,
lowLatencyMode:true
});

hls.loadSource(url);
hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED,()=>{
video.play().catch(()=>{});
res();
});

return;
}

if(url.includes(".mp4")){
video.src=url;
video.play().catch(()=>{});
res();
return;
}

// fallback web
frame.style.display="block";
video.style.display="none";
frame.src=url;

res();

});

}

/* ================= CLOSE ================= */
function closePlayer(){

if(hls) hls.destroy();

video.pause();
video.src="";
frame.src="";

document.getElementById("player").style.display="none";
grid.style.display="block";

}

function closeEP(){
overlay.style.display="none";
overlay.innerHTML="";
grid.style.display="block";
}

/* ================= START ================= */
loadAll();

</script>

</body>
</html>
