<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIEA IPTV TV MODE</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;overflow:hidden;}

.menu{
display:flex;gap:10px;padding:10px;background:#111;
overflow-x:auto;
}
.menu button{
padding:10px;background:#333;color:#fff;border:none;
border-radius:8px;cursor:pointer;min-width:120px;
}
.menu button:focus{
outline:3px solid #00c853;
transform:scale(1.05);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:12px;
padding:12px;
height:calc(100vh - 70px);
overflow-y:auto;
}

.card{
background:#111;border-radius:12px;
cursor:pointer;text-align:center;
transition:.2s;
}
.card img{
width:100%;height:200px;object-fit:cover;
border-radius:10px;
}
.card:focus{
outline:3px solid #00c853;
transform:scale(1.08);
}

#player{
position:fixed;top:0;left:0;width:100%;height:100%;
background:#000;display:none;z-index:999;
}

video,iframe{width:100%;height:100%;}

.close-btn,.home-btn{
position:absolute;top:20px;
border:none;color:#fff;cursor:pointer;
padding:10px;border-radius:10px;
}

.close-btn{right:20px;background:red;}
.home-btn{left:20px;background:#ff9800;}

</style>

</head>

<body>

<div class="menu" id="menu"></div>
<div class="grid" id="grid"></div>

<div id="player">
<button class="home-btn" onclick="goHome()">🏠</button>
<button class="close-btn" onclick="closePlayer()">✕</button>
<video id="video" controls autoplay playsinline></video>
</div>

<script>

const PROXY = "https://iptv.tawatchai250958.workers.dev/?url=";

const PLAYLISTS = [
{name:"ซีรีย์มาใหม่",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/new.json"},
{name:"ซีรี่ย์จีน",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/chinese.json"},
{name:"ซีรี่ย์ญี่ปุ่น",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/japan.json"},
{name:"ซีรี่ย์เกาหลี",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/korea.json"},
{name:"ซีรี่ย์ไทย",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/thai.json"},
{name:"ซีรีย์แนวตั้ง",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/short.json"}
];

let grid=document.getElementById("grid");
let video=document.getElementById("video");
let player=document.getElementById("player");
let hls=null;
let currentData=[];

/* MENU */
const menu=document.getElementById("menu");
PLAYLISTS.forEach((pl,i)=>{
let btn=document.createElement("button");
btn.textContent=pl.name;
btn.tabIndex=0;

btn.onclick=()=>{
focusIndex=0;
load(pl.url);
};

menu.appendChild(btn);
});

/* LOAD */
async function load(url){
grid.innerHTML="กำลังโหลด...";
let res=await fetch(url);
currentData=await res.json();
render(currentData);

setTimeout(()=>setFocus(0),300);
}

/* RENDER */
function render(data){
grid.innerHTML="";

data.forEach(item=>{

let div=document.createElement("div");
div.className="card";
div.tabIndex=0;

div.innerHTML=`
<img src="${item.image||''}">
<div>${item.title||item.name}</div>
`;

div.onclick=()=>handleClick(item);

grid.appendChild(div);

});
}

/* CLICK */
function handleClick(item){

if(item.episodes){
showEp(item);
return;
}

if(item.servers){
playServers(item.servers);
return;
}

if(item.url){
playServers([{url:item.url}]);
}

}

/* EP */
function showEp(item){

grid.innerHTML="";

item.episodes.forEach(ep=>{

let div=document.createElement("div");
div.className="card";
div.tabIndex=0;
div.textContent=ep.name;

div.onclick=()=>playServers(ep.servers||[{url:ep.url}]);

grid.appendChild(div);

});

setTimeout(()=>setFocus(0),200);

}

/* RESET */
function reset(){
if(hls){hls.destroy();hls=null;}
video.pause();
video.src="";
}

/* PLAY */
function play(url){

if(url.includes(".txt")){
url=url.replace(".txt",".m3u8");
}

url = PROXY + encodeURIComponent(url);

return new Promise((resolve,reject)=>{

if(url.includes(".m3u8") && Hls.isSupported()){

hls=new Hls();
hls.loadSource(url);
hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED,()=>{
video.muted=false;
video.volume=0.5;

video.play().catch(()=>{
video.muted=true;
video.play();
});

resolve();
});

hls.on(Hls.Events.ERROR,(e,d)=>{
if(d.fatal) reject();
});

return;
}

video.src=url;
video.onloadeddata=()=>{
video.play();
resolve();
};
video.onerror=reject;

});
}

/* SERVER AUTO */
async function playServers(servers){

player.style.display="block";

for(let s of servers){

let url=s.url;

if(!url.includes(".m3u8") && !url.includes(".mp4") && !url.includes(".txt")){
player.innerHTML=`
<button class="home-btn" onclick="goHome()">🏠</button>
<button class="close-btn" onclick="closePlayer()">✕</button>
<iframe src="${url}" allowfullscreen></iframe>`;
return;
}

try{
await play(url);
return;
}catch(e){
continue;
}

}

alert("❌ ไม่มี server ใช้ได้");

}

/* CLOSE */
function closePlayer(){
reset();
player.style.display="none";
}

/* HOME */
function goHome(){
closePlayer();
render(currentData);
setTimeout(()=>setFocus(0),200);
}

/* ================= REMOTE SYSTEM ================= */

let focusIndex = 0;

function getItems(){
return [...document.querySelectorAll('.card, .menu button')];
}

function setFocus(i){
let items=getItems();
if(items.length===0) return;

if(i<0) i=0;
if(i>=items.length) i=items.length-1;

focusIndex=i;

items.forEach(el=>el.blur());
items[focusIndex].focus();

items[focusIndex].scrollIntoView({
behavior:"smooth",
block:"center"
});
}

document.addEventListener("keydown",(e)=>{

let items=getItems();
if(items.length===0) return;

let cols=Math.floor(window.innerWidth/180);

switch(e.key){

case "ArrowRight": focusIndex++; break;
case "ArrowLeft": focusIndex--; break;
case "ArrowDown": focusIndex+=cols; break;
case "ArrowUp": focusIndex-=cols; break;

case "Enter":
items[focusIndex].click();
return;

case "Escape":
case "Backspace":
closePlayer();
return;

}

setFocus(focusIndex);

});

/* START */
load(PLAYLISTS[0].url);

</script>

</body>
</html>
