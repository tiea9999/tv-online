<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV ANDROID TV FINAL FIX</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:sans-serif;
overscroll-behavior:none;
}

#homeBtn{
position:fixed;
top:10px;
left:10px;
z-index:9999;
padding:10px;
background:#00c853;
border:none;
border-radius:10px;
color:#fff;
}

.row-title{
padding:10px;
color:#00e5ff;
font-weight:bold;
display:flex;
justify-content:space-between;
align-items:center;
}

.row-items{
display:flex;
gap:10px;
overflow-x:auto;
padding:10px;
}

.card{
min-width:150px;
background:#111;
border-radius:10px;
padding:8px;
text-align:center;
cursor:pointer;
touch-action:manipulation;
user-select:none;
-webkit-tap-highlight-color:transparent;
}

.card:focus{
outline:2px solid #00ffcc;
transform:scale(1.05);
}

img{
width:100%;
height:180px;
object-fit:cover;
border-radius:8px;
pointer-events:none;
}

#overlay,#player{
position:fixed;
top:0;left:0;
width:100%;height:100%;
display:none;
}

#overlay{background:#000;z-index:999;overflow:auto;}
#player{background:#000;z-index:1000;}

video,iframe{
width:100%;
height:100%;
border:none;
}

.btn{
position:absolute;
top:10px;
right:10px;
padding:10px;
background:#ff9800;
border:none;
border-radius:8px;
color:#fff;
z-index:1001;
}
</style>
</head>

<body>

<button id="homeBtn">🏠 HOME</button>

<div id="grid"></div>
<div id="overlay"></div>

<div id="player">
<button class="btn" onclick="closePlayer()">✕</button>
<video id="video" playsinline></video>
<iframe id="frame"></iframe>
</div>

<script>

const SOURCES=[
{name:"🔥 มาใหม่",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/new.json"},
{name:"🇨🇳 จีน",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/chinese.json"},
{name:"🇯🇵 ญี่ปุ่น",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/japan.json"},
{name:"🇰🇷 เกาหลี",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/korea.json"},
{name:"🇹🇭 ไทย",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/thai.json"}
];

let grid=document.getElementById("grid");
let overlay=document.getElementById("overlay");
let video=document.getElementById("video");
let frame=document.getElementById("frame");
let hls=null;

/* ================= LOAD ================= */
async function loadAll(){

grid.innerHTML="⚡ LOADING...";

for(let s of SOURCES){

try{
let res=await fetch(s.url);
let data=await res.json();
renderRow(s.name,data);
}catch{}

}

}

/* ================= RENDER ================= */
function renderRow(title,data){

let row=document.createElement("div");

row.innerHTML=`
<div class="row-title">${title}</div>
<div class="row-items">
${data.map(item=>`
<div class="card" tabindex="0">
<img src="${item.image||''}">
<div>${item.title||item.name||""}</div>
</div>
`).join("")}
</div>
`;

grid.appendChild(row);

/* bind click หลัง render */
row.querySelectorAll(".card").forEach((el,i)=>{
el.addEventListener("click",()=>{
openItem(data[i]);
});
});

}

/* ================= OPEN ================= */
function openItem(item){

if(item.episodes && item.episodes.length){
showEP(item);
return;
}

startPlay([{url:item.url}]);

}

/* ================= EP ================= */
function showEP(item){

overlay.style.display="block";
grid.style.display="none";

overlay.innerHTML=`
<h2 style="padding:10px">${item.title||""}</h2>
<div style="display:flex;flex-wrap:wrap;gap:10px;padding:10px" id="epBox"></div>
<button class="btn" onclick="goHome()">HOME</button>
`;

let box=document.getElementById("epBox");

item.episodes.forEach(ep=>{

let d=document.createElement("div");
d.className="card";
d.textContent=ep.name;

d.addEventListener("click",()=>{
startPlay(ep.servers);
});

box.appendChild(d);

});

}

/* ================= PLAY ================= */
function startPlay(list){

overlay.style.display="none";
player.style.display="block";

playServers(list);

}

async function playServers(list){

for(let s of list){
try{
await play(s.url);
return;
}catch{}
}

alert("❌ no server");

}

function play(url){

return new Promise((res)=>{

if(hls) hls.destroy();

video.style.display="block";
frame.style.display="none";

if(url.includes(".m3u8")){
hls=new Hls();
hls.loadSource(url);
hls.attachMedia(video);
hls.on(Hls.Events.MANIFEST_PARSED,()=>{
video.play();
res();
});
return;
}

if(url.includes(".mp4")){
video.src=url;
video.play();
res();
return;
}

video.style.display="none";
frame.style.display="block";
frame.src=url;
res();

});

}

/* ================= CLOSE ================= */
function closePlayer(){

if(hls) hls.destroy();

video.pause();
video.src="";
frame.src="";

player.style.display="none";
grid.style.display="block";

}

/* ================= HOME FIX ================= */
function goHome(){
window.location.href="https://tiea9999.github.io/tv-online/index.html";
}

document.getElementById("homeBtn").onclick=goHome;

/* ================= REMOTE FIX (REAL ANDROID TV) ================= */
let focusList=[];
let focusIndex=0;

function updateFocus(){
focusList=[...document.querySelectorAll(".card")];
}

document.addEventListener("keydown",(e)=>{

updateFocus();

if(!focusList.length) return;

switch(e.key){

case "ArrowRight":focusIndex++;break;
case "ArrowLeft":focusIndex--;break;
case "ArrowDown":focusIndex+=5;break;
case "ArrowUp":focusIndex-=5;break;

case "Enter":
case "OK":
case "Select":
focusList[focusIndex]?.click();
return;

case "Backspace":
case "Escape":
goHome();
return;

}

focusIndex=Math.max(0,Math.min(focusIndex,focusList.length-1));

let el=focusList[focusIndex];
if(el){
el.focus();
el.scrollIntoView({behavior:"smooth",block:"center"});
}

});

/* ================= BACK BLOCK (NO EXIT APP) ================= */
history.pushState(null,null,location.href);

window.addEventListener("popstate",()=>{
goHome();
history.pushState(null,null,location.href);
});

/* START */
loadAll();

</script>

</body>
</html>
