<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Netflix ULTRA</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;overflow:hidden}

/* SIDEBAR */
.sidebar{
position:fixed;left:0;top:0;width:200px;height:100%;
background:#111;padding:10px;display:flex;flex-direction:column;gap:10px;
}
.menu{padding:10px;background:#222;border-radius:8px;cursor:pointer;}
.menu.focus,.menu:hover{background:#00e5ff;color:#000;}

.content{margin-left:210px;}

/* CARD */
.row-items{display:flex;gap:10px;padding:10px;overflow-x:auto;}
.card{
min-width:150px;background:#111;border-radius:10px;padding:8px;
transition:.2s;
}
.card.focus{
transform:scale(1.12);
box-shadow:0 10px 30px rgba(0,255,200,0.6);
}

/* PREVIEW */
.preview{
position:fixed;
bottom:50px;
left:250px;
background:#111;
padding:15px;
border-radius:10px;
display:none;
width:300px;
z-index:999;
}
.preview img{
width:100%;height:160px;object-fit:cover;border-radius:8px;
}

/* PLAYER */
#player{
position:fixed;top:0;left:0;width:100%;height:100%;
background:#000;display:none;z-index:1000;
}
video,iframe{width:100%;height:100%;}

.controls{
position:absolute;bottom:30px;left:50%;
transform:translateX(-50%);
display:flex;gap:10px;
}

.btn{
padding:10px;background:#ff9800;border:none;border-radius:8px;color:#fff;
}
</style>
</head>

<body>

<div class="sidebar" id="menu"></div>
<div class="content" id="content"></div>
<div class="preview" id="preview"></div>

<div id="player">
<div class="controls">
<button class="btn" onclick="prevEP()">⏮</button>
<button class="btn" onclick="togglePlay()">⏯</button>
<button class="btn" onclick="nextEP()">⏭</button>
<button class="btn" onclick="closePlayer()">⬅</button>
<button class="btn" onclick="goMainHome()">🏠</button>
</div>
<video id="video"></video>
<iframe id="frame"></iframe>
</div>

<script>

/* CONFIG */
const SOURCES=[
{name:"🔥 มาใหม่",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/new.json"},
{name:"🇨🇳 จีน",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/chinese.json"},
{name:"🇯🇵 ญี่ปุ่น",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/japan.json"},
{name:"🇰🇷 เกาหลี",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/korea.json"},
{name:"🇹🇭 ไทย",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/thai.json"}
];

let menu=document.getElementById("menu");
let content=document.getElementById("content");
let preview=document.getElementById("preview");

let video=document.getElementById("video");
let frame=document.getElementById("frame");
let player=document.getElementById("player");
let hls=null;

let menuIndex=0,gridIndex=0,gridItems=[];
let focusArea="menu";

/* MENU */
function buildMenu(){
menu.innerHTML=SOURCES.map((m,i)=>`
<div class="menu" data-i="${i}">${m.name}</div>
`).join("");
updateMenuFocus();
}

function updateMenuFocus(){
[...menu.children].forEach(el=>el.classList.remove("focus"));
if(menu.children[menuIndex]){
menu.children[menuIndex].classList.add("focus");
}
}

/* LOAD */
async function loadCategory(i){

localStorage.setItem("last_category",i);

content.innerHTML="LOADING...";
let data=await fetch(SOURCES[i].url).then(r=>r.json()).catch(()=>[]);

content.innerHTML=`
<div class="row-items">
${data.slice(0,40).map(item=>`
<div class="card"
data-item='${encodeURIComponent(JSON.stringify(item))}'>
<img src="${item.image||''}">
<div>${item.title||item.name||""}</div>
</div>`).join("")}
</div>
`;

setTimeout(setGridFocus,200);
}

/* FOCUS */
function setGridFocus(){
gridItems=[...document.querySelectorAll(".card")];

let saved=localStorage.getItem("last_scroll");
gridIndex=saved?parseInt(saved):0;

updateGridFocus();
}

function updateGridFocus(){
gridItems.forEach(el=>el.classList.remove("focus"));

if(gridItems[gridIndex]){
let el=gridItems[gridIndex];
el.classList.add("focus");
el.scrollIntoView({inline:"center"});

localStorage.setItem("last_scroll",gridIndex);

// 🔥 SHOW PREVIEW
let item=JSON.parse(decodeURIComponent(el.dataset.item));
preview.style.display="block";
preview.innerHTML=`
<img src="${item.image||''}">
<h3>${item.title||item.name||""}</h3>
`;
}
}

/* CLICK MENU */
menu.addEventListener("click",e=>{
let btn=e.target.closest(".menu");
if(!btn)return;

menuIndex=parseInt(btn.dataset.i);
updateMenuFocus();
loadCategory(menuIndex);
focusArea="grid";
});

/* CLICK CARD */
document.addEventListener("click",e=>{
let card=e.target.closest(".card");
if(!card)return;

let item=JSON.parse(decodeURIComponent(card.dataset.item));
if(item.episodes)showEP(item);
else startPlay([{url:item.url}]);
});

/* REMOTE */
document.addEventListener("keydown",e=>{

if(player.style.display==="block"){
if(e.key==="Escape")closePlayer();
if(e.key==="Enter")togglePlay();
if(e.key==="ArrowRight")nextEP();
if(e.key==="ArrowLeft")prevEP();
return;
}

if(focusArea==="menu"){
if(e.key==="ArrowDown"){menuIndex++;updateMenuFocus();}
if(e.key==="ArrowUp"){menuIndex--;updateMenuFocus();}
if(e.key==="Enter"){loadCategory(menuIndex);focusArea="grid";}
}
else{
if(e.key==="ArrowLeft"){focusArea="menu";updateMenuFocus();return;}

if(e.key==="ArrowRight")gridIndex++;
if(e.key==="ArrowLeft")gridIndex--;
if(e.key==="ArrowDown")gridIndex+=6;
if(e.key==="ArrowUp")gridIndex-=6;

gridIndex=Math.max(0,Math.min(gridItems.length-1,gridIndex));
updateGridFocus();

if(e.key==="Enter"){
let item=JSON.parse(decodeURIComponent(gridItems[gridIndex].dataset.item));
if(item.episodes)showEP(item);
else startPlay([{url:item.url}]);
}
}

});

/* EP */
let currentEPList=[],currentEPIndex=0;

function showEP(item){
currentEPList=item.episodes;

content.innerHTML=`
<div class="row-items">
${item.episodes.map((ep,i)=>`
<div class="card ep" data-i="${i}" data-ep='${encodeURIComponent(JSON.stringify(ep))}'>
${ep.name||("EP "+ep.ep)}
</div>`).join("")}
</div>
`;

setTimeout(setGridFocus,200);
}

/* PLAYER */
function startPlay(list){
player.style.display="block";
playServers(list);
}

async function playServers(list){
for(let s of list){
try{await play(s.url);return;}catch(e){}
}
alert("เล่นไม่ได้");
}

function play(url){
return new Promise(res=>{
if(hls){hls.destroy();hls=null;}

if(url.includes(".m3u8")&&Hls.isSupported()){
video.style.display="block";frame.style.display="none";
hls=new Hls();hls.loadSource(url);hls.attachMedia(video);
hls.on(Hls.Events.MANIFEST_PARSED,()=>{video.play();res();});
return;
}

if(url.includes(".mp4")){
video.style.display="block";frame.style.display="none";
video.src=url;video.play();res();return;
}

video.style.display="none";frame.style.display="block";
frame.src=url;res();
});
}

/* AUTO NEXT */
video.onended=()=>{nextEP();};

function nextEP(){
if(currentEPIndex<currentEPList.length-1){
currentEPIndex++;
let ep=currentEPList[currentEPIndex];
startPlay(ep.servers||[{url:ep.url}]);
}
}

function prevEP(){
if(currentEPIndex>0){
currentEPIndex--;
let ep=currentEPList[currentEPIndex];
startPlay(ep.servers||[{url:ep.url}]);
}
}

/* CONTROL */
function togglePlay(){video.paused?video.play():video.pause();}
function closePlayer(){
if(hls)hls.destroy();
video.pause();video.src="";frame.src="";
player.style.display="none";
}

/* HOME */
function goMainHome(){
window.location.href="https://tiea9999.github.io/tv-online/index.html";
}

/* START */
buildMenu();

let last=localStorage.getItem("last_category")||0;
menuIndex=parseInt(last);
updateMenuFocus();
loadCategory(menuIndex);

</script>

</body>
</html>
