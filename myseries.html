<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;}
.menu{display:flex;gap:10px;padding:10px;background:#111;flex-wrap:wrap;}
.menu button{padding:10px;background:#333;color:#fff;border:none;border-radius:6px;}
.menu button:focus{outline:3px solid #00c853;}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:12px;
padding:10px;
}

.card{
background:#111;
padding:8px;
border-radius:10px;
text-align:center;
}

.card:focus{
outline:3px solid #00c853;
transform:scale(1.05);
}

img{
width:100%;
height:200px;
object-fit:cover;
border-radius:8px;
}

#player,#overlay{
position:fixed;
top:0;left:0;width:100%;height:100%;
display:none;
}

#overlay{background:rgba(0,0,0,.8);z-index:998;}
#player{background:#000;z-index:999;}

video,iframe{width:100%;height:100%;}

.btn{
position:absolute;
top:20px;
padding:10px;
border:none;
border-radius:8px;
color:#fff;
font-size:16px;
cursor:pointer;
z-index:1000;
}

.close{right:20px;background:red;}
.home{left:20px;background:#ff9800;}
</style>
</head>

<body>

<div class="menu" id="menu"></div>
<div class="grid" id="grid"></div>

<div id="overlay"></div>

<div id="player">
<button class="btn home" onclick="goHome()">🏠</button>
<button class="btn close" onclick="closePlayer()">✕</button>
<video id="video" controls autoplay playsinline></video>
</div>

<script>

const PLAYLISTS = [
{name:"ซีรีย์มาใหม่",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/new.json"},
{name:"ซีรี่ย์จีน",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/chinese.json"},
{name:"ซีรี่ย์ญี่ปุ่น",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/japan.json"},
{name:"ซีรี่ย์เกาหลี",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/korea.json"},
{name:"ซีรี่ย์ไทย",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/thai.json"},
{name:"ซีรีย์แนวตั้ง",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/short.json"}
];

let grid=document.getElementById("grid");
let video=document.getElementById("video");
let hls=null;
let currentData=[];
let focusIndex=0;

/* MENU */
const menu=document.getElementById("menu");

PLAYLISTS.forEach((pl,i)=>{
let btn=document.createElement("button");
btn.textContent=pl.name;
btn.tabIndex=0;
btn.onclick=()=>load(pl.url);
menu.appendChild(btn);
});

/* LOAD */
async function load(url){
grid.innerHTML="กำลังโหลด...";
try{
let res=await fetch(url);
currentData=await res.json();
render(currentData);
setFocus(0);
}catch{
grid.innerHTML="❌ โหลดไม่สำเร็จ";
}
}

/* RENDER */
function render(data){
grid.innerHTML="";

data.forEach((item,i)=>{

let div=document.createElement("div");
div.className="card";
div.tabIndex=0;

div.innerHTML=`
<img src="${item.image||''}">
<div>${item.title||item.name}</div>
`;

div.onclick=()=>clickItem(item);

grid.appendChild(div);

});
}

/* CLICK */
function clickItem(item){

if(item.episodes){
showEp(item);
return;
}

if(item.servers){
playServers(item.servers);
return;
}

if(item.url){
playServers([{url:item.url}]);
}

}

/* EP */
function showEp(item){

grid.innerHTML="";

item.episodes.forEach((ep,i)=>{
let div=document.createElement("div");
div.className="card";
div.tabIndex=0;
div.textContent=ep.name;

div.onclick=()=>playServers(ep.servers||[{url:ep.url}]);

grid.appendChild(div);
});

setFocus(0);
}

/* PLAY SERVER (เล่นได้ทุกเว็บ) */
function playServers(servers){

overlay.style.display="block";
player.style.display="block";

let url=servers[0].url;

// 🔥 ถ้าไม่ใช่ m3u8 = iframe ทันที
if(!url.includes(".m3u8") && !url.includes(".mp4") && !url.includes(".txt")){
player.innerHTML=`
<button class="btn home" onclick="goHome()">🏠</button>
<button class="btn close" onclick="closePlayer()">✕</button>
<iframe src="${url}" allowfullscreen allow="autoplay"></iframe>
`;
return;
}

// 🔥 video player
play(url);

}

/* PLAY */
function play(url){

if(url.includes(".txt")){
url=url.replace(".txt",".m3u8");
}

video.muted=true;

if(url.includes(".m3u8") && Hls.isSupported()){
hls=new Hls();
hls.loadSource(url);
hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED,()=>{
video.play().then(()=>video.muted=false);
});
return;
}

video.src=url;
video.onloadeddata=()=>{
video.play().then(()=>video.muted=false);
};

}

/* CLOSE */
function closePlayer(){
if(hls){hls.destroy();hls=null;}
video.pause();
video.src="";
overlay.style.display="none";
player.style.display="none";
}

/* HOME */
function goHome(){
closePlayer();
render(currentData);
setFocus(0);
}

/* 🔥 REMOTE CONTROL จริง */
document.addEventListener("keydown",(e)=>{

let cards=document.querySelectorAll(".card");

if(e.key==="ArrowRight"){
focusIndex=Math.min(focusIndex+1,cards.length-1);
setFocus(focusIndex);
}

if(e.key==="ArrowLeft"){
focusIndex=Math.max(focusIndex-1,0);
setFocus(focusIndex);
}

if(e.key==="ArrowDown"){
focusIndex=Math.min(focusIndex+4,cards.length-1);
setFocus(focusIndex);
}

if(e.key==="ArrowUp"){
focusIndex=Math.max(focusIndex-4,0);
setFocus(focusIndex);
}

if(e.key==="Enter"){
cards[focusIndex]?.click();
}

if(e.key==="Backspace"||e.key==="Escape"){
closePlayer();
}

});

/* FOCUS */
function setFocus(i){
let cards=document.querySelectorAll(".card");
if(cards[i]){
cards[i].focus();
focusIndex=i;
}
}

/* START */
load(PLAYLISTS[0].url);

</script>

</body>
</html>
