<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV NETFLIX PRO MAX</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
margin:0;background:#000;color:#fff;
font-family:sans-serif;
overflow:hidden;
}

/* ===== ROW ===== */
.row-title{
padding:10px 14px;
font-size:18px;
font-weight:bold;
}

.row{
margin-bottom:10px;
}

.row-items{
display:flex;
gap:10px;
overflow-x:auto;
padding:10px 14px;
scroll-behavior:smooth;
}

/* ===== CARD ===== */
.card,.ep{
min-width:150px;
background:#111;
border-radius:12px;
padding:8px;
text-align:center;
cursor:pointer;
user-select:none;
touch-action:manipulation;
transition:.2s;
}

.card:hover,.ep:hover{
transform:scale(1.05);
}

.card:focus,.ep:focus{
outline:2px solid #00ffcc;
transform:scale(1.06);
}

img{
width:100%;
height:190px;
object-fit:cover;
border-radius:10px;
pointer-events:none;
}

/* ===== PLAYER ===== */
#overlay,#player{
position:fixed;
top:0;left:0;
width:100%;height:100%;
display:none;
}

#overlay{
background:rgba(0,0,0,.96);
z-index:999;
overflow:auto;
}

#player{
background:#000;
z-index:1000;
}

video,iframe{
width:100%;
height:100%;
border:none;
}

/* ===== BTN ===== */
.btn{
position:absolute;
top:10px;
padding:10px 14px;
border:none;
border-radius:8px;
background:#ff9800;
color:#fff;
z-index:1001;
}
.home{left:10px}
.close{right:10px}

/* ===== Netflix feel ===== */
::-webkit-scrollbar{display:none;}
</style>
</head>

<body>

<div id="grid"></div>

<div id="overlay"></div>

<div id="player">
<button class="btn home" onclick="goHome()">🏠 Home</button>
<button class="btn close" onclick="closePlayer()">✕</button>

<video id="video" playsinline></video>
<iframe id="frame"></iframe>
</div>

<script>

/* ================= DATA ================= */
const PLAYLISTS=[
{name:"🔥 มาใหม่",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/new.json"},
{name:"🇨🇳 จีน",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/chinese.json"},
{name:"🇯🇵 ญี่ปุ่น",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/japan.json"},
{name:"🇰🇷 เกาหลี",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/korea.json"},
{name:"🇹🇭 ไทย",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/thai.json"},
{name:"📱 แนวตั้ง",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/short.json"}
];

const CACHE={};

let grid=document.getElementById("grid");
let overlay=document.getElementById("overlay");
let video=document.getElementById("video");
let frame=document.getElementById("frame");

let hls=null;
let lastWatch=null;

/* ================= CACHE LOAD ================= */
async function loadJSON(url){
if(CACHE[url]) return CACHE[url];

let res=await fetch(url);
let data=await res.json();

CACHE[url]=data;
return data;
}

/* ================= LOAD NETFLIX UI ================= */
async function loadAll(){

grid.innerHTML="⚡ LOADING NETFLIX MODE...";

for(let p of PLAYLISTS){
renderRow(p);
}

}

/* ================= RENDER ROW ================= */
async function renderRow(p){

try{

let data=await loadJSON(p.url);

let row=document.createElement("div");

row.className="row";

row.innerHTML=`
<div class="row-title">${p.name}</div>
<div class="row-items">
${data.slice(0,14).map(item=>`
<div class="card"
tabindex="0"
data-item='${encodeURIComponent(JSON.stringify(item))}'>
<img loading="lazy" src="${item.image||''}">
<div>${item.title||item.name}</div>
</div>
`).join("")}
</div>
`;

grid.appendChild(row);

}catch(e){
console.log("error",p.name);
}

}

/* ================= INPUT ENGINE (PRO MAX) ================= */
function getCard(t){
while(t && !t.classList?.contains("card")){
t=t.parentElement;
}
return t;
}

document.addEventListener("pointerup",(e)=>{

let ep=e.target.closest(".ep");
if(ep){
let data=JSON.parse(ep.dataset.ep);
startPlay(data.servers);
return;
}

let card=getCard(e.target);
if(!card) return;

try{
let item=JSON.parse(decodeURIComponent(card.dataset.item));
openItem(item);
}catch(e){}

},true);

/* ================= OPEN ITEM ================= */
function openItem(item){

/* SAVE LAST WATCH */
lastWatch=item;

if(item.episodes && item.episodes.length){
showEpisodes(item);
return;
}

startPlay([{url:item.url}]);

}

/* ================= EP UI (NETFLIX STYLE) ================= */
function showEpisodes(item){

overlay.style.display="block";

let eps=[...item.episodes].sort((a,b)=>b.ep-a.ep);

overlay.innerHTML=`
<div style="padding:20px">

<h2>${item.title}</h2>

<div style="display:flex;flex-wrap:wrap;gap:12px;margin-top:10px">
${eps.map(ep=>`
<div class="card ep"
tabindex="0"
data-ep='${JSON.stringify(ep)}'>
${ep.name}
</div>
`).join("")}
</div>

</div>

<button class="btn close" onclick="closeEP()">Close</button>
`;

}

/* ================= PLAY ENGINE (PRO MAX) ================= */
function startPlay(servers){

if(!servers || !servers.length){
alert("No server");
return;
}

overlay.style.display="none";
document.getElementById("player").style.display="block";

playServers(servers);

}

/* AUTO SERVER SWITCH */
async function playServers(list){

for(let s of list){
try{
await play(s.url);
return;
}catch(e){}
}

alert("All servers failed");

}

/* ================= PLAYER CORE ================= */
function play(url){

return new Promise((res)=>{

video.style.display="block";
frame.style.display="none";

if(hls){
hls.destroy();
hls=null;
}

/* HLS */
if(url.includes(".m3u8") && Hls.isSupported()){

hls=new Hls({
maxBufferLength:40,
lowLatencyMode:true
});

hls.loadSource(url);
hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED,()=>{

video.play().catch(()=>{});

/* AUTO FULLSCREEN */
video.requestFullscreen?.();

res();

});

return;
}

/* MP4 */
if(url.includes(".mp4")){
video.src=url;
video.play().catch(()=>{});
video.requestFullscreen?.();
res();
return;
}

/* WEB */
frame.style.display="block";
video.style.display="none";
frame.src=url;

res();

});

}

/* ================= CLOSE ================= */
function closePlayer(){

if(hls) hls.destroy();

video.pause();
video.src="";
frame.src="";

document.getElementById("player").style.display="none";

}

/* CLOSE EP */
function closeEP(){
overlay.style.display="none";
overlay.innerHTML="";
}

/* HOME */
function goHome(){
closePlayer();
}

/* ================= RESUME (PRO MAX FEATURE) ================= */
setInterval(()=>{

if(video && !video.paused){
lastWatchProgress=video.currentTime;
}

},3000);

/* START */
loadAll();

</script>

</body>
</html>
