<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIEA IPTV FINAL PROXY</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif;}
.menu{display:flex;gap:10px;padding:10px;background:#111;flex-wrap:wrap;}
.menu button{padding:10px;background:#333;color:#fff;border:none;border-radius:6px;}
.menu button:focus{outline:2px solid #00c853;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;padding:10px;}
.card{background:#111;padding:8px;border-radius:10px;text-align:center;}
.card:focus{outline:2px solid #00c853;}
img{width:100%;height:200px;object-fit:cover;border-radius:8px;}

#player{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:none;z-index:999;}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);display:none;z-index:998;}

video,iframe{width:100%;height:100%;border:none;}

.btn{
position:absolute;top:20px;
padding:10px 14px;
background:#ff9800;color:#fff;
border:none;border-radius:8px;
z-index:1000;
}
.home{left:20px;}
.close{right:20px;}
</style>
</head>

<body>

<div class="menu" id="menu"></div>
<div class="grid" id="grid"></div>

<div id="overlay"></div>

<div id="player">
<button class="btn home" onclick="goHome()">🏠</button>
<button class="btn close" onclick="closePlayer()">✕</button>
<video id="video" tabindex="0" playsinline></video>
</div>

<script>

const PROXY = "https://iptv.tawatchai250958.workers.dev/?url=";

const PLAYLISTS = [
{name:"ซีรีย์มาใหม่",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/new.json"},
{name:"จีน",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/chinese.json"},
{name:"ญี่ปุ่น",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/japan.json"},
{name:"เกาหลี",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/korea.json"},
{name:"ไทย",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/thai.json"},
{name:"สั้น",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/short.json"}
];

let grid=document.getElementById("grid");
let video=document.getElementById("video");
let hls=null;
let currentData=[];

const menu=document.getElementById("menu");

PLAYLISTS.forEach(pl=>{
let btn=document.createElement("button");
btn.textContent=pl.name;
btn.tabIndex=0;
btn.onclick=()=>load(pl.url);
menu.appendChild(btn);
});

async function load(url){
grid.innerHTML="กำลังโหลด...";
try{
let res=await fetch(url);
currentData=await res.json();
render(currentData);
setFocus();
}catch{
grid.innerHTML="❌ โหลดไม่ได้";
}
}

function render(data){
grid.innerHTML="";
data.forEach(item=>{
let div=document.createElement("div");
div.className="card";
div.tabIndex=0;

div.innerHTML=`
<img src="${item.image||''}">
<div>${item.title||item.name}</div>
`;

div.onclick=()=>openItem(item);
div.onkeydown=e=>{if(e.key==="Enter")openItem(item);};

grid.appendChild(div);
});
}

function openItem(item){

if(item.episodes){
grid.innerHTML="";
item.episodes.forEach(ep=>{
let div=document.createElement("div");
div.className="card";
div.tabIndex=0;
div.innerHTML=`<div>${ep.name||'EP'}</div>`;

div.onclick=()=>startPlay(ep.servers||[{url:ep.url}]);
div.onkeydown=e=>{if(e.key==="Enter")startPlay(ep.servers||[{url:ep.url}]);};

grid.appendChild(div);
});
setFocus();
return;
}

startPlay(item.servers||[{url:item.url}]);
}

function startPlay(servers){
const overlay=document.getElementById("overlay");
const player=document.getElementById("player");

overlay.style.display="block";
player.style.display="block";

video.src="";

playServers(servers);

video.focus();
}

function reset(){
if(hls){hls.destroy();hls=null;}
video.pause();
video.src="";
}

function fix(url){

if(url.includes(".txt")){
url=url.replace(".txt",".m3u8");
}

// 🔥 ใส่ proxy
if(url.startsWith("http")){
url = PROXY + encodeURIComponent(url);
}

return url;
}

function play(url){
return new Promise((resolve,reject)=>{

url=fix(url);
video.muted=true;

if(url.includes(".m3u8") && Hls.isSupported()){
if(hls){hls.destroy();}
hls=new Hls();
hls.loadSource(url);
hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED,()=>{
video.play().then(()=>{
video.muted=false;
resolve();
}).catch(reject);
});

hls.on(Hls.Events.ERROR,()=>reject());
return;
}

video.src=url;

video.onloadeddata=()=>{
video.play().then(()=>{
video.muted=false;
resolve();
}).catch(reject);
};

video.onerror=reject;

});
}

async function playServers(list){

const player=document.getElementById("player");

for(let s of list){

let url=s.url;

// 🔥 iframe fallback
if(!url.includes(".m3u8") && !url.includes(".mp4") && !url.includes(".txt")){
player.innerHTML=`
<button class="btn home" onclick="goHome()">🏠</button>
<button class="btn close" onclick="closePlayer()">✕</button>
<iframe src="${url}"></iframe>
`;
return;
}

try{
await play(url);
return;
}catch{}
}

alert("❌ ไม่มี server");
}

function closePlayer(){
reset();

const player=document.getElementById("player");

player.innerHTML=`
<button class="btn home" onclick="goHome()">🏠</button>
<button class="btn close" onclick="closePlayer()">✕</button>
<video id="video" tabindex="0" playsinline></video>
`;

video=document.getElementById("video");

document.getElementById("overlay").style.display="none";
player.style.display="none";
}

function goHome(){
closePlayer();
render(currentData);
setFocus();
}

document.addEventListener("keydown",e=>{

if(e.key==="Enter"||e.keyCode===13){
if(video.src){
video.play().catch(()=>{});
return;
}
document.activeElement?.click();
}

if(e.key==="MediaPlayPause"||e.keyCode===179){
if(video.paused) video.play();
else video.pause();
}

if(e.key==="Escape"||e.key==="Backspace"){
closePlayer();
}

});

function setFocus(){
setTimeout(()=>{
document.querySelector(".card,.menu button")?.focus();
},200);
}

load(PLAYLISTS[0].url);

</script>

</body>
</html>
