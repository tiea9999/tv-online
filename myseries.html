<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIEA IPTV FINAL FIX SERVER</title>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: sans-serif;
        }

        .row {
            margin: 10px;
        }

        .row-items {
            display: flex;
            gap: 10px;
            overflow-x: auto;
        }

        .card {
            min-width: 140px;
            background: #111;
            border-radius: 10px;
            padding: 6px;
            text-align: center;
        }

        .card:focus {
            outline: 3px solid #00c853;
        }

        img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 8px;
        }

        #player,
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
        }

        #player {
            background: #000;
            z-index: 999;
        }

        #overlay {
            background: rgba(0, 0, 0, .9);
            z-index: 998;
        }

        video,
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .btn {
            position: absolute;
            top: 20px;
            padding: 10px;
            background: #ff9800;
            color: #fff;
            border: none;
            border-radius: 8px;
            z-index: 1000;
        }

        .home {
            left: 20px;
        }

        .close {
            right: 20px;
        }
    </style>
</head>

<body>

    <div id="grid"></div>

    <div id="overlay"></div>

    <div id="player">
        <button class="btn home" onclick="goHome()">🏠</button>
        <button class="btn close" onclick="closePlayer()">✕</button>
        <video id="video" playsinline></video>
    </div>

    <script>
        const PROXY="https://iptv.tawatchai250958.workers.dev/?url=";

let video=document.getElementById("video");
let grid=document.getElementById("grid");
let hls=null,currentData=[];

async function load(){
grid.innerHTML="⚡ กำลังโหลด...";

let res=await fetch("https://raw.githubusercontent.com/nongakka/myseries/main/data/new.json");

currentData=await res.json();
render(currentData);
}

function render(data){
grid.innerHTML="";
let row=document.createElement("div");
row.className="row";

let list=document.createElement("div");
list.className="row-items";

data.forEach(item=>{
let div=document.createElement("div");
div.className="card";
div.tabIndex=0;

div.innerHTML=`
<img src="${item.image||''}">
<div>${item.title||item.name}</div>
`;

div.onclick=()=>openItem(item);
list.appendChild(div);
});

row.appendChild(list);
grid.appendChild(row);
}

function openItem(item){
if(item.episodes){
grid.innerHTML="";
item.episodes.forEach(ep=>{
let d=document.createElement("div");
d.className="card";
d.tabIndex=0;
d.textContent=ep.name||"EP";

d.onclick=()=>startPlay(ep.servers||[{url:ep.url}]);
grid.appendChild(d);
});
return;
}
startPlay(item.servers||[{url:item.url}]);
}

function startPlay(list){
overlay.style.display="block";
player.style.display="block";
playServers(list);
}

function fix(url){

if(!url) return "";

if(url.includes(".txt")){
url=url.replace(".txt",".m3u8");
}

// 👉 ใส่ proxy เฉพาะไฟล์จริง
if(url.includes(".m3u8")||url.includes(".mp4")){
url = PROXY + encodeURIComponent(url);
}

return url;
}

function play(url){
return new Promise((res,rej)=>{

url=fix(url);

// 👉 HLS
if(url.includes(".m3u8") && Hls.isSupported()){
if(hls) hls.destroy();
hls=new Hls();
hls.loadSource(url);
hls.attachMedia(video);
hls.on(Hls.Events.MANIFEST_PARSED,()=>{
video.play();res();
});
hls.on(Hls.Events.ERROR,()=>rej());
return;
}

// 👉 MP4
if(url.includes(".mp4")){
video.src=url;
video.onloadeddata=()=>{video.play();res();};
video.onerror=rej;
return;
}

rej();
});
}

// 🔥 ตัวจบจริง (แก้ server)
async function playServers(list){

const player = document.getElementById("player");

// วนทุกลิงก์
for(let s of list){

let url = s.url || s;

// 👉 ถ้าไม่ใช่ไฟล์ → ใช้ iframe
if(!url.includes(".m3u8") && !url.includes(".mp4") && !url.includes(".txt")){
    
    player.innerHTML = `
    <button class="btn home" onclick="goHome()">🏠</button>
    <button class="btn close" onclick="closePlayer()">✕</button>
    <iframe src="${url}" allowfullscreen></iframe>
    `;
    return;
}

try{
await play(url);
return;
}catch(e){}

}

// ❌ ถ้าไม่ได้จริง
alert("❌ ไม่มี server ใช้ได้จริง");
}

function closePlayer(){
if(hls) hls.destroy();
video.pause();
video.src="";
overlay.style.display="none";
player.style.display="none";

// reset player UI
player.innerHTML=`
<button class="btn home" onclick="goHome()">🏠</button>
<button class="btn close" onclick="closePlayer()">✕</button>
<video id="video" playsinline></video>
`;
video=document.getElementById("video");
}

function goHome(){
closePlayer();
render(currentData);
}

load();

    </script>

</body>

</html>
