<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ULTRA SMOOTH IPTV</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif}

.row-title{padding:10px;font-size:18px;font-weight:bold}

.row-items{
display:flex;
gap:10px;
overflow-x:auto;
padding:10px;
}

.card{
min-width:140px;
background:#111;
border-radius:10px;
padding:6px;
text-align:center;
cursor:pointer;
}

.card:focus{outline:3px solid #00e676;transform:scale(1.05)}

img{width:100%;height:180px;object-fit:cover;border-radius:8px}

#overlay,#player{
position:fixed;top:0;left:0;width:100%;height:100%;
display:none;
}

#overlay{background:rgba(0,0,0,.95);z-index:999}
#player{background:#000;z-index:1000}

video,iframe{width:100%;height:100%;border:none}

.btn{
position:absolute;top:10px;padding:10px;border:none;
border-radius:8px;background:#ff9800;color:#fff;z-index:1001;
}
.home{left:10px}.close{right:10px}
</style>
</head>

<body>

<div id="grid"></div>
<div id="overlay"></div>

<div id="player">
<button class="btn home" onclick="goHome()">🏠</button>
<button class="btn close" onclick="closePlayer()">✕</button>
<video id="video" playsinline></video>
<iframe id="frame"></iframe>
</div>

<script>

/* ================= CACHE ================= */
const cache = new Map();

/* ================= DATA ================= */
const PLAYLISTS=[
{name:"ซีรีย์มาใหม่",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/new.json"},
{name:"จีน",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/chinese.json"},
{name:"ญี่ปุ่น",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/japan.json"},
{name:"เกาหลี",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/korea.json"},
{name:"ไทย",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/thai.json"},
{name:"แนวตั้ง",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/short.json"}
];

let grid=document.getElementById("grid");
let overlay=document.getElementById("overlay");
let video=document.getElementById("video");
let frame=document.getElementById("frame");

let hls=null;

/* ================= LOAD ULTRA SMOOTH ================= */
async function loadAll(){

grid.innerHTML="⚡ LOADING...";

for(let p of PLAYLISTS){

loadRow(p);

}

}

/* โหลดทีละหมวด (ไม่ block UI) */
async function loadRow(p){

try{

if(cache.has(p.url)){
renderRow(p.name,cache.get(p.url));
return;
}

let res=await fetch(p.url);
let data=await res.json();

cache.set(p.url,data);

renderRow(p.name,data);

}catch(e){
console.log("fail",p.name);
}

}

/* append ทีละ row */
function renderRow(title,data){

let div=document.createElement("div");

div.innerHTML=`
<div class="row-title">${title}</div>
<div class="row-items">
${data.slice(0,12).map(item=>`
<div class="card" tabindex="0"
data-item='${encodeURIComponent(JSON.stringify(item))}'>
<img loading="lazy" src="${item.image||''}">
<div>${item.title||item.name}</div>
</div>
`).join("")}
</div>
`;

grid.appendChild(div);

}

/* ================= CLICK (ULTRA LIGHT) ================= */
document.addEventListener("click",(e)=>{

let ep=e.target.closest(".ep");
if(ep){
let epData=JSON.parse(ep.dataset.ep);
startPlay(epData.servers);
return;
}

let card=e.target.closest(".card");
if(card){
let item=JSON.parse(decodeURIComponent(card.dataset.item));
openItem(item);
}

});

/* ================= OPEN ================= */
function openItem(item){

if(item.episodes && item.episodes.length){
showEpisodes(item);
return;
}

startPlay([{url:item.url}]);

}

/* ================= EP UI ================= */
function showEpisodes(item){

overlay.style.display="block";

let eps=item.episodes.slice().sort((a,b)=>b.ep-a.ep);

overlay.innerHTML=`
<h2 style="padding:10px">${item.title}</h2>

<div style="display:flex;flex-wrap:wrap;gap:10px;padding:10px">
${eps.map(ep=>`
<div class="card ep" tabindex="0"
data-ep='${JSON.stringify(ep)}'>
${ep.name}
</div>
`).join("")}
</div>

<button class="btn close" onclick="closeEP()">ปิด</button>
`;

}

/* ================= PLAY CORE ================= */
function startPlay(servers){

if(!servers || !servers.length){
alert("ไม่มี server");
return;
}

overlay.style.display="none";
document.getElementById("player").style.display="block";

playServers(servers);

}

/* retry server */
async function playServers(list){

for(let s of list){

try{
await play(s.url);
return;
}catch(e){}

}

alert("เล่นไม่ได้ทุก server");

}

/* play engine */
function play(url){

return new Promise((res)=>{

video.style.display="block";
frame.style.display="none";

if(hls){
hls.destroy();
hls=null;
}

if(url.includes(".m3u8") && Hls.isSupported()){

hls=new Hls({
maxBufferLength:30,
enableWorker:true
});

hls.loadSource(url);
hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED,()=>{
video.play();
res();
});

return;
}

if(url.includes(".mp4")){
video.src=url;
video.play();
res();
return;
}

/* web */
frame.style.display="block";
video.style.display="none";
frame.src=url;
res();

});

}

/* ================= CLOSE ================= */
function closePlayer(){

if(hls) hls.destroy();

video.pause();
video.src="";
frame.src="";

document.getElementById("player").style.display="none";

}

function closeEP(){
overlay.style.display="none";
overlay.innerHTML="";
}

function goHome(){
closePlayer();
}

/* START */
loadAll();

</script>

</body>
</html>
