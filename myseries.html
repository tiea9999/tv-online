<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV TV BOX PRO FIX</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:sans-serif}

/* SIDEBAR */
.sidebar{
position:fixed;width:200px;height:100%;
background:#111;padding:10px
}
.menu{
padding:10px;background:#222;margin-bottom:5px;border-radius:8px;cursor:pointer
}
.menu:hover{background:#00e5ff;color:#000}

.content{margin-left:210px}

/* CARD */
.row-items{display:flex;gap:10px;overflow-x:auto;padding:10px}
.grid{display:flex;flex-wrap:wrap;gap:10px;padding:10px}

.card{
min-width:150px;
background:#111;
padding:8px;
border-radius:10px;
cursor:pointer;
outline:none;
}

.card.focus{
transform:scale(1.1);
outline:3px solid #00ffcc;
}

img{
width:100%;
height:180px;
object-fit:cover;
border-radius:8px;
}

/* PLAYER */
#player{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:#000;
display:none;
z-index:999;
}

#playerUI{
position:absolute;
bottom:0;
left:0;
width:100%;
display:flex;
gap:10px;
justify-content:center;
align-items:center;
padding:15px;
background:rgba(0,0,0,0.7);
z-index:1001;
}

#playerUI button{
font-size:18px;
padding:10px 14px;
border:none;
border-radius:8px;
background:#ff9800;
color:#fff;
}

video,iframe{
width:100%;
height:100%;
}
</style>
</head>

<body>

<div class="sidebar" id="menu"></div>
<div class="content" id="content"></div>

<!-- PLAYER -->
<div id="player">

<div id="playerUI">
<button onclick="prevEP()">⏮</button>
<button onclick="togglePlay()">⏯</button>
<button onclick="nextEP()">⏭</button>
<button onclick="closePlayer()">⬅</button>
</div>

<video id="video" playsinline controls></video>
<iframe id="frame"></iframe>

</div>

<script>

const SOURCES=[
{name:"🔥 มาใหม่",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/new.json"},
{name:"🇨🇳 จีน",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/chinese.json"},
{name:"🇯🇵 ญี่ปุ่น",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/japan.json"},
{name:"🇰🇷 เกาหลี",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/korea.json"},
{name:"🇹🇭 ไทย",url:"https://raw.githubusercontent.com/nongakka/myseries/main/data/thai.json"}
];

let menu=document.getElementById("menu");
let content=document.getElementById("content");

let player=document.getElementById("player");
let video=document.getElementById("video");
let frame=document.getElementById("frame");

let hls=null;

/* ===== EP SYSTEM ===== */
let currentEPList=[];
let currentEPIndex=0;
let currentKey="";

/* ===== MENU ===== */
function buildMenu(){
menu.innerHTML=SOURCES.map((m,i)=>`
<div class="menu" onclick="loadCategory(${i})">${m.name}</div>
`).join("");
}

/* ===== LOAD ===== */
async function loadCategory(i){

content.innerHTML="LOADING...";

let data=await fetch(SOURCES[i].url).then(r=>r.json()).catch(()=>[]);

content.innerHTML=`
<div class="row-items">
${data.slice(0,12).map(item=>cardHTML(item)).join("")}
</div>
`;
}

/* ===== FULL CARD ===== */
function cardHTML(item){
return `
<div class="card"
data-item='${encodeURIComponent(JSON.stringify(item))}'>
<img src="${item.image||''}">
<div>${item.title||item.name||""}</div>
</div>
`;
}

/* ===== CLICK FIX (สำคัญ) ===== */
document.addEventListener("click",e=>{

let ep=e.target.closest(".card.ep");
if(ep){
let data=JSON.parse(decodeURIComponent(ep.dataset.ep));
currentEPIndex=parseInt(ep.dataset.i);
startPlay(data.servers||[{url:data.url}]);
player.style.display="block";
return;
}

let c=e.target.closest(".card");
if(!c)return;

let item=JSON.parse(decodeURIComponent(c.dataset.item));

if(item.episodes){
showEP(item);
}else{
startPlay([{url:item.url}]);
player.style.display="block";
}

});

/* ===== EP LIST ===== */
function showEP(item){

currentEPList=item.episodes;
currentKey="ep_"+item.title;

currentEPIndex=parseInt(localStorage.getItem(currentKey)||0);

content.innerHTML=`
<h2>${item.title||""}</h2>

<div class="grid">
${item.episodes.map((ep,i)=>`
<div class="card ep"
data-i="${i}"
data-ep='${encodeURIComponent(JSON.stringify(ep))}'>
${ep.name||("EP "+ep.ep)}
</div>
`).join("")}
</div>

<button onclick="loadCategory(0)">⬅ กลับ</button>
`;
}

/* ===== SAVE ===== */
function saveEP(){
localStorage.setItem(currentKey,currentEPIndex);
}

/* ===== PLAYER FIX ===== */
function startPlay(list){
player.style.display="block"; // 🔥 ต้องเปิดก่อน
playServers(list);
}

async function playServers(list){
for(let s of list){
try{await play(s.url);return;}catch(e){}
}
alert("❌ เล่นไม่ได้");
}

function play(url){
return new Promise(res=>{

if(hls){hls.destroy();hls=null;}

if(url.includes(".m3u8")&&Hls.isSupported()){
video.style.display="block";
frame.style.display="none";

hls=new Hls();
hls.loadSource(url);
hls.attachMedia(video);
hls.on(Hls.Events.MANIFEST_PARSED,()=>{
video.play();
res();
});
return;
}

if(url.includes(".mp4")){
video.src=url;
video.play();
res();
return;
}

video.style.display="none";
frame.style.display="block";
frame.src=url;
res();

});
}

/* ===== EP NEXT/PREV ===== */
function nextEP(){
if(currentEPIndex<currentEPList.length-1){
currentEPIndex++;
saveEP();
let ep=currentEPList[currentEPIndex];
startPlay(ep.servers||[{url:ep.url}]);
}
}

function prevEP(){
if(currentEPIndex>0){
currentEPIndex--;
saveEP();
let ep=currentEPList[currentEPIndex];
startPlay(ep.servers||[{url:ep.url}]);
}
}

/* ===== CONTROL ===== */
function togglePlay(){
if(video.paused) video.play();
else video.pause();
}

function closePlayer(){
if(hls)hls.destroy();
video.pause();
video.src="";
frame.src="";
player.style.display="none";
}

/* ===== INIT ===== */
buildMenu();
loadCategory(0);

</script>

</body>
</html>
