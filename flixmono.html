let grid=document.getElementById("grid");
let overlay=document.getElementById("overlay");
let video=document.getElementById("video");
let frame=document.getElementById("frame");
let player=document.getElementById("player");

let hls=null;
let store={};

/* LOAD */
async function loadAll(){
grid.innerHTML="⚡ LOADING...";
for(let s of SOURCES){
let data=await fetch(s.url).then(r=>r.json());
store[s.name]={data,page:1};
renderRow(s.name);
}
}

/* UI */
function renderRow(name){
let row=document.createElement("div");
row.innerHTML=`<div class="row-title">${name}
<button class="seeall" onclick="seeAll('${name}')">ดูทั้งหมด</button>
</div>
<div class="row-items" id="row-${name}"></div>`;
grid.appendChild(row);
renderPage(name);
}

function renderPage(name){
let obj=store[name];
let row=document.getElementById("row-"+name);
let items=obj.data.slice(0,obj.page*20);
row.innerHTML="";
items.forEach(item=>{
let div=document.createElement("div");
div.className="card";
div.innerHTML=`<img src="${item.image||''}"><div>${item.title||item.name||""}</div>`;
div.onclick=()=>openItem(item);
row.appendChild(div);
});
}

function seeAll(name){
store[name].page++;
renderPage(name);
}

function openItem(item){
if(item.episodes){showEP(item);return;}
startPlay([{url:item.url}]);
}

/* EP */
function showEP(item){
overlay.style.display="block";
grid.style.display="none";

overlay.innerHTML=`<h2 style="padding:10px">${item.title}</h2>
<div id="epBox" style="display:flex;flex-wrap:wrap;gap:10px;padding:10px"></div>`;

let box=document.getElementById("epBox");

item.episodes.forEach(ep=>{
let d=document.createElement("div");
d.className="card";
d.textContent=ep.name;
d.onclick=()=>startPlay(ep.servers);
box.appendChild(d);
});
}

/* PLAY */
function startPlay(list){
overlay.style.display="none";
player.style.display="block";
playServers([...list]);
}

/* AUTO SWITCH SERVER */
async function playServers(list){

for(let i=0;i<list.length;i++){
try{
await Promise.race([
play(list[i].url),
new Promise((_,rej)=>setTimeout(()=>rej(),8000))
]);
return;
}catch(e){}
}

alert("❌ เล่นไม่ได้ทุก server");
}

/* =========================
   TV BOX MODE PLAYER
========================= */
async function play(url){

if(hls){hls.destroy();hls=null;}

video.pause();
video.removeAttribute("src");
frame.src="";

video.style.display="none";
frame.style.display="none";

/* ===== HLS ===== */
if(url.includes(".m3u8") || url.includes(".txt")){

video.style.display="block";

/* 🔥 STABLE TV MODE */
hls = new Hls({
  maxBufferLength: 30,
  maxMaxBufferLength: 60,
  backBufferLength: 20,
  liveSyncDuration: 3,
  enableWorker: true,
  lowLatencyMode: true
});

/* 🔥 IMPORTANT: เล่นตรง ไม่ proxy segment */
hls.loadSource(url);
hls.attachMedia(video);

return new Promise((res,rej)=>{

hls.on(Hls.Events.MANIFEST_PARSED,()=>{

video.muted = false;
video.volume = 1;

/* 🔥 force play TV */
video.play().catch(()=>{});

res();
});

/* 🔥 auto recover */
hls.on(Hls.Events.ERROR,(e,d)=>{
if(d.fatal){
if(d.type===Hls.ErrorTypes.NETWORK_ERROR){
hls.startLoad();
}else if(d.type===Hls.ErrorTypes.MEDIA_ERROR){
hls.recoverMediaError();
}else{
hls.destroy();
rej();
}
}
});

});

}

/* ===== iframe ===== */
frame.style.display="block";
frame.src=url;

return Promise.resolve();
}

/* CLOSE */
function closePlayer(){
if(hls) hls.destroy();
video.pause();
video.src="";
frame.src="";
player.style.display="none";
grid.style.display="block";
}

/* HOME */
function goHome(){
