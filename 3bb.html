<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIEA IPTV (STABLE)</title>

<script src="https://ssl.p.jwpcdn.com/player/v/8.26.0/jwplayer.js"></script>
<script>
jwplayer.key = 'XSuP4qMl+9tK17QNb+4+th2Pm9AWgMO/cYH8CI0HGGr7bdjo';
</script>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{margin:0;background:#000;color:#fff;font-family:Arial;}
h2{text-align:center;color:orange;margin:10px;}

#channel-list{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(90px,1fr));
gap:10px;
padding:10px;
}

.channel{
background:#222;
border:2px solid #444;
border-radius:10px;
padding:5px;
text-align:center;
cursor:pointer;
}
.channel.active{background:orange;color:#000;}
.channel img{width:60px;height:60px;object-fit:contain;}

#player-container{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:90%;
max-width:1000px;
aspect-ratio:16/9;
background:#000;
border:2px solid orange;
border-radius:10px;
display:none;
z-index:9999;
}

#jw-player,#html5-player{
width:100%!important;
height:100%!important;
}

#closeBtn{
position:absolute;
top:10px;
right:10px;
background:red;
color:#fff;
border:none;
padding:6px 10px;
cursor:pointer;
z-index:10001;
}

.back-home{
position:fixed;
top:10px;
left:10px;
background:rgba(255,255,255,0.2);
padding:8px 12px;
border-radius:20px;
cursor:pointer;
z-index:9999;
}
</style>
</head>

<body>

<div class="back-home" onclick="location.reload()">⬅ หน้าโฮม</div>
<h2>TIEA IPTV</h2>

<div id="player-container">
<div id="jw-player"></div>
<video id="html5-player" controls autoplay muted playsinline style="display:none;"></video>
<button id="closeBtn" onclick="closePlayer()">X</button>
</div>

<div id="channel-list"></div>

<script>

const PROXY = "https://iptv.tawatchai250958.workers.dev/?url=";

/* ================= CHANNEL ================= */
const channels = [
{
name:"test",
logo:"https://ais-s.ais-vidnt.com/ais/play/origin/LIVE//channelicon/0001.png",
file:"https://five22rd.com/bein3th/tracks-v1a1/mono.ts.m3u8",
drm:false
},
{
name:"ThaiPBS",
logo:"https://ais-s.ais-vidnt.com/ais/play/origin/LIVE/channelicon/0014.png",
file:"https://cdn2.googlecdnforstreaming.live/tubtoeball/tsp1/chunks.m3u8",
drm:false
},
{
name:"PPTV",
logo:"https://ais-s.ais-vidnt.com/ais/play/origin/LIVE/channelicon/PPTV_2024e.jpg",
file:"https://lb-gmmz.sky-cdn.com/gmm/pptv.m3u8",
drm:false
}
];

document.addEventListener("DOMContentLoaded",()=>{
const list=document.getElementById("channel-list");

channels.forEach(ch=>{
let div=document.createElement("div");
div.className="channel";

div.innerHTML=`
<img src="${ch.logo}">
<div>${ch.name}</div>
`;

div.onclick=()=>loadChannel(ch,div);
list.appendChild(div);
});
});

let currentHls=null;

/* ================= PLAY ================= */
function loadChannel(ch,el){

document.querySelectorAll('.channel').forEach(c=>c.classList.remove('active'));
el.classList.add('active');

const container=document.getElementById("player-container");
container.style.display="block";

const jw=document.getElementById("jw-player");
const video=document.getElementById("html5-player");

if(currentHls){currentHls.destroy(); currentHls=null;}
try{jwplayer("jw-player").remove();}catch(e){}

video.pause();
video.src="";
video.style.display="none";
jw.style.display="block";

/* 🔥 ลอง 2 แบบ */
let url = ch.file;
let proxyUrl = PROXY + encodeURIComponent(url);

playWithFallback(url, proxyUrl, ch);

}

/* ================= FALLBACK ================= */
function playWithFallback(url, proxyUrl, ch){

let list = [url, proxyUrl];
let i = 0;

function next(){

if(i >= list.length){
useHTML5(url);
return;
}

let config={
file:list[i],
autostart:true
};

if(ch.drm){
config.drm={
clearkey:{
keyId:ch.keyId,
key:ch.key
}
};
}

let player=jwplayer("jw-player").setup(config);

player.on("error",()=>{
i++;
try{jwplayer("jw-player").remove();}catch(e){}
next();
});

setTimeout(()=>{
if(player.getState()!=="playing"){
i++;
try{jwplayer("jw-player").remove();}catch(e){}
next();
}
},6000);

}

next();
}

/* ================= HTML5 ================= */
function useHTML5(url){

const jw=document.getElementById("jw-player");
const video=document.getElementById("html5-player");

jw.style.display="none";
video.style.display="block";

if(video.canPlayType('application/vnd.apple.mpegurl')){
video.src=url;
video.play();
}else if(Hls.isSupported()){
currentHls=new Hls();
currentHls.loadSource(url);
currentHls.attachMedia(video);
currentHls.on(Hls.Events.MANIFEST_PARSED,()=>video.play());
}

}

/* ================= CLOSE ================= */
function closePlayer(){
document.getElementById("player-container").style.display="none";

if(currentHls){currentHls.destroy(); currentHls=null;}
try{jwplayer("jw-player").remove();}catch(e){}

let v=document.getElementById("html5-player");
v.pause();
v.src="";
}

</script>

</body>
</html>
