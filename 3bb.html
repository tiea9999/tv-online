let currentHls = null;
let shakaPlayer = null;
let activeJW = null;

function proxyUrl(url){
  return url;
}

async function stopAllPlayers(){
  const video = document.getElementById("html5-player");

  if(currentHls){
    currentHls.destroy();
    currentHls = null;
  }

  if(shakaPlayer){
    try{ await shakaPlayer.destroy(); }catch(e){}
    shakaPlayer = null;
  }

  try{
    if(activeJW){
      activeJW.stop();
      activeJW.remove();
      activeJW = null;
    }
  }catch(e){}

  video.pause();
  video.removeAttribute("src");
  video.load();
  video.style.display = "none";

  const jwBox = document.getElementById("jw-player");
  if(jwBox) jwBox.style.display = "none";
}

async function loadChannel(channel, element){
  document.querySelectorAll(".channel").forEach(ch=>ch.classList.remove("active"));
  if(element) element.classList.add("active");

  document.getElementById("player-container").style.display = "block";
  await stopAllPlayers();

  const url = proxyUrl(channel.file);

  if(url.includes(".mpd")){
    playMPD(channel, url);
  }else{
    useHLS(url);
  }

  setTimeout(()=>{
    const btn = document.getElementById("closeBtn");
    if(btn) btn.focus();
  },300);
}

/* ================= MPD ================= */
async function playMPD(channel, url){
  const video = document.getElementById("html5-player");
  const jwBox = document.getElementById("jw-player");

  if(jwBox) jwBox.style.display = "none";
  video.style.display = "block";

  video.muted = false;
  video.defaultMuted = false;
  video.volume = 1.0;

  shaka.polyfill.installAll();

  shakaPlayer = new shaka.Player(video);

  if(channel.drm){
    shakaPlayer.configure({
      drm:{
        clearKeys:{
          [channel.keyId]: channel.key
        }
      }
    });
  }

  try{
    await shakaPlayer.load(url);

    setTimeout(()=>{
      video.muted = false;
      video.defaultMuted = false;
      video.volume = 1.0;
      video.play().catch(()=>{});
    },300);

  }catch(e){
    console.log("MPD ERROR:", e);
  }
}

/* ================= HLS ================= */
function useHLS(url){
  const video = document.getElementById("html5-player");
  const jwBox = document.getElementById("jw-player");

  if(jwBox) jwBox.style.display = "none";
  video.style.display = "block";

  if(currentHls){
    currentHls.destroy();
    currentHls = null;
  }

  if(Hls.isSupported()){
    currentHls = new Hls({
      enableWorker:true,
      maxBufferLength:8,
      maxMaxBufferLength:16
    });

    currentHls.loadSource(url);
    currentHls.attachMedia(video);

    currentHls.on(Hls.Events.MANIFEST_PARSED, function(){

      // 🔥 บังคับเสียง 100%
      video.muted = false;
      video.defaultMuted = false;
      video.volume = 1.0;

      video.play().catch(()=>{});
    });

  }else{
    video.src = url;

    setTimeout(()=>{
      video.muted = false;
      video.defaultMuted = false;
      video.volume = 1.0;
      video.play().catch(()=>{});
    },300);
  }
}

/* ================= CLOSE ================= */
async function closePlayer(){
  await stopAllPlayers();
  document.getElementById("player-container").style.display = "none";
}

function goHome(){
  window.location.href = "https://tiea9999.github.io/tv-online/index.html";
}

/* ================= REMOTE ================= */
document.addEventListener("keydown",function(e){
  const container = document.getElementById("player-container");

  if(container.style.display === "block"){
    if(e.key === "Escape" || e.key === "Backspace"){
      e.preventDefault();
      closePlayer();
    }
  }
});

/* ================= INIT ================= */
document.addEventListener("DOMContentLoaded",function(){
  const listContainer = document.getElementById("channel-list");

  channels.forEach(ch=>{
    const div = document.createElement("div");
    div.className = "channel";
    div.tabIndex = 0;
    div.innerHTML = `<img src="${ch.logo}"><span>${ch.name}</span>`;

    div.onclick = ()=>loadChannel(ch,div);

    div.onkeydown = e=>{
      if(e.key === "Enter"){
        loadChannel(ch,div);
      }
    };

    listContainer.appendChild(div);
  });
});
