function setStatus(text, autoHide=true){
  const box = document.getElementById("status");
  if(!box) return;
  box.textContent = text || "";
  box.style.display = text ? "block" : "none";
  if(autoHide && text){
    clearTimeout(setStatus._timer);
    setStatus._timer = setTimeout(()=>{ box.style.display = "none"; }, 5000);
  }
}

function forceAudio100(){
  const video = document.getElementById("html5-player");
  try{
    video.muted = false;
    video.defaultMuted = false;
    video.volume = 1.0;
  }catch(e){}
}

function openExternal(url){
  url = url || activeUrl || (activeChannel ? activeChannel.file : "");
  if(!url) return;
  try{
    const u = new URL(url);
    const scheme = u.protocol.replace(":","");
    const hostPath = u.host + u.pathname + (u.search || "");
    const intent = "intent://" + hostPath +
      "#Intent;scheme=" + scheme +
      ";action=android.intent.action.VIEW;type=video/*;S.browser_fallback_url=" +
      encodeURIComponent(url) + ";end";
    window.location.href = intent;
  }catch(e){
    window.location.href = url;
  }
}

async function stopAllPlayers(){
  const video = document.getElementById("html5-player");

  if(hlsWatchdog){
    clearInterval(hlsWatchdog);
    hlsWatchdog = null;
  }

  if(currentHls){
    try{ currentHls.destroy(); }catch(e){}
    currentHls = null;
  }

  if(shakaPlayer){
    try{ await shakaPlayer.destroy(); }catch(e){}
    shakaPlayer = null;
  }

  try{
    video.pause();
    video.removeAttribute("src");
    video.load();
  }catch(e){}

  video.style.display = "none";

  const jwBox = document.getElementById("jw-player");
  if(jwBox) jwBox.style.display = "none";
  setStatus("");
}

async function loadChannel(channel, element){
  activeChannel = channel;
  activeElement = element;

  document.querySelectorAll(".channel").forEach(ch=>ch.classList.remove("active"));
  if(element) element.classList.add("active");

  document.getElementById("player-container").style.display = "block";
  forceShowControls();
  await stopAllPlayers();

  const url = proxyUrl(channel.file);
  activeUrl = url;

  if(url.includes(".mpd")){
    playMPDNotice(channel, url);
  }else{
    useHLS_STABLE(url);
  }

  setTimeout(()=>{
    const btn = document.getElementById("closeBtn");
    if(btn) btn.focus();
  },300);
}

/* ================= MPD =================
   หมายเหตุ: MPD/DRM หลายช่องไม่เล่นใน WebView/Smart TV browser
   เพราะเครื่องไม่รองรับ EME/ClearKey หรือ header/DRM ไม่ผ่าน
   เวอร์ชันนี้ไม่ฝืนเล่นในเว็บ เพื่อไม่ให้ค้าง/จอดำ
*/
function playMPDNotice(channel, url){
  const video = document.getElementById("html5-player");
  const jwBox = document.getElementById("jw-player");
  if(jwBox) jwBox.style.display = "none";
  video.style.display = "block";
  video.controls = true;
  forceAudio100();

  setStatus("ไฟล์ MPD/DRM เล่นในเว็บนี้ไม่ได้ในบางเครื่อง ให้กด PLAYER หรือ MX", false);

  // ลองด้วย Shaka แบบไม่บังคับ ถ้าเครื่องรองรับจะเล่นได้ ถ้าไม่รองรับจะไม่ค้าง
  try{
    if(window.shaka){
      shaka.polyfill.installAll();
      if(shaka.Player.isBrowserSupported()){
        shakaPlayer = new shaka.Player(video);
        shakaPlayer.configure({
          streaming:{
            bufferingGoal: 30,
            rebufferingGoal: 5,
            bufferBehind: 15,
            retryParameters:{maxAttempts:4,baseDelay:1000,backoffFactor:1.5,timeout:25000}
          }
        });
        if(channel.drm){
          shakaPlayer.configure({drm:{clearKeys:{[channel.keyId]:channel.key}}});
        }
        shakaPlayer.load(url).then(()=>{
          forceAudio100();
          video.play().catch(()=>{});
          setStatus("กำลังเล่น MPD");
        }).catch(e=>{
          console.log("MPD เล่นในเว็บไม่ได้:", e);
          setStatus("MPD เล่นในเว็บนี้ไม่ได้ ให้กด PLAYER/MX", false);
        });
      }
    }
  }catch(e){
    console.log("MPD ERROR:", e);
  }
}

/* ================= HLS STABLE CLASSIC ================= */
function useHLS_STABLE(url){
  const video = document.getElementById("html5-player");
  const jwBox = document.getElementById("jw-player");

  if(jwBox) jwBox.style.display = "none";
  video.style.display = "block";
  video.controls = true;
  forceAudio100();

  if(currentHls){
    try{ currentHls.destroy(); }catch(e){}
    currentHls = null;
  }

  if(hlsWatchdog){
    clearInterval(hlsWatchdog);
    hlsWatchdog = null;
  }

  if(Hls.isSupported() && url.includes(".m3u8")){
    setStatus("กำลังโหลด HLS...");

    currentHls = new Hls({
      enableWorker: true,
      lowLatencyMode: false,

      // สูตรเดิมที่นิ่งกว่า: ไม่ล็อกคุณภาพแข็งเกินไป
      maxBufferLength: 30,
      maxMaxBufferLength: 60,
      backBufferLength: 20,
      maxBufferHole: 0.5,
      highBufferWatchdogPeriod: 3,

      manifestLoadingMaxRetry: 5,
      manifestLoadingRetryDelay: 1000,
      manifestLoadingMaxRetryTimeout: 8000,
      levelLoadingMaxRetry: 5,
      levelLoadingRetryDelay: 1000,
      levelLoadingMaxRetryTimeout: 8000,
      fragLoadingMaxRetry: 6,
      fragLoadingRetryDelay: 1000,
      fragLoadingMaxRetryTimeout: 10000,

      startFragPrefetch: true,
      capLevelToPlayerSize: true,
      testBandwidth: false,
      abrEwmaDefaultEstimate: 1200000
    });

    currentHls.loadSource(url);
    currentHls.attachMedia(video);

    currentHls.on(Hls.Events.MANIFEST_PARSED, function(){
      forceAudio100();
      video.play().catch(()=>{});
      setTimeout(()=>{ forceAudio100(); video.play().catch(()=>{}); },300);
      setStatus("กำลังเล่น HLS");
    });

    currentHls.on(Hls.Events.BUFFER_STALLED, function(){
      setStatus("กำลังเติมบัฟเฟอร์...", true);
    });

    currentHls.on(Hls.Events.ERROR, function(event, data){
      console.log("HLS ERROR:", data);
      if(!currentHls) return;

      if(data.fatal){
        if(data.type === Hls.ErrorTypes.NETWORK_ERROR){
          setStatus("เน็ตเวิร์กสะดุด กำลังโหลดต่อ...");
          try{ currentHls.startLoad(); }catch(e){}
        }else if(data.type === Hls.ErrorTypes.MEDIA_ERROR){
          setStatus("สัญญาณวิดีโอสะดุด กำลังกู้คืน...");
          try{ currentHls.recoverMediaError(); }catch(e){}
        }else{
          setStatus("เล่นไม่ได้ กำลังลองโหลดใหม่...", false);
          try{
            currentHls.destroy();
            currentHls = null;
            setTimeout(()=>useHLS_STABLE(url), 1200);
          }catch(e){}
        }
      }
    });

    // watchdog แบบเบา ไม่รีโหลดถี่เกินไป
    let lastTime = 0;
    let stuckCount = 0;
    hlsWatchdog = setInterval(()=>{
      if(document.getElementById("player-container").style.display !== "block") return;
      if(!currentHls) return;

      forceAudio100();

      if(video.paused || video.readyState < 2){
        try{ currentHls.startLoad(); }catch(e){}
        video.play().catch(()=>{});
        return;
      }

      if(Math.abs(video.currentTime - lastTime) < 0.05){
        stuckCount++;
      }else{
        stuckCount = 0;
      }

      lastTime = video.currentTime;

      if(stuckCount >= 4){
        setStatus("ภาพค้าง กำลังกู้คืน...");
        try{ currentHls.startLoad(); }catch(e){}
        video.play().catch(()=>{});
        stuckCount = 0;
      }
    }, 3000);

  }else{
    video.src = url;
    setTimeout(()=>{
      forceAudio100();
      video.play().catch(()=>{});
    },300);
  }
}

/* ================= FORCE AUTO HIDE PLAYER CONTROLS ================= */
let controlsTimer = null;

function forceShowControls(){
  const box = document.getElementById("player-container");
  if(!box) return;

  box.classList.remove("force-hide-controls");
  box.classList.remove("controls-hidden");

  if(controlsTimer) clearTimeout(controlsTimer);

  controlsTimer = setTimeout(function(){
    forceHideControls();
  }, 3000);
}

function forceHideControls(){
  const box = document.getElementById("player-container");
  if(!box) return;
  if(box.style.display !== "none"){
    try{
      const active = document.activeElement;
      if(active && active.blur) active.blur();
    }catch(e){}
    box.classList.add("force-hide-controls");
    box.classList.add("controls-hidden");
  }
}

function setupForceAutoHide(){
  const box = document.getElementById("player-container");
  if(!box || box.dataset.forceHideReady === "1") return;
  box.dataset.forceHideReady = "1";

  ["mousemove","mousedown","touchstart","touchmove","click","pointermove","pointerdown"].forEach(function(ev){
    box.addEventListener(ev, forceShowControls, {passive:true});
  });

  document.addEventListener("keydown", function(){
    if(box.style.display !== "none"){
      forceShowControls();
    }
  });
}

async function closePlayer(){
  await stopAllPlayers();
  document.getElementById("player-container").classList.remove("controls-hidden");
  document.getElementById("player-container").classList.remove("force-hide-controls");
  document.getElementById("player-container").classList.remove("force-hide-controls");
  document.getElementById("player-container").style.display = "none";
}

document.addEventListener("keydown",function(e){
  const container = document.getElementById("player-container");

    if(e.key === "Escape" || e.key === "Backspace" || e.key === "BrowserBack"){

});
