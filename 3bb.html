document.addEventListener("DOMContentLoaded",()=>{
const list=document.getElementById("channel-list");

channels.forEach(ch=>{
let div=document.createElement("div");
div.className="channel";

div.innerHTML=`
<img src="${ch.logo}">
<div>${ch.name}</div>
`;

div.onclick=()=>loadChannel(ch,div);
list.appendChild(div);
});
});

let currentHls=null;

/* ================= PLAY ================= */
function loadChannel(ch,el){

document.querySelectorAll('.channel').forEach(c=>c.classList.remove('active'));
el.classList.add('active');

const container=document.getElementById("player-container");
container.style.display="block";

const jw=document.getElementById("jw-player");
const video=document.getElementById("html5-player");

if(currentHls){currentHls.destroy(); currentHls=null;}
try{jwplayer("jw-player").remove();}catch(e){}

video.pause();
video.src="";
video.style.display="none";
jw.style.display="block";

/* 🔥 ลอง 2 แบบ */
let url = ch.file;
let proxyUrl = PROXY + encodeURIComponent(url);

playWithFallback(url, proxyUrl, ch);

}

/* ================= FALLBACK ================= */
function playWithFallback(url, proxyUrl, ch){

let list = [url, proxyUrl];
let i = 0;

function next(){

if(i >= list.length){
useHTML5(url);
return;
}

let config={
file:list[i],
autostart:true
};

if(ch.drm){
config.drm={
clearkey:{
keyId:ch.keyId,
key:ch.key
}
};
}

let player=jwplayer("jw-player").setup(config);

player.on("error",()=>{
i++;
try{jwplayer("jw-player").remove();}catch(e){}
next();
});

setTimeout(()=>{
if(player.getState()!=="playing"){
i++;
try{jwplayer("jw-player").remove();}catch(e){}
next();
}
},6000);

}

next();
}

/* ================= HTML5 ================= */
function useHTML5(url){

const jw=document.getElementById("jw-player");
const video=document.getElementById("html5-player");

jw.style.display="none";
video.style.display="block";

if(video.canPlayType('application/vnd.apple.mpegurl')){
video.src=url;
video.play();
}else if(Hls.isSupported()){
currentHls=new Hls();
currentHls.loadSource(url);
currentHls.attachMedia(video);
currentHls.on(Hls.Events.MANIFEST_PARSED,()=>video.play());
}

}

/* ================= CLOSE ================= */
function closePlayer(){
document.getElementById("player-container").style.display="none";

if(currentHls){currentHls.destroy(); currentHls=null;}
try{jwplayer("jw-player").remove();}catch(e){}

let v=document.getElementById("html5-player");
v.pause();
v.src="";
}
